/* ---- Daily Log Section (inside Transcript tab) ---- */
function DailyLogSection({pal,cp,childEntries,subjEntries}){
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null);

  // Group subject entries by date
  const byDate = {};
  subjEntries.forEach(e=>{
    if(!e.date) return;
    if(!byDate[e.date]) byDate[e.date]={date:e.date,entries:[],dayNote:null};
    byDate[e.date].entries.push(e);
  });
  // Also pull daily notes entries for parent notes per day
  childEntries.filter(e=>e.isDay||e.subj==="Daily Notes").forEach(e=>{
    if(!e.date) return;
    if(!byDate[e.date]) byDate[e.date]={date:e.date,entries:[],dayNote:null};
    byDate[e.date].dayNote = e;
  });

  // Sort dates newest first
  const allDates = Object.values(byDate).sort((a,b)=>{
    // Parse "Mar 25" style dates for sorting
    try{
      const parse = s => new Date(s+", "+new Date().getFullYear());
      return parse(b.date) - parse(a.date);
    }catch{return 0;}
  });

  // Filter by search
  const filtered = search.trim()
    ? allDates.filter(d=>
        d.date.toLowerCase().includes(search.toLowerCase()) ||
        d.entries.some(e=>e.subj?.toLowerCase().includes(search.toLowerCase())||e.note?.toLowerCase().includes(search.toLowerCase())||e.title?.toLowerCase().includes(search.toLowerCase()))
      )
    : allDates;

  if(allDates.length===0) return null;

  return (
    <div style={{marginBottom:"0.85rem"}}>
      {/* Header + search */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.55rem"}}>
        <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>Daily Activity Log</div>
        <div style={{fontSize:"0.7rem",color:pal.slate,fontWeight:"600"}}>{allDates.length} day{allDates.length!==1?"s":""}</div>
      </div>
      <div style={{position:"relative",marginBottom:"0.65rem"}}>
        <input
          value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={"Search by date or subject..."}
          style={{width:"100%",padding:"0.5rem 0.85rem 0.5rem 2.1rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.81rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor=cp.c1}
          onBlur={e=>e.target.style.borderColor=pal.stone}/>
        <span style={{position:"absolute",left:"0.65rem",top:"50%",transform:"translateY(-50%)",fontSize:"0.85rem",pointerEvents:"none"}}>{"🔍"}</span>
        {search&&<button onClick={()=>setSearch("")}
          style={{position:"absolute",right:"0.55rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.75rem",padding:"0.1rem 0.25rem"}}>{"✕"}</button>}
      </div>

      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"1rem",fontSize:"0.78rem",color:pal.slate,background:pal.linen,borderRadius:"12px",border:`1.5px solid ${pal.stone}25`}}>
          No days match {"\""+search+"\""}.
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
          {filtered.map(day=>{
            const isOpen = expanded===day.date;
            const parentNote = day.dayNote?.note?.replace("AI Summary: ","").trim()||"";
            const aiSummary  = day.dayNote?.aiSummary||"";
            const noteToShow = parentNote.replace(aiSummary,"").trim();
            return (
              <div key={day.date} style={{background:pal.linen,borderRadius:"13px",border:`1.5px solid ${isOpen?cp.c1+"50":pal.stone+"30"}`,overflow:"hidden",transition:"border-color 0.15s"}}>
                {/* Day header row */}
                <button onClick={()=>setExpanded(isOpen?null:day.date)}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:"0.65rem",padding:"0.65rem 0.85rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"10px",background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}15)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <div style={{fontSize:"0.55rem",fontWeight:"700",color:cp.c1,textTransform:"uppercase"}}>{day.date.split(" ")[0]}</div>
                    <div style={{fontSize:"0.9rem",fontWeight:"900",color:cp.c1,lineHeight:1}}>{day.date.split(" ")[1]||""}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{day.date}</div>
                    <div style={{fontSize:"0.65rem",color:pal.slate,marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {day.entries.map(e=>e.subj).filter((v,i,a)=>a.indexOf(v)===i).join(" \u00b7 ")}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexShrink:0}}>
                    <div style={{background:cp.c1+"20",borderRadius:"20px",padding:"0.1rem 0.45rem"}}>
                      <span style={{fontWeight:"800",color:cp.c1,fontSize:"0.72rem"}}>{day.entries.length}</span>
                    </div>
                    <span style={{color:pal.slate,fontSize:"0.9rem",transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>{"›"}</span>
                  </div>
                </button>

                {/* Expanded entries */}
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${pal.stone}20`}}>
                    {day.entries.map((e,i)=>(
                      <div key={e.id||i} style={{display:"flex",gap:"0.55rem",alignItems:"flex-start",padding:"0.55rem 0.85rem",borderTop:i>0?`1px solid ${pal.stone}12`:"none",background:"#fff"}}>
                        <span style={{fontSize:"1rem",flexShrink:0,marginTop:"1px"}}>{e.thumb||"📋"}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.8rem"}}>{e.subj}</div>
                          {e.readingTitle&&(
                            <div style={{fontSize:"0.7rem",color:pal.primary,fontWeight:"600",marginTop:"1px"}}>{"📖 "+e.readingTitle}</div>
                          )}
                          {e.note&&e.note.trim()&&(
                            <div style={{fontSize:"0.72rem",color:pal.inkM,marginTop:"2px",lineHeight:1.55}}>{e.note}</div>
                          )}
                        </div>
                      </div>
                    ))}
                    {noteToShow&&(
                      <div style={{padding:"0.55rem 0.85rem",borderTop:`1px solid ${pal.stone}15`,background:pal.pale}}>
                        <div style={{fontSize:"0.62rem",fontWeight:"800",color:pal.primary,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"3px"}}>Parent Notes</div>
                        <div style={{fontSize:"0.75rem",color:pal.inkM,lineHeight:1.6}}>{noteToShow}</div>
                      </div>
                    )}
                    {aiSummary&&(
                      <div style={{padding:"0.45rem 0.85rem",borderTop:`1px solid ${pal.stone}12`,background:"#fff"}}>
                        <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,marginBottom:"2px"}}>{"✨ AI Summary"}</div>
                        <div style={{fontSize:"0.72rem",color:pal.inkM,lineHeight:1.55,fontStyle:"italic"}}>{aiSummary}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

        {/* ====== COMPARE ====== */}
        {activeView==="compare"&&family.children.length>1&&(()=>{
          const yr=new Date().getFullYear();
          const weekStart2=new Date();
          weekStart2.setDate(weekStart2.getDate()-(weekStart2.getDay()===0?6:weekStart2.getDay()-1));
          weekStart2.setHours(0,0,0,0);
          return (
            <div style={{animation:"fadeUp 0.18s ease"}}>
              <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.85rem"}}>
                {"Side-by-side · "+family.children.length+" children"}
              </div>
              <div style={{background:pal.linen,borderRadius:"16px",overflow:"hidden",border:`1.5px solid ${pal.stone}30`,marginBottom:"1rem"}}>
                <div style={{display:"grid",gridTemplateColumns:"120px "+family.children.map(()=>"1fr").join(" "),background:pal.parchm,borderBottom:`1px solid ${pal.stone}25`}}>
                  <div style={{padding:"0.55rem 0.75rem",fontSize:"0.65rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em"}}>Metric</div>
                  {family.children.map((c,i)=>{
                    const ccp=CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                    return (
                      <div key={c.id} style={{padding:"0.55rem 0.5rem",textAlign:"center",borderLeft:`1px solid ${pal.stone}20`}}>
                        <div style={{fontSize:"1.1rem"}}>{c.avatar}</div>
                        <div style={{fontSize:"0.65rem",fontWeight:"800",color:ccp.c1}}>{c.name}</div>
                        <div style={{fontSize:"0.58rem",color:pal.slate}}>{c.grade}</div>
                      </div>
                    );
                  })}
                </div>
                {[
                  {label:"Total Entries", fn:(i)=>portfolioEntries.filter(e=>e.childIdx===i&&!e.isDay).length},
                  {label:"Subjects Logged", fn:(i)=>[...new Set(portfolioEntries.filter(e=>e.childIdx===i&&!e.isDay).map(e=>e.subj))].length},
                  {label:"This Week", fn:(i)=>portfolioEntries.filter(e=>e.childIdx===i&&!e.isDay&&(()=>{try{return new Date(e.date+", "+yr)>=weekStart2;}catch{return false;}})()).length},
                  {label:"Reading Titles", fn:(i)=>portfolioEntries.filter(e=>e.childIdx===i&&(e.readingTitle||e.subj==="Reading")&&(e.readingTitle||e.title)).length},
                  {label:"Photos", fn:(i)=>portfolioEntries.filter(e=>e.childIdx===i&&e.photos&&e.photos.length>0).length},
                ].map((row,ri)=>(
                  <div key={ri} style={{display:"grid",gridTemplateColumns:"120px "+family.children.map(()=>"1fr").join(" "),borderTop:`1px solid ${pal.stone}15`,background:ri%2===0?"#fff":pal.parchm+"80"}}>
                    <div style={{padding:"0.55rem 0.75rem",fontSize:"0.74rem",color:pal.inkM,fontWeight:"600"}}>{row.label}</div>
                    {family.children.map((c,i)=>{
                      const val=row.fn(i);
                      const vals=family.children.map((_,j)=>row.fn(j));
                      const max=Math.max(...vals);
                      const isMax=val===max&&max>0;
                      const ccp=CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                      return (
                        <div key={c.id} style={{padding:"0.55rem 0.5rem",textAlign:"center",borderLeft:`1px solid ${pal.stone}15`}}>
                          <span style={{fontSize:"0.88rem",fontWeight:"800",color:isMax?ccp.c1:pal.inkM}}>{val}</span>
                          {isMax&&vals.filter(v=>v===max).length===1&&<span style={{fontSize:"0.6rem",marginLeft:"2px"}}>{"✓"}</span>}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.5rem",textTransform:"uppercase",letterSpacing:"0.06em"}}>Subject Coverage</div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.35rem",marginBottom:"1rem"}}>
                {[...new Set(portfolioEntries.filter(e=>!e.isDay).map(e=>e.subj))].map(subj=>(
                  <div key={subj} style={{background:"#fff",borderRadius:"11px",padding:"0.55rem 0.75rem",border:`1px solid ${pal.stone}20`,display:"flex",gap:"0.5rem",alignItems:"center"}}>
                    <div style={{fontSize:"0.78rem",fontWeight:"600",color:pal.inkM,width:"100px",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj}</div>
                    <div style={{flex:1,display:"flex",gap:"0.3rem",flexWrap:"wrap"}}>
                      {family.children.map((c,i)=>{
                        const cnt=portfolioEntries.filter(e=>e.childIdx===i&&e.subj===subj&&!e.isDay).length;
                        const ccp=CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                        return cnt>0?(
                          <div key={c.id} style={{display:"flex",alignItems:"center",gap:"0.2rem",padding:"0.15rem 0.45rem",background:ccp.c1+"18",borderRadius:"20px",border:`1px solid ${ccp.c1}30`}}>
                            <span style={{fontSize:"0.75rem"}}>{c.avatar}</span>
                            <span style={{fontSize:"0.65rem",fontWeight:"700",color:ccp.c1}}>{cnt}</span>
                          </div>
                        ):null;
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

    </div>
  );
}

/* ---- Narrative Editor (inline within TranscriptsScreen) ---- */
function NarrativeEditor({pal,ch,family,bySubject,attendanceDays,schoolName,cp,compact=false,observationLog=[]}){
  const LS_KEY = "rootbloom_narrative_"+ch.id;
  const [text, setText] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  const save = (v) => {
    setText(v);
    try{ localStorage.setItem(LS_KEY,v); }catch(e){}
  };

  const generate = async () => {
    setGenerating(true); setError(null);
    const subjList    = Object.keys(bySubject).join(", ")||"various subjects";
    const subjCounts  = Object.entries(bySubject).map(([s,d])=>s+": "+d.count+" entries").join(", ");
    const goals       = goalSummary(family);
    const curriculum  = curriculumContext(family);
    const allGoalObjs = [...GOALS,...(family.customGoals||[])];
    const goalProgress = (family.goals||[]).map(id=>{
      const g = allGoalObjs.find(x=>x.id===id);
      const nudge = GOAL_NUDGES[id];
      if(!g) return null;
      const cnt = nudge?.subjs?.length>0
        ? Object.entries(bySubject).filter(([s])=>nudge.subjs.includes(s)).reduce((n,[,d])=>n+d.count,0)
        : null;
      return g.label+(cnt!==null?" ("+cnt+" related entries)":"");
    }).filter(Boolean).join(", ");

    // Pull this child's observation notes — most recent 8, condensed
    const childObs = observationLog
      .filter(e=>e.childId===ch.id)
      .sort((a,b)=>(b.ts||0)-(a.ts||0))
      .slice(0,8)
      .map(e=>"\u2022 "+e.text.slice(0,120)+(e.text.length>120?"...":""))
      .join("\n");

    const prompt = "Write a warm, professional annual narrative report for a homeschool portfolio."
      + " Student: "+ch.name+", "+ch.grade+" grade."
      + " School: "+schoolName+". State: "+(family.state||"")+"."
      + " Curriculum: "+curriculum+"."
      + " Subjects studied: "+subjList+"."
      + " Portfolio entries by subject: "+subjCounts+"."
      + " Days completed: "+attendanceDays+"."
      + " Family goals this year: "+goals+"."
      + (goalProgress?" Goal progress: "+goalProgress+".":"")
      + (childObs?"\n\nParent observations recorded throughout the year (use these to make the narrative specific and personal):\n"+childObs+"\n\n":"")
      + " Write 3 paragraphs:"
      + " 1) Overview of the year — approach, rhythm, and how the family's goals shaped their homeschool."
      + " 2) Academic highlights — growth in key subjects, notable entries, reading, and specific achievements. Draw from the parent observations where relevant."
      + " 3) Character and personal development — tie back to stated goals, highlight growth beyond academics. Reference specific moments from the observations if available."
      + " Weave the parent observations naturally — make it feel like the parent wrote this from memory, not like a data report."
      + " Warm, specific, parent-voice. Suitable for state review. Under 300 words.";
    try {
      const text = await callClaude(prompt);
      save(text);
    } catch(e) {
      const msg = e.message==="NO_KEY"?"Add your API key in Settings → AI to generate narratives."
        :e.message==="RATE_LIMIT"?"Monthly AI limit reached."
        :"Could not connect. Try again.";
      setError(msg);
    }
    setGenerating(false);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.06em"}}>Annual Narrative</div>
          {observationLog.filter(e=>e.childId===ch.id).length>0&&(
            <div style={{fontSize:"0.64rem",color:pal.good,marginTop:"2px",fontWeight:"600"}}>
              {"📓 "+observationLog.filter(e=>e.childId===ch.id).length+" parent observations will be included"}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
          <span style={{fontSize:"0.65rem",color:pal.slate}}>{wordCount} words</span>
          {!compact&&<button onClick={generate} disabled={generating} style={{padding:"0.28rem 0.65rem",borderRadius:"8px",border:"none",background:generating?"#ccc":pal.accentGrad,color:"#fff",fontWeight:"700",fontSize:"0.7rem",cursor:generating?"default":"pointer"}}>
            {generating?"🔄 Writing...":"🤖 Generate"}
          </button>}
          {compact&&<button onClick={generate} disabled={generating} style={{padding:"0.22rem 0.5rem",borderRadius:"7px",border:"none",background:generating?"#ccc":`linear-gradient(135deg,${cp.c1},${cp.c2})`,color:"#fff",fontWeight:"700",fontSize:"0.62rem",cursor:generating?"default":"pointer"}}>
            {generating?"...":"🤖 AI"}
          </button>}
        </div>
      </div>
      {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem",padding:"0.5rem",background:"#faeae4",borderRadius:"8px"}}>{error}</div>}
      <textarea value={text} onChange={e=>save(e.target.value)}
        placeholder={"Write your annual narrative here, or use AI to generate one. Describe what "+ch.name+" studied this year, how they grew, highlights from each subject, and any notable achievements..."}
        rows={12}
        style={{width:"100%",padding:"0.75rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.8rem",fontFamily:"Georgia, serif",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.8}}
        onFocus={e=>e.target.style.borderColor=pal.primary}
        onBlur={e=>e.target.style.borderColor=pal.stone}/>
    </div>
  );
}
/* =======================================
   GOALS SCREEN
======================================= */
function GoalsScreen({pal,family,portfolioEntries=[],onUpdateFamily,onAddEntry}){
  const [editing,     setEditing]     = useState(false);
  const [draftGoals,  setDraftGoals]  = useState(family.goals||[]);
  const [customInput, setCustomInput] = useState("");

  const allGoalObjs  = [...GOALS,...(family.customGoals||[])];
  const activeGoals  = (family.goals||[]).map(id=>allGoalObjs.find(x=>x.id===id)).filter(Boolean);
  const subjEntries  = portfolioEntries.filter(e=>!e.isDay&&e.subj!=="Daily Notes");

  const [quickNoteId,  setQuickNoteId]  = useState(null); // goal id currently open
  const [quickNoteText,setQuickNoteText]= useState("");
  const [quickSaved,   setQuickSaved]   = useState(null); // id of last saved goal (for flash)

  const openQuickNote  = (id) => { setQuickNoteId(id); setQuickNoteText(""); };
  const closeQuickNote = ()   => { setQuickNoteId(null); setQuickNoteText(""); };
  const saveQuickNote  = (g)  => {
    const text = quickNoteText.trim();
    if(!text || !onAddEntry) return;
    const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    family.children.forEach((_,ci)=>{
      onAddEntry({
        childIdx: ci,
        title: text.slice(0,80),
        subj: "Goals",
        date: today,
        thumb: g.icon||"🌟",
        note: text,
        goalId: g.id,
        isSubject: true,
      });
    });
    setQuickSaved(g.id);
    closeQuickNote();
    setTimeout(()=>setQuickSaved(null), 2500);
  };

  const toggleDraft = id => setDraftGoals(g=>g.includes(id)?g.filter(x=>x!==id):[...g,id]);
  const addCustom = () => {
    const val = customInput.trim();
    if(!val) return;
    const id = "custom_"+val.toLowerCase().replace(/\s+/g,"_");
    const customs = family.customGoals||[];
    if(!customs.find(c=>c.id===id)){
      onUpdateFamily({customGoals:[...customs,{id,label:val,icon:"🌟"}]});
    }
    setDraftGoals(g=>[...g,id]);
    setCustomInput("");
  };
  const saveEdits = () => { onUpdateFamily({goals:draftGoals}); setEditing(false); };
  const cancelEdits = () => { setDraftGoals(family.goals||[]); setEditing(false); };

  // For each goal: find related entries, most recent, warmth message
  const getGoalData = (g) => {
    const nudge    = GOAL_NUDGES[g.id];
    const relSubjs = nudge?.subjs||[];
    const related  = relSubjs.length>0
      ? subjEntries.filter(e=>relSubjs.includes(e.subj)||(e.goalId===g.id))
      : subjEntries.filter(e=>e.goalId===g.id);
    const total    = related.length;

    // Most recent entry
    const recent   = related[0]||null; // entries are newest-first
    const recentNote = recent
      ? ((recent.readingTitle||recent.title||recent.subj||"").replace((recent.subj||"")+" \u2014 ","").trim()||recent.subj)
      : null;

    // How long since last entry (in days)
    const daysSince = recent ? (()=>{
      try {
        const yr = new Date().getFullYear();
        const d  = new Date(recent.date+", "+yr);
        const diff = Math.floor((new Date()-d)/(24*60*60*1000));
        return diff < 0 ? 0 : diff; // handle future dates gracefully
      } catch(e){ return null; }
    })() : null;

    // Warm message based on recency
    let warmth = null;
    if(total===0){
      warmth = {msg: "Nothing logged yet toward this goal \u2014 every small step counts.", tone:"quiet"};
    } else if(daysSince===0){
      warmth = {msg: "Logged today \u2014 great work keeping this front of mind.", tone:"good"};
    } else if(daysSince===1){
      warmth = {msg: "Logged yesterday. You\u2019re building something real here.", tone:"good"};
    } else if(daysSince<=5){
      warmth = {msg: "Active this week. "+child_name(family)+" is making steady progress.", tone:"good"};
    } else if(daysSince<=14){
      warmth = {msg: "It\u2019s been about "+daysSince+" days \u2014 anything worth logging from this week?", tone:"gentle"};
    } else if(daysSince<=30){
      warmth = {msg: "This goal has been quiet lately. Even one entry this week would keep it alive.", tone:"gentle"};
    } else {
      warmth = {msg: "It\u2019s been a while \u2014 no pressure, but this goal is still here when you\u2019re ready.", tone:"quiet"};
    }

    return {total, recent, recentNote, daysSince, warmth};
  };

  const child_name = (fam) => {
    const kids = fam.children||[];
    if(kids.length===1) return kids[0].name;
    if(kids.length===2) return kids[0].name+" and "+kids[1].name;
    return "your kids";
  };

  const toneColor = {
    good:   {bg:pal.goodBg,   text:pal.good,    border:pal.good+"30"},
    gentle: {bg:"#fffbeb",    text:"#7a5500",   border:"#f5c84230"},
    quiet:  {bg:pal.parchm,   text:pal.slate,   border:pal.stone+"25"},
  };

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Goals" sub="Your family learning priorities" icon="🌟"/>
      <FirstVisitTip pal={pal} screen="goals"/>
      <div style={{padding:"0 1rem"}}>

        {(family.goals||[]).length===0&&!editing?(
          <div style={{background:pal.linen,borderRadius:"18px",padding:"2rem 1.5rem",textAlign:"center",border:`1.5px solid ${pal.stone}30`,marginBottom:"1rem"}}>
            <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>🌟</div>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.9rem",marginBottom:"0.3rem"}}>{"No goals set yet"}</div>
            <div style={{fontSize:"0.76rem",color:pal.slate,lineHeight:1.6,marginBottom:"0.85rem"}}>
              {"Goals shape your daily nudges, AI suggestions, and year-end review. They\u2019re completely optional."}
            </div>
            <button onClick={()=>setEditing(true)}
              style={{padding:"0.6rem 1.4rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.84rem",cursor:"pointer"}}>
              {"+ Set Goals"}
            </button>
          </div>
        ):(
          <>
            {!editing&&(
              <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.85rem"}}>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>
                    {activeGoals.length}{" goal"}{activeGoals.length!==1?"s":""}{" this year"}
                  </div>
                  <button onClick={()=>setEditing(true)}
                    style={{padding:"0.28rem 0.7rem",border:`1.5px solid ${pal.stone}`,borderRadius:"9px",background:"transparent",color:pal.inkM,fontSize:"0.72rem",fontWeight:"700",cursor:"pointer"}}>
                    {"Edit"}
                  </button>
                </div>

                {activeGoals.map(g=>{
                  const nudge = GOAL_NUDGES[g.id];
                  const {total, recent, recentNote, daysSince, warmth} = getGoalData(g);
                  const tc = toneColor[warmth.tone];

                  return (
                    <div key={g.id} style={{background:pal.linen,borderRadius:"16px",padding:"1rem",border:`1.5px solid ${pal.stone}25`,marginBottom:"0.75rem"}}>
                      {/* Goal header */}
                      <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",marginBottom:"0.75rem"}}>
                        <div style={{width:"42px",height:"42px",borderRadius:"12px",background:total>0?pal.pale:pal.parchm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>
                          {nudge?.icon||g.icon}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem"}}>{g.label}</div>
                          {nudge&&<div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px",lineHeight:1.5}}>{nudge.nudge}</div>}
                        </div>
                        {total>0&&(
                          <div style={{textAlign:"center",flexShrink:0}}>
                            <div style={{fontWeight:"900",color:pal.primary,fontSize:"1.2rem",lineHeight:1}}>{total}</div>
                            <div style={{fontSize:"0.6rem",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.06em"}}>{"entries"}</div>
                          </div>
                        )}
                      </div>

                      {/* Most recent entry */}
                      {recent&&recentNote&&(
                        <div style={{background:"#fff",borderRadius:"10px",padding:"0.55rem 0.75rem",marginBottom:"0.6rem",border:`1px solid ${pal.stone}20`}}>
                          <div style={{fontSize:"0.63rem",color:pal.stone,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"2px",fontWeight:"700"}}>{"Most recent"}</div>
                          <div style={{fontSize:"0.81rem",color:pal.ink,fontWeight:"600",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{recentNote}</div>
                          <div style={{fontSize:"0.67rem",color:pal.slate,marginTop:"1px"}}>
                            {recent.subj}{recent.date?" \u00b7 "+recent.date:""}
                          </div>
                        </div>
                      )}

                      {/* Warm message + inline quick-log */}
                      {quickSaved===g.id&&(
                        <div style={{background:pal.goodBg,borderRadius:"10px",padding:"0.5rem 0.75rem",border:`1px solid ${pal.good}40`,display:"flex",gap:"0.4rem",alignItems:"center",marginBottom:"0.4rem",animation:"fadeUp 0.2s ease"}}>
                          <span style={{fontSize:"0.85rem"}}>{"🌱"}</span>
                          <div style={{fontSize:"0.74rem",color:pal.good,fontWeight:"700"}}>{"Logged! Great work."}</div>
                        </div>
                      )}
                      {quickNoteId===g.id ? (
                        <div style={{background:tc.bg,borderRadius:"10px",border:`1.5px solid ${pal.primary}40`,overflow:"hidden",animation:"fadeUp 0.15s ease"}}>
                          <textarea
                            autoFocus
                            value={quickNoteText}
                            onChange={e=>setQuickNoteText(e.target.value)}
                            placeholder={"What happened toward "+g.label+" today? Even one sentence helps."}
                            rows={3}
                            style={{width:"100%",padding:"0.65rem 0.75rem",border:"none",borderBottom:`1px solid ${pal.stone}30`,background:"transparent",fontSize:"0.8rem",fontFamily:"inherit",color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
                          />
                          <div style={{display:"flex",gap:"0.4rem",padding:"0.45rem 0.55rem",background:"rgba(255,255,255,0.5)"}}>
                            <button onClick={closeQuickNote}
                              style={{padding:"0.38rem 0.75rem",border:`1.5px solid ${pal.stone}`,borderRadius:"9px",background:"transparent",color:pal.slate,fontSize:"0.76rem",fontWeight:"600",cursor:"pointer"}}>
                              Cancel
                            </button>
                            <button onClick={()=>saveQuickNote(g)}
                              disabled={!quickNoteText.trim()}
                              style={{flex:1,padding:"0.38rem 0.75rem",border:"none",borderRadius:"9px",background:quickNoteText.trim()?pal.accentGrad:"#ccc",color:"#fff",fontSize:"0.78rem",fontWeight:"800",cursor:quickNoteText.trim()?"pointer":"default"}}>
                              {"Save to portfolio ✓"}
                            </button>
                          </div>
                        </div>
                      ) : (
                        <button onClick={()=>openQuickNote(g.id)}
                          style={{width:"100%",background:tc.bg,borderRadius:"10px",padding:"0.55rem 0.75rem",border:`1px solid ${tc.border}`,display:"flex",gap:"0.45rem",alignItems:"flex-start",cursor:"pointer",textAlign:"left",transition:"border-color 0.15s"}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor=pal.primary+"60"}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=tc.border}>
                          <span style={{fontSize:"0.8rem",flexShrink:0,marginTop:"1px"}}>
                            {warmth.tone==="good"?"🌱":warmth.tone==="gentle"?"💛":"🌿"}
                          </span>
                          <div style={{flex:1}}>
                            <div style={{fontSize:"0.74rem",color:tc.text,lineHeight:1.55}}>{warmth.msg}</div>
                            <div style={{fontSize:"0.65rem",color:pal.primary,fontWeight:"700",marginTop:"0.25rem"}}>{"+ Add a note \u2192"}</div>
                          </div>
                        </button>
                      )}
                    </div>
                  );
                })}

                {/* Year perspective footer */}
                {activeGoals.length>0&&(()=>{
                  const totalEntries = subjEntries.length;
                  const taggedEntries = subjEntries.filter(e=>e.goalId).length;
                  const yr = family.yearStart ? new Date(family.yearStart).getFullYear() : new Date().getFullYear();
                  return (
                    <div style={{background:pal.parchm,borderRadius:"14px",padding:"0.85rem 1rem",marginTop:"0.25rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}25`,textAlign:"center"}}>
                      <div style={{fontSize:"0.72rem",color:pal.slate,lineHeight:1.7}}>
                        <span style={{fontWeight:"700",color:pal.ink,fontSize:"1rem"}}>{totalEntries}</span>
                        {" portfolio entries this school year"}
                        {taggedEntries>0&&(
                          <>{" \u00b7 "}<span style={{fontWeight:"700",color:pal.primary}}>{taggedEntries}</span>{" tagged to a goal"}</>
                        )}
                        <div style={{marginTop:"4px",fontStyle:"italic",fontSize:"0.69rem"}}>
                          {"Every entry is evidence that learning happened. That\u2019s what matters."}
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </>
            )}

            {/* Edit mode */}
            {editing&&(
              <div>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>{"Choose your goals"}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginBottom:"1rem"}}>
                  {allGoalObjs.map(g=>{
                    const sel = draftGoals.includes(g.id);
                    return (
                      <button key={g.id} onClick={()=>toggleDraft(g.id)}
                        style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.38rem 0.75rem",borderRadius:"20px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",color:sel?pal.primary:pal.inkM,fontWeight:sel?"700":"400",fontSize:"0.78rem",cursor:"pointer",transition:"all 0.12s"}}>
                        <span style={{fontSize:"0.85rem"}}>{g.icon}</span>
                        <span>{g.label}</span>
                      </button>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.75rem"}}>
                  <input value={customInput} onChange={e=>setCustomInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addCustom()}
                    placeholder="Add a custom goal..."
                    style={{flex:1,padding:"0.55rem 0.75rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={addCustom}
                    style={{padding:"0.55rem 0.9rem",border:"none",borderRadius:"10px",background:pal.primary,color:"#fff",fontWeight:"700",fontSize:"0.8rem",cursor:"pointer"}}>{"+"}</button>
                </div>
                <div style={{display:"flex",gap:"0.5rem"}}>
                  <button onClick={cancelEdits}
                    style={{flex:1,padding:"0.65rem",border:`1.5px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.82rem",cursor:"pointer"}}>{"Cancel"}</button>
                  <button onClick={saveEdits}
                    style={{flex:2,padding:"0.65rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.84rem",cursor:"pointer"}}>{"Save Goals"}</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* =======================================
   DAY SUMMARY MODAL
   Shown after marking a day complete
======================================= */
function DaySummaryModal({pal,family,data,portfolioEntries,onSave,onClose,onFinish,onCoopLog,dateOverride}){
  // Steps: 0=coop-check 1=subjects 2=subject-notes 3=parent-notes 4=photos 5=goals 6=done
  const [step,        setStep]       = useState(0);
  const [isCoop,      setIsCoop]     = useState(false);
  const [coopSubjs,   setCoopSubjs]  = useState(new Set());
  const [coopHrs,     setCoopHrs]    = useState("2");
  const [coopNotes,   setCoopNotes]  = useState({}); // {childId_subj: note}
  const [notes,       setNotes]      = useState({}); // {childId_subj: text}
  const [parentNote,  setParentNote] = useState("");
  const [photos,      setPhotos]     = useState([]); // [{name,dataUrl,assign}]
  const [goalsHit,    setGoalsHit]   = useState(new Set());
  const [generating,  setGenerating] = useState(false);
  const [aiSummary,   setAiSummary]  = useState(null);
  const [aiError,     setAiError]    = useState(null);
  const [savedEntries,setSavedEntries]= useState(null);
  const [lessonCounts,setLessonCounts]= useState({}); // {subj: count}
  const fileInputRef = useRef(null);

  const getLessonCount = (subj) => lessonCounts[subj]||1;
  const setLessonCount = (subj,n) => setLessonCounts(c=>({...c,[subj]:n}));

  const blocks    = data.blocks || [];
  const dateLabel = data.dateLabel || "Today";
  const subjsDone = [...new Set(blocks.filter(b=>b.s!=="Break"&&b.s!=="Lunch").map(b=>b.s))];
  const coopClasses = (family.coopClasses||[]).length>0
    ? family.coopClasses
    : ["Bible / Faith","Art","Science","History","Literature","Math","Music","PE","Other"];
  const allGoalObjs = [...GOALS,...(family.customGoals||[])];
  const familyGoals = (family.goals||[]).map(id=>allGoalObjs.find(g=>g.id===id)).filter(Boolean);

  // Steps to show — always show coop check; skip goals step if family has no goals set
  const STEPS = familyGoals.length>0
    ? ["Co-op?","Subjects","Subject Notes","Parent Notes","Photos","Goals","Done"]
    : ["Co-op?","Subjects","Subject Notes","Parent Notes","Photos","Done"];
  const LAST_SAVE_STEP = STEPS.length - 2; // the step right before Done
  const DONE_STEP      = STEPS.length - 1;

  const noteKey  = (childId, subj) => childId+"__"+subj;
  const getNote  = (childId, subj) => notes[noteKey(childId,subj)]||"";
  const setNote  = (childId, subj, val) => setNotes(n=>({...n,[noteKey(childId,subj)]:val}));
  const getCoopNote = (childId, subj) => coopNotes[noteKey(childId,subj)]||"";
  const setCoopNote = (childId, subj, val) => setCoopNotes(n=>({...n,[noteKey(childId,subj)]:val}));

  const toggleCoopSubj = (s) => setCoopSubjs(prev=>{
    const n=new Set(prev); n.has(s)?n.delete(s):n.add(s); return n;
  });
  const toggleGoal = (id) => setGoalsHit(prev=>{
    const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n;
  });

  const handlePhotoUpload = (e) => {
    const defaultAssign = family.children.length===1 ? family.children[0].id : "all";
    Array.from(e.target.files).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ev => setPhotos(p=>[...p,{name:file.name,dataUrl:ev.target.result,assign:defaultAssign}]);
      reader.readAsDataURL(file);
    });
  };
  const removePhoto    = (i) => setPhotos(p=>p.filter((_,pi)=>pi!==i));
  const setPhotoAssign = (i,assign) => setPhotos(p=>p.map((ph,pi)=>pi===i?{...ph,assign}:ph));

  const generateSummary = async () => {
    setGenerating(true); setAiError(null);
    const notesList = family.children.map(ch=>{
      const subjNotes = subjsDone.map(s=>{
        const n=getNote(ch.id,s);
        return n.trim()?s+": "+n:"";
      }).filter(Boolean).join("; ");
      return ch.name+(subjNotes?": "+subjNotes:"");
    }).join(" | ");
    const prompt = "Write a warm 2-sentence homeschool day summary. Date: "+dateLabel+". Subjects: "+subjsDone.join(", ")+". Family: "+family.familyName+". Notes: "+notesList+(parentNote?". Parent note: "+parentNote:"")+". Be specific and encouraging. No emojis. Plain text only.";
    try {
      const raw = await callClaude(prompt);
      setAiSummary(raw.trim());
    } catch(e) {
      setAiError(e.message==="NO_KEY"?"Add an API key in Settings → AI to use this feature.":e.message==="RATE_LIMIT"?"Monthly AI limit reached.":"Could not generate — try again.");
    }
    setGenerating(false);
  };

  const buildEntries = () => {
    const entries = [];
    const today = dateOverride || new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    if(isCoop) {
      // Co-op entries — one per subject per child
      const subjList = [...coopSubjs];
      family.children.forEach((ch,ci)=>{
        subjList.forEach(subj=>{
          const n = getCoopNote(ch.id, subj);
          entries.push({
            childIdx:ci, title:"Co-op: "+subj,
            subj, date:today, thumb:"🏫", note:n, isSubject:true, isCoop:true,
          });
        });
        // Day entry for co-op
        const summaryNote = [parentNote.trim(), aiSummary?"AI Summary: "+aiSummary:""].filter(Boolean).join("\n\n");
        entries.push({
          childIdx:ci, title:"Co-op Day — "+dateLabel, subj:"Daily Notes", date:today,
          thumb:"🏫", note:summaryNote, subjects:subjList,
          photos:photos.filter(p=>p.assign==="all"||p.assign===ch.id).map(p=>p.dataUrl),
          isDay:true, isCoop:true, coopHrs:parseFloat(coopHrs), aiSummary:aiSummary||"",
          goalsHit:[...goalsHit],
        });
      });
    } else {
      // Regular schedule entries
      family.children.forEach((ch,ci)=>{
        subjsDone.forEach(subj=>{
          const block = blocks.find(b=>b.s===subj);
          const subjNote = getNote(ch.id, subj);
          entries.push({
            childIdx:ci,
            title: subj+" \u2014 "+dateLabel,
            subj, date:today, thumb:block?.i||"📋", note:subjNote, isSubject:true,
            lessonCount: getLessonCount(subj),
          });
        });
        const summaryNote = [parentNote.trim(), aiSummary?"AI Summary: "+aiSummary:""].filter(Boolean).join("\n\n");
        entries.push({
          childIdx:ci, title:"Day Notes — "+dateLabel, subj:"Daily Notes", date:today,
          thumb:"📝", note:summaryNote, subjects:subjsDone,
          photos:photos.filter(p=>p.assign==="all"||p.assign===ch.id).map(p=>p.dataUrl),
          isDay:true, aiSummary:aiSummary||"", goalsHit:[...goalsHit],
        });
      });
    }
    return entries;
  };

  const handleSave = () => {
    const entries = buildEntries();
    setSavedEntries(entries);
    onSave(entries);
    // Log co-op session separately if applicable
    if(isCoop && onCoopLog) {
      onCoopLog({
        session:[...coopSubjs].join(", ")||"Co-op",
        subjects:[...coopSubjs],
        hrs:parseFloat(coopHrs),
        date:dateOverride||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
      });
    }
  };

  const advance = () => {
    // Skip step 1 (subjects list) if coop — coop has its own subject picker on step 0
    if(step===0 && isCoop) { setStep(2); return; } // jump to notes
    if(step===LAST_SAVE_STEP) { handleSave(); setStep(DONE_STEP); return; }
    setStep(s=>s+1);
  };
  const retreat = () => {
    if(step===2 && isCoop) { setStep(0); return; } // jump back past subjects
    setStep(s=>Math.max(0,s-1));
  };

  const stepLabel = STEPS[step]||"";
  const CHILD_COLORS2 = ["#e8943a","#4aabcf","#9b6fc8","#44aa66","#e85a7a"];

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:pal.sand,display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",animation:"fadeIn 0.25s ease"}}>
      {/* Header */}
      <div style={{background:pal.accentGrad,padding:"1.1rem 1.2rem 1rem",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
          <div style={{fontSize:"2rem",animation:"grow 0.4s ease"}}>{"🌟"}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem"}}>Day Complete!</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,0.75)"}}>{dateLabel}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"9px",padding:"0.3rem 0.65rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>{"< "}Home</button>
        </div>
      </div>

      {/* Step progress dots */}
      <div style={{display:"flex",gap:"3px",padding:"0.65rem 1.1rem 0",flexShrink:0}}>
        {STEPS.map((l,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:"4px",borderRadius:"99px",background:i<=step?pal.primary:pal.stone+"40",marginBottom:"3px",transition:"background 0.3s"}}/>
            <div style={{fontSize:"0.52rem",color:i<=step?pal.primary:pal.stone,fontWeight:i===step?"700":"400"}}>{l}</div>
          </div>
        ))}
      </div>

      <div key={step} style={{flex:1,overflowY:"auto",padding:"1rem 1.1rem"}}>

        {/* ── Step 0: Co-op check ── */}
        {step===0 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.85rem",marginBottom:"0.25rem"}}>Was today a co-op day?</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"1rem",lineHeight:1.5}}>
              If you attended co-op, we will log it separately from your regular schedule.
            </div>
            <div style={{display:"flex",gap:"0.65rem",marginBottom:"1.2rem"}}>
              <button onClick={()=>setIsCoop(false)}
                style={{flex:1,padding:"1rem 0.75rem",borderRadius:"16px",border:`2px solid ${!isCoop?pal.primary:pal.stone+"50"}`,background:!isCoop?pal.pale:"transparent",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:"1.6rem",marginBottom:"0.25rem"}}>{"📅"}</div>
                <div style={{fontWeight:"800",color:!isCoop?pal.primary:pal.inkM,fontSize:"0.84rem"}}>Regular day</div>
                <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>Schedule subjects</div>
              </button>
              <button onClick={()=>setIsCoop(true)}
                style={{flex:1,padding:"1rem 0.75rem",borderRadius:"16px",border:`2px solid ${isCoop?pal.primary:pal.stone+"50"}`,background:isCoop?pal.pale:"transparent",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:"1.6rem",marginBottom:"0.25rem"}}>{"🏫"}</div>
                <div style={{fontWeight:"800",color:isCoop?pal.primary:pal.inkM,fontSize:"0.84rem"}}>Co-op day</div>
                <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>Log co-op session</div>
              </button>
            </div>

            {/* Co-op details — shown inline when isCoop */}
            {isCoop&&(
              <div style={{animation:"fadeUp 0.18s ease"}}>
                <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.45rem"}}>Which subjects did you cover?</div>
                <div style={{display:"flex",flexDirection:"column",gap:"0.3rem",marginBottom:"1rem"}}>
                  {coopClasses.map(s=>{
                    const sel=coopSubjs.has(s);
                    return (
                      <button key={s} onClick={()=>toggleCoopSubj(s)}
                        style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.55rem 0.85rem",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,borderRadius:"11px",background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.12s"}}>
                        <div style={{width:"18px",height:"18px",borderRadius:"4px",border:`2px solid ${sel?pal.primary:pal.stone}`,background:sel?pal.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {sel&&<span style={{color:"#fff",fontSize:"0.6rem",fontWeight:"900"}}>{"✓"}</span>}
                        </div>
                        <span style={{fontWeight:sel?"700":"400",color:sel?pal.primary:pal.inkM,fontSize:"0.83rem"}}>{s}</span>
                      </button>
                    );
                  })}
                </div>
                <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.45rem"}}>Hours</div>
                <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap"}}>
                  {["1","1.5","2","2.5","3","3.5","4"].map(h=>(
                    <button key={h} onClick={()=>setCoopHrs(h)}
                      style={{padding:"0.45rem 0.75rem",borderRadius:"10px",border:`2px solid ${coopHrs===h?pal.primary:pal.stone+"50"}`,background:coopHrs===h?pal.pale:"transparent",cursor:"pointer",fontWeight:coopHrs===h?"800":"400",color:coopHrs===h?pal.primary:pal.inkM,fontSize:"0.8rem"}}>
                      {h}h
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Regular day — show completed subjects summary */}
            {!isCoop&&(
              <div style={{animation:"fadeUp 0.18s ease"}}>
                <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.5rem"}}>Subjects completed</div>
                {subjsDone.length===0 ? (
                  <div style={{color:pal.slate,fontSize:"0.82rem",padding:"0.5rem 0"}}>No subjects checked off.</div>
                ) : (
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem"}}>
                    {subjsDone.map((s,i)=>{
                      const block=blocks.find(b=>b.s===s);
                      return <span key={i} style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.28rem 0.65rem",background:pal.goodBg,borderRadius:"20px",border:`1.5px solid ${pal.good}40`,fontSize:"0.76rem",fontWeight:"700",color:pal.good}}><span>{block?.i||"📋"}</span><span>{s}</span><span>{"✓"}</span></span>;
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── Step 1: Subjects overview (regular day only) ── */}
        {step===1 && !isCoop && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.65rem"}}>{"Completed today"}</div>
            {subjsDone.length===0 ? (
              <div style={{color:pal.slate,fontSize:"0.82rem",textAlign:"center",padding:"1rem"}}>No subjects logged.</div>
            ) : subjsDone.map((s,i)=>{
              const block = blocks.find(b=>b.s===s);
              return (
                <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.75rem 0.9rem",display:"flex",gap:"0.75rem",alignItems:"center",border:`1.5px solid ${pal.good}30`,marginBottom:"0.45rem"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"10px",background:pal.goodBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{block?.i||"📋"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.86rem"}}>{s}</div>
                    {block?.dur&&<div style={{fontSize:"0.68rem",color:pal.slate}}>{block.dur} min</div>}
                  </div>
                  <span style={{color:pal.good,fontSize:"1.1rem"}}>{"✓"}</span>
                </div>
              );
            })}
            {/* AI Summary box */}
            <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1rem",marginTop:"0.75rem",border:`1.5px solid ${pal.primary}20`}}>
              <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem",marginBottom:"0.4rem"}}>{"✨ AI Day Summary"}</div>
              {aiSummary ? (
                <div style={{fontSize:"0.8rem",color:pal.ink,lineHeight:1.7}}>{aiSummary}</div>
              ) : generating ? (
                <div style={{display:"flex",gap:"4px",alignItems:"center",padding:"0.25rem 0"}}>
                  {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
                  <span style={{fontSize:"0.76rem",color:pal.slate,marginLeft:"0.4rem"}}>Writing your day summary...</span>
                </div>
              ) : (
                <div>
                  {aiError && <div style={{fontSize:"0.72rem",color:"#a03030",marginBottom:"0.4rem"}}>{aiError}</div>}
                  <button onClick={generateSummary} style={{padding:"0.4rem 1rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.76rem",cursor:"pointer"}}>Generate Summary</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── Step 2: Subject notes (per child, per subject) ── */}
        {step===2 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>
              {isCoop?"Co-op notes":"Subject notes"}
            </div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.55}}>
              {isCoop
                ? "Jot down what each child did in each subject. Optional but great for the portfolio."
                : "What did each child do in each subject? Even a few words goes a long way."}
            </div>
            {family.children.map((ch,ci)=>{
              const cp=CHILD_COLOR_PALETTES.find(p=>p.id===(ch.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
              const subjList = isCoop ? [...coopSubjs] : subjsDone;
              return (
                <div key={ch.id} style={{marginBottom:"1.1rem"}}>
                  {family.children.length>1&&(
                    <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.55rem",padding:"0.5rem 0.75rem",background:`linear-gradient(135deg,${cp.c1}18,${cp.c2}12)`,borderRadius:"12px",border:`1.5px solid ${cp.c1}30`}}>
                      <div style={{width:"30px",height:"30px",borderRadius:"8px",background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem"}}>{ch.avatar}</div>
                      <span style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>{ch.name}</span>
                    </div>
                  )}
                  {subjList.map(subj=>{
                    const val = isCoop?getCoopNote(ch.id,subj):getNote(ch.id,subj);
                    const setter = isCoop?setCoopNote:setNote;
                    return (
                      <div key={subj} style={{marginBottom:"0.6rem"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.25rem"}}>
                          <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM}}>{"📋 "+subj}</div>
                          {!isCoop&&(
                            <div style={{display:"flex",gap:"0.25rem",alignItems:"center"}}>
                              <span style={{fontSize:"0.6rem",color:pal.slate,fontWeight:"600",marginRight:"2px"}}>Lessons:</span>
                              {[1,2,3,4].map(n=>{
                                const sel=getLessonCount(subj)===n;
                                return (
                                  <button key={n} onClick={()=>setLessonCount(subj,n)}
                                    style={{width:"24px",height:"24px",borderRadius:"6px",border:`2px solid ${sel?pal.primary:pal.stone+"60"}`,background:sel?pal.primary:"transparent",color:sel?"#fff":pal.inkM,fontSize:"0.7rem",fontWeight:"800",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,transition:"all 0.12s"}}>
                                    {n}
                                  </button>
                                );
                              })}
                            </div>
                          )}
                        </div>
                        <textarea
                          value={val}
                          onChange={e=>setter(ch.id,subj,e.target.value)}
                          placeholder={"What did "+ch.name+" do in "+subj+"?"}
                          rows={2}
                          style={{width:"100%",padding:"0.55rem 0.7rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.8rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.5}}
                          onFocus={e=>e.target.style.borderColor=cp.c1}
                          onBlur={e=>e.target.style.borderColor=pal.stone}/>
                      </div>
                    );
                  })}
                  {subjList.length===0&&<div style={{fontSize:"0.76rem",color:pal.stone,fontStyle:"italic"}}>No subjects selected.</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ── Step 3: Parent notes ── */}
        {step===3 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>{"Parent notes"}</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.55}}>
              {"Your private teaching notes — what worked well, what to revisit, observations. These go in the portfolio as parent notes."}
            </div>
            <textarea
              value={parentNote}
              onChange={e=>setParentNote(e.target.value)}
              placeholder={"e.g. Raeley struggled with long division today — try graph paper next time. She loved the science experiment. Consider more reading fluency this week."}
              rows={6}
              style={{width:"100%",padding:"0.75rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"13px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}/>
            <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"0.45rem",fontStyle:"italic"}}>Optional — skip if nothing to note today.</div>
          </div>
        )}

        {/* ── Step 4: Photos ── */}
        {step===4 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Add photos</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>
              {family.children.length>1
                ? "Upload photos then choose which child each one belongs to."
                : "Capture work, projects, or moments from today."}
            </div>
            <input type="file" ref={fileInputRef} accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}}/>
            <button onClick={()=>fileInputRef.current?.click()}
              style={{width:"100%",padding:"1.1rem",border:`2px dashed ${pal.primary}50`,borderRadius:"16px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.86rem",cursor:"pointer",marginBottom:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
              <span style={{fontSize:"1.4rem"}}>{"📷"}</span><span>Choose Photos</span>
            </button>
            {photos.length>0 && (
              <div style={{display:"flex",flexDirection:"column",gap:"0.65rem"}}>
                {photos.map((p,i)=>(
                  <div key={i} style={{borderRadius:"14px",overflow:"hidden",border:`1.5px solid ${pal.stone}40`,background:"#fff"}}>
                    <div style={{position:"relative"}}>
                      <img src={p.dataUrl} alt={p.name} style={{width:"100%",height:"130px",objectFit:"cover",display:"block"}}/>
                      <button onClick={()=>removePhoto(i)}
                        style={{position:"absolute",top:"6px",right:"6px",width:"24px",height:"24px",borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:"0.75rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"x"}</button>
                    </div>
                    {family.children.length>1&&(
                      <div style={{padding:"0.5rem 0.65rem",display:"flex",gap:"0.3rem",flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:"0.62rem",color:pal.slate,fontWeight:"700",marginRight:"2px"}}>For:</span>
                        <button onClick={()=>setPhotoAssign(i,"all")}
                          style={{padding:"0.2rem 0.55rem",borderRadius:"20px",border:`2px solid ${p.assign==="all"?pal.primary:pal.stone+"60"}`,background:p.assign==="all"?pal.pale:"transparent",color:p.assign==="all"?pal.primary:pal.slate,fontSize:"0.68rem",fontWeight:p.assign==="all"?"800":"500",cursor:"pointer"}}>
                          {"Both"}
                        </button>
                        {family.children.map((ch,ci)=>{
                          const cc=CHILD_COLORS2[ci%CHILD_COLORS2.length];
                          const sel=p.assign===ch.id;
                          return (
                            <button key={ch.id} onClick={()=>setPhotoAssign(i,ch.id)}
                              style={{padding:"0.2rem 0.55rem",borderRadius:"20px",border:`2px solid ${sel?cc:pal.stone+"60"}`,background:sel?cc+"22":"transparent",color:sel?cc:pal.slate,fontSize:"0.68rem",fontWeight:sel?"800":"500",cursor:"pointer",display:"flex",alignItems:"center",gap:"0.2rem"}}>
                              <span>{ch.avatar}</span><span>{ch.name}</span>
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
            {photos.length===0 && <div style={{textAlign:"center",padding:"1rem",color:pal.stone,fontSize:"0.78rem",fontStyle:"italic"}}>No photos yet — totally optional!</div>}
          </div>
        )}

        {/* ── Step 5: Goals (only if family has goals) ── */}
        {step===5 && familyGoals.length>0 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Goals hit today?</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.55}}>
              Tap any goals that came alive today. This helps track progress toward what matters most.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
              {familyGoals.map(g=>{
                const sel=goalsHit.has(g.id);
                return (
                  <button key={g.id} onClick={()=>toggleGoal(g.id)}
                    style={{padding:"0.85rem 0.7rem",border:`2px solid ${sel?pal.primary:pal.stone+"45"}`,borderRadius:"14px",background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.35rem",transition:"all 0.14s"}}>
                    <span style={{fontSize:"1.5rem"}}>{g.icon}</span>
                    <span style={{fontSize:"0.74rem",fontWeight:sel?"800":"500",color:sel?pal.primary:pal.inkM,lineHeight:1.25}}>{g.label}</span>
                    {sel&&<span style={{fontSize:"0.62rem",color:pal.good,fontWeight:"900"}}>{"✓ Hit it!"}</span>}
                  </button>
                );
              })}
            </div>
            {goalsHit.size===0&&(
              <div style={{textAlign:"center",marginTop:"0.85rem",fontSize:"0.74rem",color:pal.stone,fontStyle:"italic"}}>
                {"Tap any that apply — or skip if none fit today."}
              </div>
            )}
          </div>
        )}

        {/* ── Done step ── */}
        {step===DONE_STEP && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{background:pal.accentGrad,borderRadius:"18px",padding:"1.3rem 1.2rem",marginBottom:"1rem",textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",right:"-20px",top:"-20px",width:"80px",height:"80px",borderRadius:"50%",background:"rgba(255,255,255,0.1)"}}/>
              <div style={{fontSize:"3rem",marginBottom:"0.4rem",animation:"grow 0.4s ease"}}>{"🌱"}</div>
              <div style={{fontWeight:"900",color:"#fff",fontSize:"1.15rem",marginBottom:"0.2rem"}}>
                {isCoop?"Co-op logged!":"Day saved to portfolio!"}
              </div>
              <div style={{fontSize:"0.78rem",color:"rgba(255,255,255,0.78)"}}>
                {dateLabel}
                {isCoop?" \u00b7 Co-op \u00b7 "+coopHrs+"h":" \u00b7 "+subjsDone.length+" subject"+(subjsDone.length!==1?"s":"")}
                {" \u00b7 "+family.children.length+" student"+(family.children.length!==1?"s":"")}
              </div>
            </div>

            {/* Summary */}
            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}}>
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.55rem"}}>What was saved</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.38rem",marginBottom:"0.6rem"}}>
                {(isCoop?[...coopSubjs]:subjsDone).map((s,i)=>{
                  const block=blocks.find(b=>b.s===s);
                  return <span key={i} style={{padding:"0.2rem 0.6rem",background:pal.pale,borderRadius:"20px",fontSize:"0.72rem",fontWeight:"700",color:pal.primary,display:"flex",gap:"0.25rem",alignItems:"center"}}><span>{isCoop?"🏫":block?.i||"📋"}</span><span>{s}</span></span>;
                })}
              </div>
              {goalsHit.size>0&&(
                <div style={{marginTop:"0.4rem",paddingTop:"0.45rem",borderTop:`1px solid ${pal.stone}20`}}>
                  <div style={{fontSize:"0.68rem",fontWeight:"700",color:pal.primary,marginBottom:"0.3rem"}}>{"🌟 Goals hit"}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
                    {[...goalsHit].map(id=>{
                      const g=familyGoals.find(x=>x.id===id);
                      if(!g) return null;
                      return <span key={id} style={{padding:"0.18rem 0.55rem",background:pal.goodBg,borderRadius:"20px",fontSize:"0.7rem",fontWeight:"700",color:pal.good}}>{g.icon} {g.label}</span>;
                    })}
                  </div>
                </div>
              )}
              {photos.length>0&&(
                <div style={{marginTop:"0.4rem"}}>
                  <div style={{fontSize:"0.68rem",color:pal.slate,marginBottom:"0.3rem",fontWeight:"600"}}>{"📷 "+photos.length+" photo"+(photos.length!==1?"s":"")+" attached"}</div>
                  <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap"}}>
                    {photos.slice(0,4).map((p,i)=>(
                      <img key={i} src={p.dataUrl} alt="" style={{width:"50px",height:"50px",borderRadius:"8px",objectFit:"cover",border:`1.5px solid ${pal.stone}40`}}/>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div style={{background:pal.goodBg,borderRadius:"12px",padding:"0.6rem 0.85rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.good}30`,display:"flex",gap:"0.5rem",alignItems:"center"}}>
              <span style={{fontSize:"1rem"}}>{"📅"}</span>
              <div style={{fontSize:"0.76rem",color:pal.good,fontWeight:"700"}}>Added to attendance record</div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
              <button onClick={()=>onFinish?onFinish("portfolio"):onClose()}
                style={{width:"100%",padding:"0.82rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
                <span>{"🗂"}</span><span>View in Portfolio</span>
              </button>
              <button onClick={()=>onFinish?onFinish("home"):onClose()}
                style={{width:"100%",padding:"0.75rem",border:`2px solid ${pal.stone}`,borderRadius:"13px",background:"transparent",color:pal.inkM,fontWeight:"700",fontSize:"0.84rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
                <span>{"🏠"}</span><span>Back to Home</span>
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Footer buttons */}
      {step<DONE_STEP && (
        <div style={{padding:"0.9rem 1.1rem",borderTop:`1px solid ${pal.stone}40`,background:pal.linen,flexShrink:0,display:"flex",gap:"0.55rem"}}> 
          {step>0 && <button onClick={retreat} style={{padding:"0.7rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem",fontWeight:"600"}}>Back</button>}
          <button onClick={advance}
            disabled={isCoop && step===0 && coopSubjs.size===0}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:isCoop&&step===0&&coopSubjs.size===0?"#ccc":pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:isCoop&&step===0&&coopSubjs.size===0?"default":"pointer"}}>
            {step===LAST_SAVE_STEP
              ? "Save to portfolio \u2713"
              : step===0&&isCoop&&coopSubjs.size===0
                ? "Select at least one subject"
                : "Next \u2192"}
          </button>
        </div>
      )}
    </div>
  );
}


function ThemeModal({ pal, paletteId, setPaletteId, customA, customB, setCustomA, setCustomB, onClose }) {
  const [la,setLa]=useState(customA), [lb,setLb]=useState(customB);
  const preview=paletteId==="custom"?buildTheme(la,lb):pal;
  return (
    <BottomSheet pal={pal} onClose={onClose} title="Choose Your Theme" sub="Pick colors that feel like your family">
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.45rem",marginBottom:"1rem"}}>
        {PRESET_PALETTES.map(p=>{const sel=paletteId===p.id;return(
          <button key={p.id} onClick={()=>setPaletteId(p.id)} style={{padding:"0.55rem 0.4rem",borderRadius:"12px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center"}}>
            {p.isCustom?<div style={{height:"22px",borderRadius:"6px",background:`linear-gradient(90deg,${la},${lb})`,marginBottom:"0.25rem"}}/>:<div style={{height:"22px",borderRadius:"6px",background:`linear-gradient(90deg,${p.a},${lerpHex(p.a,p.b,0.5)},${p.b})`,marginBottom:"0.25rem"}}/>}
            <div style={{fontSize:"0.63rem",fontWeight:sel?"800":"500",color:sel?pal.primary:pal.inkM}}>{p.emoji} {p.name}</div>
          </button>
        );})}
      </div>
      {paletteId==="custom"&&<div style={{background:pal.pale,borderRadius:"12px",padding:"0.85rem",marginBottom:"1rem",border:`2px solid ${pal.accent}20`}}>
        <div style={{display:"flex",gap:"0.85rem",alignItems:"center",marginBottom:"0.6rem"}}>
          {[["Deep",la,setLa],["Bloom",lb,setLb]].map(([l,v,set])=><div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"0.3rem"}}>
            <input type="color" value={v} onChange={e=>set(e.target.value)} style={{width:"48px",height:"48px",borderRadius:"11px",border:`2px solid ${pal.stone}`,cursor:"pointer",padding:"2px"}}/>
            <div style={{fontSize:"0.65rem",color:pal.slate,fontWeight:"600"}}>{l}</div>
          </div>)}
          <div style={{flex:1,height:"36px",borderRadius:"9px",background:`linear-gradient(90deg,${la},${lerpHex(la,lb,0.5)},${lb})`}}/>
        </div>
      </div>}
      <div style={{background:preview.heroGrad,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.5)",letterSpacing:"0.1em",fontWeight:"700",textTransform:"uppercase"}}>Preview</div><div style={{fontWeight:"800",color:"rgba(255,255,255,0.9)",fontSize:"0.92rem"}}>Good morning 🌱</div></div>
        <div style={{height:"30px",padding:"0 0.75rem",borderRadius:"99px",background:preview.accentGrad,display:"flex",alignItems:"center"}}><span style={{fontSize:"0.7rem",fontWeight:"800",color:preview.onDark}}> Check-In</span></div>
      </div>
      <button onClick={()=>{if(paletteId==="custom"){setCustomA(la);setCustomB(lb);}onClose();}} style={{width:"100%",padding:"0.8rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>Apply Theme</button>
    </BottomSheet>
  );
}

function NavModal({ pal, navIds, setNavIds, onClose }) {
  const [local,setLocal]=useState(navIds);
  const toggle=id=>{
    const s=ALL_SECTIONS.find(x=>x.id===id);
    if(s?.locked)return;
    if(local.includes(id)){if(local.length<=3)return;setLocal(l=>l.filter(x=>x!==id));}
    else{if(local.length>=5)return;setLocal(l=>[...l,id]);}
  };
  return (
    <BottomSheet pal={pal} onClose={onClose} title="Customize Your Nav" sub={local.length + " tabs - 3-5 - Home, Schedule & Portfolio always stay"}>
      <div style={{display:"flex",flexDirection:"column",gap:"0.42rem",marginBottom:"1rem"}}>
        {ALL_SECTIONS.filter(s=>s.id!=="more").map(s=>{
          const on=local.includes(s.id),atMax=local.length>=5&&!on;
          return <button key={s.id} onClick={()=>toggle(s.id)} style={{display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.7rem 0.9rem",border:`2px solid ${on?pal.primary:pal.stone+"50"}`,borderRadius:"12px",background:on?pal.pale:"transparent",cursor:s.locked||atMax?"default":"pointer",opacity:atMax&&!on?0.35:1,transition:"all 0.13s",textAlign:"left"}}>
            <span style={{fontSize:"1.2rem",width:"28px",textAlign:"center"}}>{s.icon}</span>
            <span style={{flex:1,fontWeight:on?"700":"400",color:on?pal.primary:pal.inkM,fontSize:"0.84rem"}}>{s.label}</span>
            {s.locked?<span style={{fontSize:"0.7rem",color:pal.slate}}>🔒</span>:<div style={{width:"19px",height:"19px",borderRadius:"5px",border:`2px solid ${on?pal.primary:pal.stone}`,background:on?pal.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{on&&<span style={{color:pal.onDark,fontSize:"0.8rem",fontWeight:"900"}}>✓</span>}</div>}
          </button>;
        })}
      </div>
