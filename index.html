function lerpHex(a, b, t) {
  const ah=a.replace("#",""), bh=b.replace("#","");
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb=parseInt(bh.slice(4,6),16);
  return `#${Math.round(ar+(br-ar)*t).toString(16).padStart(2,"0")}${Math.round(ag+(bg-ag)*t).toString(16).padStart(2,"0")}${Math.round(ab+(bb-ab)*t).toString(16).padStart(2,"0")}`;
}
const lighten = (hex,a) => lerpHex(hex,"#ffffff",a);
const darken  = (hex,a) => lerpHex(hex,"#000000",a);

function buildTheme(a,b) {
  const mid=lerpHex(a,b,0.45), light=lerpHex(a,b,0.75);
  return {
    deep:darken(a,0.15), primary:a, mid, accent:b,
    accentD:darken(b,0.25), pale:lighten(b,0.70), paleMid:lighten(b,0.50),
    sand:lerpHex(lighten(a,0.88),"#fdf8ef",0.5),
    linen:lerpHex(lighten(b,0.92),"#ffffff",0.4),
    parchm:lerpHex(lighten(a,0.82),"#f5ead6",0.5),
    stone:lerpHex(lighten(a,0.55),"#c0b8a8",0.5),
    navGrad:`linear-gradient(160deg,${darken(a,0.15)},${a},${mid})`,
    heroGrad:`linear-gradient(160deg,${darken(a,0.12)},${mid})`,
    accentGrad:`linear-gradient(135deg,${mid},${b})`,
    shimmer:`linear-gradient(90deg,${lighten(b,0.55)},${lighten(a,0.65)},${lighten(b,0.55)})`,
    onDark:"#ffffff", onLight:darken(a,0.55),
    ink:"#1a1408", inkM:"#4a3c2a",
    slate:lerpHex(darken(a,0.05),"#8a7a62",0.55),
    good:lerpHex(b,"#44aa66",0.4), warn:"#c47818", bad:"#a03030",
    goodBg:lighten(lerpHex(b,"#44aa66",0.4),0.75),
    warnBg:"#fef0d0", badBg:"#faeae4",
  };
}

function getEOYWeeksLeft(family) {
  if(!family?.yearEnd) return null;
  const end = new Date(family.yearEnd);
  const today = new Date();
  const msLeft = end - today;
  if(msLeft < 0) return 0;
  return Math.ceil(msLeft / (7*24*60*60*1000));
}

function nextGrade(grade) {
  const order = ["Pre-K","K","1st","2nd","3rd","4th","5th","6th","7th","8th","9th","10th","11th","12th"];
  const idx = order.indexOf(grade);
  return idx >= 0 && idx < order.length-1 ? order[idx+1] : null;
}

function downloadPortfolioHTML(html, filename) {
  try {
    const blob = new Blob([html], {type:"text/html;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = filename; a.style.display = "none";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
    return true;
  } catch(e) { return false; }
}

  const [observationLog,    setObservationLog]    = useState(saved?.observationLog||[]);

  // Compute pending schedule days — days this week that are fully checked off
  // but not yet in the attendance log
  const pendingSchedDays = useMemo(()=>{
    try {
      const schedRaw = localStorage.getItem("rootbloom_sched_v1");
      if(!schedRaw) return 0;
      const sched = JSON.parse(schedRaw);
      const checked = sched.checked||{};
      const skipped = sched.skipped||{};

      // Build this week's days (Mon–Fri)
      const today = new Date();
      const dow = today.getDay();
      const weekStart = new Date(today);
      weekStart.setDate(today.getDate()-(dow===0?6:dow-1));
      const weekDays = [0,1,2,3,4].map(i=>{
        const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
        return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      });

      // For each past day (not today), check if all blocks were checked
      const loggedDates = new Set((saved?.attendanceLog||[]).map(e=>e.date));
      let pending = 0;
      const allBlocks = family ? generateSchedule(family, family.scheduleMode2!=="same"?family.children?.[0]?.id:null) : [];
      if(allBlocks.length===0) return 0;

      weekDays.forEach((dateStr, di)=>{
        // Only count past days (not today, not future)
        const dayDate = new Date(weekStart);
        dayDate.setDate(weekStart.getDate()+di);
        if(dayDate >= today) return; // skip today and future
        if(loggedDates.has(dateStr)) return; // already in attendance log

        const daySkipped = skipped[di]||{};
        const activeBlocks = allBlocks.filter((_,bi)=>!daySkipped[bi]);
        if(activeBlocks.length===0) return;

        const allChecked = activeBlocks.every((_,bi)=>!!checked[di+"_"+bi]);
        if(allChecked) pending++;
      });
      return pending;
    } catch(e){ return 0; }

  const navIdsExt = navIds.includes("progress")?navIds:[...navIds,"progress"];
  const navTabs = ALL_SECTIONS_EXT.filter(s=>navIdsExt.includes(s.id));

  // Listen for in-app navigation events (e.g. "View in Portfolio" links)
  useEffect(()=>{

    return ()=>{ window.removeEventListener("online", goOnline); window.removeEventListener("offline", goOffline); };
  },[]);

  const handleLogin = (cloudData) => {
    // cloudData is the Supabase payload (or null if skipped/no account)
    if(cloudData) {
      // Merge cloud data into state (cloud wins)
      if(cloudData.family) setFamily(cloudData.family);
      if(cloudData.navIds) setNavIds(cloudData.navIds);
      if(cloudData.portfolioLayout) setPortfolioLayout(cloudData.portfolioLayout);
      if(cloudData.portfolio) setPortfolioEntries(cloudData.portfolio);
      if(cloudData.pendingEntries) setPendingEntries(cloudData.pendingEntries);
      if(cloudData.coopLog) setCoopLog(cloudData.coopLog);
      if(cloudData.attendanceDays!=null) setAttendanceDays(cloudData.attendanceDays);
      if(cloudData.attendanceLog) setAttendanceLog(cloudData.attendanceLog);
      if(cloudData.observationLog) setObservationLog(cloudData.observationLog);
      if(cloudData.checkinDates) setCheckinDates(cloudData.checkinDates);
      if(cloudData.studentVisits) setStudentVisits(cloudData.studentVisits);
      if(cloudData.paletteId) setPaletteId(cloudData.paletteId);
      if(cloudData.customA) setCustomA(cloudData.customA);
      if(cloudData.customB) setCustomB(cloudData.customB);
      if(cloudData.lastCheckinDate) setLastCheckinDate(cloudData.lastCheckinDate);
      if(cloudData.checkinStreak!=null) setCheckinStreak(cloudData.checkinStreak);
      // Cloud family wins; fall back to localStorage family if cloud has none yet
      const resolvedFamily = cloudData.family || family;
      setAuthDone(true);
      setView(resolvedFamily?"parent":"onboarding");
    } else {
      // No cloud data -- use whatever is in localStorage
      setAuthDone(true);
      setView(family?"parent":"onboarding");
    }
  };
  const handleSplash     = () => setView(family?"parent":"onboarding");

  // On app load: check if Supabase already has an active session (e.g. user closed tab without signing out)
  // If so, skip the login screen entirely and restore their data
  useEffect(()=>{
    const sb = getSB();
    if(!sb){ setAuthDone(false); return; } // no Supabase configured -- show login screen
    sb.auth.getSession().then(function(res){
      const session = res.data && res.data.session;
      if(session){
        // Active session found -- pull cloud data and go straight in
        loadFromSupabase(sb).then(function(cloudData){
          if(cloudData && cloudData.family){
            if(cloudData.family) setFamily(cloudData.family);
            if(cloudData.navIds) setNavIds(cloudData.navIds);
            if(cloudData.portfolioLayout) setPortfolioLayout(cloudData.portfolioLayout);
            if(cloudData.portfolio) setPortfolioEntries(cloudData.portfolio);
            if(cloudData.pendingEntries) setPendingEntries(cloudData.pendingEntries);
            if(cloudData.coopLog) setCoopLog(cloudData.coopLog);
            if(cloudData.attendanceDays!=null) setAttendanceDays(cloudData.attendanceDays);
            if(cloudData.attendanceLog) setAttendanceLog(cloudData.attendanceLog);
            if(cloudData.observationLog) setObservationLog(cloudData.observationLog);
            if(cloudData.checkinDates) setCheckinDates(cloudData.checkinDates);
            if(cloudData.studentVisits) setStudentVisits(cloudData.studentVisits);
            if(cloudData.paletteId) setPaletteId(cloudData.paletteId);
            if(cloudData.customA) setCustomA(cloudData.customA);
            if(cloudData.customB) setCustomB(cloudData.customB);
            if(cloudData.lastCheckinDate) setLastCheckinDate(cloudData.lastCheckinDate);
            if(cloudData.checkinStreak!=null) setCheckinStreak(cloudData.checkinStreak);
            setAuthDone(true);
            setView("parent");
          } else {
            // Session exists but no cloud data yet -- use localStorage
            setAuthDone(true);
            setView(family?"parent":"onboarding");
          }
        });
      } else {
        // No active session -- show login screen
        setAuthDone(false);
      }
    });
  },[]);

  // Device mode: if this device is locked to a child, jump straight to their portal after auth
  useEffect(()=>{
    if(!authDone || !family || !deviceChild) return;
    const locked = family.children.find(c=>c.id===deviceChild);
    if(locked) {
      setActiveStudent(locked);
      setView("student");
    }
  },[authDone, deviceChild, family]);
  const handleGradeUp = (childIdx, newGrade) => {
    setFamily(f => {
      const updated = {...f, children: f.children.map((c,i) =>
        i===childIdx ? {...c, grade:newGrade} : c
      )};
      return updated;
    });
    setShowEOY(false);
    setEoyDismissed(family.yearEnd);
  };
  const handleNewYear = (newData) => {
    // newData: {yearStart, yearEnd, subjects, children (with updated grades)}
    setFamily(f=>({...f,...newData}));
    setAttendanceDays(0);
    setAttendanceLog([]);
    setCheckinStreak(0);
    setLastCheckinDate(null);
    setCheckinDates({});
    setNewYearDismissed("newyear_"+family.yearEnd);
    setShowNewYear(false);

  const handleCheckinSave = (entries) => {
    entries.forEach(e => addPortfolioEntry(e));
    // increment attendance
    const todayStr = new Date().toDateString();
    setAttendanceDays(d => d + (lastCheckinDate===todayStr ? 0 : 1));
    // update streak
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toDateString();
    if (lastCheckinDate === yStr) setCheckinStreak(s=>s+1);
    else if (lastCheckinDate !== todayStr) setCheckinStreak(1);
    setLastCheckinDate(todayStr);
  };

  // Per-child checkin — marks that specific child as logged today
  const handleChildCheckin = (childId) => {
    const todayStr = new Date().toDateString();
    setCheckinDates(d=>({...d,[childId]:todayStr}));
    // Also update family-level attendance/streak (once per day regardless of child)
    setAttendanceDays(d=>d+(lastCheckinDate===todayStr?0:1));
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(lastCheckinDate===yesterday.toDateString()) setCheckinStreak(s=>s+1);
    else if(lastCheckinDate!==todayStr) setCheckinStreak(1);
    setLastCheckinDate(todayStr);
  };
  const mainScrollRef = React.useRef(null);
  React.useEffect(()=>{
    if(mainScrollRef.current) mainScrollRef.current.scrollTop=0;
    window.scrollTo(0,0);
    document.documentElement.scrollTop=0;
    document.body.scrollTop=0;
  },[activeTab]);
  const [showCelebration, setShowCelebration] = useState(false);
  const [celebData,       setCelebData]       = useState(null);
  const [celebResetToken, setCelebResetToken] = useState(0);
  const finishOnboarding = (data) => {
    setFamily({...data, createdAt: data.createdAt||new Date().toISOString()});
    setPaletteId(data.paletteId||"sage");

    const baseNav = ["home","progress","portfolio","more"];
    if(data.useScheduleTab) {
      setNavIds(["home","schedule","progress","portfolio","more"]);
    } else {
      setNavIds(baseNav);
    }
    // Backfill attendance days from yearStart if provided
    if(data.yearStart) {
      try {
        const start = new Date(data.yearStart);
        const today = new Date();
        const msPerDay = 24*60*60*1000;
        const daysSince = Math.max(0, Math.floor((today - start) / msPerDay));
        if(daysSince > 0) setAttendanceDays(daysSince);
      } catch(e) {}
    }
    setView("parent");
    setShowCelebration(true);
  };
  const [showTour,       setShowTour]       = useState(false);
  const enterApp = () => { setShowCelebration(false); setShowTour(true); };
  const finishTour = () => { setShowTour(false); setView("parent"); };
  const openSettings     = () => setView("settings");
  const closeSettings    = () => setView("parent");
  const switchToStudent  = (child) => {
    setActiveStudent(child);
    setShowSwitcher(false);
    setView("student");
    const todayStr3 = new Date().toDateString();
    setStudentVisits(v=>({...v,[child.id]:todayStr3}));
  };
  const backToParent     = () => { setActiveStudent(null); setView("parent"); };
  const addPortfolioEntry  = (e) => setPortfolioEntries(p=>{
    const newEntry = {id:uid(),...e};
    // Dedup: remove existing same child+subj+date non-day entry before adding
    const filtered = (e.subj && e.date && !e.isDay)
      ? p.filter(x=>!(x.childIdx===e.childIdx && x.subj===e.subj && x.date===e.date && !x.isDay))
      : p;
    return [newEntry,...filtered];
  });
  const editPortfolioEntry = (id,updated) => setPortfolioEntries(p=>p.map(e=>e.id===id?{...e,...updated}:e));

  // Today is co-op day if family has co-op set up and today matches their co-op day
  const isCoop = (() => {
    if (!family) return false;
    const freq = family.coopFreq || "";
    if (freq === "We don't do co-op" || freq === "") return false;
    const coopDay = family.coopDay || "";
    if (!coopDay) return false;
    const todayName = new Date().toLocaleDateString("en-US",{weekday:"long"});
    return todayName === coopDay;
  })();

  return (
    <div style={{
      maxWidth:"430px",margin:"0 auto",height:"100vh",
      background: view==="student" ? "#fff8ee" : pal.sand,
      fontFamily: view==="student"
        ? "'Comic Sans MS','Chalkboard SE',cursive"
        : "'Palatino Linotype','Palatino',Georgia,serif",
      display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"
    }}>
      <style>{`
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes popIn{0%{opacity:0;transform:scale(.9)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        @keyframes grow{from{transform:scale(0.7) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
        @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}75%{transform:rotate(9deg)}}
        @keyframes starPop{0%{opacity:0;transform:scale(0) rotate(-20deg)}70%{transform:scale(1.25) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
        @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(60px) rotate(360deg)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{border-radius:99px}
        input,textarea,select,button{font-family:inherit}
      `}</style>

      {/* -- LOGIN / SPLASH -- */}
      {authDone===null && <div style={{height:"100vh",background:pal.heroGrad,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:"36px",height:"36px",borderRadius:"50%",border:"3px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",animation:"spin 0.8s linear infinite"}}/></div>}
      {authDone===false && <LoginScreen pal={pal} onLogin={handleLogin} />}
      {authDone && view==="splash" && <SplashScreen pal={pal} onContinue={handleSplash} />}
      {view==="onboarding" && <OnboardingFlow pal={pal} onComplete={finishOnboarding} />}
      {view==="settings"   && <SettingsScreen pal={pal} family={family} setFamily={setFamily}
          paletteId={paletteId} setPaletteId={setPaletteId}
          customA={customA} customB={customB} setCustomA={setCustomA} setCustomB={setCustomB}
          navIds={navIds} setNavIds={setNavIds} onBack={closeSettings}
          onCelebReset={()=>setCelebResetToken(t=>t+1)}
          onSignOut={()=>{
            // Save current state to Supabase first, then sign out
            const sb = getSB();
            const doSignOut = () => {
              try{
                const keys=Object.keys(localStorage).filter(k=>k.startsWith("rootbloom"));
                keys.forEach(k=>localStorage.removeItem(k));
              }catch(e){}
              if(sb){ sb.auth.signOut().then(function(){ window.location.reload(); }); }
              else { window.location.reload(); }
            };
            if(sb && family){
              // Force a cloud save before signing out using direct fetch
              sb.auth.getSession().then(function(res){
                var session = res.data && res.data.session;
                if(session && session.user){
                  const payload = {family,navIds,portfolioLayout,portfolio:portfolioEntries,pendingEntries,coopLog,attendanceDays,attendanceLog,observationLog,checkinDates,studentVisits,paletteId,customA,customB,lastCheckinDate,checkinStreak,todayProgress,eoyDismissed,newYearDismissed,notifDismissed};
                  fetch(SUPABASE_URL+"/rest/v1/family_data",{
                    method:"POST",
                    headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
                    body:JSON.stringify({user_id:session.user.id,payload:payload,updated_at:new Date().toISOString()})
                  }).then(function(){ doSignOut(); }).catch(function(){ doSignOut(); });
                } else { doSignOut(); }
              });
            } else { doSignOut(); }
          }}
          deviceChild={deviceChild} setDeviceChild={(id)=>{
            setDeviceChild(id);
            try{ if(id){ localStorage.setItem("rootbloom_device_child",id); }else{ localStorage.removeItem("rootbloom_device_child"); } }catch(e){}
          }} />}

      {/* -- STUDENT PORTAL -- */}
      {view==="student" && activeStudent && family && (
        <StudentPortal
          child={activeStudent}
          family={family}
          pal={pal}
          isCoop={isCoop}
          entries={portfolioEntries.filter((_,i)=> family.children.findIndex(c=>c.id===activeStudent.id) === portfolioEntries.find(e=>e.id===_.id)?.childIdx)}
          allEntries={portfolioEntries}
          onAddEntry={addPortfolioEntry}
          checkinStreak={checkinStreak}
          checkinDates={checkinDates}
          onCoopLog={e=>setCoopLog(l=>[{...e,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})},...l])}
          onQuizComplete={(notif)=>{
            const updated=[notif,...quizNotifs].slice(0,20);
            setQuizNotifs(updated);
            try{ localStorage.setItem("rootbloom_quiz_notifs",JSON.stringify(updated)); }catch(ex){}
          }}
          onOpenFieldStudy={()=>{setFieldStudyChild(activeStudent);setShowFieldStudy(true);}}
          celebResetToken={celebResetToken}
          onSubmitEntry={(entry)=>{
            const childIdx=family.children.findIndex(c=>c.id===activeStudent.id);
            const trustLevel=(activeStudent.trustLevel)||"approve";
            if(trustLevel==="auto"){
              addPortfolioEntry({...entry,childIdx,selfLogged:true});
            } else {
              setPendingEntries(p=>[{id:"pend_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),...entry,childIdx,selfLogged:true,submittedAt:new Date().toISOString()},...p]);
            }
          }}
          onBack={backToParent}
          parentNotes={family.parentNotes||{}}
          onMarkNoteRead={(childId)=>{
            const notes = {...(family.parentNotes||{})};
            if(notes[childId]) notes[childId] = {...notes[childId], read:true};
            setFamily(f=>({...f, parentNotes:notes}));
          }}
        />
      )}

      {/* -- PARENT APP -- */}
      {view==="parent" && family && (<>
        {/* Status bar */}
        <div style={{background:pal.deep,height:"44px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.1rem",flexShrink:0,zIndex:10}}>
          <button onClick={()=>setShowSwitcher(true)} style={{background:"rgba(255,255,255,0.13)",border:"none",borderRadius:"8px",padding:"0.18rem 0.6rem",cursor:"pointer",display:"flex",alignItems:"center",gap:"0.3rem"}}>
            <span style={{fontSize:"0.75rem"}}>👤</span>
            <span style={{fontSize:"0.62rem",color:"rgba(255,255,255,0.7)",fontWeight:"700"}}>Switch</span>
          </button>
          <button onClick={()=>setShowTheme(true)} style={{display:"flex",alignItems:"center",gap:"0.4rem",background:"none",border:"none",cursor:"pointer",padding:0}}>
            <span style={{fontSize:"0.9rem"}}>🌱</span>
            <span style={{fontWeight:"800",color:"rgba(255,255,255,0.9)",fontSize:"0.85rem"}}>{"Root & Bloom"}</span>
          </button>
          <button onClick={openSettings} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:"7px",padding:"0.18rem 0.55rem",cursor:"pointer",fontSize:"0.75rem",color:"rgba(255,255,255,0.65)",fontWeight:"600"}}>{"⚙️"}</button>
        </div>

        {/* Main content */}
        <div ref={mainScrollRef} className="app-scroll-root" style={{flex:1,overflowY:"auto",paddingBottom:"72px"}}>
          {activeTab==="home" && <HomeScreen pal={pal} family={family} child={childFilt} setChild={setChildFilt} onTheme={()=>setShowTheme(true)} attendanceDays={attendanceDays} checkinStreak={checkinStreak} lastCheckinDate={lastCheckinDate} portfolioEntries={portfolioEntries} onTabChange={setActiveTab} todayProgress={todayProgress} navIds={navIds}
            attendanceLog={attendanceLog}
            onAddEntry={addPortfolioEntry}
            onCheckin={handleChildCheckin}
            checkinDates={checkinDates}
            observationLog={observationLog}
            onOpenJournal={(childId)=>setShowJournal(childId)}
            studentVisits={studentVisits}
            onOpenFieldStudy={(ch)=>{setFieldStudyChild(ch||family.children[0]);setShowFieldStudy(true);}}
            quizNotifs={quizNotifs}
            onDismissQuizNotif={(id)=>{
              const updated=quizNotifs.map(n=>n.id===id?{...n,dismissed:true}:n);
              setQuizNotifs(updated);
              try{ localStorage.setItem("rootbloom_quiz_notifs",JSON.stringify(updated)); }catch(ex){}
            }}
            fieldStudyNotifs={fieldStudyNotifs}
            onDismissFieldStudyNotif={(id)=>{
              const updated=fieldStudyNotifs.map(n=>n.id===id?{...n,dismissed:true}:n);
              setFieldStudyNotifs(updated);
              try{ localStorage.setItem("rootbloom_fs_notifs",JSON.stringify(updated)); }catch(ex){}
            }}
            homeLayout={homeLayout}
            onSetHomeLayout={setHomeLayout}
            coopLog={coopLog}
            onUpdateFamily={updates=>setFamily(f=>({...f,...updates}))}
            onOpenPC={(childId)=>{setPcChildId(childId);setActiveTab("preparedcapable");}}
          />}
          {activeTab==="schedule" && <ScheduleScreen pal={pal} family={family} child={childFilt} setChild={setChildFilt}
            lastCheckinDate={lastCheckinDate}
            onUpdateFamily={updates=>setFamily(f=>({...f,...updates}))}
            onMarkComplete={(data)=>{
              const todayStr=new Date().toDateString();
              setAttendanceDays(d=>d+(lastCheckinDate===todayStr?0:1));
              const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
              if(lastCheckinDate===yesterday.toDateString()) setCheckinStreak(s=>s+1);
              else if(lastCheckinDate!==todayStr) setCheckinStreak(1);
              setLastCheckinDate(todayStr);
              if(data.wrapUpEntries&&data.wrapUpEntries.length>0){
                data.wrapUpEntries.forEach(e=>addPortfolioEntry(e));
              }
            }}
            onProgressUpdate={(count,total)=>{
              const todayStr=new Date().toDateString();
              setTodayProgress({count,total,date:todayStr});
            }}
          />}
          {activeTab==="progress"    && <ProgressScreen   pal={pal} family={family} child={childFilt} setChild={setChildFilt} portfolioEntries={portfolioEntries} attendanceDays={attendanceDays} onUpdateFamily={updates=>setFamily(f=>({...f,...updates}))} onOpenEOY={()=>{setEoyChild(0);setShowEOY(true);}} onOpenDigest={()=>setShowDigest(true)} />}
          {activeTab==="learn"       && <LearnScreen       pal={pal} family={family} child={childFilt} setChild={setChildFilt} learnTab={learnTab} setLearnTab={setLearnTab} portfolioEntries={portfolioEntries} />}
          {activeTab==="portfolio"   && <PortfolioScreen   pal={pal} family={family} child={childFilt} setChild={setChildFilt} entries={portfolioEntries} onAddEntry={addPortfolioEntry} onEditEntry={editPortfolioEntry} attendanceDays={attendanceDays}
            lastCheckinDate={lastCheckinDate} coopLog={coopLog} portfolioLayout={portfolioLayout} onSetPortfolioLayout={setPortfolioLayout}
            attendanceLog={attendanceLog} notifDismissed={notifDismissed} onDismissNotif={(k)=>setNotifDismissed(d=>({...d,[k]:new Date().toDateString()}))} onOpenEOY={()=>{setEoyChild(0);setShowEOY(true);}}
            onOpenFieldStudy={(ch)=>{setFieldStudyChild(ch);setShowFieldStudy(true);}}
            pendingEntries={pendingEntries}
            onApprovePending={(id,edits)=>{
              const e=pendingEntries.find(p=>p.id===id);
              if(e){ addPortfolioEntry({...e,...(edits||{})}); setPendingEntries(p=>p.filter(x=>x.id!==id)); }
            }}
            onDeclinePending={(id)=>setPendingEntries(p=>p.filter(x=>x.id!==id))}
            onCheckin={()=>handleChildCheckin(childFilt!=="all"?childFilt:family.children?.[0]?.id)}/>}
          {activeTab==="attendance"  && <AttendanceScreen  pal={pal} family={family} days={attendanceDays} attendanceLog={attendanceLog} portfolioEntries={portfolioEntries} coopLog={coopLog}
            onAddDay={(entry)=>{
              setAttendanceLog(l=>[entry,...l.filter(x=>x.date!==entry.date)]);
              if(!["Excused Absence","Unexcused Absence","Holiday"].includes(entry.type)){
                setAttendanceDays(d=>d+1);
              }
            }}
            onRemoveDay={(date)=>{
              const entry = attendanceLog.find(e=>e.date===date);
              setAttendanceLog(l=>l.filter(e=>e.date!==date));
              if(entry&&!["Excused Absence","Unexcused Absence","Holiday"].includes(entry.type)){
                setAttendanceDays(d=>Math.max(0,d-1));
              }
            }}
            onSyncPortfolio={()=>{
              // Find portfolio dates not already in attendanceLog
              const loggedDates = new Set(attendanceLog.map(e=>e.date));
              const portfolioDates = [...new Set(portfolioEntries.filter(e=>!e.isDay&&e.date).map(e=>e.date))];
              const newDates = portfolioDates.filter(d=>!loggedDates.has(d));
              if(newDates.length===0) return 0;
              const newEntries = newDates.map(d=>({date:d,type:"School Day",note:"Synced from portfolio",subjects:[...new Set(portfolioEntries.filter(e=>e.date===d&&!e.isDay).map(e=>e.subj))]}));
              setAttendanceLog(l=>[...newEntries,...l]);
              setAttendanceDays(d=>d+newDates.length);
              return newDates.length;
            }}
            pending={pendingSchedDays}
            onConfirmPull={()=>{
              // Add pending days to attendance log so they won't show as pending again
              const today = new Date();
              const dow = today.getDay();
              const weekStart = new Date(today);
              weekStart.setDate(today.getDate()-(dow===0?6:dow-1));
              const newEntries = [];
              for(let di=0;di<5;di++){
                const d=new Date(weekStart);d.setDate(weekStart.getDate()+di);
                if(d>=today) continue;
                const dateStr=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
                if(!attendanceLog.find(e=>e.date===dateStr)){
                  newEntries.push({date:dateStr,type:"School Day",note:"Added from schedule"});
                }
              }
              if(newEntries.length>0){
                setAttendanceLog(l=>[...newEntries,...l]);
                setAttendanceDays(d=>d+newEntries.length);
              }

            onLogPastDay={(dateStr)=>{

              onTheme={()=>setShowTheme(true)} onNavEdit={()=>setShowNav(true)} onSettings={openSettings} onLifeReady={()=>setShowLifeReady(true)} />}

        {showFABMenu&&(
          <div style={{position:"fixed",bottom:"140px",left:"calc(50% - 205px)",zIndex:50,display:"flex",flexDirection:"column",gap:"0.4rem",alignItems:"flex-start"}}>

              style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.55rem 0.9rem",border:"none",borderRadius:"22px",background:"#fff",boxShadow:"0 3px 14px rgba(0,0,0,0.18)",cursor:"pointer",fontSize:"0.82rem",fontWeight:"700",color:"#1a1a1a",whiteSpace:"nowrap"}}>
              <span style={{fontSize:"1.1rem"}}>{"✏️"}</span>{"Quick Log"}
            </button>
            <button onClick={()=>{setShowFABMenu(false);setShowParentNote(true);}}
              style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.55rem 0.9rem",border:"none",borderRadius:"22px",background:"#fff",boxShadow:"0 3px 14px rgba(0,0,0,0.18)",cursor:"pointer",fontSize:"0.82rem",fontWeight:"700",color:"#1a1a1a",whiteSpace:"nowrap"}}>
              <span style={{fontSize:"1.1rem"}}>{"💌"}</span>{"Note to Child"}

        <button onClick={()=>setShowFABMenu(v=>!v)}
          style={{position:"fixed",bottom:"80px",left:"calc(50% - 205px)",width:"52px",height:"52px",borderRadius:"50%",background:showFABMenu?"#1a1a1a":pal.heroGrad||pal.accentGrad,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",zIndex:49,boxShadow:`0 3px 14px ${pal.primary}55`,transition:"transform 0.15s, background 0.15s"}}

          onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}

            onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}

          {(!isOnline||deviceChild)&&(
            <div style={{position:"absolute",top:"-22px",left:"50%",transform:"translateX(-50%)",background:!isOnline?"#c0392b":pal.slate,color:"#fff",fontSize:"0.58rem",fontWeight:"700",padding:"2px 10px",borderRadius:"99px 99px 0 0",letterSpacing:"0.06em",whiteSpace:"nowrap",opacity:0.92}}>

          )}
          {navTabs.map(t=>{
            const active=activeTab===t.id;

            const isPortfolio=t.id==="portfolio";
            const quizBubbleCount=isProgress?(quizNotifs||[]).filter(n=>!n.dismissed&&new Date(n.ts).toDateString()===new Date().toDateString()).length:0;
            const pendingCount=isPortfolio?pendingEntries.length:0;
            return (
              <button key={t.id} onClick={()=>setActiveTab(t.id)}

                  {pendingCount>0&&<div style={{position:"absolute",top:"-4px",right:"-6px",minWidth:"16px",height:"16px",borderRadius:"99px",background:"#e8943a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.55rem",fontWeight:"900",color:"#fff",padding:"0 3px",lineHeight:1,boxShadow:"0 1px 4px rgba(0,0,0,0.25)"}}>{pendingCount}</div>}

      {showQuickCapture && <QuickCaptureModal pal={pal} family={family} activeChildId={childFilt}
          onClose={()=>setShowQuickCapture(false)}
          attendanceLog={attendanceLog}

          onSave={(entries)=>{
            entries.forEach(e=>addPortfolioEntry(e));
            setShowQuickCapture(false);
          }}/>}
        {pastDayWrapUp && (
          <WrapUpModal
            pal={pal} family={family}
            subjsDone={[]} notesBySubj={{}}
            dateLabel={pastDayWrapUp.dateLabel} dateStr={pastDayWrapUp.dateStr}
            allDone={true}
            onSave={(entries)=>{
              entries.forEach(e=>addPortfolioEntry(e));
              setAttendanceDays(d=>d+1);
              setPastDayWrapUp(null);
            }}
            onClose={()=>setPastDayWrapUp(null)}
          />
        )}
        {showAIChat    && <AIChatModal     pal={pal} family={family} portfolioEntries={portfolioEntries} onClose={()=>setShowAIChat(false)} />}
        {showTheme    && <ThemeModal     pal={pal} paletteId={paletteId} setPaletteId={setPaletteId} customA={customA} customB={customB} setCustomA={setCustomA} setCustomB={setCustomB} onClose={()=>setShowTheme(false)} />}
        {showNav      && <NavModal       pal={pal} navIds={navIds} setNavIds={setNavIds} onClose={()=>setShowNav(false)} />}
        {showSwitcher && <ViewSwitcher   pal={pal} family={family} onParent={()=>setShowSwitcher(false)} onStudent={switchToStudent} />}
        {showSchedConfirm && <SchedConfirmModal pal={pal} family={family} days={pendingSchedDays} onConfirm={()=>{
          const today=new Date(); const dow=today.getDay(); const weekStart=new Date(today);
          weekStart.setDate(today.getDate()-(dow===0?6:dow-1));
          const newEntries=[];
          for(let di=0;di<5;di++){
            const d=new Date(weekStart);d.setDate(weekStart.getDate()+di);
            if(d>=today) continue;
            const dateStr=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
            if(!attendanceLog.find(e=>e.date===dateStr)) newEntries.push({date:dateStr,type:"School Day",note:"Added from schedule"});
          }
          if(newEntries.length>0){setAttendanceLog(l=>[...newEntries,...l]);setAttendanceDays(d=>d+newEntries.length);}
          setShowSchedConfirm(false);
        }} onClose={()=>setShowSchedConfirm(false)} />}
        {showDigest   && <WeeklyDigestModal pal={pal} family={family}
          savedPulses={(()=>{try{const s=localStorage.getItem("rootbloom_pulses");return s?JSON.parse(s):[];}catch(e){return [];}})()}
          portfolioEntries={portfolioEntries} attendanceDays={attendanceDays}
          onClose={()=>setShowDigest(false)} />}
        {showCatchup  && <CatchupModal   pal={pal} family={family} days={attendanceDays} needed={parseInt((getStateInfo(family.state||"").hours||"180").match(/\d+/)?.[0]||"180")} onClose={()=>setShowCatchup(false)} />}
        {showCelebration && celebData && <CelebrationModal pal={pal} data={celebData} onEnter={enterApp}/>}
        {showTour && <TourModal pal={pal} onDone={finishTour}/>}
        {showFieldStudy && fieldStudyChild && family && (
          <FieldStudyModal
            pal={pal} family={family} child={fieldStudyChild}
            allEntries={portfolioEntries}
            onAddEntry={addPortfolioEntry}
            onClose={()=>setShowFieldStudy(false)}
            onComplete={(data)=>{
              const notif={id:"fs_"+Date.now(),child:data.child,result:data.result,subj:data.subj,saved:data.saved,wsDeclined:data.wsDeclined,wsWanted:data.wsWanted,ts:Date.now(),dismissed:false};
              const updated=[notif,...fieldStudyNotifs].slice(0,10);
              setFieldStudyNotifs(updated);
              try{ localStorage.setItem("rootbloom_fs_notifs",JSON.stringify(updated)); }catch(ex){}
            }}
          />
        )}
        {showEOY && family && <EOYChecklistModal pal={pal} family={family} childIdx={eoyChild} setChildIdx={setEoyChild}
          weeksLeft={getEOYWeeksLeft(family)}
          portfolioEntries={portfolioEntries}
          attendanceDays={attendanceDays}
          onClose={()=>{setShowEOY(false);setEoyDismissed(family.yearEnd);}}
          onGradeUp={handleGradeUp} />}
        {showNewYear && family && <NewYearModal pal={pal} family={family}
          onStart={handleNewYear}
          onDismiss={()=>{setNewYearDismissed("newyear_"+family.yearEnd);setShowNewYear(false);}}/>}
        }
        {showJournal!==null && family && (
          <ObservationJournalModal
            pal={pal} family={family} childId={showJournal}
            entries={observationLog}
            onAdd={(entry)=>setObservationLog(l=>{
              if(entry._edit){const {_edit,...clean}=entry; return l.map(x=>x.id===clean.id?clean:x);}
              return [entry,...l];
            })}
            onDelete={(id)=>setObservationLog(l=>l.filter(e=>e.id!==id))}
            onClose={()=>setShowJournal(null)}
          />
        )}
      </>)}
    </div>
  );
}

/* =======================================
   LOGIN SCREEN
======================================= */
function LoginScreen({ pal, onLogin }) {
  const [mode,     setMode]     = React.useState("login");
  const [email,    setEmail]    = React.useState("");
  const [pw,       setPw]       = React.useState("");
  const [pwShow,   setPwShow]   = React.useState(false);
  const [loading,  setLoading]  = React.useState(false);
  const [err,      setErr]      = React.useState("");
  const [msg,      setMsg]      = React.useState("");
  const sbReady    = !!(window.supabase && window.SUPABASE_KEY && window.SUPABASE_KEY !== "PASTE_YOUR_ANON_KEY_HERE");

  const handleSubmit = async () => {
    setErr(""); setMsg("");
    if(!sbReady){ setErr("Supabase not configured yet. Add your anon key to index.html."); return; }
    if(!email.trim()||!pw){ setErr("Please enter your email and password."); return; }
    setLoading(true);
    const sb = getSB();
    if(!sb){ setErr("Could not connect to Supabase."); setLoading(false); return; }
    try {
      let result;
      if(mode==="login"){
        result = await sb.auth.signInWithPassword({email:email.trim(),password:pw});
      } else {
        result = await sb.auth.signUp({email:email.trim(),password:pw});
      }
      if(result.error){ setErr(result.error.message); setLoading(false); return; }
      if(mode==="signup" && result.data&&!result.data.session){
        setMsg("Check your email to confirm your account, then come back and log in!");
        setMode("login"); setLoading(false); return;
      }
      // Reset SB client so it picks up the fresh session token
      if(typeof resetSB === "function") resetSB();
      const sb2 = getSB();
      // Pull cloud data or start fresh
      const cloudData = await loadFromSupabase(sb2||sb);
      onLogin(cloudData);
    } catch(e){ setErr("Something went wrong. Try again."); }
    setLoading(false);
  };

  const handleSkip = () => { onLogin(null); };

  return (
    <div style={{height:"100vh",background:pal.heroGrad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 1.2rem",fontFamily:"Georgia,serif"}}>
      <div style={{width:"100%",maxWidth:"400px"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{fontSize:"4rem",marginBottom:"0.75rem"}}>{"🌱"}</div>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:"2rem",fontWeight:"800",color:"#fff",margin:"0 0 0.3rem",lineHeight:1.1}}>{"Root & Bloom"}</h1>
          <p style={{color:"rgba(255,255,255,0.65)",fontSize:"0.84rem",margin:0}}>{"Your homeschool, beautifully organized"}</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"22px",padding:"1.5rem 1.3rem",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.2)"}}>
          {/* Mode toggle */}
          <div style={{display:"flex",gap:"0.4rem",marginBottom:"1.2rem",background:"rgba(0,0,0,0.15)",borderRadius:"14px",padding:"4px"}}>
            {["login","signup"].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr("");setMsg("");}}
                style={{flex:1,padding:"0.5rem",border:"none",borderRadius:"11px",background:mode===m?"rgba(255,255,255,0.95)":"transparent",color:mode===m?pal.primary:"rgba(255,255,255,0.7)",fontWeight:mode===m?"800":"500",fontSize:"0.84rem",cursor:"pointer",transition:"all 0.16s",fontFamily:"inherit"}}>
                {m==="login"?"Log In":"Create Account"}
              </button>
            ))}
          </div>
          {err&&<div style={{background:"rgba(180,0,0,0.25)",border:"1px solid rgba(255,100,100,0.4)",borderRadius:"10px",padding:"0.55rem 0.8rem",fontSize:"0.77rem",color:"#ffe0e0",marginBottom:"0.85rem",lineHeight:1.5}}>{err}</div>}
          {msg&&<div style={{background:"rgba(0,150,80,0.25)",border:"1px solid rgba(100,220,150,0.4)",borderRadius:"10px",padding:"0.55rem 0.8rem",fontSize:"0.77rem",color:"#d0ffe0",marginBottom:"0.85rem",lineHeight:1.5}}>{msg}</div>}
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.7)",fontWeight:"600",marginBottom:"0.3rem"}}>{"Email"}</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder={"your@email.com"}
              style={{width:"100%",padding:"0.65rem 0.85rem",border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:"12px",background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:"0.88rem",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
              onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,0.7)";}}
              onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,0.25)";}} />
          </div>
          <div style={{marginBottom:"1.1rem"}}>
            <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.7)",fontWeight:"600",marginBottom:"0.3rem"}}>{"Password"}</div>
            <div style={{position:"relative"}}>
              <input type={pwShow?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)}
                placeholder={"Password"}
                onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
                style={{width:"100%",padding:"0.65rem 2.5rem 0.65rem 0.85rem",border:"1.5px solid rgba(255,255,255,0.25)",borderRadius:"12px",background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:"0.88rem",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
                onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,0.7)";}}
                onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,0.25)";}} />
              <button onClick={()=>setPwShow(v=>!v)}
                style={{position:"absolute",right:"0.6rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:"0.82rem",padding:"0.2rem"}}>
                {pwShow?"Hide":"Show"}
              </button>
            </div>

/* ---- Curriculum Add Widget (used in Settings) ---- */
function CurriculumAddWidget({pal, local, updL}){
  const [show,     setShow]     = useState(false);
  const [name,     setName]     = useState("");
  const [url,      setUrl]      = useState("");
  const [fetching, setFetching] = useState(false);
  const [msg,      setMsg]      = useState("");

  const urlValid = url.trim().startsWith("http")||url.trim().startsWith("www");

  const add = async () => {
    const n = name.trim();
    const u = url.trim();
    if(!n||!urlValid) return;
    const id = "custom_curr_"+n.toLowerCase().replace(/\s+/g,"_");
    const entry = {id,label:n,url:u,icon:"📘",desc:"Custom curriculum",summary:""};
    const existing = (local.customCurriculums||[]).filter(c=>c.id!==id);
    updL("customCurriculums",[...existing,entry]);
    updL("curriculumBrands",[...(local.curriculumBrands||[]).filter(x=>x!==id),id]);
    setFetching(true);
    setMsg("Looking up "+n+"...");
    try {
      const fetchKey2 = (() => { try{ return localStorage.getItem("rootbloom_apikey")||""; }catch(e){return "";} })();
      if(!fetchKey2) { setMsg("Add an API key in Settings to use AI features."); setFetching(false); return; }
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":fetchKey2,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:400,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:"Please visit "+u+" and give me a 2-3 sentence summary of what this homeschool curriculum covers, its teaching philosophy, grade levels, and what makes it unique. Be concise and practical."}]
        })
      });
      const d = await res.json();
      const summary = d.content?.filter(b=>b.type==="text").map(b=>b.text).join(" ").trim()||"";
      const withSummary = [...existing,{...entry,summary:summary||""}];
      updL("customCurriculums",withSummary);
      setMsg(summary?"✓ Summary added!":"✓ Added — no summary found.");
    } catch(e) {
      setMsg("✓ Added! (Website lookup failed)");
    }
    setFetching(false);
    setName(""); setUrl(""); setShow(false);
    setTimeout(()=>setMsg(""),3000);
  };

  return (
    <div>
      {msg&&<div style={{fontSize:"0.72rem",color:pal.good,fontWeight:"600",marginBottom:"0.45rem",padding:"0.4rem 0.6rem",background:pal.goodBg,borderRadius:"8px",border:`1px solid ${pal.good}30`}}>{msg}</div>}
      {!show?(
        <button onClick={()=>setShow(true)}
          style={{width:"100%",padding:"0.48rem",border:`2px dashed ${pal.stone}`,borderRadius:"10px",background:"transparent",color:pal.slate,fontSize:"0.76rem",fontWeight:"600",cursor:"pointer"}}>
          + Add custom curriculum
        </button>
      ):(

/* --- SCHEDULE GENERATOR --- */
function generateSchedule(family, childId) {
  const schedMode = family.scheduleMode2 || "same"; // "same" | "separate" | "mixed"
  const customSubjs = family.customSubjects || [];
  const subjectMap = Object.fromEntries([...SUBJECT_OPTIONS, ...customSubjs].map(s=>[s.id,s]));

  // Resolve which subjects and settings to use
  let subjects, sessionMins, startHour, startMin;
  if(schedMode==="separate" && childId) {
    const ch = family.children.find(c=>c.id===childId);
    const cfg = ch?.scheduleConfig||{};
    subjects    = cfg.subjects || family.subjects || ["math","reading","language","science","history"];
    sessionMins = parseInt((cfg.sessionLength||family.sessionLength||"45 min").split(" ")[0]);
    startHour   = parseInt((cfg.startTime||family.startTime||"8:00").split(":")[0]);
    startMin    = parseInt((cfg.startTime||family.startTime||"8:00").split(":")[1]||0);
  } else if(schedMode==="mixed" && childId) {
    const ch = family.children.find(c=>c.id===childId);
    const cfg = ch?.scheduleConfig||{};
    // Group subjects first, then child-specific
    const groupSubjs  = family.groupSubjects || family.subjects || [];
    const indivSubjs  = cfg.subjects || [];
    subjects    = [...new Set([...groupSubjs, ...indivSubjs])];
    sessionMins = parseInt((cfg.sessionLength||family.sessionLength||"45 min").split(" ")[0]);
    startHour   = parseInt((family.startTime||"8:00").split(":")[0]);
    startMin    = parseInt((family.startTime||"8:00").split(":")[1]||0);
  } else {
    subjects    = family.subjects || ["math","reading","language","science","history"];
    sessionMins = parseInt((family.sessionLength||"45 min").split(" ")[0]);
    startHour   = parseInt((family.startTime||"8:00").split(":")[0]);
    startMin    = parseInt((family.startTime||"8:00").split(":")[1]||0);
  }

  // Per-day subject filter: if weeklySchedule set, use only today's subjects
  if(family.weeklySchedule) {
    const todayJs = new Date().getDay(); // 0=Sun,1=Mon...6=Sat
    // Convert JS dow to our Mon-based 0-4 index
    const todayIdx = todayJs===0 ? null : todayJs===6 ? null : todayJs-1; // null=weekend
    if(todayIdx!==null) {
      const daySubjs = family.weeklySchedule[todayIdx];
      if(daySubjs===null) {
        // Co-op day or day off — use coopSubjects if set, otherwise empty
        const coopSubjs = family.coopSubjects||[];
        const coopDowCheck = ["Monday","Tuesday","Wednesday","Thursday","Friday"].indexOf(family.coopDay??"");
        if(todayIdx===coopDowCheck && coopSubjs.length>0) {
          subjects = coopSubjs; // show co-op subjects on co-op day
        } else {
          subjects = [];
        }
      } else if(Array.isArray(daySubjs) && daySubjs.length>0) {
        subjects = daySubjs; // use only today's subjects (already IDs)
      }
      // if daySubjs is undefined (not set yet), keep the full subjects list
    }
  }

  const isTimed = family.scheduleMode === "timed";
  let blocks = [];
  let cursor = startHour * 60 + startMin;
  const toTime = mins => {
    const h = Math.floor(mins/60);
    const m = mins % 60;
    return `${h}:${m.toString().padStart(2,"0")}`;
  };

  if (family.morningGathering) {
    blocks.push({t:isTimed?toTime(cursor):"", s:family.morningGatheringName||"Morning Time", i:"🌅", c:"all", dur:30, isGroup:true});
    if(isTimed) cursor += 30;
  }

  subjects.forEach((id, idx) => {
    const subj = subjectMap[id];
    if (!subj) return;
    if (isTimed) {
      const hour = Math.floor(cursor/60);
      if (hour >= 12 && !blocks.find(b=>b.s==="Lunch")) {
        blocks.push({t:toTime(cursor), s:"Lunch", i:"🥪", c:"all", dur:45});
        cursor += 45;
      }
    }
    // Mark group subjects vs individual in mixed mode
    const isGroup = schedMode==="mixed" && (family.groupSubjects||[]).includes(id);
    const cId = schedMode==="separate"&&childId ? childId : "all";
    blocks.push({t:isTimed?toTime(cursor):"", s:subj.label, i:subj.icon, c:cId, dur:sessionMins, isGroup});
    if(isTimed) {
      cursor += sessionMins;
      if ((idx+1) % 2 === 0 && idx < subjects.length-1) {
        const breakStyle = family.breakStyle||"";
        if (!breakStyle.includes("No set")) {
          blocks.push({t:toTime(cursor), s:"Break", i:"☕", c:"all", dur:15});
          cursor += 15;
        }
      }
    }
  });

  // Apply schedule overrides: remove deleted, apply duration edits, add custom, reorder
  const overrides = family.scheduleOverrides;
  if(overrides) {
    if(overrides.removed?.length) {
      blocks = blocks.filter(b=>!overrides.removed.includes(b.s));
    }
    if(overrides.durations) {
      blocks = blocks.map(b=>overrides.durations[b.s]?{...b,dur:overrides.durations[b.s]}:b);
    }
    if(overrides.custom?.length) {
      blocks = [...blocks, ...overrides.custom];
    }
    if(overrides.order?.length) {
      const orderMap = Object.fromEntries(overrides.order.map((s,i)=>[s,i]));
      blocks.sort((a,b)=>{
        const ai = orderMap[a.s]??999;
        const bi = orderMap[b.s]??999;
        return ai-bi;
      });
    }
  }

  // Inject co-op block on the family's co-op day
  if(family.coopFreq && family.coopFreq!=="We don't do co-op" && family.coopDay) {
    const DOW_MAP = {"Monday":1,"Tuesday":2,"Wednesday":3,"Thursday":4,"Friday":5,"Saturday":6};
    const coopDow = DOW_MAP[family.coopDay];
    const todayDow = new Date().getDay();
    if(coopDow===todayDow) {
      const coopName = family.coopName||"Co-op";
      if(!blocks.find(b=>b.s===coopName||b.s==="Co-op")) {
        blocks.push({t:family.coopTime||"", s:coopName, i:"🏫", c:"all", dur:180, isCoop:true});
      }
    }
  }

  // Inject Life Ready blocks based on day of week
  if (family.lifeReady) {
    const dow = new Date().getDay();
    const freq = family.lifeReadyFreq || "monday_plus_practice";
    const topic = getLRTopicForWeek(family.children?.[0]?.grade||"5th");
    if (dow===1) {
      const insertAt = family.morningGathering ? 1 : 0;
      blocks.splice(insertAt, 0, {
        t: isTimed ? toTime(cursor) : "",
        s: LR_NAME + ": " + topic,
        i: LR_ICON,
        c: "all",
        dur: 30,
        lifeReady: true,
        isLesson: true,
        accentColor: LR_COLOR,
      });
    } else if (freq === "monday_plus_practice" && (dow===2||dow===3||dow===4)) {
      blocks.push({
        t: "",
        s: "P&C Practice: " + topic,
        i: LR_ICON,
        c: "all",
        dur: 10,
        lifeReady: true,
        isPractice: true,
        accentColor: LR_COLOR,
      });
    }
  }

  return blocks;
}

    {
      emoji:"🏡",
      color:"#2a6a2a",
      color2:"#4a9a4a",
      title:"Your daily command center",
      body:"Log today's school day right from the home screen. Tap 📝 Log Today — it walks you through every subject in under a minute.",

    },

      emoji:"📅",
      color:"#1a5a8a",
      color2:"#3a8ac8",
      title:"Check off as you go",

      emoji:"🗂",

  const next = () => slide < SLIDES.length-1 ? goTo(slide+1) : onDone();

        <p style={{

          background:`${s.color}35`,border:`1px solid ${s.color2}50`,
          borderRadius:"20px",padding:"0.35rem 0.85rem",
          animation:"fadeUp 0.4s ease 0.26s both",
        }}>
          <span style={{fontSize:"0.75rem"}}>{"💡"}</span>

      </div>

            borderRadius:"99px",border:"none",cursor:"pointer",

          flex:2,padding:"0.85rem",border:"none",borderRadius:"14px",
          background:slide===SLIDES.length-1
            ? `linear-gradient(135deg,${s.color},${s.color2})`

          color:"#fff",fontWeight:"900",fontSize:"0.95rem",cursor:"pointer",
          boxShadow:`0 6px 24px ${s.color}50`,
          transition:"box-shadow 0.3s",

  const topGoals = scored.slice(0,3);

/* ── School day helper -- is today a school day for this family? ── */
function isSchoolDay(schoolDays) {
  const dayName = new Date().toLocaleDateString("en-US",{weekday:"long"});
  const dayMap = {"Sunday":0,"Monday":1,"Tuesday":2,"Wednesday":3,"Thursday":4,"Friday":5,"Saturday":6};
  const d = dayMap[dayName];
  if(!schoolDays || schoolDays==="Monday-Friday") return d>=1&&d<=5;
  if(schoolDays==="Monday-Thursday")  return d>=1&&d<=4;
  if(schoolDays==="Tuesday-Friday")   return d>=2&&d<=5;
  if(schoolDays==="Mon/Wed/Fri")      return d===1||d===3||d===5;
  if(schoolDays==="Tue/Thu")          return d===2||d===4;
  // fallback: Mon-Fri
  return d>=1&&d<=5;
}

  const handleTouchStart = (e, i) => { touchDragIdx.current = i; touchStartY.current = e.touches[0].clientY; };
  const handleTouchMove  = (e) => {
    if(touchDragIdx.current === null) return;
    const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    const row = el?.closest('[data-drag-idx]');
    if(row) setDragOverIdx(parseInt(row.dataset.dragIdx));
  };
  const handleTouchEnd = () => {
    if(touchDragIdx.current !== null && dragOverIdx !== null && touchDragIdx.current !== dragOverIdx) {
      const next = [...homeLayout];
      const [moved] = next.splice(touchDragIdx.current, 1);

            <div style={{flex:1}}>
              <div style={{fontWeight:"700",color:"#b07800",fontSize:"0.82rem"}}>{_stalest.label+" hasn't been logged in a while"}</div>
              <div style={{fontSize:"0.7rem",color:"#7a5500",marginTop:"1px"}}>{_staleDays===999?"Not logged yet this year":_staleDays+" days since the last "+_stalest.label+" entry."}</div>
            </div>
            <button onClick={()=>{try{localStorage.setItem(_dismissKey2,"1");}catch(e){}}}
              style={{padding:"0.28rem 0.55rem",border:"1px solid #f5c84250",borderRadius:"7px",background:"transparent",color:"#b07800",fontSize:"0.7rem",cursor:"pointer",flexShrink:0}}>{"OK"}</button>
          </div>
        );
      })()}

      {/* Field study notification banners */}
      {(fieldStudyNotifs||[]).filter(n=>!n.dismissed).map(n=>(
        <div key={n.id} style={{background:pal.pale,borderRadius:"13px",padding:"0.75rem 1rem",marginBottom:"0.6rem",border:`2px solid ${pal.primary}22`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:"0.6rem"}}>
            <span style={{fontSize:"1.2rem",flexShrink:0}}>{n.child?.avatar||"🔭"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.82rem",marginBottom:"2px"}}>
                {(n.child?.name||"") + " completed a Field Study!"}
              </div>
              <div style={{fontSize:"0.72rem",color:pal.ink,marginBottom:"2px"}}>
                {n.result?.subject||n.subj}
              </div>
              {n.wsDeclined&&!n.wsWanted&&(
                <div style={{fontSize:"0.68rem",color:"#b07800",marginBottom:"4px"}}>
                  {(n.child?.name||"")+" declined the worksheet"}
                </div>
              )}
              <div style={{fontSize:"0.67rem",color:pal.slate}}>
                {n.saved?"Saved to portfolio":"Not saved yet"}
              </div>
            </div>
            <button onClick={()=>onDismissFieldStudyNotif&&onDismissFieldStudyNotif(n.id)}
              style={{padding:"0.15rem 0.5rem",border:`1.5px solid ${pal.stone}`,borderRadius:"20px",background:"transparent",color:pal.slate,fontSize:"0.65rem",fontWeight:"600",cursor:"pointer",flexShrink:0}}>
              {"Dismiss"}
            </button>
          </div>
        </div>
      ))}
      {/* ── Layout edit toggle ── */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"0.5rem"}}>
        <button onClick={()=>setLayoutEdit(v=>!v)}
          style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.25rem 0.65rem",border:`1.5px solid ${layoutEdit?pal.primary:pal.stone+"60"}`,borderRadius:"20px",background:layoutEdit?pal.pale:"transparent",color:layoutEdit?pal.primary:pal.slate,fontSize:"0.68rem",fontWeight:"700",cursor:"pointer",transition:"all 0.15s"}}>
          <span>{layoutEdit?"✓ Done":"⠿ Edit Layout"}</span>
        </button>
      </div>

      {layoutEdit ? (
        /* ── Drag-to-reorder editor ── */
        <div>
          {homeLayout.map((sid,i)=>(
            <div key={sid} data-drag-idx={i}
              draggable
              onDragStart={()=>handleDragStart(i)}
              onDragOver={e=>handleDragOver(e,i)}
              onDrop={()=>handleDrop(i)}
              onTouchStart={e=>handleTouchStart(e,i)}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleTouchEnd}
              style={{display:"flex",alignItems:"center",gap:"0.65rem",background:dragOverIdx===i?pal.pale:pal.linen,borderRadius:"13px",padding:"0.7rem 0.85rem",marginBottom:"0.5rem",border:`1.5px solid ${dragOverIdx===i?pal.primary:pal.stone+"40"}`,cursor:"grab",transition:"all 0.12s",userSelect:"none",touchAction:"none"}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{SECTION_ICONS[sid]||"📌"}</span>
              <span style={{flex:1,fontWeight:"700",color:pal.inkM,fontSize:"0.82rem"}}>{SECTION_LABELS[sid]||sid}</span>
              <button onClick={e=>{e.stopPropagation();onSetHomeLayout&&onSetHomeLayout(homeLayout.filter(x=>x!==sid));}}
                style={{padding:"0.15rem 0.45rem",border:"1px solid "+pal.stone+"50",borderRadius:"8px",background:pal.parchm,color:pal.slate,fontSize:"0.65rem",cursor:"pointer",fontWeight:"600",flexShrink:0}}>
                {"Hide"}
              </button>
              <span style={{fontSize:"1.2rem",color:pal.stone,flexShrink:0,letterSpacing:"-1px"}}>{"≡"}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"0.5rem"}}>
            <div style={{fontSize:"0.68rem",color:pal.slate,fontStyle:"italic"}}>{"Drag to reorder \u00b7 tap Hide to remove"}</div>
            <button onClick={()=>onSetHomeLayout&&onSetHomeLayout(["goals","pandc","progress_nudge","goals","pandc","coop","progress_nudge","thisweek","todaycard"])}
              style={{fontSize:"0.65rem",color:pal.primary,fontWeight:"700",background:"transparent",border:"none",cursor:"pointer",padding:"0.2rem 0.4rem"}}>
              {"Reset to default"}
            </button>
          </div>
          {(()=>{
            const allSids=["goals","pandc","progress_nudge","thisweek","consistency","subjectgap","todaycard"];
            const hiddenSids=allSids.filter(s=>!homeLayout.includes(s));
            if(!hiddenSids.length) return null;
            return (
              <div style={{marginTop:"0.75rem",padding:"0.6rem 0.75rem",background:pal.parchm,borderRadius:"12px",border:"1px solid "+pal.stone+"30"}}>
                <div style={{fontSize:"0.65rem",fontWeight:"700",color:pal.slate,marginBottom:"0.4rem",textTransform:"uppercase",letterSpacing:"0.05em"}}>{"Hidden sections"}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
                  {hiddenSids.map(s=>(
                    <button key={s} onClick={()=>onSetHomeLayout&&onSetHomeLayout([...homeLayout,s])}
                      style={{padding:"0.2rem 0.6rem",borderRadius:"20px",border:"1.5px solid "+pal.primary+"50",background:pal.pale,color:pal.primary,fontSize:"0.68rem",fontWeight:"700",cursor:"pointer"}}>
                      {"+ "+(SECTION_LABELS[s]||s)}
                    </button>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      ) : (
        /* ── Normal rendered sections in user-defined order ── */
        <div>
          {homeLayout.map(sid => {
            const fn = sectionRenderMap[sid];
            return fn ? fn() : null;
          })}
        </div>
      )}

        <div style={{height:"0.5rem"}}/>
      </div>
      {showQuickLog&&(()=>{
        const childIdx = Math.max(0,family.children.findIndex(c=>c.id===child));
        const currentChild = family.children[childIdx];
        const si = getStateInfo(family.state||"");
        return <DailyPortfolioModal pal={pal} family={family} childIdx={childIdx} stateInfo={si}
          onClose={()=>{ setShowQuickLog(false); setLogQueue([]); }}
          onSave={(entries)=>{
            entries.forEach(e=>onAddEntry&&onAddEntry(e));
            // Only mark day logged if there are real entries
            if(entries.length>0) onCheckin&&onCheckin(currentChild?.id);
            if(logQueue.length>0){
              const [nextChildId,...rest] = logQueue;
              // Show transition screen instead of jumping directly
              setShowQuickLog(false);
              setNextChildPrompt({nextChildId, prevEntries:entries, queue:rest});
              setCarryOverSubjs([]); // reset carryover selection
            } else {
              setShowQuickLog(false);
            }
          }} prevCarryOver={carryOverSubjs.length>0?carryOverSubjs:null}/>;
      })()}

      {/* ── Next Child Transition Prompt ── */}
      {nextChildPrompt&&(()=>{
        const nextChild = family.children.find(c=>c.id===nextChildPrompt.nextChildId);
        if(!nextChild) return null;
        const nextCp = CHILD_COLOR_PALETTES.find(p=>p.id===(nextChild.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
        // Subjects from prev child's entries (for carry-over)
        const prevSubjs = [...new Set(nextChildPrompt.prevEntries.filter(e=>!e.isDay).map(e=>e.subj))];
        const remaining = nextChildPrompt.queue.length;
        return (
          <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{width:"100%",maxWidth:"430px",background:pal.linen,borderRadius:"24px 24px 0 0",animation:"slideUp 0.28s ease",paddingBottom:"env(safe-area-inset-bottom)"}}>
              <div style={{padding:"0.65rem 0 0",display:"flex",justifyContent:"center"}}>
                <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone+"60"}}/>
              </div>
              <div style={{padding:"1rem 1.2rem 0.5rem",textAlign:"center"}}>
                <div style={{fontSize:"2.2rem",marginBottom:"0.3rem",animation:"grow 0.35s ease"}}>{"✅"}</div>
                <div style={{fontWeight:"800",color:pal.good,fontSize:"1rem",marginBottom:"0.15rem"}}>
                  {family.children.find(c=>c.id!==nextChildPrompt.nextChildId&&!nextChildPrompt.queue.includes(c.id))?.name||"Done"}{" logged!"}
                </div>
                <div style={{fontSize:"0.76rem",color:pal.slate}}>
                  {remaining>0
                    ? "Up next: "+nextChild.name+" · then "+(remaining)+" more"
                    : "Up next: "+nextChild.name+" (last one!)"}
                </div>
              </div>

              <div style={{padding:"0.75rem 1.2rem"}}>
                {/* Carry-over option */}
                {prevSubjs.length>0&&(
                  <div style={{background:pal.parchm,borderRadius:"13px",padding:"0.75rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
                    <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.5rem"}}>
                      {"📋 Carry subjects over to "+nextChild.name+"?"}
                    </div>
                    <div style={{fontSize:"0.7rem",color:pal.slate,marginBottom:"0.6rem"}}>
                      {"Select any subjects to pre-fill — you can still edit notes"}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
                      {prevSubjs.map(s=>{
                        const sel = carryOverSubjs.includes(s);
                        return (
                          <button key={s} onClick={()=>setCarryOverSubjs(prev=>sel?prev.filter(x=>x!==s):[...prev,s])}
                            style={{padding:"0.28rem 0.65rem",borderRadius:"20px",border:`2px solid ${sel?nextCp.c1:pal.stone+"50"}`,background:sel?nextCp.c1+"18":"transparent",color:sel?nextCp.c1:pal.inkM,fontWeight:sel?"700":"400",fontSize:"0.76rem",cursor:"pointer",transition:"all 0.12s"}}>
                            {s}
                          </button>
                        );
                      })}
                    </div>
                    {prevSubjs.length>1&&(
                      <button onClick={()=>setCarryOverSubjs(carryOverSubjs.length===prevSubjs.length?[]:prevSubjs)}
                        style={{marginTop:"0.45rem",fontSize:"0.68rem",color:nextCp.c1,background:"none",border:"none",cursor:"pointer",fontWeight:"700"}}>
                        {carryOverSubjs.length===prevSubjs.length?"Clear all":"Select all"}
                      </button>
                    )}
                  </div>
                )}

                {/* Action buttons */}
                <button onClick={()=>{
                    setNextChildPrompt(null);
                    setLogQueue(nextChildPrompt.queue);
                    setChild(nextChildPrompt.nextChildId);
                    setCarryOverSubjs(prev=>prev); // keep selection
                    setShowQuickLog(true);
                  }}
                  style={{width:"100%",padding:"0.85rem",border:"none",borderRadius:"13px",background:`linear-gradient(135deg,${nextCp.c1},${nextCp.c2})`,color:"#fff",fontWeight:"800",fontSize:"0.9rem",cursor:"pointer",marginBottom:"0.45rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
                  <span>{nextChild.avatar}</span>
                  <span>{"Log "+nextChild.name+"’s day"}</span>
                </button>
                <div style={{display:"flex",gap:"0.4rem"}}>
                  {nextChildPrompt.queue.length>0&&(
                    <button onClick={()=>{
                        // Skip this child, move to next in queue
                        const [skip,...rest] = nextChildPrompt.queue.length>0?[nextChildPrompt.nextChildId,...nextChildPrompt.queue]:[nextChildPrompt.nextChildId];
                        if(rest.length>0){
                          setNextChildPrompt({nextChildId:rest[0],prevEntries:nextChildPrompt.prevEntries,queue:rest.slice(1)});
                        } else {
                          setNextChildPrompt(null);
                        }
                        setCarryOverSubjs([]);
                      }}
                      style={{flex:1,padding:"0.65rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.78rem",cursor:"pointer"}}>
                      {"Skip "+nextChild.name}
                    </button>
                  )}
                  <button onClick={()=>{setNextChildPrompt(null);setCarryOverSubjs([]);}}
                    style={{flex:1,padding:"0.65rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.78rem",cursor:"pointer"}}>
                    {"Done for today"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* =======================================
   SCHEDULE EDITOR MODAL
======================================= */
function ScheduleQuickEditors({pal, family, onUpdateFamily}) {
  const [openCard, setOpenCard] = useState(null); // "goals" | "schedule" | null
  const customSjs = family.customSubjects||[];
  const sMap = Object.fromEntries([...SUBJECT_OPTIONS,...customSjs].map(s=>[s.id,s]));
  const activeSjs = (family.subjects||[]).map(id=>sMap[id]).filter(Boolean);
  const coopDowIdx = ["Monday","Tuesday","Wednesday","Thursday","Friday"].indexOf(family.coopDay??"");
  const DOW_NAMES = ["Mon","Tue","Wed","Thu","Fri"];
  const DOW_FULL  = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

  // Lesson goals state
  const [lgLocal, setLgLocal] = useState(family.lessonGoals||{});
  const cycleGoal = (subjId, dow) => {
    const cur = (lgLocal[subjId]||{})[dow]||0;
    const next = cur>=3?0:cur+1;
    const updated = {...lgLocal,[subjId]:{...(lgLocal[subjId]||{}),[dow]:next}};
    setLgLocal(updated);
    onUpdateFamily&&onUpdateFamily({lessonGoals:updated});
  };

  // Weekly schedule state
  const initWs = () => {
    if(family.weeklySchedule) return family.weeklySchedule;
    const init = {};
    for(let d=0;d<5;d++) init[d] = d===coopDowIdx?null:activeSjs.map(s=>s.id);
    return init;
  };
  const [wsLocal, setWsLocal] = useState(initWs);
  const [activeDay, setActiveDay] = useState(coopDowIdx===0?1:0);

  const updateWs = (fn) => {
    const next = typeof fn==="function"?fn(wsLocal):fn;
    setWsLocal(next);
    onUpdateFamily&&onUpdateFamily({weeklySchedule:next});
  };
  const togSubj = (dow,id) => updateWs(prev=>{
    const cur=prev[dow]||[];
    return {...prev,[dow]:cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]};
  });
  const togDay = (dow) => {
    if(dow===coopDowIdx) return;
    updateWs(prev=>({...prev,[dow]:prev[dow]===null?activeSjs.map(s=>s.id):null}));
  };

  const isOff = wsLocal[activeDay]===null && activeDay!==coopDowIdx;
  const isCoop = activeDay===coopDowIdx;
  const daySjs = wsLocal[activeDay]||[];

  if(activeSjs.length===0) return null;

  const cardStyle = (id) => ({
    background:pal.linen,borderRadius:"14px",marginBottom:"0.75rem",
    border:`1.5px solid ${openCard===id?pal.primary+"50":pal.stone+"35"}`,overflow:"hidden",
  });
  const hdrStyle = (id) => ({
    display:"flex",justifyContent:"space-between",alignItems:"center",
    padding:"0.75rem 1rem",cursor:"pointer",
    background:openCard===id?pal.pale:"transparent",
  });

  return (
    <div style={{padding:"0 1rem",marginTop:"0.5rem"}}>
      <div style={{fontSize:"0.68rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.6rem"}}>{"Quick Settings"}</div>

      {/* Lesson Goals card */}
      <div style={cardStyle("goals")}>
        <div style={hdrStyle("goals")} onClick={()=>setOpenCard(openCard==="goals"?null:"goals")}>
          <div>
            <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.82rem"}}>{"🎯 Lesson Goals"}</div>
            <div style={{fontSize:"0.65rem",color:pal.slate,marginTop:"1px"}}>{"Tap a number to cycle 0\u20133 per day"}</div>
          </div>
          <span style={{color:pal.slate,fontSize:"1rem",transform:openCard==="goals"?"rotate(90deg)":"none",transition:"transform 0.2s"}}>{"›"}</span>
        </div>
        {openCard==="goals"&&(
          <div style={{padding:"0 0.85rem 0.85rem",animation:"fadeUp 0.16s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr repeat(5,32px)",gap:"0.25rem",marginBottom:"0.35rem",alignItems:"center"}}>
              <div/>
              {DOW_NAMES.map((d,i)=>(
                <div key={d} style={{textAlign:"center",fontSize:"0.58rem",fontWeight:"800",color:i===coopDowIdx?"#b07800":pal.slate,textTransform:"uppercase"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"0.35rem"}}>
              {activeSjs.map(s=>(
                <div key={s.id} style={{display:"grid",gridTemplateColumns:"1fr repeat(5,32px)",gap:"0.25rem",alignItems:"center",background:pal.parchm,borderRadius:"9px",padding:"0.42rem 0.5rem"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"0.3rem",minWidth:0}}>
                    <span style={{fontSize:"0.9rem",flexShrink:0}}>{s.icon}</span>
                    <span style={{fontSize:"0.72rem",fontWeight:"600",color:pal.inkM,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
                  </div>
                  {[0,1,2,3,4].map(dow=>{
                    const ic=dow===coopDowIdx;
                    const val=ic?null:((lgLocal[s.id]||{})[dow]||0);
                    return (
                      <div key={dow} style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {ic?(
                          <div style={{width:"28px",height:"28px",borderRadius:"7px",background:"#fff8e6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.5rem",color:"#b07800",fontWeight:"700",lineHeight:1.1,textAlign:"center"}}>{"co\u00b7op"}</div>
                        ):(
                          <button onClick={()=>cycleGoal(s.id,dow)}
                            style={{width:"28px",height:"28px",borderRadius:"7px",border:`2px solid ${val>0?pal.primary:pal.stone+"50"}`,background:val>0?pal.pale:"transparent",cursor:"pointer",fontWeight:"800",fontSize:"0.8rem",color:val>0?pal.primary:pal.stone,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                            {val}
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Weekly Schedule card */}
      <div style={cardStyle("schedule")}>
        <div style={hdrStyle("schedule")} onClick={()=>setOpenCard(openCard==="schedule"?null:"schedule")}>
          <div>
            <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.82rem"}}>{"📅 Weekly Schedule"}</div>
            <div style={{fontSize:"0.65rem",color:pal.slate,marginTop:"1px"}}>{"Which subjects on which days"}</div>
          </div>
          <span style={{color:pal.slate,fontSize:"1rem",transform:openCard==="schedule"?"rotate(90deg)":"none",transition:"transform 0.2s"}}>{"›"}</span>
        </div>
        {openCard==="schedule"&&(
          <div style={{padding:"0 0.85rem 0.85rem",animation:"fadeUp 0.16s ease"}}>
            <div style={{display:"flex",gap:"0.25rem",marginBottom:"0.65rem"}}>
              {DOW_NAMES.map((d,i)=>{
                const isAct=activeDay===i, isCp=i===coopDowIdx, isOff2=wsLocal[i]===null&&!isCp;
                const cnt=Array.isArray(wsLocal[i])?wsLocal[i].length:0;
                return (
                  <button key={i} onClick={()=>setActiveDay(i)}
                    style={{flex:1,padding:"0.4rem 0.1rem",borderRadius:"9px",border:`1.5px solid ${isAct?pal.primary:isCp?"#f5c842":isOff2?pal.stone+"30":pal.stone+"45"}`,background:isAct?pal.pale:isCp?"#fff8e6":"transparent",cursor:"pointer",textAlign:"center"}}>
                    <div style={{fontSize:"0.6rem",fontWeight:"800",color:isAct?pal.primary:isCp?"#b07800":isOff2?pal.stone:pal.inkM,textTransform:"uppercase"}}>{d}</div>
                    <div style={{fontSize:"0.55rem",color:isAct?pal.primary:isCp?"#b07800":isOff2?pal.stone:pal.slate,marginTop:"1px",fontWeight:"600"}}>
                      {isCp?"coop":isOff2?"off":cnt+"s"}
                    </div>
                  </button>
                );
              })}
            </div>
            {isCoop?(
              <div style={{background:"#fff8e6",borderRadius:"11px",padding:"0.65rem 0.85rem",border:"1.5px solid #f5c84240"}}>
                <div style={{fontSize:"0.73rem",color:"#7a5500",fontWeight:"700",marginBottom:"0.5rem"}}>{"🏫 Co-op Subjects"}</div>
                <div style={{fontSize:"0.68rem",color:"#b07800",marginBottom:"0.45rem"}}>{"Which subjects do you cover at co-op? These will show on your schedule on co-op day."}</div>
                <div style={{display:"flex",flexDirection:"column",gap:"0.2rem"}}>
                  {activeSjs.map(s=>{
                    const coopSubjsQE = family.coopSubjects||[];
                    const selQE = coopSubjsQE.includes(s.id);
                    return (
                      <button key={s.id} onClick={()=>{
                        const curQE = family.coopSubjects||[];
                        onUpdateFamily&&onUpdateFamily({coopSubjects: selQE?curQE.filter(x=>x!==s.id):[...curQE,s.id]});
                      }} style={{display:"flex",gap:"0.45rem",alignItems:"center",padding:"0.35rem 0.5rem",border:`1.5px solid ${selQE?"#b07800":"#f5c84270"}`,borderRadius:"7px",background:selQE?"#fff3cc":"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.1s"}}>
                        <span style={{fontSize:"0.85rem",width:"16px",textAlign:"center",flexShrink:0}}>{s.icon}</span>
                        <span style={{flex:1,fontWeight:selQE?"700":"400",color:selQE?"#7a5500":"#b07800",fontSize:"0.74rem"}}>{s.label}</span>
                        <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`2px solid ${selQE?"#b07800":"#f5c842"}`,background:selQE?"#b07800":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {selQE&&<span style={{color:"#fff",fontSize:"0.55rem",fontWeight:"900"}}>{"✓"}</span>}
                        </div>
                      </button>
                    );
                  })}
                </div>
                {(family.coopSubjects||[]).length===0&&<div style={{fontSize:"0.65rem",color:"#b07800",marginTop:"0.4rem",fontStyle:"italic"}}>{"Tap to select subjects, or leave empty if co-op classes are separate."}</div>}
              </div>
            ):(
