                  onKeyDown={e=>e.key==="Enter"&&addBlock()}
                  style={{flex:1,padding:"0.48rem 0.65rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:"#fff",color:pal.ink,outline:"none",fontFamily:"inherit"}}
                  onFocus={e=>e.target.style.borderColor=pal.primary}
                  onBlur={e=>e.target.style.borderColor=pal.stone}
                  autoFocus/>
                <select value={newDur} onChange={e=>setNewDur(e.target.value)}
                  style={{padding:"0.48rem 0.5rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:"#fff",color:pal.inkM,outline:"none"}}>
                  {DURATIONS.map(d=><option key={d} value={d}>{d} min</option>)}
                </select>
              </div>
              <div style={{marginBottom:"0.6rem"}}>
                <div style={{fontSize:"0.7rem",color:pal.slate,marginBottom:"0.3rem"}}>Icon</div>
                <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap"}}>
                  {ICONS.map(ic=>(
                    <button key={ic} onClick={()=>setNewIcon(ic)}
                      style={{width:"32px",height:"32px",borderRadius:"8px",border:`2px solid ${newIcon===ic?pal.primary:pal.stone+"50"}`,background:newIcon===ic?pal.pale:"transparent",cursor:"pointer",fontSize:"1rem",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {ic}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:"0.4rem"}}>
                <button onClick={()=>{setShowAdd(false);setNewName("");}}
                  style={{padding:"0.5rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",background:"transparent",color:pal.slate,fontSize:"0.8rem",cursor:"pointer"}}>
                  Cancel
                </button>
                <button onClick={addBlock}
                  style={{flex:1,padding:"0.5rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.82rem",cursor:"pointer"}}>
                  Add Block
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:"0.9rem 1.1rem",borderTop:`1px solid ${pal.stone}40`,background:pal.linen,flexShrink:0}}>
          <button onClick={handleSave}
            style={{width:"100%",padding:"0.82rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.9rem",cursor:"pointer"}}>
            Save Schedule
          </button>
        </div>
      </div>
    </div>
  );
}

function ScheduleScreen({pal,family,child,setChild,onMarkComplete,onProgressUpdate,onUpdateFamily,lastCheckinDate}){
  const today = new Date();
  const todayDow = today.getDay();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - (todayDow===0?6:todayDow-1));
  const DAYS = ["Mon","Tue","Wed","Thu","Fri"].map((l,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return {l, d:d.getDate(), date:d.toDateString(), isToday:d.toDateString()===today.toDateString()};
  });
  const todayIdx = DAYS.findIndex(d=>d.isToday);
  const [selectedDay, setSelectedDay] = useState(Math.max(0,todayIdx));
  const [showEditor, setShowEditor] = useState(false);

  // Persist checked + skipped state in localStorage so partial progress saves across navigation
  const SCHED_KEY = "rootbloom_sched_v1";
  const loadSchedState = () => { try{const s=localStorage.getItem(SCHED_KEY);return s?JSON.parse(s):{checked:{},skipped:{},notes:{}};}catch(e){return{checked:{},skipped:{},notes:{}};}};
  const [schedState, setSchedState] = useState(()=>loadSchedState());
  const saveSchedState = (ns) => { try{localStorage.setItem(SCHED_KEY,JSON.stringify(ns));}catch(e){} };
  const [expandedNoteKey, setExpandedNoteKey] = useState(null); // which block has note open

  const checked = schedState.checked || {};
  const daySubjects = schedState.skipped || {};

  const setChecked = (updFn) => setSchedState(prev=>{
    const ns = {...prev, checked:{...updFn(prev.checked||{})}};
    saveSchedState(ns); return ns;
  });
  const setSubjectNote = (key, val) => setSchedState(prev=>{
    const ns = {...prev, notes:{...(prev.notes||{}),[key]:val}};
    saveSchedState(ns); return ns;
  });
  const subjectNotes = schedState.notes || {};
  const setDaySubjects = (updFn) => setSchedState(prev=>{
    const ns = {...prev, skipped:{...updFn(prev.skipped||{})}};
    saveSchedState(ns); return ns;
  });

  const schedMode2 = family.scheduleMode2||"same";
  const activeChildId = child==="all" ? null : child;
  const allBlocks = generateSchedule(family, schedMode2!=="same" ? activeChildId : null);
  const toggleBlock = (di, bi) => {
    const key = di+"_"+bi;
    setChecked(c=>({...c,[key]:!c[key]}));
  };
  const skipBlock = (e, di, bi) => {
    e.stopPropagation();
    setDaySubjects(prev=>{
      const dayMap = prev[di]||{};
      return {...prev,[di]:{...dayMap,[bi]:!dayMap[bi]}};
    });
  };
  const checkAll = (di) => {
    const updates = {};
    allBlocks.forEach((b,bi)=>{ if(!(daySubjects[di]||{})[bi]) updates[di+"_"+bi]=true; });
    setChecked(c=>({...c,...updates}));
  };
  const uncheckAll = (di) => {
    const updates = {};
    allBlocks.forEach((_,bi)=>{ updates[di+"_"+bi]=false; });
    setChecked(c=>({...c,...updates}));
  };

  const visibleBlocks = allBlocks.filter((b,bi)=>!(daySubjects[selectedDay]||{})[bi]);
  // In separate/mixed mode, allBlocks is already per-child — show all; in same mode, filter by child
  const filteredByChild = schedMode2==="same"
    ? visibleBlocks.filter(b=>child==="all"||b.c==="all"||b.c===child)
    : visibleBlocks;
  const checkedCount = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi] && checked[selectedDay+"_"+bi]).length;
  const allDone = checkedCount===filteredByChild.length && filteredByChild.length>0;

  // Report progress to parent (home screen)
  useEffect(()=>{
    if(onProgressUpdate && DAYS[selectedDay]?.isToday) {
      onProgressUpdate(checkedCount, filteredByChild.length);
    }
  },[checkedCount, filteredByChild.length, selectedDay]);
  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Schedule" sub={new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})} icon="📅"/>
      <FirstVisitTip pal={pal} screen="schedule"/>
      <div style={{padding:"0 1rem"}}>
        {/* Child filter + edit button */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.9rem",alignItems:"center"}}>
          <div style={{display:"flex",gap:"0.35rem",flex:1,overflowX:"auto"}}>
            {schedMode2==="same"&&<Chip pal={pal} label="All" active={child==="all"} onClick={()=>setChild("all")}/>}
            {family.children.map(c=><Chip key={c.id} pal={pal} label={c.avatar+" "+c.name} active={child===c.id||(schedMode2!=="same"&&child==="all"&&c===family.children[0])} onClick={()=>setChild(c.id)}/>)}
          </div>
          {schedMode2!=="same"&&(
            <span style={{fontSize:"0.6rem",color:pal.slate,background:pal.parchm,padding:"0.18rem 0.5rem",borderRadius:"20px",border:`1px solid ${pal.stone}40`,flexShrink:0,whiteSpace:"nowrap"}}>
              {schedMode2==="mixed"?"Mixed":"Per-child"}
            </span>
          )}
          <button onClick={()=>setShowEditor(true)}
            style={{padding:"0.32rem 0.7rem",border:`1.5px solid ${pal.stone}`,borderRadius:"9px",background:pal.linen,color:pal.inkM,fontSize:"0.72rem",fontWeight:"700",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
            {"✏️ Edit"}
          </button>
        </div>
        {/* Day strip - real dates */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"1rem"}}>
          {DAYS.map((d,i)=>(
            <button key={i} onClick={()=>setSelectedDay(i)} style={{flex:1,padding:"0.55rem 0",borderRadius:"12px",border:`2px solid ${i===selectedDay?pal.primary:d.isToday?pal.primary+"40":pal.stone+"55"}`,background:i===selectedDay?pal.primary:"transparent",cursor:"pointer",textAlign:"center",transition:"all 0.14s"}}>
              <div style={{fontSize:"0.58rem",fontWeight:"600",color:i===selectedDay?"rgba(255,255,255,0.7)":d.isToday?pal.primary:pal.slate,marginBottom:"2px"}}>{d.l}</div>
              <div style={{fontSize:"0.9rem",fontWeight:"800",color:i===selectedDay?pal.onDark:pal.inkM}}>{d.d}</div>
            </button>
          ))}
        </div>

        {/* Today tip - only show on today */}
        {DAYS[selectedDay]?.isToday && (()=>{
          const loggedViaPortfolio = lastCheckinDate===new Date().toDateString() && !allDone;
          return (
            <div style={{background:loggedViaPortfolio?pal.goodBg:pal.pale,borderRadius:"13px",padding:"0.65rem 1rem",marginBottom:"0.85rem",border:`2px solid ${loggedViaPortfolio?pal.good+"40":pal.primary+"22"}`,display:"flex",gap:"0.65rem",alignItems:"center"}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{loggedViaPortfolio?"✓":"🌱"}</span>
              <div style={{flex:1}}>
                {loggedViaPortfolio?(
                  <>
                    <div style={{fontWeight:"700",color:pal.good,fontSize:"0.78rem"}}>Already logged via Portfolio</div>
                    <div style={{fontSize:"0.7rem",color:pal.inkM,marginTop:"1px"}}>You can still check off subjects here if you want to track them — or skip to the next day.</div>
                  </>
                ):(
                  <>
                    <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem"}}>{"Today's checklist"}</div>
                    <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"1px"}}>Tap items to check them off. Skip any you are not doing today.</div>
                  </>
                )}
              </div>
            </div>
          );
        })()}

        {/* Block list */}
        {filteredByChild.length===0 && (
          <div style={{textAlign:"center",padding:"2rem 1rem",color:pal.slate,fontSize:"0.82rem"}}>No subjects for this day yet.</div>
        )}
        {allBlocks.map((b, bi)=>{
          const skipped = (daySubjects[selectedDay]||{})[bi];
          const blockKey = selectedDay+"_"+bi;
          const done = !!checked[blockKey];
          const hiddenByChild = !(child==="all"||b.c==="all"||b.c===child);
          if(hiddenByChild) return null;
          const noteKey = selectedDay+"_"+bi+"_note";
          const noteOpen = expandedNoteKey===blockKey;
          const hasNote  = !!(subjectNotes[noteKey]&&subjectNotes[noteKey].trim());
          return (
            <div key={bi} style={{marginBottom:"0.5rem",opacity:skipped?0.38:1,transition:"opacity 0.2s"}}>
              <div style={{background:done?pal.pale:pal.linen,borderRadius:noteOpen?"14px 14px 0 0":"14px",border:`2px solid ${done?pal.primary+"40":pal.stone+"18"}`,position:"relative",overflow:"hidden",transition:"all 0.14s"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:"4px",background:done?pal.accentGrad:skipped?pal.stone+"40":pal.stone+"60"}}/>
                <div onClick={()=>!skipped&&toggleBlock(selectedDay,bi)}
                  style={{padding:"0.85rem 1rem",display:"flex",gap:"0.85rem",alignItems:"center",cursor:skipped?"default":"pointer"}}>
                  <div style={{width:"40px",height:"40px",borderRadius:"11px",background:b.lifeReady?(done?LR_COLOR+"33":LR_COLOR+"18"):(done?pal.primary+"22":pal.pale),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.25rem",flexShrink:0,border:b.lifeReady?`2px solid ${LR_COLOR}40`:"none"}}>{b.i}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",color:done?(b.lifeReady?LR_COLOR:pal.primary):skipped?pal.stone:pal.ink,fontSize:"0.88rem",textDecoration:done?"line-through":skipped?"line-through":"none"}}>{b.s}</div>
                    <div style={{fontSize:"0.72rem",color:b.lifeReady?LR_COLOR:pal.slate,fontWeight:b.lifeReady?"600":"400"}}>{b.t?h12(b.t)+" · ":""}{b.dur} min{b.isLesson?" · Lesson":b.isPractice?" · Practice":""}</div>
                    {hasNote&&!noteOpen&&<div style={{fontSize:"0.65rem",color:pal.primary,marginTop:"2px",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {subjectNotes[noteKey]}</div>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();skipBlock(e,selectedDay,bi);}}
                    style={{padding:"0.18rem 0.5rem",borderRadius:"8px",border:`1.5px solid ${skipped?pal.warn:pal.stone+"60"}`,background:"transparent",color:skipped?pal.warn:pal.stone,fontSize:"0.62rem",fontWeight:"700",cursor:"pointer",flexShrink:0}}>
                    {skipped?"restore":"skip"}
                  </button>
                  {/* Note button */}
                  {!skipped&&<button onClick={e=>{e.stopPropagation();setExpandedNoteKey(noteOpen?null:blockKey);}}
                    style={{padding:"0.18rem 0.45rem",borderRadius:"8px",border:`1.5px solid ${hasNote?pal.primary:pal.stone+"60"}`,background:hasNote?pal.pale:"transparent",color:hasNote?pal.primary:pal.stone,fontSize:"0.7rem",cursor:"pointer",flexShrink:0}}>
                    📝
                  </button>}
                  <div style={{width:"22px",height:"22px",borderRadius:"6px",border:`2.5px solid ${done?pal.primary:pal.stone}`,background:done?pal.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.14s"}}>
                    {done&&<span style={{color:"#fff",fontSize:"0.75rem",fontWeight:"900"}}>✓</span>}
                  </div>
                </div>
                {/* Inline note field */}
                {noteOpen&&(
                  <div style={{padding:"0 1rem 0.75rem 1rem",borderTop:`1px solid ${pal.stone}20`}}>
                    <textarea value={subjectNotes[noteKey]||""} onChange={e=>setSubjectNote(noteKey,e.target.value)}
                      rows={2} placeholder={"Notes for "+b.s+"... what did they learn, struggles, highlights?"}
                      autoFocus
                      style={{width:"100%",padding:"0.55rem 0.75rem",border:`1.5px solid ${pal.primary}50`,borderRadius:"10px",fontSize:"0.8rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55,marginTop:"0.65rem"}}/>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {/* Progress bar */}
        {filteredByChild.length>0&&(
          <div style={{background:pal.linen,borderRadius:"12px",padding:"0.75rem 1rem",marginTop:"0.35rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}35`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <span style={{fontSize:"0.75rem",fontWeight:"600",color:pal.inkM}}>{DAYS[selectedDay]?.isToday?"Today":"This day"}</span>
              <span style={{fontSize:"0.75rem",fontWeight:"800",color:allDone?pal.good:pal.primary}}>{checkedCount} / {filteredByChild.length} done</span>
            </div>
            <div style={{height:"7px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${filteredByChild.length?Math.round(checkedCount/filteredByChild.length*100):0}%`,borderRadius:"99px",background:allDone?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.3s ease"}}/>
            </div>
          </div>
        )}

        {/* Check all / uncheck all row */}
        {filteredByChild.length>0 && (
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.65rem"}}>
            <button onClick={()=>checkAll(selectedDay)}
              style={{flex:1,padding:"0.6rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.78rem",cursor:"pointer"}}>
              Check All Done
            </button>
            <button onClick={()=>uncheckAll(selectedDay)}
              style={{padding:"0.6rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.78rem",cursor:"pointer"}}>
              Clear
            </button>
          </div>
        )}

        {/* Live progress banner - always visible */}
        <div style={{background:checkedCount>0?pal.goodBg:pal.parchm,borderRadius:"14px",padding:"0.75rem 1rem",marginBottom:"0.65rem",border:`1.5px solid ${checkedCount>0?pal.good+"40":pal.stone+"35"}`,transition:"all 0.3s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}>
            <span style={{fontSize:"0.8rem",color:checkedCount>0?pal.good:pal.inkM,fontWeight:"700"}}>{checkedCount} of {filteredByChild.length} done</span>
            <span style={{fontSize:"0.72rem",color:pal.slate}}>{"Saves automatically"}</span>
          </div>
          <div style={{height:"6px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${filteredByChild.length?Math.round(checkedCount/filteredByChild.length*100):0}%`,borderRadius:"99px",background:allDone?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.4s ease"}}/>
          </div>
        </div>

        {/* Mark complete - glows when all done */}
        <button
          onClick={()=>{
            if(!allDone) return;
            const completedBlocks = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi]&&checked[selectedDay+"_"+bi]);
            onMarkComplete({
              blocks:completedBlocks,
              date:DAYS[selectedDay]?.date||new Date().toDateString(),
              dateLabel:DAYS[selectedDay]?DAYS[selectedDay].l+" "+DAYS[selectedDay].d:new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),
              checkedCount,
              total:filteredByChild.length,
            });
          }}
          style={{width:"100%",marginBottom:"0.75rem",padding:"0.9rem",border:"none",borderRadius:"14px",background:allDone?pal.accentGrad:pal.stone+"30",color:allDone?pal.onDark:pal.stone,fontWeight:"800",fontSize:"0.88rem",cursor:allDone?"pointer":"default",transition:"all 0.3s",boxShadow:allDone?`0 6px 24px ${pal.accent}50`:"none"}}>
          {allDone ? "🌟 Day complete — see summary" : "Check off subjects above to finish the day"}
        </button>
        <div style={{height:"1rem"}}/>
      </div>
      {showEditor&&<ScheduleEditorModal pal={pal} family={family}
        onSave={overrides=>{onUpdateFamily&&onUpdateFamily({scheduleOverrides:overrides});setShowEditor(false);}}
        onClose={()=>setShowEditor(false)}/>}
    </div>
  );
}

/* ---- AI Rate Limiter ---- */
const AI_KEY = ""; // TODO: Add your Anthropic API key here (sk-ant-...)
const AI_LIMIT_KEY = "rootbloom_ai_limits";
const AI_MONTHLY_LIMIT = 50; // max AI calls per month — change as needed

function checkAILimit(limitOverride) {
  try {
    const now = new Date();
    const monthKey = now.getFullYear()+"-"+(now.getMonth()+1);
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    const count = stored[monthKey]||0;
    const limit = limitOverride || (() => { try{ return parseInt(localStorage.getItem("rootbloom_ailimit")||String(AI_MONTHLY_LIMIT)); }catch(e){return AI_MONTHLY_LIMIT;} })();
    return { allowed: count < limit, used: count, limit, monthKey };
  } catch(e) { return { allowed: true, used: 0, limit: AI_MONTHLY_LIMIT, monthKey:"" }; }
}
function incrementAILimit(monthKey) {
  try {
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    stored[monthKey] = (stored[monthKey]||0) + 1;
    // Clean up old months
    const now = new Date();
    const current = now.getFullYear()+"-"+(now.getMonth()+1);
    Object.keys(stored).forEach(k=>{ if(k!==current) delete stored[k]; });
    localStorage.setItem(AI_LIMIT_KEY, JSON.stringify(stored));
  } catch(e) {}
}

// Returns a rich goals string for AI prompts — human-readable, context-rich
function goalSummary(family) {
  const allGoals = [...GOALS,...(family.customGoals||[])];
  const goalIds  = family.goals||[];
  if(goalIds.length===0) return "well-rounded education";
  const labels = goalIds.map(id=>{
    const g = allGoals.find(x=>x.id===id);
    return g ? g.label : id;
  }).filter(Boolean);
  return labels.join(", ");
}

// Returns curriculum context string for AI prompts
function curriculumContext(family) {
  const brands = (family.curriculumBrands||[]).map(id=>{
    const b = CURRICULUM_BRANDS.find(x=>x.id===id);
    return b ? b.label : id;
  }).filter(Boolean);
  const style  = Array.isArray(family.curriculumStyle)
    ? family.curriculumStyle.join(", ")
    : family.curriculumStyle||"eclectic";
  const parts = [];
  if(brands.length>0) parts.push("Programs: "+brands.join(", "));
  if(style) parts.push("Approach: "+style);
  return parts.join(" | ")||"eclectic homeschool";
}

async function callClaude(prompt) {
  const runtimeKey = (() => { try{ return localStorage.getItem("rootbloom_apikey")||AI_KEY; }catch(e){return AI_KEY;} })();
  const runtimeLimit = (() => { try{ return parseInt(localStorage.getItem("rootbloom_ailimit")||"50"); }catch(e){return 50;} })();
  if(!runtimeKey) throw new Error("NO_KEY");
  const { allowed, monthKey } = checkAILimit(runtimeLimit);
  if(!allowed) throw new Error("RATE_LIMIT");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":runtimeKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5-20251001",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}],
    }),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  incrementAILimit(monthKey);
  return data.content?.map(b=>b.text||"").join("") || "";
}

function AIChatModal({ pal, family, onClose }) {
  const [messages, setMessages] = useState([
    { role:"assistant", content:`Hi! I'm your Root & Bloom assistant 🌱\n\nI can help you create **worksheets**, **lesson plans**, **unit studies**, **discussion questions**, or anything else for your homeschool. Just tell me what you need!\n\nTry something like:\n* "Make a worksheet on fractions for 4th grade"\n* "Write a nature journal prompt for my 7-year-old"\n* "Plan a 3-day unit on the American Revolution"` }
  ]);
  const [input,    setInput]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  const childNames = (family?.children||[]).map(c=>`${c.name} (${c.grade})`).join(", ");
  const philosophies = Array.isArray(family?.curriculumStyle)
    ? family.curriculumStyle.join(", ")
    : (family?.curriculumStyle || "eclectic");

  useEffect(() => {
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if(!AI_KEY){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"AI features need an API key. Ask your app admin to add one in settings."}]);setInput("");return;}
    const {allowed,used,limit} = checkAILimit();
    if(!allowed){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"Monthly AI limit of "+limit+" uses reached. Resets next month!"}]);setInput("");return;}
    setInput("");
    const userMsg = {role:"user", content:text};
    const updated = [...messages, userMsg];
    setMessages(updated);
    setLoading(true);
    try {
      const history = updated.map(m=>({role:m.role, content:m.content}));
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":AI_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-5-20251001",
          max_tokens:1500,
          system:"You are a warm, creative homeschool assistant for Root & Bloom app. You help homeschool families with worksheets, lesson plans, unit studies, discussion questions, project ideas, and any educational content they need.\n\n"
            +"Family info:\n"
            +"- Children: "+(childNames||"not specified")+"\n"
            +"- Curriculum: "+curriculumContext(family)+"\n"
            +"- State: "+(family?.state||"not specified")+"\n"
            +"- Family goals: "+goalSummary(family)+"\n"
            +"- Active subjects: "+((family?.subjects||[]).join(", ")||"not specified")+"\n\n"
            +"Always shape your suggestions to reflect the family's goals. If they prioritize Faith & Character, weave in character development. If Strong Readers, emphasize reading-based learning. If STEM Focus, lean into experiments and inquiry. If Nature & Outdoors, suggest outdoor and nature-based activities.\n\n"
            +"When creating worksheets or lesson plans, format them clearly with headers and numbered items. Be warm, encouraging, and practical. Keep responses focused and useful.",
          messages:history
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response. Please try again.";
      setMessages(m=>[...m,{role:"assistant",content:reply}]);
    } catch(e) {
      const msg = e.message==="NO_KEY"
        ? "AI features need an API key. Add your key in the app settings."
        : e.message==="RATE_LIMIT"
        ? "Monthly AI limit reached (50 uses). Reset next month or update the limit in settings."
        : "Something went wrong. Please check your connection and try again.";
      setMessages(m=>[...m,{role:"assistant",content:msg}]);
    }
    setLoading(false);
  };

  const handleKey = e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }};

  const QUICK = [
    "Make a worksheet for today",
    "Give me a fun project idea",
    "Write discussion questions",
    "Plan a lesson on nature",
  ];

  const renderMessage = (text) => {
    return text.split("\n").map((line,i)=>{
      const bold = line.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
      return <div key={i} style={{marginBottom:line===""?"0.4rem":"0"}} dangerouslySetInnerHTML={{__html:bold||"&nbsp;"}} />;
    });
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",background:pal.sand,maxWidth:"430px",margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:pal.heroGrad,padding:"0.9rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <div style={{width:"38px",height:"38px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:"#fff",fontSize:"0.95rem"}}>AI Assistant</div>
          <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.65)"}}>Worksheets, lessons, projects & more</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"8px",padding:"0.3rem 0.65rem",color:"#fff",cursor:"pointer",fontSize:"0.8rem",fontWeight:"700"}}>{"✕"}</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant" && (
              <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem",flexShrink:0,marginRight:"0.5rem",alignSelf:"flex-end",marginBottom:"2px"}}></div>
            )}
            <div style={{
              maxWidth:"82%",padding:"0.65rem 0.9rem",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
              background:m.role==="user"?pal.accentGrad:pal.linen,
              color:m.role==="user"?pal.onDark:pal.ink,
              fontSize:"0.82rem",lineHeight:1.6,
              border:m.role==="assistant"?`1px solid ${pal.stone}50`:"none"
            }}>
              {renderMessage(m.content)}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
            <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem"}}></div>
            <div style={{background:pal.linen,border:`1px solid ${pal.stone}50`,borderRadius:"16px 16px 16px 4px",padding:"0.65rem 0.9rem"}}>
              <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,opacity:0.4,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
              </div>
            </div>
          </div>
        )}
        {/* Quick prompts - show only at start */}
        {messages.length===1 && !loading && (
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginTop:"0.25rem"}}>
            {QUICK.map(q=>(
              <button key={q} onClick={()=>{setInput(q); setTimeout(()=>inputRef.current?.focus(),50);}}
                style={{padding:"0.4rem 0.75rem",border:`1.5px solid ${pal.primary}40`,borderRadius:"20px",background:pal.pale,color:pal.primary,fontSize:"0.74rem",fontWeight:"600",cursor:"pointer"}}>
                {q}
              </button>
            ))}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"0.75rem 1rem",borderTop:`1.5px solid ${pal.stone}40`,background:pal.linen,flexShrink:0}}>
        <div style={{display:"flex",gap:"0.5rem",alignItems:"flex-end"}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Ask me anything... worksheet, lesson plan, project idea..."
            rows={2}
            style={{flex:1,resize:"none",padding:"0.6rem 0.8rem",border:`1.5px solid ${pal.stone}60`,borderRadius:"12px",background:"#fff",fontSize:"0.82rem",fontFamily:"inherit",color:pal.ink,outline:"none",lineHeight:1.5}}
          />
          <button onClick={send} disabled={!input.trim()||loading}
            style={{width:"40px",height:"40px",borderRadius:"50%",border:"none",background:input.trim()&&!loading?pal.accentGrad:"#ccc",color:"#fff",fontSize:"1rem",cursor:input.trim()&&!loading?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
            >
          </button>
        </div>
        <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"0.4rem",textAlign:"center"}}>Press Enter to send - Shift+Enter for new line</div>
      </div>
      <style>{`@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

/* ---- Unit Study Add/Edit Modal ---- */
function UnitModal({pal,family,initial,onClose,onSave}){
  const isEdit = !!initial;
  const ICONS = ["📚","🏛","📐","🔬","📝","🎨","🎵","📜","🌏","🌳","📖","🧪","💻","🖌","📓"];
  const [title,   setTitle]   = useState(initial?.title||"");
  const [subject, setSubject] = useState(initial?.subject||"");
  const [icon,    setIcon]    = useState(initial?.icon||"📚");
  const [weeks,   setWeeks]   = useState(initial?.weeks||6);
  const [plan,    setPlan]    = useState(initial?.plan||"");
  const [notes,   setNotes]   = useState(initial?.notes||"");
  const [customSubj, setCustomSubj] = useState("");

  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = activeSubjs.map(s=>s.label);

  const canSave = title.trim()&&(subject||customSubj.trim());
  const finalSubj = subject||customSubj.trim();

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Unit Study":"Add Unit Study"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>{"✕"}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          <Lbl pal={pal}>Subject</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>{setSubject(s);setCustomSubj("");}}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subject===s?pal.primary:pal.stone+"60"}`,background:subject===s?pal.pale:"transparent",color:subject===s?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subject===s?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            <button onClick={()=>{setSubject("");}} style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${!subject?pal.primary:pal.stone+"60"}`,background:!subject?pal.pale:"transparent",color:!subject?pal.primary:pal.slate,fontSize:"0.73rem",cursor:"pointer"}}>Other</button>
          </div>
          {!subject && (
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)} placeholder="e.g. Home Ec, Logic, Latin..."
              style={{width:"100%",padding:"0.5rem 0.75rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",fontSize:"0.8rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit",marginBottom:"0.75rem"}}/>
          )}
          {subject && <div style={{height:"0.6rem"}}/>}

          <Lbl pal={pal}>Unit title</Lbl>
          <Input pal={pal} value={title} onChange={setTitle} placeholder="e.g. Ancient Egypt, Fractions, Essay Writing"/>
          <div style={{height:"0.75rem"}}/>

          {/* Reading title — required for FL/PA states */}
          {needsReadingTitle && (
            <div style={{animation:"fadeUp 0.18s ease",marginBottom:"0.75rem"}}>
              <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>*</span></Lbl>
              <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.7rem",marginBottom:"0.5rem",fontSize:"0.71rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>

              </div>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Math 5/4, Bible Story Vol.2"/>

            <div style={{marginBottom:"0.55rem"}}>
              <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
            </div>
          )}
          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setIcon(ic)} style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${icon===ic?pal.primary:pal.stone+"50"}`,background:icon===ic?pal.pale:"transparent",cursor:"pointer",fontSize:"1.1rem"}}>{ic}</button>
            ))}

          <Lbl pal={pal}>Duration</Lbl>

              <button key={w} onClick={()=>setWeeks(w)} style={{padding:"0.3rem 0.65rem",borderRadius:"20px",border:`2px solid ${weeks===w?pal.primary:pal.stone+"50"}`,background:weeks===w?pal.pale:"transparent",cursor:"pointer",fontSize:"0.76rem",fontWeight:weeks===w?"700":"400",color:weeks===w?pal.primary:pal.inkM}}>
                {w} wks
              </button>
            ))}

          <Lbl pal={pal}>Unit plan / overview (optional)</Lbl>
          <textarea value={plan} onChange={e=>setPlan(e.target.value)} rows={4}

            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55,marginBottom:"0.75rem"}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>

          <Lbl pal={pal}>Notes (optional)</Lbl>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2}
            placeholder="Curriculum used, any special notes..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
        </div>
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
          <button onClick={()=>canSave&&onSave({title,subject:finalSubj,icon,weeks,plan,notes})} disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {isEdit?"Save Changes":"Add Unit"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =======================================
   AI UNIT BUILDER MODAL - 3-step wizard
   Calls Claude API live
======================================= */
function AIUnitBuilderModal({ pal, family, activeChild, onSave, onClose }) {
  const [step,     setStep]     = useState(0); // 0=subject 1=details 2=generating 3=result
  const [subject,  setSubject]  = useState(null);
  const [topic,    setTopic]    = useState("");
  const [duration, setDuration] = useState("6 weeks");
  const [notes,    setNotes]    = useState("");
  const [result,   setResult]   = useState(null);
  const [error,    setError]    = useState(null);
  const [dots,     setDots]     = useState(".");

  // Animate dots while generating
  useState(()=>{
    if(step!==2) return;
    const t=setInterval(()=>setDots(d=>d.length>=3?".":"d.+."), 600);
    return ()=>clearInterval(t);
  },[step]);

  const generate = async () => {
    if(!subject||!topic.trim()) return;
    setStep(2);
    setError(null);
    const child = activeChild;
    const goals = goalSummary(family);
    const curriculum = curriculumContext(family);
    const prompt = "You are a homeschool curriculum assistant. Create a concise unit study plan shaped toward this family's goals.\n\n"
      + "Student: "+(child?.name||"Student")+", "+(child?.grade||"elementary")+" grade\n"
      + "Curriculum: "+curriculum+"\n"
      + "Subject: "+subject.label+"\n"
      + "Topic: "+topic+"\n"
      + "Duration: "+duration+"\n"
      + "Family goals: "+goals+"\n"
      + (notes?"Special notes: "+notes+"\n":"")
      + "\nIMPORTANT: Shape the unit to reflect the family's goals. If they prioritize Faith & Character, weave in character development. If Strong Readers, emphasize reading-based activities. If STEM Focus, add hands-on experiments. If Nature & Outdoors, include outdoor learning.\n\n"
      + "Respond in this exact JSON format (no markdown, no backticks, just raw JSON):\n"
      + '{\n  \"title\": \"unit title (5-8 words)\",\n  \"overview\": \"2-3 sentence engaging overview\",\n'
      + '  \"weeklyPlan\": [\n    {\"week\": 1, \"focus\": \"focus area\", \"activities\": [\"activity 1\", \"activity 2\", \"activity 3\"], \"resources\": \"suggested books or materials\"},\n'
      + '    {\"week\": 2, \"focus\": \"focus area\", \"activities\": [\"activity 1\", \"activity 2\", \"activity 3\"], \"resources\": \"suggested books or materials\"}\n  ],\n'
      + '  \"keySkills\": [\"skill 1\", \"skill 2\", \"skill 3\"],\n  \"assessmentIdeas\": [\"idea 1\", \"idea 2\"]\n}'
      + "\n\nInclude only the first 3 weeks in weeklyPlan. Keep each activity description under 12 words."

    try {
      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
      setStep(3);
    } catch(e) {
      setError("Couldn't connect to AI right now. Check your connection and try again.");
      setStep(1);
    }
  };

  const handleSave = () => {
    if(!result||!subject) return;
    const subj = SUBJECTS.find(s=>s.id===subject.id);
    onSave({
      subject:subject.label,
      icon:subject.icon,
      title:result.title,
      weeks:parseInt(duration)||6,
      weeksDone:0,
      plan:result.overview+"\n\n"+result.weeklyPlan.map(w=>`Week ${w.week}: ${w.focus}\n${w.activities.map(a=>"* "+a).join("\n")}`).join("\n\n"),
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(14px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -14px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>
        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        {/* Header */}
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}> AI Unit Builder</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>
              {["Pick a subject","Details","Generating...","Your unit plan"][step]}
            </div>
          </div>
          {step!==2&&<button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>}
        </div>
        {/* Progress steps */}
        {step<3&&<div style={{display:"flex",gap:"4px",padding:"0.65rem 1.3rem 0",flexShrink:0}}>
          {[0,1,2].map(i=><div key={i} style={{flex:1,height:"4px",borderRadius:"99px",background:i<=step?pal.primary:pal.stone+"50",transition:"background 0.25s"}}/>)}
        </div>}

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          {/* Step 0 - Subject picker */}
          {step===0&&(<>
            <div style={{fontSize:"0.8rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.6}}>
              What subject are we building a unit for{activeChild?` for ${activeChild.name}`:""}?
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>
              {SUBJECTS.map(s=>{
                const sel=subject?.id===s.id;
                return (
                  <button key={s.id} onClick={()=>setSubject(s)} style={{padding:"0.8rem 0.7rem",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,borderRadius:"14px",background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.3rem",transition:"all 0.13s"}}>
                    <span style={{fontSize:"1.5rem"}}>{s.icon}</span>
                    <span style={{fontSize:"0.74rem",fontWeight:sel?"800":"500",color:sel?pal.primary:pal.inkM}}>{s.label}</span>
                  </button>
                );
              })}
            </div>
          </>)}

          {/* Step 1 - Details */}
          {step===1&&(<>
            <div style={{display:"flex",alignItems:"center",gap:"0.65rem",padding:"0.75rem",background:pal.pale,borderRadius:"13px",marginBottom:"1rem",border:`2px solid ${pal.primary}20`}}>
              <span style={{fontSize:"1.5rem"}}>{subject?.icon}</span>
              <span style={{fontWeight:"700",color:pal.primary,fontSize:"0.88rem"}}>{subject?.label}</span>
              <button onClick={()=>setStep(0)} style={{marginLeft:"auto",fontSize:"0.72rem",color:pal.slate,background:"transparent",border:"none",cursor:"pointer",fontWeight:"600"}}>Change</button>
            </div>
            <Lbl pal={pal}>Topic or title</Lbl>
            <Input pal={pal} value={topic} onChange={setTopic} placeholder={"e.g. " + (subject?.id==="history"?"Ancient Egypt":subject?.id==="math"?"Fractions & Decimals":subject?.id==="science"?"Weather & Climate":"The American Revolution")} />
            <div style={{height:"0.85rem"}}/>
            <Lbl pal={pal}>Duration</Lbl>
            <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
              {DURATIONS.map(d=>(
                <PillBtn key={d} label={d} active={duration===d} onClick={()=>setDuration(d)} pal={pal}/>
              ))}
            </div>
            <Lbl pal={pal}>Any special requests? <span style={{fontWeight:"400",color:pal.slate}}>(optional)</span></Lbl>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)}
              placeholder="e.g. Include nature journaling, focus on hands-on activities, tie to our faith..."
              rows={3} style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",lineHeight:1.55,outline:"none"}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}
            />
            {error&&<div style={{marginTop:"0.75rem",padding:"0.75rem",background:pal.badBg,borderRadius:"11px",fontSize:"0.78rem",color:"#a03030",lineHeight:1.55}}>{error}</div>}
          </>)}

          {/* Step 2 - Generating */}
          {step===2&&(
            <div style={{textAlign:"center",padding:"2rem 1rem",animation:"fadeIn 0.3s ease"}}>
              <div style={{fontSize:"3.5rem",marginBottom:"1rem",animation:"pulse 1.4s ease infinite"}}></div>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"1.1rem",marginBottom:"0.5rem"}}>Building your unit{dots}</div>
              <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.7,marginBottom:"1.5rem"}}>
                Claude is creating a {duration} {subject?.label} unit on "{topic}" for {activeChild?.name||"your student"}.
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>

                <div key={i} style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.5rem",border:`1.5px solid ${pal.stone}40`}}>

                  ))}
                  {w.resources&&<div style={{marginTop:"0.5rem",fontSize:"0.72rem",color:pal.slate,fontStyle:"italic"}}>📚 {w.resources}</div>}
                </div>
              ))}

              {/* Assessment ideas */}
              {result.assessmentIdeas&&result.assessmentIdeas.length>0&&(

                  {result.assessmentIdeas.map((a,i)=>(
                    <div key={i} style={{display:"flex",gap:"0.5rem",alignItems:"flex-start",marginBottom:"0.28rem"}}>

        </div>

        {/* Footer buttons */}
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {step===0&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={()=>subject&&setStep(1)} disabled={!subject} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:subject?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:subject?"pointer":"not-allowed"}}>
                {"Next →"}
              </button>
            </>
          )}
          {step===1&&(
            <>
              <button onClick={()=>setStep(0)} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Back</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Build It
              </button>
            </>
          )}
          {step===3&&(
            <>
              <button onClick={()=>{setStep(1);setResult(null);}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Rebuild</button>
              <button onClick={handleSave} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Save Unit
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function AIWorksheetModal({ pal, family, activeChild, wsType, onClose }) {
  const [topic,   setTopic]   = useState("");
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);

  const isCustom = wsType==="custom";
  const ws = isCustom ? {id:"custom",label:"Custom Worksheet",icon:""} : wsType;

  const generate = async () => {
    if(!topic.trim()) return;
    setLoading(true); setError(null);
    const child  = activeChild;
    const grade  = child?.grade||"elementary";
    const goals  = goalSummary(family);
    const curriculum = curriculumContext(family);
    const prompt = "Create a homeschool worksheet for a "+grade+" student.\n\n"
      + "Worksheet type: "+ws.label+"\n"
      + "Topic: "+topic+"\n"
      + "Student name: "+(child?.name||"Student")+"\n"
      + "Curriculum: "+curriculum+"\n"
      + "Family goals: "+goals+"\n\n"
      + "Let the family's goals subtly shape the content tone and examples where natural (e.g. if Faith & Character is a goal, use character-building scenarios; if Nature & Outdoors, use nature-based examples; if Strong Readers, include rich vocabulary).\n\n"
      + "Respond in this exact JSON format (no markdown, no backticks, just raw JSON):\n"
      + '{"title":"worksheet title","instructions":"one clear sentence of instructions",'
      + '"items":[{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"}],'
      + '"bonusChallenge":"one optional bonus challenge sentence"}'
      + "\n\nMake items age-appropriate for "+grade+". For copywork: provide beautiful sentences to copy. For narration: provide open-ended reflection prompts. For math: provide practice problems. For spelling: provide 8 words with a sentence each. For quiz: provide 5 questions with blank answer lines. Keep items concise and clear."

    try {
      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
    } catch(e) {
      setError("Couldn't generate worksheet right now. Try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(14px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -14px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{ws.icon} {ws.label}</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>{activeChild?.name||"Student"} - {activeChild?.grade||"All grades"}</div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          {!result&&!loading&&(<>
            <Lbl pal={pal}>What topic?</Lbl>
            <Input pal={pal} value={topic} onChange={setTopic}
              placeholder={ws.id==="copywork"?"e.g. Famous quotes about nature":ws.id==="math"?"e.g. Adding fractions":"e.g. Ancient Egypt"}
            />
            {error&&<div style={{marginTop:"0.65rem",padding:"0.7rem",background:pal.badBg,borderRadius:"10px",fontSize:"0.78rem",color:"#a03030"}}>{error}</div>}
            <div style={{height:"0.85rem"}}/>
          </>)}

          {loading&&(
            <div style={{textAlign:"center",padding:"2rem 0"}}>
              <div style={{fontSize:"3rem",marginBottom:"0.75rem",animation:"pulse 1.2s ease infinite"}}>{ws.icon}</div>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.95rem",marginBottom:"0.3rem"}}>Building your worksheet...</div>
              <div style={{fontSize:"0.78rem",color:pal.slate}}>This takes about 10 seconds</div>
            </div>
          )}

          {result&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              {/* Worksheet header */}
              <div style={{background:pal.parchm,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.3rem"}}>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.92rem",flex:1,paddingRight:"0.5rem"}}>{result.title}</div>
                  <span style={{fontSize:"0.68rem",fontWeight:"700",color:pal.primary,background:pal.pale,borderRadius:"50px",padding:"0.12rem 0.5rem",flexShrink:0}}>{ws.label}</span>
                </div>
                <div style={{display:"flex",gap:"1rem",fontSize:"0.7rem",color:pal.slate}}>
                  <span>Name: {activeChild?.name||"___________"}</span>
                  <span>Date: ___________</span>
                </div>
              </div>
              {/* Instructions */}
              <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.65,marginBottom:"0.85rem",fontStyle:"italic",padding:"0 0.2rem"}}>
                📌 {result.instructions}
              </div>
              {/* Items */}
              <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginBottom:"0.85rem"}}>
                {(result.items||[]).map((item,i)=>(
                  <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.8rem 0.95rem",border:`1.5px solid ${pal.stone}40`}}>
                    <div style={{display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
                      <div style={{width:"22px",height:"22px",borderRadius:"50%",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:"900",color:"#fff",flexShrink:0,marginTop:"1px"}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.6,marginBottom:"0.45rem"}}>{item.content}</div>
                        <div style={{borderBottom:`1px solid ${pal.stone}60`,height:"1px",marginBottom:"0.3rem"}}/>
                        <div style={{borderBottom:`1px solid ${pal.stone}35`,height:"1px"}}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {/* Bonus */}
              {result.bonusChallenge&&(
                <div style={{background:pal.pale,borderRadius:"12px",padding:"0.75rem 0.9rem",border:`2px solid ${pal.primary}25`,marginBottom:"0.5rem"}}>
                  <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.75rem",marginBottom:"0.2rem"}}>* Bonus Challenge</div>
                  <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.55}}>{result.bonusChallenge}</div>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {!result&&!loading&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Generate
              </button>
            </>
          )}
          {result&&(
            <>
              <button onClick={()=>{setResult(null);setTopic("");}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>New</button>
              <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Done
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* =======================================
   MASTERY CARD
======================================= */
function MasteryCard({pal, family, child, cp}) {
  const yearEnd = family.yearEnd||"";
  const MASTERY_KEY = "rootbloom_mastery_"+child.id+"_"+yearEnd;
  const [mastery, setMastery] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem(MASTERY_KEY)||"{}"); }catch(e){return {};}
  });
  const [expanded, setExpanded] = useState(false);
  const [activeTab, setActiveTab] = useState(null);
  const skills = EOY_SKILLS[child.grade]||EOY_SKILLS["5th"]||[];
  const cycle = (skill) => {
    const cur = mastery[skill]||null;
    const next = cur===null?"working":cur==="working"?"mastered":null;
    const updated = {...mastery};
    if(next===null) delete updated[skill]; else updated[skill]=next;
    setMastery(updated);
    try{ localStorage.setItem(MASTERY_KEY, JSON.stringify(updated)); }catch(e){}
  };
  const totalSkills   = skills.reduce((s,cat)=>s+cat.skills.length, 0);
  const masteredCount = Object.values(mastery).filter(v=>v==="mastered").length;
  const workingCount  = Object.values(mastery).filter(v=>v==="working").length;
  const pct = totalSkills>0 ? Math.round(masteredCount/totalSkills*100) : 0;
  const STATUS = {
    null:     {label:"\u2014",   bg:"transparent",  color:"#bbb",     border:"#e0e0e0"},
    working:  {label:"Working", bg:"#fff8e6",      color:"#b07800",  border:"#f5c842"},
    mastered: {label:"\u2713",  bg:cp.c1+"18",     color:cp.c1,      border:cp.c1+"50"},
  };
  if(!expanded) return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <button onClick={()=>setExpanded(true)}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.85rem 1rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <div style={{width:"40px",height:"40px",borderRadius:"11px",background:cp.c1+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{"🎯"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.85rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>
            {masteredCount>0||workingCount>0 ? masteredCount+" mastered · "+workingCount+" in progress · "+totalSkills+" total" : child.grade+" grade skills — tap to track"}
          </div>
        </div>
        {masteredCount>0&&<div style={{background:cp.c1+"18",borderRadius:"20px",padding:"0.1rem 0.5rem",flexShrink:0}}><span style={{fontWeight:"800",color:cp.c1,fontSize:"0.74rem"}}>{pct+"%"}</span></div>}
        <span style={{color:pal.slate,fontSize:"1rem",flexShrink:0}}>{"›"}</span>
      </button>
      {(masteredCount>0||workingCount>0)&&(
        <div style={{padding:"0 1rem 0.75rem"}}>
          <div style={{height:"6px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s ease"}}/>
          </div>
        </div>
      )}
    </div>
  );
  const currentCat = activeTab||skills[0]?.cat;
  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}12)`,padding:"0.85rem 1rem",display:"flex",alignItems:"center",gap:"0.65rem",borderBottom:`1px solid ${pal.stone}20`}}>
        <span style={{fontSize:"1.2rem"}}>{"🎯"}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>{masteredCount+" of "+totalSkills+" mastered · "+workingCount+" in progress"}</div>
        </div>
        <button onClick={()=>setExpanded(false)} style={{width:"26px",height:"26px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.8rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
      </div>
      <div style={{padding:"0.55rem 1rem 0"}}>
        <div style={{height:"5px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.65rem"}}>
          <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:"0",overflowX:"auto",padding:"0 0.75rem",borderBottom:`1px solid ${pal.stone}20`}}>
        {skills.map(cat=>(
          <button key={cat.cat} onClick={()=>setActiveTab(cat.cat)}
            style={{padding:"0.45rem 0.65rem",border:"none",borderBottom:`2px solid ${currentCat===cat.cat?cp.c1:"transparent"}`,background:"transparent",color:currentCat===cat.cat?cp.c1:pal.slate,fontWeight:currentCat===cat.cat?"800":"500",fontSize:"0.68rem",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {cat.cat}
          </button>
        ))}
      </div>
      <div style={{padding:"0.65rem 0.85rem"}}>
        <div style={{fontSize:"0.64rem",color:pal.slate,marginBottom:"0.5rem"}}>{"Tap to cycle: \u2014 \u2192 Working \u2192 Mastered"}</div>
        {(skills.find(c=>c.cat===currentCat)||skills[0])?.skills.map((skill,i)=>{
          const status = mastery[skill]||null;
          const st = STATUS[status];
          return (
            <button key={i} onClick={()=>cycle(skill)}
              style={{width:"100%",display:"flex",alignItems:"center",gap:"0.6rem",padding:"0.52rem 0.65rem",marginBottom:"0.28rem",borderRadius:"10px",border:`1.5px solid ${st.border}`,background:st.bg,cursor:"pointer",textAlign:"left",transition:"all 0.12s"}}>
              <div style={{width:"32px",height:"22px",borderRadius:"6px",border:`1.5px solid ${st.border}`,background:st.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:"0.7rem",fontWeight:"800",color:st.color}}>{st.label}</span>
              </div>
              <span style={{fontSize:"0.78rem",color:status==="mastered"?cp.c1:status==="working"?"#7a5500":pal.inkM,fontWeight:status?"600":"400",flex:1,textAlign:"left"}}>{skill}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =======================================
   QUICK CAPTURE MODAL
======================================= */
function QuickCaptureModal({pal, family, activeChildId, onClose, onSave}) {
  const allSubjOptions = [...SUBJECT_OPTIONS, ...(family.customSubjects||[])];
  const activeSubjIds  = family.subjects||[];
  const activeSubjs    = activeSubjIds.map(id=>allSubjOptions.find(s=>s.id===id)).filter(Boolean);
  const defaultCi = activeChildId && activeChildId!=="all"
    ? Math.max(0, family.children.findIndex(c=>c.id===activeChildId))
    : 0;
  const [childIdx,  setChildIdx]  = useState(defaultCi);
  const [subj,      setSubj]      = useState(activeSubjs[0]?.label||"");
  const [note,      setNote]      = useState("");
  const [photos,    setPhotos]    = useState([]);
  const [saved,     setSaved]     = useState(false);
  const noteRef    = useRef(null);
  const galleryRef = useRef(null);
  const activeCh   = family.children[childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const todayDate  = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  useEffect(()=>{ setTimeout(()=>noteRef.current?.focus(), 150); },[]);
  const handlePhoto = (e) => {
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setPhotos(p=>[...p,{dataUrl:ev.target.result}]);
      r.readAsDataURL(file);
    });
    e.target.value="";
  };
  const handleSave = () => {
    if(!subj) return;
    const subjObj = allSubjOptions.find(s=>s.label===subj||s.id===subj);
    onSave([{childIdx, subj, title:note.trim()?note.trim().slice(0,80):subj+" \u2014 "+todayDate, note:note.trim(), thumb:subjObj?.icon||"📋", date:todayDate, photos:photos.map(p=>p.dataUrl)}]);
    setSaved(true);
    setTimeout(onClose, 900);
  };
  if(saved) return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:"430px",background:pal.goodBg,borderRadius:"22px 22px 0 0",padding:"2rem 1.5rem",textAlign:"center",animation:"slideUp 0.22s ease"}}>
        <div style={{fontSize:"2.5rem",marginBottom:"0.4rem"}}>{"✓"}</div>
        <div style={{fontWeight:"800",color:pal.good,fontSize:"1rem"}}>{"Captured!"}</div>
        <div style={{fontSize:"0.78rem",color:pal.inkM,marginTop:"4px"}}>{subj+" saved to "+activeCh?.name+"\u2019s portfolio"}</div>
      </div>
    </div>
  );
  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:"430px",background:pal.linen,borderRadius:"24px 24px 0 0",animation:"slideUp 0.24s ease",paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div style={{padding:"0.65rem 0 0",display:"flex",justifyContent:"center"}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone+"60"}}/>
        </div>
        <div style={{padding:"0.6rem 1.1rem 0.75rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.95rem"}}>{"✏️ Quick Capture"}</div>
