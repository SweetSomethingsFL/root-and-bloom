          </div>

          <Lbl pal={pal}>Title</Lbl>
          <Input pal={pal} value={title} onChange={setTitle} placeholder="What did they do or learn?"/>
          <div style={{height:"0.75rem"}}/>
          <Lbl pal={pal}>Notes (optional)</Lbl>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
            placeholder="Any details, observations, or reflections..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
        </div>
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
          <button onClick={()=>canSave&&onSave({childIdx,title,subj,note,thumb,date:initialData?.date||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})})}
            disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {isEdit?"Save Changes":"Save Entry"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Weekly Portfolio Packet ---- */
function WeeklyPacket({pal,family,child,entries,onBack}){
  const [generating, setGenerating] = useState(false);
  const [summary,    setSummary]    = useState(null);
  const [error,      setError]      = useState(null);

  const ch = family.children[child];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const childEntries = entries.filter(e=>e.childIdx===child);

  // Get this week entries
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  const weekEntries = childEntries.slice(0,20); // last 20 entries as proxy for the week

  const weekOf = now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const schoolName = family.schoolName || (family.familyName+" Academy") || "Home School";

  const generateSummary = async () => {
    if(weekEntries.length===0){setError("No entries yet! Complete some check-ins first.");return;}
    setGenerating(true); setError(null);
    const entriesList = weekEntries.map(e=>"- "+e.subj+": "+e.title+(e.note?" ("+e.note+")":"")).join("\n");
    const approach = (family.curriculumStyle||[]).join(", ")||"eclectic";
    const prompt = "You are a homeschool portfolio assistant. Write a warm, professional 2-paragraph narrative summary for a weekly portfolio packet.\n\n"
      + "Student: "+(ch?.name||"Student")+", "+(ch?.grade||"elementary")+" grade\n"
      + "School: "+schoolName+"\n"
      + "Learning approach: "+approach+"\n"
      + "Week of: "+weekOf+"\n\n"
      + "Activities this week:\n"+entriesList+"\n\n"
      + "Write: 1) A 2-3 sentence narrative describing what the student learned, warmly written for a state portfolio review. "
      + "2) A 1-2 sentence reflection on their growth. "
      + "Under 120 words total. No bullet points."

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:400,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.map(b=>b.text||"").join("")||"";
      if(!text) throw new Error("empty");
      setSummary(text);
    } catch(e){
      setError("Could not generate summary. Check your connection and try again.");
    }
    setGenerating(false);
  };

  // Group entries by subject
  const bySubject = {};
  weekEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]=[];
    bySubject[e.subj].push(e);
  });

  return (
    <div style={{animation:"fadeUp 0.22s ease",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>Back</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{ch?.avatar} {ch?.name} — Weekly Packet</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>Week of {weekOf}</div>
        </div>
        <button onClick={()=>window.print()} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>🖨 Print</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"1rem"}}>

        {/* Page 1: Cover + Summary */}
        <div style={{background:pal.linen,borderRadius:"18px",padding:"1.2rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}} id="packet-page1">
          {/* School header */}
          <div style={{borderBottom:`2px solid ${cp.c1}40`,paddingBottom:"0.75rem",marginBottom:"0.85rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{schoolName}</div>
              <div style={{fontSize:"0.7rem",color:pal.slate}}>{family.state} · {family.parentName}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"0.65rem",color:pal.slate,fontWeight:"600"}}>WEEKLY PORTFOLIO</div>
              <div style={{fontSize:"0.68rem",fontWeight:"700",color:pal.inkM}}>Week of {weekOf}</div>
            </div>
          </div>

          {/* Student info */}
          <div style={{display:"flex",alignItems:"center",gap:"0.85rem",marginBottom:"1rem"}}>
            <div style={{width:"54px",height:"54px",borderRadius:"14px",background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2rem",flexShrink:0}}>{ch?.avatar}</div>
            <div>
              <div style={{fontWeight:"900",color:pal.ink,fontSize:"1.1rem"}}>{ch?.name}</div>
              <div style={{fontSize:"0.76rem",color:pal.slate}}>{ch?.grade} · {weekEntries.length} activities this week</div>
            </div>
          </div>

          {/* AI Summary section */}
          <div style={{background:pal.sand,borderRadius:"13px",padding:"0.9rem 1rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}35`}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.5rem"}}>Weekly Narrative</div>
            {summary ? (
              <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.75}}>{summary}</div>
            ) : generating ? (
              <div style={{display:"flex",gap:"0.5rem",alignItems:"center",padding:"0.5rem 0"}}>
                {[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:cp.c1,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
                <span style={{fontSize:"0.78rem",color:pal.slate}}>Writing summary...</span>
              </div>
            ) : (
              <div style={{textAlign:"center",padding:"0.5rem 0"}}>
                <div style={{fontSize:"0.78rem",color:pal.slate,marginBottom:"0.65rem"}}>{weekEntries.length===0?"Add some check-ins first to generate a summary.":"Generate an AI-written narrative summary of this week."}</div>
                {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem"}}>{error}</div>}
                <button onClick={generateSummary} disabled={weekEntries.length===0||generating}
                  style={{padding:"0.55rem 1.2rem",border:"none",borderRadius:"11px",background:weekEntries.length>0?`linear-gradient(135deg,${cp.c1},${cp.c2})`:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.8rem",cursor:weekEntries.length>0?"pointer":"default"}}>
                  Generate with AI
                </button>
              </div>
            )}
            {summary && (
              <button onClick={()=>{setSummary(null);generateSummary();}} style={{marginTop:"0.5rem",background:"transparent",border:"none",color:pal.slate,fontSize:"0.68rem",cursor:"pointer",fontWeight:"600"}}>Regenerate</button>
            )}
          </div>

          {/* Subject list */}
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.5rem"}}>Subjects Covered</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
            {Object.keys(bySubject).map(s=>(
              <span key={s} style={{padding:"0.22rem 0.65rem",background:`${cp.c1}22`,borderRadius:"20px",fontSize:"0.74rem",fontWeight:"700",color:cp.c1,border:`1.5px solid ${cp.c1}40`}}>{s} ({bySubject[s].length})</span>
            ))}
            {Object.keys(bySubject).length===0&&<span style={{fontSize:"0.78rem",color:pal.slate}}>No entries yet</span>}
          </div>
        </div>

        {/* Page 2: Activity log */}

function AttendanceScreen({pal, family, days, pending, onConfirmPull, onCatchup}){
  const REQUIRED = 180;
  const remaining = REQUIRED - days;
  const pct = Math.round((days/REQUIRED)*100);
  const weeksLeft = Math.round(remaining/5*10)/10;
  const onTrack = pct >= 68; // roughly where they should be mid-year
  const MONTHS=[
    {m:"Aug",target:20,actual:20},{m:"Sep",target:20,actual:20},{m:"Oct",target:18,actual:18},
    {m:"Nov",target:14,actual:13},{m:"Dec",target:10,actual:10},{m:"Jan",target:20,actual:18},
    {m:"Feb",target:18,actual:17},{m:"Mar",target:10,actual:days-116,cap:true},
    {m:"Apr",target:18,actual:0},{m:"May",target:12,actual:0},
  ];
  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Attendance" sub={(family?.state||"Your state") + (family?.yearStart?" - "+new Date(family.yearStart).getFullYear()+(family?.yearEnd?"-"+new Date(family.yearEnd).getFullYear():""):" - Current year")} icon="📋"/>
      <div style={{padding:"1rem"}}>

        {/* Schedule pull banner - appears when schedule has unconfirmed days */}
        {pending>0&&(
          <div style={{background:pal.pale,borderRadius:"16px",padding:"0.9rem 1.1rem",marginBottom:"1rem",border:`2px solid ${pal.primary}30`,animation:"fadeUp 0.2s ease"}}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start"}}>
              <div style={{width:"40px",height:"40px",borderRadius:"11px",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",flexShrink:0}}>📅</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.88rem",marginBottom:"0.2rem"}}>
                  {pending} school {pending===1?"day":"days"} ready to log
                </div>
                <div style={{fontSize:"0.75rem",color:pal.inkM,lineHeight:1.6,marginBottom:"0.65rem"}}>
                  Your schedule shows {pending} completed {pending===1?"day":"days"} not yet counted. Add {pending===1?"it":"them"} to your attendance record?
                </div>
                <div style={{display:"flex",gap:"0.5rem"}}>
                  <button onClick={onConfirmPull} style={{flex:1,padding:"0.6rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.8rem",cursor:"pointer"}}>
                    v Yes, add {pending===1?"it":"them"}
                  </button>
                  <button style={{padding:"0.6rem 0.85rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",background:"transparent",color:pal.slate,fontSize:"0.8rem",cursor:"pointer"}}>
                    Skip
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Stats grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"0.65rem",marginBottom:"1rem"}}>
          {[
            {l:"Days Logged",  v:days,         bg:pal.goodBg,  c:pal.good},
            {l:"Days Needed",  v:remaining,    bg:pal.warnBg,  c:pal.warn},
            {l:"Absences",     v:4,            bg:pal.badBg,   c:pal.bad},
            {l:"Excused",      v:3,            bg:pal.parchm,  c:pal.slate},
          ].map(s=>(
            <div key={s.l} style={{background:s.bg,borderRadius:"14px",padding:"0.85rem",textAlign:"center",border:`1px solid ${s.c}18`}}>
              <div style={{fontWeight:"900",fontSize:"1.5rem",color:s.c,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:"0.62rem",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:"3px"}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Year progress bar */}
        <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
            <span style={{fontWeight:"700",color:pal.inkM,fontSize:"0.8rem"}}>Year Progress</span>
            <span style={{fontWeight:"900",color:onTrack?pal.good:pal.warn,fontSize:"0.82rem"}}>{pct}% {onTrack?"v":"!"}</span>
          </div>
          <div style={{height:"12px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"7px"}}>
            <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:onTrack?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.4s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:pal.slate}}>
            <span>{days} of {REQUIRED} days complete</span>
            <span>~{weeksLeft} weeks to go</span>
          </div>
        </div>

        {/* Monthly breakdown */}
        <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.8rem",marginBottom:"0.75rem"}}>Monthly Breakdown</div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
            {MONTHS.filter(m=>m.target>0).map((m,i)=>{
              const actual=m.cap?Math.max(0,Math.min(m.actual,m.target)):m.actual;
              const done=actual>=m.target;
              const future=m.actual===0&&!m.cap;
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:"0.65rem"}}>
                  <div style={{width:"28px",fontSize:"0.7rem",fontWeight:"700",color:future?pal.stone:pal.inkM,flexShrink:0}}>{m.m}</div>
                  <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                    {!future&&<div style={{height:"100%",width:`${Math.round(actual/m.target*100)}%`,borderRadius:"99px",background:done?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.4s"}}/>}
                  </div>
                  <div style={{width:"32px",textAlign:"right",fontSize:"0.7rem",fontWeight:"700",color:future?pal.stone:done?pal.good:pal.warn,flexShrink:0}}>
                    {future?"-":`${actual}/${m.target}`}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Warm status card + catch-up trigger */}
        <div style={{background:onTrack?pal.goodBg:pal.warnBg,borderRadius:"16px",padding:"1rem 1.1rem",marginBottom:"1rem",border:`2px solid ${onTrack?pal.good:pal.warn}22`}}>
          <div style={{fontWeight:"800",color:onTrack?pal.good:pal.warn,fontSize:"0.9rem",marginBottom:"0.3rem"}}>
            {onTrack ? "💚 You\u2019re on track!" : "💛 A little behind - no worries!"}
          </div>
          <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.65,marginBottom:onTrack?0:"0.75rem"}}>
            {onTrack
              ? `Amazing work - ${days} days logged and right on schedule. Keep going!`
              : `You need ${remaining} more days. That's totally doable - you've got about ${weeksLeft} weeks left and plenty of time to catch up.`
            }
          </div>
          {!onTrack&&(
            <button onClick={onCatchup} style={{width:"100%",padding:"0.7rem",border:"none",borderRadius:"12px",background:`linear-gradient(135deg,${pal.warn},${pal.accentD})`,color:"#fff",fontWeight:"800",fontSize:"0.84rem",cursor:"pointer"}}>
              📅 Build a Catch-Up Plan
            </button>
          )}
        </div>
        <div style={{height:"0.5rem"}}/>
      </div>
    </div>
  );
}

function LifeReadyScreen({pal,family,onBack}){
  const [tab,      setTab]      = useState("this_week");
  const [generating,setGenerating]=useState(false);
  const [lesson,   setLesson]   = useState(null);
  const [error,    setError]    = useState(null);

  const grade = family.children?.[0]?.grade||"5th";
  const topic = getLRTopicForWeek(grade);
  const cats  = family.lifeReadyCategories||LR_CATEGORIES.map(c=>c.id);
  const freq  = family.lifeReadyFreq||"monday_plus_practice";
  const LS_KEY = "stembloom_lr_lesson";

  useState(()=>{
    try{ const s=localStorage.getItem(LS_KEY); if(s){const p=JSON.parse(s);if(p.topic===topic)setLesson(p);} }catch(e){}
  },[]);

  const generateLesson = async () => {
    setGenerating(true); setError(null);
    const childNames = (family.children||[]).map(c=>c.name+" ("+c.grade+")").join(", ");
    const prompt = "Create an age-appropriate Life Ready lesson plan for homeschool students."
      + " Topic: "+topic+". Students: "+childNames+"."
      + " Format: 1) Opening hook (1-2 sentences to grab attention), "
      + "2) What you need (materials list, simple), "
      + "3) The lesson (3-5 clear steps, hands-on), "
      + "4) Discussion questions (2-3 age-appropriate), "
      + "5) Practice challenge (one thing to try this week)."
      + " Keep total under 300 words. Practical, engaging, no fluff.";
    try {
      const text = await callClaude(prompt);
      const data = {topic, text, grade, date:new Date().toISOString()};
      setLesson(data);
      try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
    } catch(e){
      const msg = e.message==="NO_KEY"?"Add your API key in Settings → AI to generate lessons."
        :e.message==="RATE_LIMIT"?"Monthly AI limit reached."
        :"Could not connect. Try again.";
      setError(msg);

function TranscriptsScreen({pal,family,portfolioEntries=[],attendanceDays=0,coopLog=[]}){

  const yearEnd   = family.yearEnd   ? new Date(family.yearEnd).toLocaleDateString("en-US",{month:"long",year:"numeric"})   : "—";

/* ---- Narrative Editor (inline within TranscriptsScreen) ---- */
function NarrativeEditor({pal,ch,family,bySubject,attendanceDays,schoolName,cp}){
  const LS_KEY = "stembloom_narrative_"+ch.id;
  const [text, setText] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  const save = (v) => {
    setText(v);
    try{ localStorage.setItem(LS_KEY,v); }catch(e){}
  };

  const generate = async () => {
    setGenerating(true); setError(null);
    const subjList = Object.keys(bySubject).join(", ")||"various subjects";
    const approach = (Array.isArray(family.curriculumStyle)?family.curriculumStyle:[family.curriculumStyle||"eclectic"]).join(", ");
    const prompt = "Write a warm, professional annual narrative report for a homeschool portfolio."
      + " Student: "+ch.name+", "+ch.grade+" grade."
      + " School: "+schoolName+". State: "+(family.state||"")+"."
      + " Learning approach: "+approach+"."
      + " Subjects studied: "+subjList+"."
      + " Days completed: "+attendanceDays+"."
      + " Write 3 paragraphs: 1) Overview of the year and approach, 2) Academic highlights and growth in key subjects, 3) Character and personal development."
      + " Warm, specific, and suitable for state review. Under 250 words.";
    try {
      const text = await callClaude(prompt);
      save(text);
    } catch(e) {
      const msg = e.message==="NO_KEY"?"Add your API key in Settings → AI to generate narratives."
        :e.message==="RATE_LIMIT"?"Monthly AI limit reached."
        :"Could not connect. Try again.";
      setError(msg);
    }
    setGenerating(false);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
        <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.06em"}}>Annual Narrative</div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
          <span style={{fontSize:"0.65rem",color:pal.slate}}>{wordCount} words</span>
          <button onClick={generate} disabled={generating} style={{padding:"0.28rem 0.65rem",borderRadius:"8px",border:"none",background:generating?"#ccc":pal.accentGrad,color:"#fff",fontWeight:"700",fontSize:"0.7rem",cursor:generating?"default":"pointer"}}>
            {generating?"🔄 Writing...":"🤖 Generate"}
          </button>
        </div>
      </div>
      {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem",padding:"0.5rem",background:"#faeae4",borderRadius:"8px"}}>{error}</div>}
      <textarea value={text} onChange={e=>save(e.target.value)}
        placeholder={"Write your annual narrative here, or use AI to generate one. Describe what "+ch.name+" studied this year, how they grew, highlights from each subject, and any notable achievements..."}
        rows={12}
        style={{width:"100%",padding:"0.75rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.8rem",fontFamily:"Georgia, serif",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.8}}
        onFocus={e=>e.target.style.borderColor=pal.primary}
        onBlur={e=>e.target.style.borderColor=pal.stone}/>
    </div>
  );
}

  const [aiError,   setAiError]  = useState(null);
  const fileInputRef = useRef(null);

  const dateLabel = data.dateLabel || "Today";
  const subjsDone = [...new Set(blocks.filter(b=>b.s!=="Break"&&b.s!=="Lunch").map(b=>b.s))];

    const files = Array.from(e.target.files);

      reader.readAsDataURL(file);

  const generateSummary = async () => {
    setGenerating(true); setAiError(null);
    const notesList = Object.entries(notes).map(([cid,n])=>{
      const ch = family.children.find(c=>c.id===cid);
      return ch&&n.trim() ? ch.name+": "+n : "";
    }).filter(Boolean).join(" | ");
    const subjList = subjsDone.join(", ");
    const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";
    const prompt = "Write a warm, encouraging 2-3 sentence daily summary for a homeschool family."
      + " Date: "+dateLabel+". School: "+schoolName+"."
      + " Subjects completed: "+subjList+"."
      + (notesList?" Student notes: "+notesList:"")
      + " Write in a celebratory, warm tone. Mention specific subjects. Under 80 words.";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})
      });
      const d = await res.json();
      const text = d.content?.map(b=>b.text||"").join("")||"";
      if(!text) throw new Error("empty");
      setAiSummary(text);
    } catch(e){
      setAiError("Could not generate — check your connection.");
    }
    setGenerating(false);
  };

  const handleSave = () => {
    const entries = [];
    const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    // One portfolio entry per completed subject per child
    family.children.forEach((ch,ci)=>{
      const note = notes[ch.id]||"";
      subjsDone.forEach(subj=>{
        entries.push({
          childIdx:ci,
          title:subj+" — "+dateLabel,
          subj,
          date:today,
          thumb:blocks.find(b=>b.s===subj)?.i||"📋",
          note:note+(aiSummary?"\n\nDay summary: "+aiSummary:""),
        });
      });
    });
    onSave(entries);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:pal.sand,display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",animation:"fadeIn 0.25s ease"}}>
      {/* Celebration header */}
      <div style={{background:pal.accentGrad,padding:"1.1rem 1.2rem 1rem",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
          <div style={{fontSize:"2rem",animation:"grow 0.4s ease"}}>🌟</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem"}}>Day Complete!</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,0.75)"}}>{"Great work — " + dateLabel}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"9px",padding:"0.3rem 0.65rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>Skip</button>
        </div>
      </div>

      {/* Step progress */}
      <div style={{display:"flex",gap:"3px",padding:"0.65rem 1.1rem 0",flexShrink:0}}>
        {["Subjects","Notes","Photos","Done"].map((l,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:"4px",borderRadius:"99px",background:i<=step?pal.primary:pal.stone+"40",marginBottom:"3px",transition:"background 0.3s"}}/>
            <div style={{fontSize:"0.58rem",color:i<=step?pal.primary:pal.stone,fontWeight:i===step?"700":"400"}}>{l}</div>
          </div>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"1rem 1.1rem"}}>

        {/* Step 0: What you did */}
        {step===0 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.65rem"}}>{"Completed today"}</div>
            {subjsDone.length===0 ? (
              <div style={{color:pal.slate,fontSize:"0.82rem",textAlign:"center",padding:"1rem"}}>No subjects logged.</div>
            ) : subjsDone.map((s,i)=>{
              const block = blocks.find(b=>b.s===s);
              return (
                <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.75rem 0.9rem",display:"flex",gap:"0.75rem",alignItems:"center",border:`1.5px solid ${pal.good}30`,marginBottom:"0.45rem"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"10px",background:pal.goodBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{block?.i||"📋"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.86rem"}}>{s}</div>
                    {block?.dur&&<div style={{fontSize:"0.68rem",color:pal.slate}}>{block.dur} min</div>}
                  </div>
                  <span style={{color:pal.good,fontSize:"1.1rem"}}>✓</span>
                </div>
              );
            })}
            {/* AI Summary box */}
            <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1rem",marginTop:"0.75rem",border:`1.5px solid ${pal.primary}20`}}>
              <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem",marginBottom:"0.4rem"}}>✨ AI Day Summary</div>
              {aiSummary ? (
                <div style={{fontSize:"0.8rem",color:pal.ink,lineHeight:1.7}}>{aiSummary}</div>
              ) : generating ? (
                <div style={{display:"flex",gap:"4px",alignItems:"center",padding:"0.25rem 0"}}>
                  {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
                  <span style={{fontSize:"0.76rem",color:pal.slate,marginLeft:"0.4rem"}}>Writing your day summary...</span>
                </div>
              ) : (
                <div>
                  {aiError && <div style={{fontSize:"0.72rem",color:"#a03030",marginBottom:"0.4rem"}}>{aiError}</div>}
                  <button onClick={generateSummary} style={{padding:"0.4rem 1rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.76rem",cursor:"pointer"}}>Generate Summary</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Step 1: Student notes */}
        {step===1 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Student notes</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>{"Optional — add anything a child wants to remember about today."}</div>
            {family.children.map((c)=>(
              <div key={c.id} style={{marginBottom:"0.85rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"0.3rem"}}>
                  <span style={{fontSize:"1.2rem"}}>{c.avatar}</span>
                  <span style={{fontWeight:"700",color:pal.inkM,fontSize:"0.86rem"}}>{c.name}</span>
                </div>
                <textarea value={notes[c.id]||""} onChange={e=>setNotes(n=>({...n,[c.id]:e.target.value}))}
                  placeholder={"What did "+c.name+" enjoy or want to remember?"}
                  rows={3} style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
                  onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
              </div>
            ))}
          </div>
        )}

        {/* Step 2: Photos */}
        {step===2 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Add photos</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>Capture work, projects, or moments from today.</div>
            <input type="file" ref={fileInputRef} accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}}/>
            <button onClick={()=>fileInputRef.current?.click()}
              style={{width:"100%",padding:"1.1rem",border:`2px dashed ${pal.primary}50`,borderRadius:"16px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.86rem",cursor:"pointer",marginBottom:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
              <span style={{fontSize:"1.4rem"}}>📷</span><span>Choose Photos</span>
            </button>
            {photos.length>0 && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.55rem"}}>
                {photos.map((p,i)=>(
                  <div key={i} style={{position:"relative",borderRadius:"12px",overflow:"hidden",border:`1.5px solid ${pal.stone}40`}}>
                    <img src={p.dataUrl} alt={p.name} style={{width:"100%",height:"110px",objectFit:"cover",display:"block"}}/>
                    <button onClick={()=>removePhoto(i)}
                      style={{position:"absolute",top:"5px",right:"5px",width:"22px",height:"22px",borderRadius:"50%",background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:"0.7rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
                  </div>
                ))}
              </div>
            )}
            {photos.length===0 && <div style={{textAlign:"center",padding:"1rem",color:pal.stone,fontSize:"0.78rem",fontStyle:"italic"}}>No photos yet — totally optional!</div>}
          </div>
        )}

        {/* Step 3: Done */}
        {step===3 && (
          <div style={{animation:"fadeUp 0.2s ease",textAlign:"center",padding:"0.5rem 0"}}>
            <div style={{fontSize:"4rem",marginBottom:"0.75rem",animation:"grow 0.4s ease"}}>🌱</div>
            <div style={{fontWeight:"900",color:pal.primary,fontSize:"1.2rem",marginBottom:"0.3rem"}}>{"Saved to portfolio!"}</div>
            <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.7,marginBottom:"1rem"}}>{subjsDone.length} subjects logged for {dateLabel}.</div>
            {aiSummary && (
              <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1rem",border:`1.5px solid ${pal.primary}20`,textAlign:"left",marginBottom:"1rem"}}>
                <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.74rem",marginBottom:"0.35rem"}}>Today summary</div>
                <div style={{fontSize:"0.8rem",color:pal.ink,lineHeight:1.7}}>{aiSummary}</div>
              </div>
            )}
            {photos.length>0 && (
              <div style={{fontSize:"0.74rem",color:pal.slate}}>{photos.length} photo{photos.length!==1?"s":""} attached</div>
            )}
          </div>
        )}
      </div>

      {/* Footer buttons */}
      <div style={{padding:"0.9rem 1.1rem",borderTop:`1px solid ${pal.stone}40`,background:pal.linen,flexShrink:0,display:"flex",gap:"0.55rem"}}>
        {step<3 ? (
          <>
            {step>0 && <button onClick={()=>setStep(s=>s-1)} style={{padding:"0.7rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem",fontWeight:"600"}}>Back</button>}
            <button onClick={()=>{
              if(step===2){handleSave();setStep(3);}
              else setStep(s=>s+1);
            }} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
              {step===0?"Add notes →":step===1?"Add photos →":"Save to portfolio ✓"}
            </button>
          </>
        ) : (
          <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.92rem",cursor:"pointer"}}>{"Back to home 🌱"}</button>
        )}
      </div>
    </div>
  );
}

function CheckinModal({ pal, family, onClose, onSave }) {
  const [step,    setStep]    = useState(0);
  const [ratings, setRatings] = useState({});
  const [notes,   setNotes]   = useState({});
  const [subjects,setSubjects]= useState({});
  const customSubjs = family.customSubjects || [];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);

  const handleSave = () => {
    const entries = [];
    family.children.forEach((c,idx)=>{
      const note = notes[c.id]||"";
      const subjList = subjects[c.id]||[];
      // One entry per tagged subject
      if(subjList.length>0) {
        subjList.forEach(sid=>{
          const subj = allSubjs.find(s=>s.id===sid);
          entries.push({
            childIdx:idx,
            title:(note.slice(0,35)||subj?.label||"Daily work"),
            subj:subj?.label||sid,
            date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
            thumb:subj?.icon||"📋",
            note,
          });
        });
      } else if(note.trim()) {
        entries.push({
          childIdx:idx,
          title:note.slice(0,42),
          subj:"Daily Check-In",
          date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
          thumb:"📋",
          note,
        });
      }
    });
    onSave(entries);
    setStep(2);
  };

  const STEPS = ["How did today go?","What did you cover?","Logged! 🌱"];
  const SUBS  = ["Rate each child","Check subjects + add notes","Great work staying consistent"];

  return (
    <BottomSheet pal={pal} onClose={onClose} title={STEPS[step]} sub={SUBS[step]} tall>
      <div style={{display:"flex",gap:"5px",marginBottom:"1rem"}}>
        {[0,1,2].map(i=><div key={i} style={{height:"4px",flex:1,borderRadius:"99px",background:i<=step?pal.primary:pal.stone+"50",transition:"background 0.25s"}}/>)}
      </div>

      {/* Step 0: Rate each child */}
      {step===0 && (
        <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
          {family.children.map(c=>(
            <div key={c.id} style={{background:pal.sand,borderRadius:"14px",padding:"0.85rem 1rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.6rem"}}>
                <span style={{fontSize:"1.3rem"}}>{c.avatar}</span>
                <span style={{fontWeight:"700",color:pal.ink}}>{c.name}</span>
              </div>
              <div style={{display:"flex",gap:"0.4rem"}}>
                {["😔","😐","🙂","😊","🌟"].map((e,i)=>(
                  <button key={i} onClick={()=>setRatings(r=>({...r,[c.id]:i}))}
                    style={{flex:1,padding:"0.52rem",borderRadius:"10px",border:`2px solid ${ratings[c.id]===i?pal.primary:pal.stone+"55"}`,background:ratings[c.id]===i?pal.pale:"transparent",cursor:"pointer",fontSize:"1.3rem",transition:"all 0.12s"}}>
                    {e}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Step 1: Subjects + notes per child */}
      {step===1 && (
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          {family.children.map((c,ci)=>(
            <div key={c.id}>
              <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.5rem"}}>
                <span style={{fontSize:"1.2rem"}}>{c.avatar}</span>
                <span style={{fontWeight:"800",color:pal.inkM,fontSize:"0.85rem"}}>{c.name}</span>
                {ratings[c.id]!==undefined && <span style={{fontSize:"1rem"}}>{["😔","😐","🙂","😊","🌟"][ratings[c.id]]}</span>}
              </div>
              {/* Subject chips */}
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.55rem"}}>
                {activeSubjs.map(s=>{
                  const sel=(subjects[c.id]||[]).includes(s.id);
                  return (
                    <button key={s.id} onClick={()=>setSubjects(prev=>{
                      const cur=prev[c.id]||[];
                      return {...prev,[c.id]:sel?cur.filter(x=>x!==s.id):[...cur,s.id]};
                    })} style={{padding:"0.25rem 0.6rem",borderRadius:"20px",border:`2px solid ${sel?pal.primary:pal.stone+"60"}`,background:sel?pal.pale:"transparent",cursor:"pointer",fontSize:"0.72rem",fontWeight:sel?"700":"400",color:sel?pal.primary:pal.slate,display:"flex",gap:"0.25rem",alignItems:"center"}}>
                      <span>{s.icon}</span><span>{s.label}</span>
                    </button>
                  );
                })}
              </div>
              <textarea value={notes[c.id]||""} onChange={e=>setNotes(n=>({...n,[c.id]:e.target.value}))}
                placeholder={"What "+c.name+" worked on today... (optional)"}
                rows={2} style={{width:"100%",padding:"0.65rem 0.8rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",lineHeight:1.55,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
            </div>
          ))}
        </div>
      )}

      {/* Step 2: Confirmation */}
      {step===2 && (
        <div style={{textAlign:"center",padding:"1rem 0"}}>
          <div style={{fontSize:"3.5rem",marginBottom:"0.6rem",animation:"grow 0.4s ease"}}>🌱</div>
          <div style={{fontWeight:"800",color:pal.primary,fontSize:"1rem",marginBottom:"0.35rem"}}>Check-in saved!</div>
          <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.7,marginBottom:"0.75rem"}}>Added to attendance and portfolio.</div>
          {Object.values(subjects).flat().length > 0 && (
            <div style={{background:pal.pale,borderRadius:"12px",padding:"0.65rem",fontSize:"0.78rem",color:pal.inkM}}>
              {Object.values(subjects).flat().length} subject{Object.values(subjects).flat().length!==1?"s":""} logged today
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",gap:"0.6rem",marginTop:"1.1rem"}}>
        {step<2 ? (
          <>
            <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Skip</button>
            <button onClick={()=>step===1?handleSave():setStep(s=>s+1)} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
              {step===0?"Next →":"Save ✓"}
            </button>
          </>
        ) : (
          <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>Done 🌱</button>
        )}
      </div>
    </BottomSheet>
  );
}

  const [la,setLa]=useState(customA), [lb,setLb]=useState(customB);

    <BottomSheet pal={pal} onClose={onClose} title="Choose Your Theme" sub="Pick colors that feel like your family">
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.45rem",marginBottom:"1rem"}}>
        {PRESET_PALETTES.map(p=>{const sel=paletteId===p.id;return(
          <button key={p.id} onClick={()=>setPaletteId(p.id)} style={{padding:"0.55rem 0.4rem",borderRadius:"12px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center"}}>
            {p.isCustom?<div style={{height:"22px",borderRadius:"6px",background:`linear-gradient(90deg,${la},${lb})`,marginBottom:"0.25rem"}}/>:<div style={{height:"22px",borderRadius:"6px",background:`linear-gradient(90deg,${p.a},${lerpHex(p.a,p.b,0.5)},${p.b})`,marginBottom:"0.25rem"}}/>}

        <div style={{display:"flex",gap:"0.85rem",alignItems:"center",marginBottom:"0.6rem"}}>
          {[["Deep",la,setLa],["Bloom",lb,setLb]].map(([l,v,set])=><div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"0.3rem"}}>
            <input type="color" value={v} onChange={e=>set(e.target.value)} style={{width:"48px",height:"48px",borderRadius:"11px",border:`2px solid ${pal.stone}`,cursor:"pointer",padding:"2px"}}/>
            <div style={{fontSize:"0.65rem",color:pal.slate,fontWeight:"600"}}>{l}</div>
          </div>)}
          <div style={{flex:1,height:"36px",borderRadius:"9px",background:`linear-gradient(90deg,${la},${lerpHex(la,lb,0.5)},${lb})`}}/>
        </div>
      </div>}
      <div style={{background:preview.heroGrad,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.5)",letterSpacing:"0.1em",fontWeight:"700",textTransform:"uppercase"}}>Preview</div><div style={{fontWeight:"800",color:"rgba(255,255,255,0.9)",fontSize:"0.92rem"}}>Good morning 🌱</div></div>
        <div style={{height:"30px",padding:"0 0.75rem",borderRadius:"99px",background:preview.accentGrad,display:"flex",alignItems:"center"}}><span style={{fontSize:"0.7rem",fontWeight:"800",color:preview.onDark}}> Check-In</span></div>
      </div>
      <button onClick={()=>{if(paletteId==="custom"){setCustomA(la);setCustomB(lb);}onClose();}} style={{width:"100%",padding:"0.8rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>Apply Theme v</button>
    </BottomSheet>
  );
}

function NavModal({ pal, navIds, setNavIds, onClose }) {
  const [local,setLocal]=useState(navIds);
  const toggle=id=>{
    const s=ALL_SECTIONS.find(x=>x.id===id);
    if(s?.locked)return;
    if(local.includes(id)){if(local.length<=3)return;setLocal(l=>l.filter(x=>x!==id));}
    else{if(local.length>=5)return;setLocal(l=>[...l,id]);}
  };
  return (
    <BottomSheet pal={pal} onClose={onClose} title="Customize Your Nav" sub={local.length + " tabs - 3-5 - Home, Schedule & Portfolio always stay"}>
      <div style={{display:"flex",flexDirection:"column",gap:"0.42rem",marginBottom:"1rem"}}>
        {ALL_SECTIONS.filter(s=>s.id!=="more").map(s=>{
          const on=local.includes(s.id),atMax=local.length>=5&&!on;
          return <button key={s.id} onClick={()=>toggle(s.id)} style={{display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.7rem 0.9rem",border:`2px solid ${on?pal.primary:pal.stone+"50"}`,borderRadius:"12px",background:on?pal.pale:"transparent",cursor:s.locked||atMax?"default":"pointer",opacity:atMax&&!on?0.35:1,transition:"all 0.13s",textAlign:"left"}}>
            <span style={{fontSize:"1.2rem",width:"28px",textAlign:"center"}}>{s.icon}</span>
            <span style={{flex:1,fontWeight:on?"700":"400",color:on?pal.primary:pal.inkM,fontSize:"0.84rem"}}>{s.label}</span>
            {s.locked?<span style={{fontSize:"0.7rem",color:pal.slate}}>🔒</span>:<div style={{width:"19px",height:"19px",borderRadius:"5px",border:`2px solid ${on?pal.primary:pal.stone}`,background:on?pal.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{on&&<span style={{color:pal.onDark,fontSize:"0.65rem",fontWeight:"900"}}>v</span>}</div>}
          </button>;
        })}
      </div>
      <div style={{background:pal.linen,borderRadius:"12px",border:`1.5px solid ${pal.stone}45`,padding:"0.65rem",marginBottom:"1rem"}}>
        <div style={{fontSize:"0.65rem",color:pal.slate,textAlign:"center",marginBottom:"0.5rem",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.07em"}}>Preview</div>
        <div style={{display:"flex",justifyContent:"center"}}>{local.map(id=>{const s=ALL_SECTIONS.find(x=>x.id===id);return <div key={id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"0.35rem 0"}}><span style={{fontSize:"1.1rem"}}>{s?.icon}</span><span style={{fontSize:"0.57rem",color:pal.primary,fontWeight:"700"}}>{s?.label}</span></div>;})}</div>
      </div>
      <button onClick={()=>{setNavIds(local);onClose();}} style={{width:"100%",padding:"0.8rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>Save Nav v</button>
    </BottomSheet>
  );
}

/* =======================================
   CATCH-UP RESCHEDULER MODAL
   Warm, practical, not stressful
======================================= */
function CatchupModal({ pal, family, days, needed, onClose }) {
  const remaining  = needed - days;
  const weeksLeft  = 11; // approximate weeks remaining in year
  const daysPerWk  = Math.ceil(remaining / weeksLeft);
  const extraPerWk = Math.max(0, daysPerWk - 5);
  const [plan, setPlan] = useState(null); // null | "light" | "medium" | "steady"

  const PLANS = [
    {
      id:"steady",
      icon:"🌿",
      title:"Steady & Consistent",
      desc:`School 5 days/week with no breaks - you'll finish right on time.`,
      wks:weeksLeft, extra:0, color:pal.good, bg:pal.goodBg,
      steps:[
        "Keep your current daily schedule going",
        "Aim for zero unplanned absences this term",
        "Use make-up Saturdays only if needed",
      ],
    },
    {
      id:"medium",
      icon:"",
      title:"Light Catch-Up",
      desc:`Add one extra morning session per week - gentle but effective.`,
      wks:weeksLeft-1, extra:1, color:pal.warn, bg:pal.warnBg,
      steps:[
        "Add a 2-hour Friday afternoon session each week",
        "Use summer week if needed as backup",
        "Keep weekends free - you've earned it",
      ],
    },
    {
      id:"light",
      icon:"!",
      title:"Sprint to Finish",
      desc:`School 6 days/week for a few weeks - done early with time to spare.`,
      wks:weeksLeft-2, extra:2, color:pal.primary, bg:pal.pale,
      steps:[
        "Add Saturday school for 4-5 weeks",
        "Double up one subject block daily",
        "Build in a free week as reward at the end",
      ],
    },
  ];

  const selected = plan ? PLANS.find(p=>p.id===plan) : null;

  return (
    <BottomSheet pal={pal} onClose={onClose} title="📅 Your Catch-Up Plan" sub={remaining + " days to go - " + weeksLeft + " weeks left"} tall>
      {/* Warm opener */}
      <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1.1rem",marginBottom:"1.1rem",border:`2px solid ${pal.primary}18`}}>
        <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.9rem",marginBottom:"0.25rem"}}>
          {"You're doing better than you think 💚"}
        </div>
        <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.7}}>
          {days} {" days logged is real, meaningful schoolwork. You have "} {weeksLeft} {" weeks left and "} {remaining} {" days to go - that's completely achievable with any of these paths."}
        </div>
      </div>

      {/* Plan picker */}
      {!plan && (<>
        <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.8rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.65rem"}}>Choose your path</div>
        <div style={{display:"flex",flexDirection:"column",gap:"0.6rem",marginBottom:"1rem"}}>
          {PLANS.map(p=>(
            <button key={p.id} onClick={()=>setPlan(p.id)} style={{padding:"0.9rem 1rem",border:`2px solid ${p.color}25`,borderRadius:"16px",background:p.bg,cursor:"pointer",textAlign:"left",display:"flex",gap:"0.8rem",alignItems:"flex-start",transition:"all 0.14s"}}>
              <span style={{fontSize:"1.6rem",flexShrink:0,marginTop:"2px"}}>{p.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:"800",color:p.color,fontSize:"0.88rem",marginBottom:"0.2rem"}}>{p.title}</div>
                <div style={{fontSize:"0.75rem",color:pal.inkM,lineHeight:1.55}}>{p.desc}</div>
              </div>
              <span style={{color:p.color,fontSize:"1.1rem",flexShrink:0,marginTop:"4px"}}>></span>
            </button>
          ))}
        </div>
      </>)}

      {/* Selected plan detail */}
      {selected && (
        <div style={{animation:"fadeUp 0.2s ease"}}>
          <button onClick={()=>setPlan(null)} style={{display:"flex",alignItems:"center",gap:"0.35rem",background:"transparent",border:"none",color:pal.primary,cursor:"pointer",fontSize:"0.78rem",fontWeight:"700",marginBottom:"0.85rem",padding:0}}>
            Back to plans
          </button>
          <div style={{background:selected.bg,borderRadius:"18px",padding:"1.1rem 1.2rem",marginBottom:"1rem",border:`2px solid ${selected.color}22`}}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"center",marginBottom:"0.75rem"}}>
              <span style={{fontSize:"2rem"}}>{selected.icon}</span>
              <div>
                <div style={{fontWeight:"900",color:selected.color,fontSize:"1rem"}}>{selected.title}</div>
                <div style={{fontSize:"0.73rem",color:pal.slate,marginTop:"1px"}}>Finish in ~{selected.wks} weeks</div>
              </div>
            </div>
            {selected.steps.map((s,i)=>(
              <div key={i} style={{display:"flex",gap:"0.6rem",alignItems:"flex-start",padding:"0.42rem 0",borderTop:i>0?`1px solid ${selected.color}18`:"none"}}>
                <div style={{width:"20px",height:"20px",borderRadius:"50%",background:selected.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.65rem",fontWeight:"900",color:"#fff",flexShrink:0,marginTop:"1px"}}>{i+1}</div>
                <span style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.55}}>{s}</span>
              </div>
            ))}
          </div>
          {/* Weekly schedule preview */}
          <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.6rem"}}>Sample week</div>
            <div style={{display:"flex",gap:"0.3rem"}}>
              {["M","T","W","T","F","S"].map((d,i)=>{
                const active = i < (5 + selected.extra);
                return (
                  <div key={i} style={{flex:1,textAlign:"center"}}>
                    <div style={{width:"100%",aspectRatio:"1",borderRadius:"8px",background:active?pal.accentGrad:pal.parchm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:"800",color:active?"#fff":pal.stone,marginBottom:"3px"}}>{active?"v":"-"}</div>
                    <div style={{fontSize:"0.58rem",color:active?pal.primary:pal.stone,fontWeight:active?"700":"400"}}>{d}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{fontSize:"0.74rem",color:pal.slate,lineHeight:1.7,marginBottom:"1rem",textAlign:"center",fontStyle:"italic"}}>
            {"Remember: consistency beats intensity. Even if you miss a day, you'll still be making progress."}
          </div>
          <button onClick={onClose} style={{width:"100%",padding:"0.85rem",border:"none",borderRadius:"14px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
            {"Got it - let's do this! 🌱"}
          </button>
        </div>
      )}
    </BottomSheet>
  );
}


function ScreenHdr({pal,title,sub,icon}){

function BottomSheet({children,onClose,title,sub,pal,tall}){
  return <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",boxShadow:"0 -14px 60px rgba(0,0,0,0.32)",animation:"slideUp 0.28s ease",maxHeight:tall?"88vh":"82vh",display:"flex",flexDirection:"column"}}><div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div><div style={{padding:"0.75rem 1.3rem 0.75rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{title}</div>{sub&&<div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>{sub}</div>}</div><button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0,marginLeft:"0.75rem"}}>x</button></div><div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem 1.3rem"}}>{children}</div></div></div>;
}
function Chip({pal,label,active,onClick,dark,small}){
  return <button onClick={onClick} style={{padding:small?"0.2rem 0.55rem":"0.25rem 0.7rem",border:`2px solid ${active?(dark?"rgba(255,255,255,0.55)":pal.primary):(dark?"rgba(255,255,255,0.2)":pal.stone+"70")}`,borderRadius:"50px",background:active?(dark?"rgba(255,255,255,0.18)":pal.pale):"transparent",color:active?(dark?"#fff":pal.primary):(dark?"rgba(255,255,255,0.55)":pal.slate),fontSize:small?"0.7rem":"0.75rem",fontWeight:active?"700":"500",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{label}</button>;
}
function Btn({pal,children,onClick,disabled,style={}}){
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"0.9rem",border:"none",borderRadius:"14px",background:disabled?"#ccc":pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.92rem",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}}>{children}</button>;
}
function Input({pal,value,onChange,placeholder,type="text"}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",transition:"border-color 0.18s"}} onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>;
}
function Select({pal,value,onChange,options}){
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",cursor:"pointer"}}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>;
}
function Lbl({pal,children}){
  return <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.38rem"}}>{children}</div>;

function PillBtn({pal,label,active,onClick}){
  return <button onClick={onClick} style={{padding:"0.3rem 0.75rem",border:`2px solid ${active?pal.primary:pal.stone+"60"}`,borderRadius:"50px",background:active?pal.pale:"transparent",color:active?pal.primary:pal.inkM,fontSize:"0.78rem",fontWeight:active?"700":"400",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.13s"}}>{label}</button>;

function SCard({pal,title,note,action,children}){

function Row({pal,title,action}){
