  if(!entry) return null;
  const ch = family.children[entry.childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"flex-end",animation:"fadeIn 0.18s ease"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxHeight:"85vh",overflowY:"auto",background:pal.linen,borderRadius:"22px 22px 0 0",padding:"1.2rem 1.1rem 2rem",animation:"slideUp 0.22s ease"}}>

        {/* Handle bar */}
        <div style={{width:"40px",height:"4px",borderRadius:"99px",background:pal.stone+"60",margin:"0 auto 1rem"}}/>

        {/* Header */}
        <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",marginBottom:"1rem"}}>
          <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`linear-gradient(135deg,${cp.c1}25,${cp.c2}18)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",flexShrink:0,overflow:"hidden",position:"relative"}}>
            {entry.photos&&entry.photos[0]
              ?<img src={entry.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>
              :<span>{entry.thumb||"📋"}</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.92rem",lineHeight:1.3}}>{entry.readingTitle||entry.title}</div>
            <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px"}}>
              {entry.subj}{entry.date?" · "+entry.date:""}{ch?" · "+ch.avatar+" "+ch.name:""}
            </div>
          </div>
          {onEdit&&<button onClick={onEdit} style={{padding:"0.28rem 0.65rem",border:`1.5px solid ${pal.stone}`,borderRadius:"8px",background:"transparent",color:pal.slate,fontWeight:"700",fontSize:"0.7rem",cursor:"pointer",flexShrink:0}}>Edit</button>}
        </div>

        {/* Reading title */}
        {entry.readingTitle&&entry.readingTitle!==entry.title&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.3rem"}}>📖 Reading Material</div>
            <div style={{fontSize:"0.88rem",color:pal.ink,fontWeight:"600"}}>{entry.readingTitle}</div>
          </div>
        )}

        {/* Notes */}
        {entry.note&&entry.note.trim()&&!entry.isSubject&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>Notes</div>
            <div style={{fontSize:"0.84rem",color:pal.inkM,lineHeight:1.75,background:pal.parchm,borderRadius:"11px",padding:"0.75rem 0.9rem",whiteSpace:"pre-wrap"}}>{entry.note.replace("AI Summary: ","").trim()}</div>
          </div>
        )}

        {/* Subjects covered (day notes) */}
        {entry.subjects&&entry.subjects.length>0&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>Subjects Covered</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
              {entry.subjects.map(s=>(
                <span key={s} style={{fontSize:"0.72rem",padding:"0.15rem 0.55rem",background:cp.c1+"18",borderRadius:"20px",color:cp.c1,fontWeight:"700"}}>{s}</span>
              ))}
            </div>
          </div>
        )}

        {/* AI Summary */}
        {entry.aiSummary&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>🤖 AI Summary</div>
            <div style={{fontSize:"0.82rem",color:pal.inkM,lineHeight:1.7,background:pal.pale,borderRadius:"11px",padding:"0.7rem 0.85rem",fontStyle:"italic"}}>{entry.aiSummary}</div>
          </div>
        )}

        {/* Photos */}
        {entry.photos&&entry.photos.length>0&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.45rem"}}>📷 Photos ({entry.photos.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem"}}>
              {entry.photos.map((src,i)=>(
                <div key={i} style={{aspectRatio:"1",borderRadius:"10px",overflow:"hidden",border:`1.5px solid ${pal.stone}30`}}>
                  <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
              ))}
            </div>
          </div>
        )}

        <button onClick={onClose}
          style={{width:"100%",padding:"0.8rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer",marginTop:"0.5rem"}}>
          Done
        </button>
      </div>
    </div>
  );
}



/* ---- State Reminder ---- */
function StateReminder({pal,stateInfo,state}){
  const [open, setOpen] = useState(false);
  if(!state) return null;

  const tier = stateInfo.tier||2;
  const tierColor = tier<=1?pal.good:tier===2?pal.primary:tier===3?"#e07b00":"#c0392b";
  const tierLabel = tier<=1?"Low regulation":tier===2?"Moderate regulation":tier===3?"Moderate-high regulation":"High regulation";

  return (
    <div style={{background:pal.linen,borderRadius:"14px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1.1rem"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.75rem 0.9rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:"1.1rem",flexShrink:0}}>📋</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{state} Portfolio Reminder</div>
          <div style={{fontSize:"0.65rem",color:tierColor,fontWeight:"700",marginTop:"1px"}}>{tierLabel}</div>
        </div>
        <span style={{color:pal.slate,fontSize:"1rem",transform:open?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>›</span>
      </button>
      {open&&(
        <div style={{borderTop:`1px solid ${pal.stone}20`,padding:"0.75rem 0.9rem",background:"#fff"}}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
            {[
              ["📋","What to keep",stateInfo.portfolio],
              ["⏰","Hours / days",stateInfo.hours],
              ["📊","Testing",stateInfo.testing],
              ["📅","Due date",stateInfo.deadline],
              ["🗂","Keep records for",stateInfo.keepFor],
            ].filter(([_,__,v])=>v&&v!=="None"&&v!=="Not required"&&v!=="Not specified").map(([icon,label,val])=>(
              <div key={label} style={{display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
                <span style={{fontSize:"0.85rem",flexShrink:0,marginTop:"1px"}}>{icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.65rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"1px"}}>{label}</div>
                  <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.5}}>{val}</div>
                </div>
              </div>
            ))}
            <div style={{fontSize:"0.67rem",color:pal.slate,marginTop:"0.25rem",fontStyle:"italic",lineHeight:1.5}}>
              Laws can change. Always verify with HSLDA.org or your state DOE before your annual evaluation.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- Additional Notes ---- */
function AdditionalNotes({pal,family,child}){
  const LS_KEY = "rootbloom_portnotes_"+(child?.id||"");
  const [notes, setNotes] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [editing, setEditing] = useState(false);

  const save = (v) => {
    setNotes(v);
    try{localStorage.setItem(LS_KEY,v);}catch(e){}
  };

  return (
    <div style={{background:pal.linen,borderRadius:"14px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1.1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.75rem 0.9rem",borderBottom:editing||notes?`1px solid ${pal.stone}20`:"none"}}>
        <div>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>Additional Notes</div>
          <div style={{fontSize:"0.65rem",color:pal.slate,marginTop:"1px"}}>Parent observations, goals, reflections</div>
        </div>
        <button onClick={()=>setEditing(e=>!e)}
          style={{padding:"0.28rem 0.65rem",border:`1.5px solid ${pal.stone}`,borderRadius:"8px",background:"transparent",color:pal.slate,fontWeight:"700",fontSize:"0.7rem",cursor:"pointer"}}>
          {editing?"Done":"Edit"}
        </button>
      </div>
      {(editing||notes.trim())&&(
        <div style={{padding:"0.75rem 0.9rem",background:"#fff"}}>
          {editing ? (
            <textarea value={notes} onChange={e=>save(e.target.value)} rows={4}
              placeholder={"Notes about "+(child?.name||"your student")+" - progress, observations, goals for next term..."}
              style={{width:"100%",padding:"0.6rem 0.75rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.8rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}/>
          ) : (
            <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{notes}</div>
          )}
        </div>
      )}
    </div>
  );
}



function AddEntryModal({pal,family,onClose,onSave,initialData=null,stateInfo=null}){
  const isEdit = initialData!==null;
  // Multi-child: store as Set of indices
  const [selectedChildren, setSelectedChildren] = useState(
    isEdit ? new Set([initialData?.childIdx||0]) : new Set([0])
  );
  const toggleChild = (i) => {
    if(isEdit) { setSelectedChildren(new Set([i])); return; } // edit = single child
    setSelectedChildren(prev => {
      const next = new Set(prev);
      if(next.has(i) && next.size>1) next.delete(i);
      else next.add(i);
      return next;
    });
  };
  const [title,     setTitle]     = useState(initialData?.title||"");
  const [subj,      setSubj]      = useState(initialData?.subj||"Daily Check-In");
  const [customSubj,setCustomSubj]= useState("");
  const [showCustom,setShowCustom]= useState(false);
  const [note,      setNote]      = useState(initialData?.note||"");
  const [thumb,        setThumb]       = useState(initialData?.thumb||"📋");
  const [readingTitle, setReadingTitle] = useState(initialData?.readingTitle||"");
  const isReadingSubj = subj==="Reading" || subj==="Reading/Language Arts";
  const needsReadingTitle = isReadingSubj && (stateInfo?.readingLog||false) && !isEdit;
  const canSaveReading = !needsReadingTitle || readingTitle.trim().length>0;
  const THUMBS=["📋","📜","🎨","🔬","📖","🏛","📝","🌿","🧪","🎵","📐","🌍","🏃","🍳","🏠","🧹","🌳","📸","💡","🖌"];
  const [photos,      setPhotos]    = useState(initialData?.photos||[]);
  const [showCamera,  setShowCamera]= useState(false);
  const galleryRef  = useRef(null);
  const cameraRef   = useRef(null);
  const videoRef    = useRef(null);
  const canvasRef   = useRef(null);
  const streamRef   = useRef(null);

  const handleGallery = (e) => {
    Array.from(e.target.files).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ev => setPhotos(p=>[...p,{name:file.name,dataUrl:ev.target.result}]);
      reader.readAsDataURL(file);
    });
  };

  const openCamera = async () => {
    setShowCamera(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
      streamRef.current = stream;
      if(videoRef.current) videoRef.current.srcObject = stream;
    } catch(e) {
      alert("Camera not available. Try uploading from gallery instead.");
      setShowCamera(false);
    }
  };

  const takePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if(!video||!canvas) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    const dataUrl = canvas.toDataURL("image/jpeg",0.85);
    setPhotos(p=>[...p,{name:"photo-"+Date.now()+".jpg",dataUrl}]);
    closeCamera();
  };

  const closeCamera = () => {
    if(streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setShowCamera(false);
  };

  const removePhoto = (i) => setPhotos(p=>p.filter((_,pi)=>pi!==i));
  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = ["Daily Check-In",...activeSubjs.map(s=>s.label)];
  // If editing with a subj not in the list, show it as custom
  const subjInList = subjOptions.includes(subj);
  const canSave = title.trim().length>0 && canSaveReading;

  const handleSubjSelect = (s) => {
    if(s==="__other__"){setShowCustom(true);}
    else{setSubj(s);setShowCustom(false);}
  };
  const applyCustomSubj = () => {
    if(customSubj.trim()){setSubj(customSubj.trim());setShowCustom(false);}
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Entry":"Add Portfolio Entry"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>x</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          <Lbl pal={pal}>{isEdit?"For which child?":"For which children? (select all that apply)"}</Lbl>
          <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {family.children.map((c,i)=>{
              const sel=selectedChildren.has(i);
              return (
                <button key={c.id} onClick={()=>toggleChild(i)}
                  style={{flex:1,minWidth:"80px",padding:"0.55rem 0.4rem",borderRadius:"11px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center",position:"relative",transition:"all 0.13s"}}>
                  {sel&&<div style={{position:"absolute",top:"4px",right:"4px",width:"14px",height:"14px",borderRadius:"50%",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:"0.7rem",fontWeight:"900"}}>✓</span></div>}
                  <div style={{fontSize:"1.3rem"}}>{c.avatar}</div>
                  <div style={{fontSize:"0.68rem",fontWeight:sel?"700":"400",color:sel?pal.primary:pal.inkM}}>{c.name}</div>
                </button>
              );
            })}
          </div>
          {!isEdit && selectedChildren.size>1 && (
            <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.75rem",marginBottom:"0.75rem",marginTop:"-0.4rem",fontSize:"0.72rem",color:pal.primary,fontWeight:"700"}}>
              {selectedChildren.size} children selected — one entry will be saved for each
            </div>
          )}

          <Lbl pal={pal}>Subject</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>handleSubjSelect(s)}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subj===s&&!showCustom?pal.primary:pal.stone+"60"}`,background:subj===s&&!showCustom?pal.pale:"transparent",color:subj===s&&!showCustom?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subj===s&&!showCustom?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            {/* Other option */}
            <button onClick={()=>handleSubjSelect("__other__")}
              style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.stone+"60"}`,background:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.pale:"transparent",color:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:showCustom||(!subjInList&&subj!=="Daily Check-In")?"700":"400",cursor:"pointer"}}>
              + Other
            </button>
          </div>
          {/* Custom subject input */}
          {(showCustom||(!subjInList&&subj!=="Daily Check-In")) && (
            <div style={{display:"flex",gap:"0.4rem",marginBottom:"0.6rem",animation:"fadeUp 0.18s ease"}}>
              <input value={showCustom?customSubj:subj} onChange={e=>showCustom?setCustomSubj(e.target.value):setSubj(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&applyCustomSubj()}
                placeholder="e.g. Home Ec, Nutrition, Art History..."
                style={{flex:1,padding:"0.5rem 0.75rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",fontSize:"0.8rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}/>
              {showCustom && <button onClick={applyCustomSubj} style={{padding:"0.5rem 0.75rem",border:"none",borderRadius:"11px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.78rem",cursor:"pointer"}}>Use</button>}
            </div>
          )}
          {subj && !showCustom && <div style={{fontSize:"0.72rem",color:pal.primary,fontWeight:"700",marginBottom:"0.75rem"}}>Subject: {subj}</div>}

          {/* Reading title — required for FL/PA states */}
          {needsReadingTitle && (
            <div style={{animation:"fadeUp 0.18s ease",marginBottom:"0.75rem"}}>
              <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>*</span></Lbl>
              <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.7rem",marginBottom:"0.5rem",fontSize:"0.71rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>
                📖 {family.state||"Your state"} requires reading materials to be listed by title.
              </div>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Math 5/4, Bible Story Vol.2"/>
            </div>
          )}
          {isReadingSubj && !needsReadingTitle && (
            <div style={{marginBottom:"0.55rem"}}>
              <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
            </div>
          )}
          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {THUMBS.map(t=>(
              <button key={t} onClick={()=>setThumb(t)}
                style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${thumb===t?pal.primary:pal.stone+"50"}`,background:thumb===t?pal.pale:"transparent",cursor:"pointer",fontSize:"1.1rem"}}>
                {t}
              </button>
            ))}
          </div>

          <Lbl pal={pal}>Title</Lbl>
          <Input pal={pal} value={title} onChange={setTitle} placeholder="What did they do or learn?"/>
          <div style={{height:"0.75rem"}}/>
          <Lbl pal={pal}>Notes (optional)</Lbl>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
            placeholder="Any details, observations, or reflections..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>

          {/* ── PHOTOS ── */}
          <div style={{height:"0.75rem"}}/>
          <Lbl pal={pal}>Photos (optional)</Lbl>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.65rem"}}>
            {/* Gallery upload */}
            <input ref={galleryRef} type="file" accept="image/*" multiple onChange={handleGallery} style={{display:"none"}}/>
            <button onClick={()=>galleryRef.current?.click()}
              style={{flex:1,padding:"0.6rem 0.5rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",background:"transparent",color:pal.inkM,fontWeight:"700",fontSize:"0.76rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.35rem"}}>
              <span style={{fontSize:"1.1rem"}}>📷</span><span>Gallery</span>
            </button>
            {/* Camera */}
            <button onClick={openCamera}
              style={{flex:1,padding:"0.6rem 0.5rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",background:pal.pale,color:pal.primary,fontWeight:"700",fontSize:"0.76rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.35rem"}}>
              <span style={{fontSize:"1.1rem"}}>📸</span><span>Camera</span>
            </button>
          </div>
          {/* Photo grid */}
          {photos.length>0 && (
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem",marginBottom:"0.5rem"}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:"relative",borderRadius:"10px",overflow:"hidden",aspectRatio:"1",border:`1.5px solid ${pal.stone}40`}}>
                  <img src={p.dataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>removePhoto(i)}
                    style={{position:"absolute",top:"4px",right:"4px",width:"20px",height:"20px",borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:"0.65rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
                    x
                  </button>
                </div>
              ))}
            </div>
          )}
          {photos.length===0&&<div style={{fontSize:"0.72rem",color:pal.stone,fontStyle:"italic",marginBottom:"0.5rem"}}>No photos yet</div>}

          {/* Camera modal */}
          {showCamera && (
            <div style={{position:"fixed",inset:0,background:"#000",zIndex:500,display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.75rem 1rem",background:"rgba(0,0,0,0.8)"}}>
                <span style={{color:"#fff",fontWeight:"700",fontSize:"0.9rem"}}>Take Photo</span>
                <button onClick={closeCamera} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"8px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.8rem",cursor:"pointer"}}>Cancel</button>
              </div>
              <video ref={videoRef} autoPlay playsInline muted style={{flex:1,width:"100%",objectFit:"cover"}}/>
              <canvas ref={canvasRef} style={{display:"none"}}/>
              <div style={{padding:"1.2rem",background:"rgba(0,0,0,0.8)",display:"flex",justifyContent:"center"}}>
                <button onClick={takePhoto}
                  style={{width:"70px",height:"70px",borderRadius:"50%",border:"4px solid #fff",background:"rgba(255,255,255,0.9)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.8rem",boxShadow:"0 0 0 4px rgba(255,255,255,0.3)"}}>
                  📸
                </button>
              </div>
            </div>
          )}
        </div>
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
          <button onClick={()=>{
              if(!canSave) return;
              const today = initialData?.date||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
              if(isEdit) {
                // Edit = single child (first selected)
                const childIdx = [...selectedChildren][0];
                onSave({childIdx,title,subj,note,thumb,date:today,photos:photos.map(p=>p.dataUrl),readingTitle:readingTitle.trim()||undefined});
              } else {
                // Multi-save — one per selected child
                [...selectedChildren].forEach(childIdx => {
                  onSave({childIdx,title,subj,note,thumb,date:today,photos:photos.map(p=>p.dataUrl),readingTitle:readingTitle.trim()||undefined});
                });
              }
            }}
            disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {isEdit?"Save Changes":selectedChildren.size>1?"Save "+selectedChildren.size+" Entries":"Save Entry"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Weekly Portfolio Packet ---- */
function WeeklyPacket({pal,family,child,entries,onBack}){
  const [generating, setGenerating] = useState(false);
  const [summary,    setSummary]    = useState(null);
  const [error,      setError]      = useState(null);

  const ch = family.children[child];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const childEntries = entries.filter(e=>e.childIdx===child);

  // Get this week entries
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  const weekEntries = childEntries.slice(0,20); // last 20 entries as proxy for the week

  const weekOf = now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const schoolName = family.schoolName || (family.familyName+" Academy") || "Home School";

  const generateSummary = async () => {
    if(weekEntries.length===0){setError("No entries yet! Complete some check-ins first.");return;}
    setGenerating(true); setError(null);
    const entriesList = weekEntries.map(e=>"- "+e.subj+": "+e.title+(e.note?" ("+e.note+")":"")).join("\n");
    const approach = (family.curriculumStyle||[]).join(", ")||"eclectic";
    const prompt = "You are a homeschool portfolio assistant. Write a warm, professional 2-paragraph narrative summary for a weekly portfolio packet.\n\n"
      + "Student: "+(ch?.name||"Student")+", "+(ch?.grade||"elementary")+" grade\n"
      + "School: "+schoolName+"\n"
      + "Learning approach: "+approach+"\n"
      + "Week of: "+weekOf+"\n\n"
      + "Activities this week:\n"+entriesList+"\n\n"
      + "Write: 1) A 2-3 sentence narrative describing what the student learned, warmly written for a state portfolio review. "
      + "2) A 1-2 sentence reflection on their growth. "
      + "Under 120 words total. No bullet points."

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:400,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.map(b=>b.text||"").join("")||"";
      if(!text) throw new Error("empty");
      setSummary(text);
    } catch(e){
      setError("Could not generate summary. Check your connection and try again.");
    }
    setGenerating(false);
  };

  // Group entries by subject
  const bySubject = {};
  weekEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]=[];
    bySubject[e.subj].push(e);
  });

  return (
    <div style={{animation:"fadeUp 0.22s ease",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>Back</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{ch?.avatar} {ch?.name} — Weekly Packet</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>Week of {weekOf}</div>
        </div>
        <button onClick={()=>window.print()} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>🖨 Print</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"1rem"}}>

        {/* Page 1: Cover + Summary */}
        <div style={{background:pal.linen,borderRadius:"18px",padding:"1.2rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}} id="packet-page1">
          {/* School header */}
          <div style={{borderBottom:`2px solid ${cp.c1}40`,paddingBottom:"0.75rem",marginBottom:"0.85rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{schoolName}</div>
              <div style={{fontSize:"0.7rem",color:pal.slate}}>{family.state} · {family.parentName}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"0.65rem",color:pal.slate,fontWeight:"600"}}>WEEKLY PORTFOLIO</div>
              <div style={{fontSize:"0.68rem",fontWeight:"700",color:pal.inkM}}>Week of {weekOf}</div>
            </div>
          </div>

          {/* Student info */}
          <div style={{display:"flex",alignItems:"center",gap:"0.85rem",marginBottom:"1rem"}}>
            <div style={{width:"54px",height:"54px",borderRadius:"14px",background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2rem",flexShrink:0}}>{ch?.avatar}</div>
            <div>
              <div style={{fontWeight:"900",color:pal.ink,fontSize:"1.1rem"}}>{ch?.name}</div>
              <div style={{fontSize:"0.76rem",color:pal.slate}}>{ch?.grade} · {weekEntries.length} activities this week</div>
            </div>
          </div>

          {/* AI Summary section */}
          <div style={{background:pal.sand,borderRadius:"13px",padding:"0.9rem 1rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}35`}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.5rem"}}>Weekly Narrative</div>
            {summary ? (
              <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.75}}>{summary}</div>

function AttendanceScreen({pal, family, days, pending, onConfirmPull, onCatchup}){
  const REQUIRED = 180;
  const remaining = REQUIRED - days;
  const pct = Math.round((days/REQUIRED)*100);
  const weeksLeft = Math.round(remaining/5*10)/10;
  const onTrack = pct >= 68; // roughly where they should be mid-year
  const MONTHS=[
    {m:"Aug",target:20,actual:20},{m:"Sep",target:20,actual:20},{m:"Oct",target:18,actual:18},
    {m:"Nov",target:14,actual:13},{m:"Dec",target:10,actual:10},{m:"Jan",target:20,actual:18},
    {m:"Feb",target:18,actual:17},{m:"Mar",target:10,actual:days-116,cap:true},
    {m:"Apr",target:18,actual:0},{m:"May",target:12,actual:0},
  ];
  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Attendance" sub={(family?.state||"Your state") + (family?.yearStart?" - "+new Date(family.yearStart).getFullYear()+(family?.yearEnd?"-"+new Date(family.yearEnd).getFullYear():""):" - Current year")} icon="📋"/>
      <div style={{padding:"1rem"}}>

        {/* Schedule pull banner - appears when schedule has unconfirmed days */}
        {pending>0&&(
          <div style={{background:pal.pale,borderRadius:"16px",padding:"0.9rem 1.1rem",marginBottom:"1rem",border:`2px solid ${pal.primary}30`,animation:"fadeUp 0.2s ease"}}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start"}}>
              <div style={{width:"40px",height:"40px",borderRadius:"11px",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",flexShrink:0}}>📅</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.88rem",marginBottom:"0.2rem"}}>
                  {pending} school {pending===1?"day":"days"} ready to log
                </div>
                <div style={{fontSize:"0.75rem",color:pal.inkM,lineHeight:1.6,marginBottom:"0.65rem"}}>
                  Your schedule shows {pending} completed {pending===1?"day":"days"} not yet counted. Add {pending===1?"it":"them"} to your attendance record?
                </div>
                <div style={{display:"flex",gap:"0.5rem"}}>
                  <button onClick={onConfirmPull} style={{flex:1,padding:"0.6rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.8rem",cursor:"pointer"}}>
                    v Yes, add {pending===1?"it":"them"}
                  </button>
                  <button style={{padding:"0.6rem 0.85rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",background:"transparent",color:pal.slate,fontSize:"0.8rem",cursor:"pointer"}}>
                    Skip
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Stats grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"0.65rem",marginBottom:"1rem"}}>
          {[
            {l:"Days Logged",  v:days,         bg:pal.goodBg,  c:pal.good},
            {l:"Days Needed",  v:remaining,    bg:pal.warnBg,  c:pal.warn},
            {l:"Absences",     v:4,            bg:pal.badBg,   c:pal.bad},
            {l:"Excused",      v:3,            bg:pal.parchm,  c:pal.slate},
          ].map(s=>(
            <div key={s.l} style={{background:s.bg,borderRadius:"14px",padding:"0.85rem",textAlign:"center",border:`1px solid ${s.c}18`}}>
              <div style={{fontWeight:"900",fontSize:"1.5rem",color:s.c,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:"0.62rem",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:"3px"}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Year progress bar */}
        <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
            <span style={{fontWeight:"700",color:pal.inkM,fontSize:"0.8rem"}}>Year Progress</span>
            <span style={{fontWeight:"900",color:onTrack?pal.good:pal.warn,fontSize:"0.82rem"}}>{pct}% {onTrack?"v":"!"}</span>
          </div>
          <div style={{height:"12px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"7px"}}>
            <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:onTrack?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.4s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:pal.slate}}>
            <span>{days} of {REQUIRED} days complete</span>
            <span>~{weeksLeft} weeks to go</span>
          </div>
        </div>

        {/* Monthly breakdown */}
        <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.8rem",marginBottom:"0.75rem"}}>Monthly Breakdown</div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
            {MONTHS.filter(m=>m.target>0).map((m,i)=>{
              const actual=m.cap?Math.max(0,Math.min(m.actual,m.target)):m.actual;
              const done=actual>=m.target;
              const future=m.actual===0&&!m.cap;
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:"0.65rem"}}>
                  <div style={{width:"28px",fontSize:"0.7rem",fontWeight:"700",color:future?pal.stone:pal.inkM,flexShrink:0}}>{m.m}</div>
                  <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                    {!future&&<div style={{height:"100%",width:`${Math.round(actual/m.target*100)}%`,borderRadius:"99px",background:done?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.4s"}}/>}
                  </div>
                  <div style={{width:"32px",textAlign:"right",fontSize:"0.7rem",fontWeight:"700",color:future?pal.stone:done?pal.good:pal.warn,flexShrink:0}}>
                    {future?"-":`${actual}/${m.target}`}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Warm status card + catch-up trigger */}
        <div style={{background:onTrack?pal.goodBg:pal.warnBg,borderRadius:"16px",padding:"1rem 1.1rem",marginBottom:"1rem",border:`2px solid ${onTrack?pal.good:pal.warn}22`}}>
          <div style={{fontWeight:"800",color:onTrack?pal.good:pal.warn,fontSize:"0.9rem",marginBottom:"0.3rem"}}>
            {onTrack ? "💚 You\u2019re on track!" : "💛 A little behind - no worries!"}
          </div>
          <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.65,marginBottom:onTrack?0:"0.75rem"}}>
            {onTrack
              ? `Amazing work - ${days} days logged and right on schedule. Keep going!`
              : `You need ${remaining} more days. That's totally doable - you've got about ${weeksLeft} weeks left and plenty of time to catch up.`
            }
          </div>
          {!onTrack&&(
            <button onClick={onCatchup} style={{width:"100%",padding:"0.7rem",border:"none",borderRadius:"12px",background:`linear-gradient(135deg,${pal.warn},${pal.accentD})`,color:"#fff",fontWeight:"800",fontSize:"0.84rem",cursor:"pointer"}}>
              📅 Build a Catch-Up Plan
            </button>
          )}
        </div>
        <div style={{height:"0.5rem"}}/>
      </div>
    </div>
  );
}

                      <div key={i} style={{marginBottom:"0.65rem"}}>

                          <span style={{flex:1}}>{q}</span>
                        </div>
                        {answers.length>0&&(
                          <div style={{marginLeft:"1.4rem",marginTop:"0.3rem"}}>
                            <button onClick={()=>setOpen(o=>!o)}
                              style={{fontSize:"0.65rem",color:LR_COLOR,fontWeight:"700",background:"transparent",border:`1px solid ${LR_COLOR}40`,borderRadius:"20px",padding:"0.12rem 0.6rem",cursor:"pointer"}}>
                              {open?"▲ Hide ideas":"▼ Example answers"}
                            </button>
                            {open&&(
                              <div style={{marginTop:"0.4rem",display:"flex",flexDirection:"column",gap:"0.3rem"}}>
                                {answers.map((a,j)=>(
                                  <div key={j} style={{display:"flex",gap:"0.4rem",alignItems:"flex-start",fontSize:"0.75rem",color:pal.slate,lineHeight:1.55}}>
                                    <span style={{color:LR_COLOR,flexShrink:0,marginTop:"1px"}}>•</span>
                                    <span>{a}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Practice challenge */}
                <div style={{background:`linear-gradient(135deg,${LR_COLOR},${LR_COLOR2})`,borderRadius:"14px",padding:"0.9rem 1rem"}}>
                  <div style={{fontSize:"0.6rem",fontWeight:"800",color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>🎯 Practice Challenge</div>
                  <div style={{fontSize:"0.82rem",color:"#fff",lineHeight:1.65}}>{plan.challenge}</div>
                </div>

              </div>
            );
          })()}
          {/* Week schedule — each day is expandable, plus next week preview */}
          {(()=>{
            const [expandedDay, setExpandedDay] = React.useState(null);
            const [showNext,    setShowNext]    = React.useState(false);
            const nextWeekTopic = getLRTopicForWeek(grade, 1);
            const nextWeekNum   = getLRWeekNumber(grade) + 1;

            const plan = getLessonPlan(topic, grade);
            const tierKey = ["Pre-K","K","1st","2nd"].includes(grade)?"low":["9th","10th","11th","12th"].includes(grade)?"high":"mid";
            const dayDetails = {
              "Monday": {
                duration: "30 minutes",
                what: "Full lesson",
                how: "Read through the lesson plan together, work through the steps, and discuss the questions. This is your main learning time for the week."
              },
              "Tuesday": {
                duration: "10 minutes",
                what: plan.tuesday ? plan.tuesday[tierKey].title : "Quick practice",
                how:  plan.tuesday ? plan.tuesday[tierKey].activity : "Revisit one step from Monday. Can your child explain it back in their own words?"
              },
              "Wednesday": {
                duration: "10 minutes",
                what: plan.wednesday ? plan.wednesday[tierKey].title : "Practice challenge",
                how:  plan.wednesday ? plan.wednesday[tierKey].activity : "Work on the hands-on challenge from the lesson."
              },
              "Thursday": {
                duration: "10 minutes",
                what: plan.thursday ? plan.thursday[tierKey].title : "Quick review",
                how:  plan.thursday ? plan.thursday[tierKey].activity : "Ask your child two questions from the lesson. Celebrate what they remember."
              }
            };

            const activeDays = freq==="monday_plus_practice"
              ? ["Monday","Tuesday","Wednesday","Thursday"]
              : ["Monday"];

            return (
              <div style={{background:pal.linen,borderRadius:"16px",overflow:"hidden",marginBottom:"1rem",border:"1.5px solid #e0e0e0"}}>
                <div style={{padding:"0.8rem 1rem 0.3rem",borderBottom:"1px solid #f0f0f0"}}>
                  <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem"}}>This week plan</div>
                  <div style={{fontSize:"0.62rem",color:pal.slate,marginTop:"1px"}}>Tap a day to see what to expect</div>
                </div>

                {/* Day rows */}
                {["Monday","Tuesday","Wednesday","Thursday"].map((day,i)=>{
                  const active  = activeDays.includes(day);
                  const details = dayDetails[day];
                  const isOpen  = expandedDay===day;
                  const icons   = {Monday:"📚",Tuesday:"🔧",Wednesday:"🎯",Thursday:"📝"};
                  return (
                    <div key={day}>
                      <button onClick={()=>active&&setExpandedDay(isOpen?null:day)}
                        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.55rem 1rem",background:isOpen?LR_COLOR+"08":"transparent",border:"none",borderTop:"1px solid #f5f5f5",cursor:active?"pointer":"default",textAlign:"left"}}>
                        <div style={{width:"30px",height:"30px",borderRadius:"8px",background:active?LR_COLOR+"20":"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0}}>{icons[day]}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:"700",color:active?pal.ink:"#bbb",fontSize:"0.8rem"}}>{day}</div>
                          <div style={{fontSize:"0.65rem",color:active?LR_COLOR:"#ccc",fontWeight:active?"600":"400"}}>{active?details.what+" · "+details.duration:"—"}</div>
                        </div>
                        {active&&<span style={{color:pal.slate,fontSize:"0.9rem",transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.18s",flexShrink:0}}>›</span>}
                      </button>
                      {isOpen&&active&&(
                        <div style={{padding:"0.65rem 1rem 0.75rem 3.5rem",background:"#fff",borderTop:"1px solid #f5f5f5"}}>
                          <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.65}}>{details.how}</div>
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Next week preview */}
                <button onClick={()=>setShowNext(s=>!s)}
                  style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.6rem 1rem",background:showNext?LR_COLOR+"08":"transparent",border:"none",borderTop:"1px solid #ececec",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:"30px",height:"30px",borderRadius:"8px",background:LR_COLOR+"12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:"0.58rem",fontWeight:"900",color:LR_COLOR}}>W{nextWeekNum}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"0.65rem",fontWeight:"700",color:LR_COLOR,textTransform:"uppercase",letterSpacing:"0.05em"}}>Coming up next week</div>
                    <div style={{fontSize:"0.78rem",color:pal.inkM,fontWeight:"600",marginTop:"1px"}}>{nextWeekTopic}</div>
                  </div>
                  <span style={{color:pal.slate,fontSize:"0.9rem",transform:showNext?"rotate(90deg)":"none",transition:"transform 0.18s",flexShrink:0}}>›</span>
                </button>
                {showNext&&(
                  <div style={{padding:"0.65rem 1rem 0.75rem 3.5rem",background:"#fff",borderTop:"1px solid #f5f5f5"}}>
                    <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.65}}>
                      Next week you and your student will explore: <b>{nextWeekTopic}</b>. A full lesson plan will be ready when the week arrives.
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

        </>)}

        {/* ====== TOPICS TAB ====== */}
        {tab==="topics" && (<>
          {/* Upcoming 4 weeks — one per child so grades are correct */}
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.55rem"}}>Upcoming 4 Weeks</div>
          {(()=>{
            const upcoming = getLRUpcomingTopics(grade, 4);
            // Deduplicate — if same topic appears due to wrapping, show distinct
            const seen = new Set();
            const deduped = upcoming.filter(item=>{
              if(seen.has(item.topic)) return false;
              seen.add(item.topic); return true;
            });
            return deduped.map((item,i)=>(
              <div key={i} style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.55rem 0.75rem",background:i===0?LR_COLOR+"18":pal.linen,borderRadius:"11px",marginBottom:"0.35rem",border:`1.5px solid ${i===0?LR_COLOR+"40":"#e8e8e8"}`}}>
                <div style={{width:"28px",height:"28px",borderRadius:"7px",background:i===0?LR_COLOR:pal.parchm,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:"0.65rem",fontWeight:"900",color:i===0?"#fff":pal.slate}}>W{item.weekNum}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:i===0?"800":"600",color:i===0?LR_COLOR:pal.inkM,fontSize:"0.82rem"}}>{item.topic}</div>
                  <div style={{fontSize:"0.65rem",color:pal.slate}}>{i===0?"This week":i===1?"Next week":"In "+i+" weeks"}</div>
                </div>
                {i===0&&<span style={{fontSize:"0.7rem",color:LR_COLOR,fontWeight:"800"}}>Now</span>}
              </div>
            ));
          })()}

          {/* Full 36-week list */}
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.55rem",marginTop:"1rem"}}>Full year curriculum ({grade})</div>
          <div style={{background:pal.linen,borderRadius:"14px",border:"1.5px solid #e8e8e8",overflow:"hidden",marginBottom:"0.85rem"}}>
            {(LR_WEEKLY_TOPICS[grade]||LR_WEEKLY_TOPICS["5th"]).map((topic,i)=>{
              const current = getLRWeekNumber(grade)-1===i;
              return (
                <div key={i} style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.48rem 0.75rem",borderTop:i>0?"1px solid #f5f5f5":"none",background:current?LR_COLOR+"10":"transparent"}}>
                  <span style={{fontSize:"0.6rem",fontWeight:"700",color:current?LR_COLOR:pal.stone,width:"22px",flexShrink:0,textAlign:"center"}}>W{i+1}</span>
                  <span style={{fontSize:"0.78rem",color:current?LR_COLOR:pal.inkM,fontWeight:current?"700":"400",flex:1}}>{topic}</span>
                  {current&&<span style={{fontSize:"0.6rem",color:LR_COLOR,fontWeight:"800",flexShrink:0}}>← Now</span>}
                </div>
              );
            })}
          </div>

          {/* Category cards */}
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.55rem"}}>Focus areas</div>
          {LR_CATEGORIES.filter(c=>cats.includes(c.id)).map((c,i)=>(
            <div key={c.id} style={{background:pal.linen,borderRadius:"12px",padding:"0.75rem 0.9rem",marginBottom:"0.4rem",border:"1.5px solid #e8e8e8",display:"flex",gap:"0.65rem",alignItems:"center"}}>
              <div style={{width:"38px",height:"38px",borderRadius:"10px",background:LR_COLOR+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{c.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{c.label}</div>
                <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>{c.desc}</div>
              </div>
            </div>
          ))}
        </>)}

        {/* ====== SETTINGS TAB ====== */}
        {tab==="settings" && (<>
          <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",border:"1.5px solid #e8e8e8",marginBottom:"0.85rem"}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.65rem"}}>Current schedule</div>
            {[
              ["monday_plus_practice","Monday lesson + practice Tue-Thu"],
              ["monday_only","Monday lesson only"],
              ["flexible","Flexible — I schedule it"],
            ].map(([id,label])=>(
              <div key={id} style={{display:"flex",gap:"0.5rem",alignItems:"center",padding:"0.42rem 0",borderTop:id!=="monday_plus_practice"?"1px solid #f0f0f0":"none"}}>
                <div style={{width:"14px",height:"14px",borderRadius:"50%",border:`2px solid ${freq===id?LR_COLOR:"#ccc"}`,background:freq===id?LR_COLOR:"transparent",flexShrink:0}}/>
                <span style={{fontSize:"0.8rem",color:freq===id?LR_COLOR:pal.inkM,fontWeight:freq===id?"700":"400"}}>{label}</span>
              </div>
            ))}
            <div style={{fontSize:"0.72rem",color:pal.slate,marginTop:"0.65rem"}}>{"To change these, go to Settings → School."}</div>
          </div>
          <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",border:"1.5px solid #e8e8e8"}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.5rem"}}>Active focus areas ({cats.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.38rem"}}>
              {LR_CATEGORIES.filter(c=>cats.includes(c.id)).map(c=>(
                <span key={c.id} style={{padding:"0.2rem 0.55rem",background:LR_COLOR+"18",borderRadius:"20px",fontSize:"0.72rem",fontWeight:"700",color:LR_COLOR}}>{c.icon} {c.label}</span>
              ))}
            </div>
          </div>
        </>)}
      </div>
    </div>
  );
}

function TranscriptsScreen({pal,family,portfolioEntries=[],attendanceDays=0,coopLog=[]}){
  const [activeChild,setActiveChild] = useState(0);
  const [activeView, setActiveView]  = useState("overview"); // overview | transcript | narrative

  const ch = family.children[activeChild];
  if(!ch) return null;

  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const REQUIRED = 180;
  const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";
  const yearStart = family.yearStart ? new Date(family.yearStart).toLocaleDateString("en-US",{month:"long",year:"numeric"}) : "—";
  const yearEnd   = family.yearEnd   ? new Date(family.yearEnd).toLocaleDateString("en-US",{month:"long",year:"numeric"})   : "—";
  const pct = Math.min(100,Math.round((attendanceDays/REQUIRED)*100));

  const childEntries = portfolioEntries.filter(e=>e.childIdx===activeChild);
  const childCoopHrs = coopLog.reduce((sum,l)=>sum+(l.hrs||0),0);

  // Group entries by subject
  const bySubject = {};
  childEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]={count:0,entries:[]};
    bySubject[e.subj].count++;
    bySubject[e.subj].entries.push(e);
  });

  // Get active subjects from family
  const customSubjs = family.customSubjects||[];
  const allSubjMap = Object.fromEntries([...SUBJECT_OPTIONS,...customSubjs].map(s=>[s.id,s]));
  const activeSubjs = (family.subjects||[]).map(id=>allSubjMap[id]).filter(Boolean);

  const printRecord = () => window.print();

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Records" sub="Transcripts & Reports" icon="🎓"/>
      <div style={{padding:"0 1rem"}}>

        {/* Child tabs */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.85rem",overflowX:"auto"}}>
          {family.children.map((c,i)=>(
            <Chip key={c.id} pal={pal} label={c.avatar+" "+c.name} active={activeChild===i} onClick={()=>{setActiveChild(i);setActiveView("overview");}} small/>
          ))}
        </div>

        {/* View tabs */}
        <div style={{display:"flex",background:pal.parchm,borderRadius:"11px",padding:"3px",gap:"2px",marginBottom:"1rem"}}>
          {[["overview","📋 Overview"],["transcript","📜 Transcript"],["narrative","📖 Narrative"]].map(([id,l])=>(
            <button key={id} onClick={()=>setActiveView(id)} style={{flex:1,padding:"0.45rem",border:"none",borderRadius:"9px",background:activeView===id?pal.linen:"transparent",color:activeView===id?pal.ink:pal.slate,fontSize:"0.72rem",fontWeight:activeView===id?"700":"400",cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {/* ====== OVERVIEW ====== */}
        {activeView==="overview" && (<>
          {/* Student card */}
          <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,borderRadius:"18px",padding:"1.1rem 1.2rem",marginBottom:"1rem",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:"-20px",top:"-20px",width:"80px",height:"80px",borderRadius:"50%",background:"rgba(255,255,255,0.1)"}}/>
            <div style={{display:"flex",gap:"0.85rem",alignItems:"center",position:"relative"}}>
              <div style={{width:"52px",height:"52px",borderRadius:"14px",background:"rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.9rem",flexShrink:0}}>{ch.avatar}</div>
              <div>
                <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem"}}>{ch.name}</div>
                <div style={{fontSize:"0.76rem",color:"rgba(255,255,255,0.8)"}}>{ch.grade} · {schoolName}</div>
                <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.65)",marginTop:"2px"}}>{family.state} · {yearStart} — {yearEnd}</div>
              </div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.55rem",marginBottom:"1rem"}}>
            {[
              {l:"Days",      v:attendanceDays, c:pal.primary,  bg:pal.pale},
              {l:"Entries",   v:childEntries.length, c:pal.mid, bg:pal.paleMid},
              {l:"Subjects",  v:Object.keys(bySubject).length, c:pal.accentD, bg:pal.pale},
            ].map(s=>(
              <div key={s.l} style={{background:s.bg,borderRadius:"13px",padding:"0.75rem 0.5rem",textAlign:"center",border:`1.5px solid ${s.c}22`}}>

              </div>

          </div>

                  <span style={{fontSize:"0.72rem",color:pal.slate}}>{data.count} {data.count===1?"entry":"entries"}</span>
                </div>
              ))}
            </div>
          )}

          {(family.curriculumBrands||[]).length>0 && (
            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}}>
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.5rem"}}>Curriculum Programs</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                {(family.curriculumBrands||[]).map(id=>{
                  const b=CURRICULUM_BRANDS.find(x=>x.id===id);
                  return b?<span key={id} style={{padding:"0.2rem 0.6rem",background:pal.pale,borderRadius:"20px",fontSize:"0.73rem",fontWeight:"600",color:pal.primary}}>{b.label}</span>:null;

              </div>
            </div>

              <div style={{display:"flex",flexWrap:"wrap",gap:"0.38rem"}}>

                })}
              </div>
            </div>
          )}
          <div style={{height:"0.5rem"}}/>
        </>)}

        {/* ====== TRANSCRIPT VIEW ====== */}
        {activeView==="transcript" && (<>
          <div style={{background:pal.linen,borderRadius:"18px",padding:"1.2rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}}>
            {/* Header */}
            <div style={{borderBottom:`2px solid ${cp.c1}40`,paddingBottom:"0.85rem",marginBottom:"0.9rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div>
                <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{schoolName}</div>

/* ---- Narrative Editor (inline within TranscriptsScreen) ---- */
function NarrativeEditor({pal,ch,family,bySubject,attendanceDays,schoolName,cp,compact=false}){
  const LS_KEY = "rootbloom_narrative_"+ch.id;
  const [text, setText] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  const save = (v) => {
    setText(v);
    try{ localStorage.setItem(LS_KEY,v); }catch(e){}
  };

  const generate = async () => {
    setGenerating(true); setError(null);
    const subjList = Object.keys(bySubject).join(", ")||"various subjects";
    const approach = (Array.isArray(family.curriculumStyle)?family.curriculumStyle:[family.curriculumStyle||"eclectic"]).join(", ");
    const prompt = "Write a warm, professional annual narrative report for a homeschool portfolio."
      + " Student: "+ch.name+", "+ch.grade+" grade."
      + " School: "+schoolName+". State: "+(family.state||"")+"."
      + " Learning approach: "+approach+"."
      + " Subjects studied: "+subjList+"."
      + " Days completed: "+attendanceDays+"."
      + " Write 3 paragraphs: 1) Overview of the year and approach, 2) Academic highlights and growth in key subjects, 3) Character and personal development."
      + " Warm, specific, and suitable for state review. Under 250 words.";
    try {
      const text = await callClaude(prompt);
      save(text);
    } catch(e) {
      const msg = e.message==="NO_KEY"?"Add your API key in Settings → AI to generate narratives."
        :e.message==="RATE_LIMIT"?"Monthly AI limit reached."
        :"Could not connect. Try again.";
      setError(msg);
    }
    setGenerating(false);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
        <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.06em"}}>Annual Narrative</div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
          <span style={{fontSize:"0.65rem",color:pal.slate}}>{wordCount} words</span>
          {!compact&&<button onClick={generate} disabled={generating} style={{padding:"0.28rem 0.65rem",borderRadius:"8px",border:"none",background:generating?"#ccc":pal.accentGrad,color:"#fff",fontWeight:"700",fontSize:"0.7rem",cursor:generating?"default":"pointer"}}>
            {generating?"🔄 Writing...":"🤖 Generate"}
          </button>}
          {compact&&<button onClick={generate} disabled={generating} style={{padding:"0.22rem 0.5rem",borderRadius:"7px",border:"none",background:generating?"#ccc":`linear-gradient(135deg,${cp.c1},${cp.c2})`,color:"#fff",fontWeight:"700",fontSize:"0.62rem",cursor:generating?"default":"pointer"}}>
            {generating?"...":"🤖 AI"}
          </button>}
        </div>
      </div>
      {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem",padding:"0.5rem",background:"#faeae4",borderRadius:"8px"}}>{error}</div>}
      <textarea value={text} onChange={e=>save(e.target.value)}
        placeholder={"Write your annual narrative here, or use AI to generate one. Describe what "+ch.name+" studied this year, how they grew, highlights from each subject, and any notable achievements..."}
        rows={12}
        style={{width:"100%",padding:"0.75rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.8rem",fontFamily:"Georgia, serif",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.8}}
        onFocus={e=>e.target.style.borderColor=pal.primary}
        onBlur={e=>e.target.style.borderColor=pal.stone}/>
    </div>
  );
}

/* =======================================
   DAY SUMMARY MODAL
   Shown after marking a day complete
======================================= */
function DaySummaryModal({pal,family,data,portfolioEntries,onSave,onClose,onFinish}){
  const [step,      setStep]     = useState(0); // 0=summary 1=notes 2=photos 3=done
  const [notes,     setNotes]    = useState({}); // {childId: text}
  const [photos,    setPhotos]   = useState([]); // [{name,dataUrl}]
  const [generating,setGenerating]=useState(false);
  const [aiSummary, setAiSummary]=useState(null);
  const [aiError,   setAiError]  = useState(null);
  const fileInputRef = useRef(null);

  const blocks    = data.blocks || [];
  const dateLabel = data.dateLabel || "Today";
  const subjsDone = [...new Set(blocks.filter(b=>b.s!=="Break"&&b.s!=="Lunch").map(b=>b.s))];

  const handlePhotoUpload = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file=>{
      const reader = new FileReader();
      reader.onload = (ev) => {
        setPhotos(p=>[...p,{name:file.name,dataUrl:ev.target.result}]);
      };
      reader.readAsDataURL(file);
    });
  };

  const removePhoto = (i) => setPhotos(p=>p.filter((_,pi)=>pi!==i));

  const generateSummary = async () => {
    setGenerating(true); setAiError(null);
    const notesList = Object.entries(notes).map(([cid,n])=>{
      const ch = family.children.find(c=>c.id===cid);
      return ch&&n.trim() ? ch.name+": "+n : "";
    }).filter(Boolean).join(" | ");
    const subjList = subjsDone.join(", ");
    const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";
    const prompt = "Write a warm, encouraging 2-3 sentence daily summary for a homeschool family."
      + " Date: "+dateLabel+". School: "+schoolName+"."
      + " Subjects completed: "+subjList+"."
      + (notesList?" Student notes: "+notesList:"")
      + " Write in a celebratory, warm tone. Mention specific subjects. Under 80 words.";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})
      });
      const d = await res.json();
      const text = d.content?.map(b=>b.text||"").join("")||"";
      if(!text) throw new Error("empty");
      setAiSummary(text);
    } catch(e){
      setAiError("Could not generate — check your connection.");
    }
    setGenerating(false);
  };

  const [savedEntries, setSavedEntries] = useState(null); // holds built entries after save

  const buildEntries = () => {
    const entries = [];
    const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    family.children.forEach((ch,ci)=>{
      const childNote = notes[ch.id]||"";
      // 1. One clean entry per subject
      subjsDone.forEach(subj=>{
        const block = blocks.find(b=>b.s===subj);
        entries.push({
          childIdx:ci,
          title:subj+" — "+dateLabel,
          subj:subj,
          date:today,
          thumb:block?.i||"📋",
          note:"",
          isSubject:true,
        });
      });
      // 2. Separate daily notes entry
      const summaryNote = [
        childNote.trim(),
        aiSummary?"AI Summary: "+aiSummary:""
      ].filter(Boolean).join("\n\n");
      entries.push({
        childIdx:ci,
        title:"Day Notes — "+dateLabel,
        subj:"Daily Notes",
        date:today,
        thumb:"📝",
        note:summaryNote,
        subjects:subjsDone,
        photos:photos.map(p=>p.dataUrl),
        isDay:true,
        aiSummary:aiSummary||"",
      });
    });
    return entries;
  };

  const handleSave = () => {
    // Build entries and store them — do NOT call onSave yet
    // onSave fires when user taps a nav button on step 3
    const entries = buildEntries();
    setSavedEntries(entries);
    onSave(entries); // persist to localStorage now
    // Modal stays open — step 3 renders the confirmation
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:pal.sand,display:"flex",flexDirection:"column",maxWidth:"430px",margin:"0 auto",animation:"fadeIn 0.25s ease"}}>
      {/* Celebration header */}
      <div style={{background:pal.accentGrad,padding:"1.1rem 1.2rem 1rem",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
          <div style={{fontSize:"2rem",animation:"grow 0.4s ease"}}>🌟</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem"}}>Day Complete!</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,0.75)"}}>{"Great work — " + dateLabel}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"9px",padding:"0.3rem 0.65rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>{"< "}Home</button>
        </div>
      </div>

      {/* Step progress */}
      <div style={{display:"flex",gap:"3px",padding:"0.65rem 1.1rem 0",flexShrink:0}}>
        {["Subjects","Notes","Photos","Done"].map((l,i)=>(
          <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:"4px",borderRadius:"99px",background:i<=step?pal.primary:pal.stone+"40",marginBottom:"3px",transition:"background 0.3s"}}/>
            <div style={{fontSize:"0.58rem",color:i<=step?pal.primary:pal.stone,fontWeight:i===step?"700":"400"}}>{l}</div>
          </div>
        ))}
      </div>

      <div key={step} style={{flex:1,overflowY:"auto",padding:"1rem 1.1rem"}}>

        {/* Step 0: What you did */}
        {step===0 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.65rem"}}>{"Completed today"}</div>
            {subjsDone.length===0 ? (
              <div style={{color:pal.slate,fontSize:"0.82rem",textAlign:"center",padding:"1rem"}}>No subjects logged.</div>
            ) : subjsDone.map((s,i)=>{
              const block = blocks.find(b=>b.s===s);
              return (
                <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.75rem 0.9rem",display:"flex",gap:"0.75rem",alignItems:"center",border:`1.5px solid ${pal.good}30`,marginBottom:"0.45rem"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"10px",background:pal.goodBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{block?.i||"📋"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.86rem"}}>{s}</div>
                    {block?.dur&&<div style={{fontSize:"0.68rem",color:pal.slate}}>{block.dur} min</div>}
                  </div>
                  <span style={{color:pal.good,fontSize:"1.1rem"}}>✓</span>
                </div>
              );
            })}
            {/* AI Summary box */}
            <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1rem",marginTop:"0.75rem",border:`1.5px solid ${pal.primary}20`}}>
              <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem",marginBottom:"0.4rem"}}>✨ AI Day Summary</div>
              {aiSummary ? (
                <div style={{fontSize:"0.8rem",color:pal.ink,lineHeight:1.7}}>{aiSummary}</div>
              ) : generating ? (
                <div style={{display:"flex",gap:"4px",alignItems:"center",padding:"0.25rem 0"}}>
                  {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
                  <span style={{fontSize:"0.76rem",color:pal.slate,marginLeft:"0.4rem"}}>Writing your day summary...</span>
                </div>
              ) : (
                <div>
                  {aiError && <div style={{fontSize:"0.72rem",color:"#a03030",marginBottom:"0.4rem"}}>{aiError}</div>}
                  <button onClick={generateSummary} style={{padding:"0.4rem 1rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.76rem",cursor:"pointer"}}>Generate Summary</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Step 1: Student notes */}
        {step===1 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Student notes</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>{"Optional — add anything a child wants to remember about today."}</div>
            {family.children.map((c)=>(
              <div key={c.id} style={{marginBottom:"0.85rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"0.3rem"}}>
                  <span style={{fontSize:"1.2rem"}}>{c.avatar}</span>
                  <span style={{fontWeight:"700",color:pal.inkM,fontSize:"0.86rem"}}>{c.name}</span>
                </div>
                <textarea value={notes[c.id]||""} onChange={e=>setNotes(n=>({...n,[c.id]:e.target.value}))}
                  placeholder={"What did "+c.name+" enjoy or want to remember?"}
                  rows={3} style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
                  onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
              </div>
            ))}
          </div>
        )}

        {/* Step 2: Photos */}
        {step===2 && (
          <div style={{animation:"fadeUp 0.2s ease"}}>
            <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Add photos</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>Capture work, projects, or moments from today.</div>
            <input type="file" ref={fileInputRef} accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}}/>
            <button onClick={()=>fileInputRef.current?.click()}
              style={{width:"100%",padding:"1.1rem",border:`2px dashed ${pal.primary}50`,borderRadius:"16px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.86rem",cursor:"pointer",marginBottom:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
              <span style={{fontSize:"1.4rem"}}>📷</span><span>Choose Photos</span>
            </button>
            {photos.length>0 && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.55rem"}}>
                {photos.map((p,i)=>(
                  <div key={i} style={{position:"relative",borderRadius:"12px",overflow:"hidden",border:`1.5px solid ${pal.stone}40`}}>
                    <img src={p.dataUrl} alt={p.name} style={{width:"100%",height:"110px",objectFit:"cover",display:"block"}}/>
                    <button onClick={()=>removePhoto(i)}
                      style={{position:"absolute",top:"5px",right:"5px",width:"22px",height:"22px",borderRadius:"50%",background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:"0.7rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
                  </div>
                ))}
              </div>
            )}
            {photos.length===0 && <div style={{textAlign:"center",padding:"1rem",color:pal.stone,fontSize:"0.78rem",fontStyle:"italic"}}>No photos yet — totally optional!</div>}
          </div>
        )}

        {/* Step 3: Done — celebration + preview */}
        {step===3 && (

            </div>

            {/* What was saved */}
            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}}>
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.55rem"}}>What was saved</div>
