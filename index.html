function AIWorksheetModal({ pal, family, activeChild, wsType, onClose }) {
  const [topic,   setTopic]   = useState("");
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);

  const isCustom = wsType==="custom";
  const ws = isCustom ? {id:"custom",label:"Custom Worksheet",icon:""} : wsType;

  const generate = async () => {
    if(!topic.trim()) return;
    setLoading(true); setError(null);
    const child  = activeChild;
    const grade  = child?.grade||"elementary";
    const goals  = goalSummary(family);
    const curriculum = curriculumContext(family);
    const prompt = "Create a homeschool worksheet for a "+grade+" student.\n\n"
      + "Worksheet type: "+ws.label+"\n"
      + "Topic: "+topic+"\n"
      + "Student name: "+(child?.name||"Student")+"\n"
      + "Curriculum: "+curriculum+"\n"
      + "Family goals: "+goals+"\n\n"
      + "Let the family's goals subtly shape the content tone and examples where natural (e.g. if Faith & Character is a goal, use character-building scenarios; if Nature & Outdoors, use nature-based examples; if Strong Readers, include rich vocabulary).\n\n"
      + "Respond in this exact JSON format (no markdown, no backticks, just raw JSON):\n"
      + '{"title":"worksheet title","instructions":"one clear sentence of instructions",'
      + '"items":[{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"}],'
      + '"bonusChallenge":"one optional bonus challenge sentence"}'
      + "\n\nMake items age-appropriate for "+grade+". For copywork: provide beautiful sentences to copy. For narration: provide open-ended reflection prompts. For math: provide practice problems. For spelling: provide 8 words with a sentence each. For quiz: provide 5 questions with blank answer lines. Keep items concise and clear."

    try {
      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
    } catch(e) {
      setError("Couldn't generate worksheet right now. Try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(14px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -14px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{ws.icon} {ws.label}</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>{activeChild?.name||"Student"} - {activeChild?.grade||"All grades"}</div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          {!result&&!loading&&(<>
            <Lbl pal={pal}>What topic?</Lbl>
            <Input pal={pal} value={topic} onChange={setTopic}
              placeholder={ws.id==="copywork"?"e.g. Famous quotes about nature":ws.id==="math"?"e.g. Adding fractions":"e.g. Ancient Egypt"}
            />
            {error&&<div style={{marginTop:"0.65rem",padding:"0.7rem",background:pal.badBg,borderRadius:"10px",fontSize:"0.78rem",color:"#a03030"}}>{error}</div>}
            <div style={{height:"0.85rem"}}/>
          </>)}

          {loading&&(
            <div style={{textAlign:"center",padding:"2rem 0"}}>
              <div style={{fontSize:"3rem",marginBottom:"0.75rem",animation:"pulse 1.2s ease infinite"}}>{ws.icon}</div>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.95rem",marginBottom:"0.3rem"}}>Building your worksheet...</div>
              <div style={{fontSize:"0.78rem",color:pal.slate}}>This takes about 10 seconds</div>
            </div>
          )}

          {result&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              {/* Worksheet header */}
              <div style={{background:pal.parchm,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.3rem"}}>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.92rem",flex:1,paddingRight:"0.5rem"}}>{result.title}</div>
                  <span style={{fontSize:"0.68rem",fontWeight:"700",color:pal.primary,background:pal.pale,borderRadius:"50px",padding:"0.12rem 0.5rem",flexShrink:0}}>{ws.label}</span>
                </div>
                <div style={{display:"flex",gap:"1rem",fontSize:"0.7rem",color:pal.slate}}>
                  <span>Name: {activeChild?.name||"___________"}</span>
                  <span>Date: ___________</span>
                </div>
              </div>
              {/* Instructions */}
              <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.65,marginBottom:"0.85rem",fontStyle:"italic",padding:"0 0.2rem"}}>
                📌 {result.instructions}
              </div>
              {/* Items */}
              <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginBottom:"0.85rem"}}>
                {(result.items||[]).map((item,i)=>(
                  <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.8rem 0.95rem",border:`1.5px solid ${pal.stone}40`}}>
                    <div style={{display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
                      <div style={{width:"22px",height:"22px",borderRadius:"50%",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:"900",color:"#fff",flexShrink:0,marginTop:"1px"}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.6,marginBottom:"0.45rem"}}>{item.content}</div>
                        <div style={{borderBottom:`1px solid ${pal.stone}60`,height:"1px",marginBottom:"0.3rem"}}/>
                        <div style={{borderBottom:`1px solid ${pal.stone}35`,height:"1px"}}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {/* Bonus */}
              {result.bonusChallenge&&(
                <div style={{background:pal.pale,borderRadius:"12px",padding:"0.75rem 0.9rem",border:`2px solid ${pal.primary}25`,marginBottom:"0.5rem"}}>
                  <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.75rem",marginBottom:"0.2rem"}}>* Bonus Challenge</div>
                  <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.55}}>{result.bonusChallenge}</div>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {!result&&!loading&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Generate
              </button>
            </>
          )}
          {result&&(
            <>
              <button onClick={()=>{setResult(null);setTopic("");}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>New</button>
              <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Done
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}


function PortfolioScreen({pal,family,child,setChild,entries=[],onAddEntry,onEditEntry,attendanceDays=0,lastCheckinDate,onCheckin}){
  const [showDailyLog,   setShowDailyLog]   = useState(false);
  const [showAdd,        setShowAdd]        = useState(false);
  const [showAddExtra,   setShowAddExtra]   = useState(false);
  const [editEntry,      setEditEntry]      = useState(null);
  const [detailEntry,    setDetail]         = useState(null);
  const [expandedSubj,   setExpandedSubj]   = useState(null);
  const [showYearView,   setShowYearView]   = useState(false);
  const [dayDetail,      setDayDetail]      = useState(null);
  const [searchQuery,    setSearchQuery]    = useState("");
  const [showPrintMenu,  setShowPrintMenu]  = useState(false);
  const [showFullYearPrint, setShowFullYearPrint] = useState(false);
  const [printDate,         setPrintDate]         = useState(""); // date string for prior-day print
  const [showDatePicker,    setShowDatePicker]     = useState(false);

  const stateInfo = getStateInfo(family.state||"");
  const activeCi  = family.children.findIndex(c=>c.id===child);
  const activeCh  = activeCi>=0 ? family.children[activeCi] : family.children[0];
  const activeCiR = activeCi>=0 ? activeCi : 0;
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const childEntries = entries.filter(e=>e.childIdx===activeCiR);
  const subjEntries  = childEntries.filter(e=>!e.isDay && e.subj!=="Daily Notes");
  const readingEntries = subjEntries.filter(e=>e.subj==="Reading"||e.subj==="Reading/Language Arts"||e.subj==="Bible / Faith");
  const extraEntries = childEntries.filter(e=>e.isExtra||e.subj==="Extracurricular"||e.subj==="Co-op");
  const photoEntries = childEntries.filter(e=>e.photos&&e.photos.length>0);

  const bySubject = {};
  subjEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]={subj:e.subj,entries:[],hasPhotos:false};
    bySubject[e.subj].entries.push(e);
    if(e.photos&&e.photos.length>0) bySubject[e.subj].hasPhotos=true;
  });
  const subjectList = Object.values(bySubject).sort((a,b)=>b.entries.length-a.entries.length);
  const schoolName  = family.schoolName||(family.familyName+" Academy")||"Home School";

  if(showYearView) return <YearOverview pal={pal} family={family} activeCh={activeCh} cp={cp}
    entries={childEntries} attendanceDays={attendanceDays} onBack={()=>setShowYearView(false)}/>;

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Portfolio" sub={activeCh?.name||"Select a child"} icon="🗂"/>
      <FirstVisitTip pal={pal} screen="portfolio"/>
      <div style={{padding:"0 1rem"}}>

        {/* Child tabs */}
        <div style={{display:"flex",gap:"0",marginBottom:"0.85rem",background:pal.parchm,borderRadius:"13px",padding:"3px"}}>
          {family.children.map((c,i)=>{
            const isSel=i===activeCiR;
            const ccp=CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
            const cnt=entries.filter(e=>e.childIdx===i&&!e.isDay).length;
            return(
              <button key={c.id} onClick={()=>setChild(c.id)}
                style={{flex:1,padding:"0.5rem 0.3rem",border:"none",borderRadius:"10px",background:isSel?pal.linen:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",transition:"all 0.15s"}}>
                <div style={{fontSize:"1.3rem",lineHeight:1}}>{c.avatar}</div>
                <div style={{fontSize:"0.65rem",fontWeight:isSel?"800":"400",color:isSel?ccp.c1:pal.slate}}>{c.name}</div>
                <div style={{fontSize:"0.55rem",color:isSel?ccp.c1:pal.stone,fontWeight:"600"}}>{cnt}</div>
              </button>
            );
          })}
        </div>

        {/* ── STUDENT HEADER CARD ── */}
        <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,borderRadius:"16px",padding:"1rem 1.1rem",marginBottom:"0.85rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem",lineHeight:1.2}}>{activeCh?.name}</div>
            <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.82)",marginTop:"2px"}}>{activeCh?.grade} {"\u2022"} {schoolName}</div>
            <div style={{fontSize:"0.68rem",color:"rgba(255,255,255,0.65)",marginTop:"2px"}}>
              {family.yearStart&&family.yearEnd
                ? new Date(family.yearStart).getFullYear()+" \u2013 "+new Date(family.yearEnd).getFullYear()
                : new Date().getFullYear()+" \u2013 "+(new Date().getFullYear()+1)}

          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"2.8rem",lineHeight:1}}>{activeCh?.avatar}</div>
            <div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.7)",marginTop:"2px"}}>{subjEntries.length} entries</div>
          </div>
        </div>

        {/* ── ACTION ROW ── */}
        {(()=>{
          const todayDateStr = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});

          return (
            <div style={{display:"flex",gap:"0.45rem",marginBottom:"1rem"}}>
              <button onClick={()=>setShowDailyLog(true)}

                <span>{loggedToday?"✓":"+"}</span>
                <span>{loggedToday?"Logged Today":"Log Today"}</span>
              </button>
              <button onClick={()=>setShowAdd(true)}
                style={{flex:1,padding:"0.65rem 0.5rem",border:`2px solid ${pal.stone}50`,borderRadius:"12px",background:"transparent",color:pal.inkM,fontWeight:"700",fontSize:"0.78rem",cursor:"pointer"}}>
                Quick Add
              </button>
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>setShowPrintMenu(p=>!p)}
                  style={{padding:"0.65rem 0.75rem",border:"none",borderRadius:"12px",background:pal.primary,color:"#fff",fontWeight:"700",fontSize:"0.78rem",cursor:"pointer"}}>

                </button>
                {showPrintMenu&&(
                  <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:"#fff",borderRadius:"12px",border:`1.5px solid ${pal.stone}30`,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",zIndex:100,minWidth:"200px",overflow:"hidden"}}>
                    <button onClick={()=>{printPortfolioPDF(family,childEntries,activeCh,attendanceDays,stateInfo);setShowPrintMenu(false);}}
                      style={{width:"100%",padding:"0.65rem 0.9rem",border:"none",background:"transparent",color:pal.ink,fontSize:"0.78rem",fontWeight:"600",cursor:"pointer",textAlign:"left",display:"flex",gap:"0.5rem",alignItems:"center",borderBottom:`1px solid ${pal.stone}20`}}>
                      <span>{"📄"}</span><span>{"Today's log"}</span>
                    </button>
                    {(()=>{
                      const loggedDates = [...new Set(childEntries.filter(e=>!e.isDay&&e.date).map(e=>e.date))].slice(0,60);
                      return loggedDates.length>0?(
                        <div style={{borderBottom:`1px solid ${pal.stone}20`}}>
                          <div style={{padding:"0.45rem 0.9rem 0.25rem",fontSize:"0.64rem",fontWeight:"800",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.06em"}}>Prior days</div>
                          <div style={{maxHeight:"160px",overflowY:"auto"}}>
                            {loggedDates.map(dateStr=>(
                              <button key={dateStr} onClick={()=>{
                                printPortfolioPDF(family,childEntries,activeCh,attendanceDays,stateInfo,dateStr);
                                setShowPrintMenu(false);
                              }} style={{width:"100%",padding:"0.5rem 0.9rem",border:"none",background:"transparent",color:pal.ink,fontSize:"0.78rem",fontWeight:"500",cursor:"pointer",textAlign:"left",display:"flex",gap:"0.5rem",alignItems:"center"}}>
                                <span>{"📄"}</span><span>{dateStr}</span>
                              </button>
                            ))}
                          </div>
                        </div>

                    })()}
                    <button onClick={()=>{setShowPrintMenu(false);setShowFullYearPrint(true);}}
                      style={{width:"100%",padding:"0.65rem 0.9rem",border:"none",background:"transparent",color:pal.ink,fontSize:"0.78rem",fontWeight:"600",cursor:"pointer",textAlign:"left",display:"flex",gap:"0.5rem",alignItems:"center"}}>
                      <span>{"📚"}</span><span>{"Full year portfolio"}</span>

          <button onClick={()=>printEvaluatorLetter(family,activeCh,attendanceDays)}

          </button>
            </div>
          );
        })()}

        {/* ── SEARCH ── */}
        {subjEntries.length>10&&(
          <div style={{position:"relative",marginBottom:"0.85rem"}}>
            <span style={{position:"absolute",left:"0.75rem",top:"50%",transform:"translateY(-50%)",fontSize:"0.9rem",pointerEvents:"none"}}>{"🔍"}</span>
            <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
              placeholder={"Search entries, subjects, notes..."}
              style={{width:"100%",padding:"0.6rem 2rem 0.6rem 2.2rem",border:`1.5px solid ${searchQuery?pal.primary:pal.stone+"50"}`,borderRadius:"12px",fontSize:"0.83rem",background:pal.linen,color:pal.ink,outline:"none",fontFamily:"inherit"}}/>
            {searchQuery&&(
              <button onClick={()=>setSearchQuery("")}
                style={{position:"absolute",right:"0.6rem",top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",cursor:"pointer",color:pal.slate,fontSize:"0.9rem"}}>
                {"✕"}
              </button>
            )}
          </div>
        )}
        {searchQuery.trim()&&(()=>{
          const q=searchQuery.trim().toLowerCase();
          const results=subjEntries.filter(e=>
            (e.subj||"").toLowerCase().includes(q)||(e.title||"").toLowerCase().includes(q)||
            (e.note||"").toLowerCase().includes(q)||(e.readingTitle||"").toLowerCase().includes(q)||
            (e.date||"").toLowerCase().includes(q)
          ).slice(0,30);
          return (
            <div style={{marginBottom:"1rem"}}>
              <div style={{fontSize:"0.72rem",color:pal.slate,marginBottom:"0.5rem",fontWeight:"600"}}>
                {results.length===0?"No results":results.length+" result"+(results.length===1?"":"s")}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.38rem"}}>
                {results.map((e,i)=>{
                  const noteTxt=(e.note||"").replace("AI Summary: ","").trim();
                  return (
                    <div key={e.id||i} onClick={()=>setDetail(e)}
                      style={{background:"#fff",borderRadius:"13px",padding:"0.65rem 0.85rem",border:`1.5px solid ${pal.stone}20`,cursor:"pointer",display:"flex",gap:"0.6rem",alignItems:"center"}}>
                      <div style={{width:"36px",height:"36px",borderRadius:"9px",background:`${cp.c1}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>
                        {e.thumb||"📋"}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.35rem",marginBottom:"1px"}}>
                          <span style={{fontSize:"0.65rem",fontWeight:"700",color:cp.c1,background:cp.c1+"15",padding:"0.1rem 0.4rem",borderRadius:"20px",flexShrink:0}}>{e.subj}</span>
                          <span style={{fontSize:"0.62rem",color:pal.stone,flexShrink:0}}>{e.date}</span>
                        </div>
                        <div style={{fontWeight:"600",color:pal.ink,fontSize:"0.81rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.readingTitle||e.title}</div>

                      </div>
                      <span style={{color:pal.stone,fontSize:"0.8rem",flexShrink:0}}>{"›"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── YEAR OVERVIEW BUTTON ── */}
        <button onClick={()=>setShowYearView(true)}
          style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0.7rem 0.9rem",background:pal.linen,border:`1.5px solid ${pal.stone}30`,borderRadius:"13px",cursor:"pointer",marginBottom:"1rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.55rem"}}>
            <span style={{fontSize:"1.2rem"}}>{"📅"}</span>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem"}}>Year Overview</div>
              <div style={{fontSize:"0.64rem",color:pal.slate,marginTop:"1px"}}>{attendanceDays} days logged {"\u2022"} See what{"'"}s done {"&"} what{"'"}s left</div>
            </div>
          </div>
          <span style={{color:pal.stone,fontSize:"1rem"}}>{"›"}</span>
        </button>

        {/* ── SUBJECTS CARD ── */}
        {!searchQuery.trim()&&<PortfolioCard pal={pal} icon="📚" title="Subjects" count={subjEntries.length}>
          {subjectList.length===0 ? (
            <div style={{textAlign:"center",padding:"1.2rem 0.5rem"}}>
              <div style={{fontSize:"1.8rem",marginBottom:"0.35rem"}}>📖</div>
              <div style={{fontSize:"0.78rem",color:pal.slate}}>No subjects logged yet. Tap {"\""}Log Today{"\""}!</div>
            </div>
          ) : subjectList.map((sd)=>(
            <PortfolioSubjectRow key={sd.subj} sd={sd} cp={cp} pal={pal} family={family}
              expanded={expandedSubj===sd.subj}
              onToggle={()=>setExpandedSubj(expandedSubj===sd.subj?null:sd.subj)}
              onDetail={setDetail}/>
          ))}
        </PortfolioCard>}

        {!searchQuery.trim()&&<PortfolioCard pal={pal} icon="📖" title="Book List" count={readingEntries.length}
          note="Reading titles logged">
          {readingEntries.length===0 ? (
            <div style={{padding:"0.85rem 0",textAlign:"center"}}>
              <div style={{fontSize:"0.78rem",color:pal.slate}}>No books logged yet. Add reading entries above.</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:"0.3rem",paddingTop:"0.1rem"}}>
              {readingEntries.map((e,i)=>(
                <div key={e.id||i}
                  style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.45rem 0.6rem",borderRadius:"10px",background:"#fff",border:`1px solid ${pal.stone}20`}}>
                  <span style={{fontSize:"1rem",flexShrink:0}}>{"📖"}</span>
                  <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setDetail(e)}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.8rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.readingTitle||e.title}</div>
                    <div style={{fontSize:"0.62rem",color:pal.slate}}>{e.subj} {"\u2022"} {e.date}</div>
                  </div>
                  <button onClick={()=>setEditEntry(e)}
                    style={{padding:"0.2rem 0.5rem",border:`1.5px solid ${pal.stone}`,borderRadius:"7px",background:"transparent",color:pal.slate,fontSize:"0.65rem",fontWeight:"700",cursor:"pointer",flexShrink:0}}>
                    Edit
                  </button>
                </div>
              ))}
            </div>
          )}
        </PortfolioCard>}

        {!searchQuery.trim()&&(<>{/* ── PHOTOS CARD ── */}
        <PortfolioPhotosCard pal={pal} cp={cp} entries={photoEntries} onDetail={setDetail} onEdit={(e)=>setEditEntry(e)} onAdd={()=>setShowAdd(true)}/>

        {/* ── EXTRACURRICULARS CARD ── */}
        <PortfolioCard pal={pal} icon="🏆" title="Extracurriculars" count={extraEntries.length}>
          {extraEntries.length===0 ? (
            <div style={{padding:"0.5rem 0",textAlign:"center"}}>
              <div style={{fontSize:"0.78rem",color:pal.slate,marginBottom:"0.65rem"}}>Sports, music, co-op, field trips {"\u2014"} log them here.</div>
              <button onClick={()=>setShowAddExtra(true)}
                style={{padding:"0.42rem 1rem",border:`1.5px solid ${pal.primary}`,borderRadius:"10px",background:"transparent",color:pal.primary,fontSize:"0.76rem",fontWeight:"700",cursor:"pointer"}}>
                + Add Extracurricular
              </button>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:"0.3rem",paddingTop:"0.1rem"}}>
              <button onClick={()=>setShowAddExtra(true)}
                style={{padding:"0.32rem 0.75rem",border:`1.5px solid ${pal.primary}`,borderRadius:"20px",background:"transparent",color:pal.primary,fontSize:"0.72rem",fontWeight:"700",cursor:"pointer",marginBottom:"0.5rem",display:"inline-block"}}>
                + Add
              </button>
              {extraEntries.slice().reverse().map((e,i)=>(
                <div key={e.id||i}
                  style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.45rem 0.6rem",borderRadius:"10px",background:"#fff",border:`1px solid ${pal.stone}20`}}>
                  <span style={{fontSize:"1rem",flexShrink:0}}>{e.thumb||"🏆"}</span>
                  <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setDetail(e)}>
                    <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.8rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
                    <div style={{fontSize:"0.62rem",color:pal.slate}}>{e.date}</div>
                  </div>
                  <button onClick={()=>setEditEntry(e)}
                    style={{padding:"0.2rem 0.5rem",border:`1.5px solid ${pal.stone}`,borderRadius:"7px",background:"transparent",color:pal.slate,fontSize:"0.65rem",fontWeight:"700",cursor:"pointer",flexShrink:0}}>
                    Edit
                  </button>
                </div>
              ))}
            </div>
          )}
        </PortfolioCard>

        {/* ── ADDITIONAL NOTES ── */}
        {!searchQuery.trim()&&<MasteryCard pal={pal} family={family} child={activeCh} cp={cp}/>}
        <AdditionalNotes pal={pal} family={family} child={activeCh}/>
        </>)}

        {/* ── WORKSHEET REMINDER ── */}
        <div style={{background:"#fffbeb",border:"1.5px solid #f5c842",borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
          <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:"1px"}}>{"📎"}</span>
          <div>
            <div style={{fontWeight:"800",color:"#7a5500",fontSize:"0.82rem",marginBottom:"2px"}}>Add Worksheets to Your Binder</div>
            <div style={{fontSize:"0.72rem",color:"#a07020",lineHeight:1.55}}>When you print your portfolio, add completed worksheets, tests, and work samples behind each section. Physical evidence strengthens your portfolio for evaluation.</div>
          </div>
        </div>

        {/* ── STATE REMINDER ── */}
        <StateReminder pal={pal} stateInfo={stateInfo} state={family.state||""}/>

        <div style={{height:"1rem"}}/>
      </div>

      {showDailyLog&&<DailyPortfolioModal pal={pal} family={family} childIdx={activeCiR}
        stateInfo={stateInfo}
        onClose={()=>setShowDailyLog(false)}
        onSave={(newEntries)=>{
          if(onAddEntry) {
            newEntries.forEach(e=>onAddEntry(e));
          }
          onCheckin&&onCheckin();
          setShowDailyLog(false);
        }}/>}
      {showAdd&&<AddEntryModal pal={pal} family={family} onClose={()=>setShowAdd(false)}
        onSave={e=>{onAddEntry&&onAddEntry(e);setShowAdd(false);}}
        stateInfo={stateInfo}/>}
      {showAddExtra&&<AddExtraModal pal={pal} family={family}
        onClose={()=>setShowAddExtra(false)}
        onSave={entries=>{entries.forEach(e=>onAddEntry&&onAddEntry(e));setShowAddExtra(false);}}/>}
      {editEntry&&<AddEntryModal pal={pal} family={family} initialData={editEntry}
        onClose={()=>setEditEntry(null)}
        onSave={updated=>{onEditEntry&&onEditEntry(editEntry.id,updated);setEditEntry(null);}}
        stateInfo={stateInfo}/>}
      {detailEntry&&<EntryDetailModal pal={pal} family={family} entry={detailEntry}
        onClose={()=>setDetail(null)}
        onEdit={()=>{setEditEntry(detailEntry);setDetail(null);}}/>}
      {showFullYearPrint&&(
        <FullYearPrintModal
          pal={pal} family={family} child={activeCh} cp={cp}
          entries={childEntries} attendanceDays={attendanceDays}
          onClose={()=>setShowFullYearPrint(false)}
        />
      )}
    </div>
  );
}

/* ---- Portfolio Card wrapper ---- */
/* =======================================
   MASTERY CARD
======================================= */
function MasteryCard({pal, family, child, cp}) {
  const yearEnd = family.yearEnd||"";
  const MASTERY_KEY = "rootbloom_mastery_"+child.id+"_"+yearEnd;
  const [mastery, setMastery] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem(MASTERY_KEY)||"{}"); }catch(e){return {};}
  });
  const [expanded, setExpanded] = useState(false);
  const [activeTab, setActiveTab] = useState(null);
  const skills = EOY_SKILLS[child.grade]||EOY_SKILLS["5th"]||[];
  const cycle = (skill) => {
    const cur = mastery[skill]||null;
    const next = cur===null?"working":cur==="working"?"mastered":null;
    const updated = {...mastery};
    if(next===null) delete updated[skill]; else updated[skill]=next;
    setMastery(updated);
    try{ localStorage.setItem(MASTERY_KEY, JSON.stringify(updated)); }catch(e){}
  };
  const totalSkills   = skills.reduce((s,cat)=>s+cat.skills.length, 0);
  const masteredCount = Object.values(mastery).filter(v=>v==="mastered").length;
  const workingCount  = Object.values(mastery).filter(v=>v==="working").length;
  const pct = totalSkills>0 ? Math.round(masteredCount/totalSkills*100) : 0;
  const STATUS = {
    null:     {label:"\u2014",   bg:"transparent",  color:"#bbb",     border:"#e0e0e0"},
    working:  {label:"Working", bg:"#fff8e6",      color:"#b07800",  border:"#f5c842"},
    mastered: {label:"\u2713",  bg:cp.c1+"18",     color:cp.c1,      border:cp.c1+"50"},
  };
  if(!expanded) return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <button onClick={()=>setExpanded(true)}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.85rem 1rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <div style={{width:"40px",height:"40px",borderRadius:"11px",background:cp.c1+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{"🎯"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.85rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>
            {masteredCount>0||workingCount>0 ? masteredCount+" mastered · "+workingCount+" in progress · "+totalSkills+" total" : child.grade+" grade skills — tap to track"}
          </div>
        </div>
        {masteredCount>0&&<div style={{background:cp.c1+"18",borderRadius:"20px",padding:"0.1rem 0.5rem",flexShrink:0}}><span style={{fontWeight:"800",color:cp.c1,fontSize:"0.74rem"}}>{pct+"%"}</span></div>}
        <span style={{color:pal.slate,fontSize:"1rem",flexShrink:0}}>{"›"}</span>
      </button>
      {(masteredCount>0||workingCount>0)&&(
        <div style={{padding:"0 1rem 0.75rem"}}>
          <div style={{height:"6px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s ease"}}/>
          </div>
        </div>
      )}
    </div>
  );
  const currentCat = activeTab||skills[0]?.cat;
  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}12)`,padding:"0.85rem 1rem",display:"flex",alignItems:"center",gap:"0.65rem",borderBottom:`1px solid ${pal.stone}20`}}>
        <span style={{fontSize:"1.2rem"}}>{"🎯"}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>{masteredCount+" of "+totalSkills+" mastered · "+workingCount+" in progress"}</div>
        </div>
        <button onClick={()=>setExpanded(false)} style={{width:"26px",height:"26px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.8rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
      </div>
      <div style={{padding:"0.55rem 1rem 0"}}>
        <div style={{height:"5px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.65rem"}}>
          <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:"0",overflowX:"auto",padding:"0 0.75rem",borderBottom:`1px solid ${pal.stone}20`}}>
        {skills.map(cat=>(
          <button key={cat.cat} onClick={()=>setActiveTab(cat.cat)}
            style={{padding:"0.45rem 0.65rem",border:"none",borderBottom:`2px solid ${currentCat===cat.cat?cp.c1:"transparent"}`,background:"transparent",color:currentCat===cat.cat?cp.c1:pal.slate,fontWeight:currentCat===cat.cat?"800":"500",fontSize:"0.68rem",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {cat.cat}
          </button>
        ))}
      </div>
      <div style={{padding:"0.65rem 0.85rem"}}>
        <div style={{fontSize:"0.64rem",color:pal.slate,marginBottom:"0.5rem"}}>{"Tap to cycle: \u2014 \u2192 Working \u2192 Mastered"}</div>
        {(skills.find(c=>c.cat===currentCat)||skills[0])?.skills.map((skill,i)=>{
          const status = mastery[skill]||null;
          const st = STATUS[status];
          return (
            <button key={i} onClick={()=>cycle(skill)}
              style={{width:"100%",display:"flex",alignItems:"center",gap:"0.6rem",padding:"0.52rem 0.65rem",marginBottom:"0.28rem",borderRadius:"10px",border:`1.5px solid ${st.border}`,background:st.bg,cursor:"pointer",textAlign:"left",transition:"all 0.12s"}}>
              <div style={{width:"32px",height:"22px",borderRadius:"6px",border:`1.5px solid ${st.border}`,background:st.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:"0.7rem",fontWeight:"800",color:st.color}}>{st.label}</span>
              </div>
              <span style={{fontSize:"0.78rem",color:status==="mastered"?cp.c1:status==="working"?"#7a5500":pal.inkM,fontWeight:status?"600":"400",flex:1,textAlign:"left"}}>{skill}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =======================================
   QUICK CAPTURE MODAL
======================================= */
function QuickCaptureModal({pal, family, activeChildId, onClose, onSave, attendanceLog=[], onAttendanceAdd}) {
  const allSubjOptions = [...SUBJECT_OPTIONS, ...(family.customSubjects||[])];
  const activeSubjIds  = family.subjects||[];
  const activeSubjs    = activeSubjIds.map(id=>allSubjOptions.find(s=>s.id===id)).filter(Boolean);
  const allGoalObjs    = [...GOALS,...(family.customGoals||[])];
  const familyGoals    = (family.goals||[]).map(id=>allGoalObjs.find(g=>g.id===id)).filter(Boolean);
  const defaultCi = activeChildId && activeChildId!=="all"
    ? Math.max(0, family.children.findIndex(c=>c.id===activeChildId))
    : 0;
  const todayIso  = new Date().toISOString().slice(0,10);
  const [childIdx,     setChildIdx]     = useState(defaultCi);
  const [subj,         setSubj]         = useState(activeSubjs[0]?.label||"");
  const [note,         setNote]         = useState("");
  const [photos,       setPhotos]       = useState([]);
  const [saved,        setSaved]        = useState(false);
  const [captureDate,  setCaptureDate]  = useState(todayIso);
  const [lessonCount,  setLessonCount]  = useState(1);
  const [readingTitle, setReadingTitle] = useState("");
  const [goalsHit,     setGoalsHit]     = useState(new Set());
  const [showGoals,    setShowGoals]    = useState(false);
  const [savedEntryDate, setSavedEntryDate] = useState(null);
  const noteRef    = useRef(null);
  const galleryRef = useRef(null);
  const activeCh   = family.children[childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const isReading  = subj.toLowerCase().includes("read");
  const dateLabel  = captureDate===todayIso
    ? new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})
    : new Date(captureDate+", "+new Date().getFullYear()).toLocaleDateString("en-US",{month:"short",day:"numeric"});
  const displayDate = captureDate===todayIso
    ? new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})
    : new Date(captureDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

  useEffect(()=>{ setTimeout(()=>noteRef.current?.focus(), 150); },[]);

  const toggleGoal = (id) => setGoalsHit(prev=>{
    const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n;
  });

  const handlePhoto = (e) => {
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setPhotos(p=>[...p,{dataUrl:ev.target.result}]);
      r.readAsDataURL(file);
    });
    e.target.value="";
  };

  const handleSave = () => {
    if(!subj) return;
    const subjObj = allSubjOptions.find(s=>s.label===subj||s.id===subj);
    const entryDate = new Date(captureDate).toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const entry = {
      childIdx, subj,
      title: note.trim() ? note.trim().slice(0,80) : subj+"\u2014"+entryDate,
      note: note.trim(),
      thumb: subjObj?.icon||"📋",
      date: entryDate,
      photos: photos.map(p=>p.dataUrl),
      lessonCount,
      isSubject: true,
    };
    if(isReading && readingTitle.trim()) entry.readingTitle = readingTitle.trim();
    if(goalsHit.size>0) entry.goalsHit = [...goalsHit];
    onSave([entry]);
    setSavedEntryDate(entryDate);
    setSaved(true);
  };

  // Check if the saved date already has an attendance record
  const alreadyInAttendance = savedEntryDate
    ? attendanceLog.some(e=>e.date===savedEntryDate)
    : false;

  if(saved) return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:"430px",background:pal.goodBg,borderRadius:"22px 22px 0 0",padding:"1.6rem 1.5rem",animation:"slideUp 0.22s ease"}}>
        <div style={{textAlign:"center",marginBottom:alreadyInAttendance?"1rem":"0"}}>
          <div style={{fontSize:"2.5rem",marginBottom:"0.4rem"}}>{"✓"}</div>
          <div style={{fontWeight:"800",color:pal.good,fontSize:"1rem"}}>{"Captured!"}</div>
          <div style={{fontSize:"0.78rem",color:pal.inkM,marginTop:"4px"}}>{subj+" saved to "+activeCh?.name+"\u2019s portfolio \u00b7 "+displayDate+(lessonCount>1?" \u00b7 "+lessonCount+" lessons":"")}</div>
        </div>
        {!alreadyInAttendance&&onAttendanceAdd&&savedEntryDate&&(
          <div style={{background:"#fff",borderRadius:"14px",padding:"0.85rem 1rem",marginTop:"0.85rem",border:`1.5px solid ${pal.primary}25`}}>
            <div style={{fontSize:"0.78rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.5rem"}}>{"📋 Add to attendance record?"}</div>
            <div style={{fontSize:"0.7rem",color:pal.slate,marginBottom:"0.65rem",lineHeight:1.5}}>{savedEntryDate+" isn\u2019t in your attendance log yet."}</div>
            <div style={{display:"flex",gap:"0.45rem"}}>
              <button onClick={()=>{
                onAttendanceAdd({date:savedEntryDate,type:"School Day",note:"Added from Quick Capture"});
                onClose();
              }} style={{flex:1,padding:"0.52rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.78rem",cursor:"pointer"}}>
                {"Yes, add it"}
              </button>
              <button onClick={onClose}
                style={{padding:"0.52rem 0.85rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",background:"transparent",color:pal.slate,fontSize:"0.78rem",cursor:"pointer"}}>
                {"Skip"}
              </button>
            </div>
          </div>
        )}
        {(alreadyInAttendance||!onAttendanceAdd)&&(
          <div style={{marginTop:"0.5rem",textAlign:"center"}}>
            <button onClick={onClose} style={{fontSize:"0.74rem",color:pal.primary,background:"transparent",border:"none",cursor:"pointer",fontWeight:"700"}}>{"Done"}</button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:"430px",background:pal.linen,borderRadius:"24px 24px 0 0",animation:"slideUp 0.24s ease",paddingBottom:"env(safe-area-inset-bottom)",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"0.65rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone+"60"}}/>
        </div>
        <div style={{padding:"0.6rem 1.1rem 0.6rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.95rem"}}>{"✏️ Quick Capture"}</div>
          <button onClick={onClose} style={{width:"26px",height:"26px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0 1.1rem 1.1rem"}}>

          {/* Date row */}
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.75rem",background:pal.parchm,borderRadius:"10px",padding:"0.4rem 0.65rem",border:`1.5px solid ${pal.stone}40`}}>
            <span style={{fontSize:"0.8rem"}}>{"📅"}</span>
            <span style={{fontSize:"0.75rem",color:pal.inkM,fontWeight:"600",flex:1}}>
              {captureDate===todayIso ? "Today" : displayDate}
            </span>
            <input type="date" value={captureDate} max={todayIso}
              onChange={e=>setCaptureDate(e.target.value)}
              style={{border:"none",background:"transparent",fontSize:"0.72rem",color:pal.primary,fontWeight:"700",cursor:"pointer",outline:"none",fontFamily:"inherit"}}/>
          </div>

          {/* Child picker */}
          {family.children.length>1&&(
            <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.75rem",overflowX:"auto"}}>
              {family.children.map((c,i)=>{
                const ccp=CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                const sel=i===childIdx;
                return (
                  <button key={c.id} onClick={()=>setChildIdx(i)}
                    style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.3rem 0.65rem",border:`2px solid ${sel?ccp.c1:pal.stone+"40"}`,borderRadius:"20px",background:sel?ccp.c1+"18":"transparent",cursor:"pointer",flexShrink:0}}>
                    <span style={{fontSize:"1rem"}}>{c.avatar}</span>
                    <span style={{fontSize:"0.74rem",fontWeight:sel?"800":"500",color:sel?ccp.c1:pal.inkM}}>{c.name}</span>
                  </button>
                );
              })}
            </div>
          )}

          {/* Subject chips */}
          <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap",marginBottom:"0.75rem"}}>
            {activeSubjs.map(s=>{
              const sel=subj===s.label;
              return (
                <button key={s.id} onClick={()=>setSubj(s.label)}
                  style={{display:"flex",alignItems:"center",gap:"0.25rem",padding:"0.28rem 0.6rem",border:`2px solid ${sel?cp.c1:pal.stone+"40"}`,borderRadius:"20px",background:sel?cp.c1+"18":"transparent",cursor:"pointer",flexShrink:0}}>
                  <span style={{fontSize:"0.85rem"}}>{s.icon}</span>
                  <span style={{fontSize:"0.72rem",fontWeight:sel?"800":"500",color:sel?cp.c1:pal.inkM}}>{s.label}</span>
                </button>
              );
            })}
          </div>

          {/* Lesson count */}
          <div style={{marginBottom:"0.65rem"}}>
            <div style={{fontSize:"0.7rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>{"Lessons completed"}</div>
            <div style={{display:"flex",gap:"0.35rem"}}>
              {[1,2,3,4].map(n=>{
                const sel=lessonCount===n;
                return (
                  <button key={n} onClick={()=>setLessonCount(n)}
                    style={{flex:1,padding:"0.35rem 0",border:`2px solid ${sel?cp.c1:pal.stone+"40"}`,borderRadius:"9px",background:sel?cp.c1+"18":"transparent",color:sel?cp.c1:pal.inkM,fontWeight:sel?"800":"500",fontSize:"0.82rem",cursor:"pointer"}}>
                    {n}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Reading title — conditional */}
          {isReading&&(
            <div style={{marginBottom:"0.65rem"}}>
              <div style={{fontSize:"0.7rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>{"📖 Book / title read"}</div>
              <input value={readingTitle} onChange={e=>setReadingTitle(e.target.value)}
                placeholder={"e.g. Charlotte\u2019s Web, Ch. 4"}
                style={{width:"100%",padding:"0.5rem 0.7rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
                onFocus={e=>e.target.style.borderColor=cp.c1}
                onBlur={e=>e.target.style.borderColor=pal.stone}/>
            </div>
          )}

          {/* Notes */}
          <textarea ref={noteRef} value={note} onChange={e=>setNote(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&e.metaKey) handleSave();}}
            placeholder={"What did "+activeCh?.name+" do? (optional)"}
            rows={3}
            style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"13px",fontSize:"0.84rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6,marginBottom:"0.65rem"}}
            onFocus={e=>e.target.style.borderColor=cp.c1}
            onBlur={e=>e.target.style.borderColor=pal.stone}/>

          {/* Goals hit — collapsible */}
          {familyGoals.length>0&&(
            <div style={{marginBottom:"0.65rem"}}>
              <button onClick={()=>setShowGoals(g=>!g)}
                style={{display:"flex",alignItems:"center",gap:"0.4rem",background:"transparent",border:"none",cursor:"pointer",padding:"0",marginBottom:showGoals?"0.45rem":"0"}}>
                <span style={{fontSize:"0.7rem",fontWeight:"700",color:pal.inkM}}>{"🎯 Goals hit today"}</span>
                {goalsHit.size>0&&<span style={{fontSize:"0.65rem",fontWeight:"800",color:cp.c1,background:cp.c1+"18",padding:"0.1rem 0.4rem",borderRadius:"99px"}}>{goalsHit.size}</span>}
                <span style={{fontSize:"0.65rem",color:pal.slate}}>{showGoals?"▲":"▼"}</span>
              </button>
              {showGoals&&(
                <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap"}}>
                  {familyGoals.map(g=>{
                    const sel=goalsHit.has(g.id);
                    return (
                      <button key={g.id} onClick={()=>toggleGoal(g.id)}
                        style={{display:"flex",alignItems:"center",gap:"0.25rem",padding:"0.25rem 0.55rem",border:`2px solid ${sel?cp.c1:pal.stone+"40"}`,borderRadius:"20px",background:sel?cp.c1+"18":"transparent",cursor:"pointer"}}>
                        <span style={{fontSize:"0.8rem"}}>{g.icon||"🌿"}</span>
                        <span style={{fontSize:"0.68rem",fontWeight:sel?"800":"500",color:sel?cp.c1:pal.inkM}}>{g.label}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Photos */}
          {photos.length>0&&(
            <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.65rem",overflowX:"auto"}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:"relative",flexShrink:0}}>
                  <img src={p.dataUrl} alt="" style={{width:"54px",height:"54px",borderRadius:"9px",objectFit:"cover",border:`1.5px solid ${pal.stone}30`}}/>
                  <button onClick={()=>setPhotos(ps=>ps.filter((_,pi)=>pi!==i))}
                    style={{position:"absolute",top:"2px",right:"2px",width:"18px",height:"18px",borderRadius:"50%",background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:"0.55rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
                </div>
              ))}
            </div>
          )}

          {/* Bottom action row */}
          <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
            <input ref={galleryRef} type="file" accept="image/*" multiple onChange={handlePhoto} style={{display:"none"}}/>
            <button onClick={()=>galleryRef.current?.click()}
              style={{width:"44px",height:"44px",borderRadius:"12px",border:`2px solid ${pal.stone+"50"}`,background:"transparent",color:pal.slate,fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{"📷"}</button>
            <button onClick={handleSave} disabled={!subj}
              style={{flex:1,padding:"0.75rem",border:"none",borderRadius:"13px",background:subj?`linear-gradient(135deg,${cp.c1},${cp.c2})`:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:subj?"pointer":"default"}}>{"Save ✓"}</button>
          </div>
          <div style={{fontSize:"0.63rem",color:pal.stone,textAlign:"center",marginTop:"0.45rem"}}>
            {"Saves to "+activeCh?.name+"\u2019s portfolio \u00b7 "+displayDate+(lessonCount>1?" \u00b7 "+lessonCount+" lessons":"")}
          </div>
        </div>
      </div>
    </div>
  );
}

/* =======================================
   FULL YEAR PRINT MODAL
======================================= */
function FullYearPrintModal({pal, family, child, cp, entries, attendanceDays, onClose}) {
  const [aiSummary,  setAiSummary]  = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [error,      setError]      = useState(null);
  const [includeAI,  setIncludeAI]  = useState(true);
  const subjEntries = entries.filter(e=>!e.isDay&&e.subj!=="Daily Notes");
  const bySubject   = {};
  subjEntries.forEach(e=>{ if(!bySubject[e.subj]) bySubject[e.subj]=[]; bySubject[e.subj].push(e); });
  const subjectList   = Object.keys(bySubject).sort((a,b)=>bySubject[b].length-bySubject[a].length);
  const readingTitles = [...new Set(subjEntries.filter(e=>e.readingTitle).map(e=>e.readingTitle))];
  const generateSummary = async () => {
    setLoading(true); setError(null);
    const subjBreakdown = subjectList.map(s=>s+" ("+bySubject[s].length+")").join(", ");
    const notesSample   = subjEntries.filter(e=>(e.note||"").trim().length>20).slice(0,20).map(e=>e.subj+": "+((e.note||"").slice(0,120))).join(" | ");
    const yearStart = family.yearStart?new Date(family.yearStart).getFullYear():new Date().getFullYear();
    const yearEnd   = family.yearEnd?new Date(family.yearEnd).getFullYear():yearStart+1;
    const prompt = "You are writing a warm year-end summary for a homeschool portfolio.\n"
      +"Student: "+child.name+", "+child.grade+"\nSchool: "+(family.schoolName||family.familyName+" Academy")+"\n"
      +"Subjects: "+subjBreakdown+"\nDays logged: "+attendanceDays+"\n"
      +"Reading: "+(readingTitles.slice(0,8).join(", ")||"not recorded")+"\n"
      +"Work samples: "+notesSample+"\n\n"
      +"Respond ONLY in JSON (no markdown):\n"
      +'{"narrative":"2-3 warm sentences","accomplishments":["win 1","win 2","win 3","win 4"],"growthAreas":["area 1","area 2","area 3"],"readingHighlight":"one sentence","parentNote":"encouragement for parent"}';
    try {
      const raw = await callClaude(prompt);
      setAiSummary(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { setError("Could not generate — try again."); }
    setLoading(false);
  };
  const handlePrint = () => {
    printFullPortfolio(family, entries, child, attendanceDays, null, includeAI?aiSummary:null);
    onClose();
  };
  return (
    <div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:"430px",background:pal.linen,borderRadius:"24px 24px 0 0",animation:"slideUp 0.26s ease",maxHeight:"88vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"0.65rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone+"60"}}/>
        </div>
        <div style={{padding:"0.75rem 1.2rem 0.8rem",borderBottom:`1px solid ${pal.stone}30`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.95rem"}}>{"📚 Full Year Portfolio"}</div>
            <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px"}}>{child.name+" · "+child.grade}</div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.85rem"}}>{"✕"}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.2rem"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.5rem",marginBottom:"1rem"}}>
            {[{n:attendanceDays,l:"Days"},{n:subjEntries.length,l:"Entries"},{n:subjectList.length,l:"Subjects"}].map(({n,l})=>(
              <div key={l} style={{background:cp.c1+"12",borderRadius:"10px",padding:"0.6rem 0.5rem",textAlign:"center",border:`1px solid ${cp.c1}20`}}>
                <div style={{fontWeight:"800",color:cp.c1,fontSize:"1.1rem"}}>{n}</div>
                <div style={{fontSize:"0.63rem",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:pal.parchm,borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}25`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.6rem"}}>
              <div>
                <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{"✨ AI Year Summary"}</div>
                <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>{"Accomplishments, growth areas, reading"}</div>
              </div>
              <button onClick={()=>setIncludeAI(v=>!v)}
                style={{width:"42px",height:"24px",borderRadius:"12px",border:"none",background:includeAI?cp.c1:pal.stone+"60",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                <div style={{position:"absolute",top:"3px",left:includeAI?"21px":"3px",width:"18px",height:"18px",borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
              </button>
            </div>

/* ---- Year Overview ---- */
function YearOverview({pal,family,activeCh,cp,entries,attendanceDays,onBack}){
  const TOTAL_WEEKS = 40;
  const now = new Date();
  const yearStart = family.yearStart ? new Date(family.yearStart) : new Date(now.getFullYear(),7,1);
  const yearEnd   = family.yearEnd   ? new Date(family.yearEnd)   : new Date(now.getFullYear()+1,4,31);
  const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";

  // Build a map of week# => entry count
  const weekMap = {};
  entries.forEach(e=>{
    try{
      const d = new Date(e.date+", "+now.getFullYear());
      if(isNaN(d)) return;
      const diff = Math.floor((d-yearStart)/(7*24*60*60*1000));
      if(diff>=0&&diff<TOTAL_WEEKS){ weekMap[diff]=(weekMap[diff]||0)+1; }
    }catch(err){}
  });

  const msPerWeek = 7*24*60*60*1000;
  const currentWeek = Math.floor((now-yearStart)/msPerWeek);
  const REQUIRED = parseInt((getStateInfo(family.state||"").hours||"180").match(/\d+/)?.[0]||"180");
  const pct = REQUIRED ? Math.min(100,Math.round((attendanceDays/REQUIRED)*100)) : null;

  // Subject breakdown
  const bySubj = {};
  entries.filter(e=>!e.isDay&&e.subj!=="Daily Notes").forEach(e=>{
    bySubj[e.subj]=(bySubj[e.subj]||0)+1;
  });
  const subjList = Object.entries(bySubj).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>
          {"< Back"}
        </button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{activeCh?.avatar} {activeCh?.name} {"—"} Year Overview</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>{schoolName}</div>
        </div>
      </div>

      <div style={{padding:"0.85rem 1rem"}}>

        {/* Attendance bar */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.5rem"}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>School Year Progress</div>
            <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{pct!==null?pct+"% done":attendanceDays+" days"}</div>
          </div>
          {pct!==null&&(
            <div style={{height:"10px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.45rem"}}>
              <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.5s"}}/>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.69rem",color:pal.slate}}>
            <span><b style={{color:pal.ink}}>{attendanceDays}</b> days logged</span>
            {REQUIRED?(<>
              <span><b style={{color:pal.ink}}>{Math.max(0,REQUIRED-attendanceDays)}</b> days remaining</span>
              <span><b style={{color:pal.ink}}>{REQUIRED}</b> required</span>
            </>):(
              <span style={{fontStyle:"italic"}}>{family.state||"Your state"} has no day requirement</span>
            )}
          </div>
        </div>

        {/* 40-week grid */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>40-Week Grid</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"0.3rem",marginBottom:"0.7rem"}}>
            {Array.from({length:TOTAL_WEEKS},(_,w)=>{
              const count  = weekMap[w]||0;
              const isPast = w<currentWeek;
              const isCurr = w===currentWeek;
              const hasWork= count>0;
              const bg = isCurr
                ? cp.c1
                : hasWork
                  ? cp.c1+"55"
                  : isPast
                    ? "#f0ece6"
                    : pal.parchm;
              const textCol = isCurr?"#fff": hasWork?cp.c1 : isPast?"#ccc" : pal.stone;
              return (
                <div key={w} style={{aspectRatio:"1",borderRadius:"7px",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:`1.5px solid ${isCurr?cp.c1:hasWork?cp.c1+"40":"transparent"}`,transition:"all 0.15s"}}>
                  <div style={{fontSize:"0.52rem",fontWeight:isCurr||hasWork?"800":"400",color:textCol,lineHeight:1}}>{w+1}</div>
                  {count>0&&<div style={{fontSize:"0.45rem",color:isCurr?"rgba(255,255,255,0.8)":cp.c1,fontWeight:"700"}}>{count}</div>}
                </div>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",fontSize:"0.62rem",color:pal.slate}}>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1}}/>
              <span>This week</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1+"55"}}/>
              <span>Logged</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:"#f0ece6"}}/>
              <span>Past / no log</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:pal.parchm,border:`1px solid ${pal.stone}40`}}/>
              <span>Upcoming</span>
            </div>
          </div>
        </div>

        {/* Subject breakdown */}
        {subjList.length>0&&(
          <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>Subjects This Year</div>
            <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
              {subjList.map(([subj,cnt])=>{
                const maxCnt = subjList[0][1];
                const w = Math.max(8,Math.round((cnt/maxCnt)*100));
                return (
                  <div key={subj} style={{display:"flex",alignItems:"center",gap:"0.55rem"}}>
                    <div style={{width:"90px",fontSize:"0.73rem",color:pal.inkM,fontWeight:"600",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj}</div>
                    <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${w}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:"0.72rem",fontWeight:"800",color:cp.c1,minWidth:"22px",textAlign:"right",flexShrink:0}}>{cnt}</div>
                  </div>
                );
