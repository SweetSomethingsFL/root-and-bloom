}

/* ======= SKELETON SCREENS for other tabs ======= */

function ScheduleScreen({pal,family,child,setChild,onMarkComplete,onProgressUpdate}){
  const today = new Date();
  const todayDow = today.getDay();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - (todayDow===0?6:todayDow-1));
  const DAYS = ["Mon","Tue","Wed","Thu","Fri"].map((l,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return {l, d:d.getDate(), date:d.toDateString(), isToday:d.toDateString()===today.toDateString()};
  });
  const todayIdx = DAYS.findIndex(d=>d.isToday);
  const [selectedDay, setSelectedDay] = useState(Math.max(0,todayIdx));

  // Persist checked + skipped state in localStorage so partial progress saves across navigation
  const SCHED_KEY = "rootbloom_sched_v1";
  const loadSchedState = () => { try{const s=localStorage.getItem(SCHED_KEY);return s?JSON.parse(s):{checked:{},skipped:{},notes:{}};}catch(e){return{checked:{},skipped:{},notes:{}};}};
  const [schedState, setSchedState] = useState(()=>loadSchedState());
  const saveSchedState = (ns) => { try{localStorage.setItem(SCHED_KEY,JSON.stringify(ns));}catch(e){} };
  const [expandedNoteKey, setExpandedNoteKey] = useState(null); // which block has note open

  const checked = schedState.checked || {};
  const daySubjects = schedState.skipped || {};

  const setChecked = (updFn) => setSchedState(prev=>{
    const ns = {...prev, checked:{...updFn(prev.checked||{})}};
    saveSchedState(ns); return ns;
  });
  const setSubjectNote = (key, val) => setSchedState(prev=>{
    const ns = {...prev, notes:{...(prev.notes||{}),[key]:val}};
    saveSchedState(ns); return ns;
  });
  const subjectNotes = schedState.notes || {};
  const setDaySubjects = (updFn) => setSchedState(prev=>{
    const ns = {...prev, skipped:{...updFn(prev.skipped||{})}};
    saveSchedState(ns); return ns;
  });

  const allBlocks = generateSchedule(family);
  const toggleBlock = (di, bi) => {
    const key = di+"_"+bi;
    setChecked(c=>({...c,[key]:!c[key]}));
  };
  const skipBlock = (e, di, bi) => {
    e.stopPropagation();
    setDaySubjects(prev=>{
      const dayMap = prev[di]||{};
      return {...prev,[di]:{...dayMap,[bi]:!dayMap[bi]}};
    });
  };
  const checkAll = (di) => {
    const updates = {};
    allBlocks.forEach((b,bi)=>{ if(!(daySubjects[di]||{})[bi]) updates[di+"_"+bi]=true; });
    setChecked(c=>({...c,...updates}));
  };
  const uncheckAll = (di) => {
    const updates = {};
    allBlocks.forEach((_,bi)=>{ updates[di+"_"+bi]=false; });
    setChecked(c=>({...c,...updates}));
  };

  const visibleBlocks = allBlocks.filter((b,bi)=>!(daySubjects[selectedDay]||{})[bi]);
  const filteredByChild = visibleBlocks.filter(b=>child==="all"||b.c==="all"||b.c===child);
  const checkedCount = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi] && checked[selectedDay+"_"+bi]).length;
  const allDone = checkedCount===filteredByChild.length && filteredByChild.length>0;

  // Report progress to parent (home screen)
  useEffect(()=>{
    if(onProgressUpdate && DAYS[selectedDay]?.isToday) {
      onProgressUpdate(checkedCount, filteredByChild.length);
    }
  },[checkedCount, filteredByChild.length, selectedDay]);
  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Schedule" sub={new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})} icon="📅"/>
      <div style={{padding:"0 1rem"}}>
        {/* Child filter */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.9rem",overflowX:"auto"}}>
          <Chip pal={pal} label="All" active={child==="all"} onClick={()=>setChild("all")}/>
          {family.children.map(c=><Chip key={c.id} pal={pal} label={c.avatar+" "+c.name} active={child===c.id} onClick={()=>setChild(c.id)}/>)}
        </div>
        {/* Day strip - real dates */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"1rem"}}>
          {DAYS.map((d,i)=>(
            <button key={i} onClick={()=>setSelectedDay(i)} style={{flex:1,padding:"0.55rem 0",borderRadius:"12px",border:`2px solid ${i===selectedDay?pal.primary:d.isToday?pal.primary+"40":pal.stone+"55"}`,background:i===selectedDay?pal.primary:"transparent",cursor:"pointer",textAlign:"center",transition:"all 0.14s"}}>
              <div style={{fontSize:"0.58rem",fontWeight:"600",color:i===selectedDay?"rgba(255,255,255,0.7)":d.isToday?pal.primary:pal.slate,marginBottom:"2px"}}>{d.l}</div>
              <div style={{fontSize:"0.9rem",fontWeight:"800",color:i===selectedDay?pal.onDark:pal.inkM}}>{d.d}</div>
            </button>
          ))}
        </div>

        {/* Today tip - only show on today */}
        {DAYS[selectedDay]?.isToday && (
          <div style={{background:pal.pale,borderRadius:"13px",padding:"0.65rem 1rem",marginBottom:"0.85rem",border:`2px solid ${pal.primary}22`,display:"flex",gap:"0.65rem",alignItems:"center"}}>
            <span style={{fontSize:"1.1rem",flexShrink:0}}>🌱</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem"}}>{"Today's checklist"}</div>
              <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"1px"}}>Tap items to check them off. Skip any you are not doing today.</div>
            </div>
          </div>
        )}

        {/* Block list */}
        {filteredByChild.length===0 && (
          <div style={{textAlign:"center",padding:"2rem 1rem",color:pal.slate,fontSize:"0.82rem"}}>No subjects for this day yet.</div>
        )}
        {allBlocks.map((b, bi)=>{
          const skipped = (daySubjects[selectedDay]||{})[bi];
          const blockKey = selectedDay+"_"+bi;
          const done = !!checked[blockKey];
          const hiddenByChild = !(child==="all"||b.c==="all"||b.c===child);
          if(hiddenByChild) return null;
          const noteKey = selectedDay+"_"+bi+"_note";
          const noteOpen = expandedNoteKey===blockKey;
          const hasNote  = !!(subjectNotes[noteKey]&&subjectNotes[noteKey].trim());
          return (
            <div key={bi} style={{marginBottom:"0.5rem",opacity:skipped?0.38:1,transition:"opacity 0.2s"}}>
              <div style={{background:done?pal.pale:pal.linen,borderRadius:noteOpen?"14px 14px 0 0":"14px",border:`2px solid ${done?pal.primary+"40":pal.stone+"18"}`,position:"relative",overflow:"hidden",transition:"all 0.14s"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:"4px",background:done?pal.accentGrad:skipped?pal.stone+"40":pal.stone+"60"}}/>
                <div onClick={()=>!skipped&&toggleBlock(selectedDay,bi)}
                  style={{padding:"0.85rem 1rem",display:"flex",gap:"0.85rem",alignItems:"center",cursor:skipped?"default":"pointer"}}>
                  <div style={{width:"40px",height:"40px",borderRadius:"11px",background:b.lifeReady?(done?LR_COLOR+"33":LR_COLOR+"18"):(done?pal.primary+"22":pal.pale),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.25rem",flexShrink:0,border:b.lifeReady?`2px solid ${LR_COLOR}40`:"none"}}>{b.i}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"700",color:done?(b.lifeReady?LR_COLOR:pal.primary):skipped?pal.stone:pal.ink,fontSize:"0.88rem",textDecoration:done?"line-through":skipped?"line-through":"none"}}>{b.s}</div>
                    <div style={{fontSize:"0.72rem",color:b.lifeReady?LR_COLOR:pal.slate,fontWeight:b.lifeReady?"600":"400"}}>{b.t?h12(b.t)+" · ":""}{b.dur} min{b.isLesson?" · Lesson":b.isPractice?" · Practice":""}</div>
                    {hasNote&&!noteOpen&&<div style={{fontSize:"0.65rem",color:pal.primary,marginTop:"2px",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {subjectNotes[noteKey]}</div>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();skipBlock(e,selectedDay,bi);}}
                    style={{padding:"0.18rem 0.5rem",borderRadius:"8px",border:`1.5px solid ${skipped?pal.warn:pal.stone+"60"}`,background:"transparent",color:skipped?pal.warn:pal.stone,fontSize:"0.62rem",fontWeight:"700",cursor:"pointer",flexShrink:0}}>
                    {skipped?"restore":"skip"}
                  </button>
                  {/* Note button */}
                  {!skipped&&<button onClick={e=>{e.stopPropagation();setExpandedNoteKey(noteOpen?null:blockKey);}}

          </div>
        </div>

        {/* Mark complete - glows when all done */}
        <button
          onClick={()=>{

            const completedBlocks = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi]&&checked[selectedDay+"_"+bi]);
            onMarkComplete({
              blocks:completedBlocks,
              date:DAYS[selectedDay]?.date||new Date().toDateString(),

          {allDone ? "🌟 Day complete — see summary" : "Check off subjects above to finish the day"}
        </button>
        <div style={{height:"1rem"}}/>
      </div>
    </div>
  );
}

/* ---- AI Rate Limiter ---- */
const AI_KEY = ""; // TODO: Add your Anthropic API key here (sk-ant-...)
const AI_LIMIT_KEY = "rootbloom_ai_limits";
const AI_MONTHLY_LIMIT = 50; // max AI calls per month — change as needed

function checkAILimit(limitOverride) {
  try {
    const now = new Date();
    const monthKey = now.getFullYear()+"-"+(now.getMonth()+1);
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    const count = stored[monthKey]||0;
    const limit = limitOverride || (() => { try{ return parseInt(localStorage.getItem("rootbloom_ailimit")||String(AI_MONTHLY_LIMIT)); }catch(e){return AI_MONTHLY_LIMIT;} })();
    return { allowed: count < limit, used: count, limit, monthKey };
  } catch(e) { return { allowed: true, used: 0, limit: AI_MONTHLY_LIMIT, monthKey:"" }; }
}
function incrementAILimit(monthKey) {
  try {
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    stored[monthKey] = (stored[monthKey]||0) + 1;
    // Clean up old months
    const now = new Date();
    const current = now.getFullYear()+"-"+(now.getMonth()+1);
    Object.keys(stored).forEach(k=>{ if(k!==current) delete stored[k]; });
    localStorage.setItem(AI_LIMIT_KEY, JSON.stringify(stored));
  } catch(e) {}
}

async function callClaude(prompt) {
  const runtimeKey = (() => { try{ return localStorage.getItem("rootbloom_apikey")||AI_KEY; }catch(e){return AI_KEY;} })();
  const runtimeLimit = (() => { try{ return parseInt(localStorage.getItem("rootbloom_ailimit")||"50"); }catch(e){return 50;} })();
  if(!runtimeKey) throw new Error("NO_KEY");
  const { allowed, monthKey } = checkAILimit(runtimeLimit);
  if(!allowed) throw new Error("RATE_LIMIT");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":runtimeKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5-20251001",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}],
    }),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  incrementAILimit(monthKey);
  return data.content?.map(b=>b.text||"").join("") || "";
}

      {/* Worksheet Builder Modal */}
      {showWS && (
        <AIWorksheetModal
          pal={pal} family={family} activeChild={activeChild}
          wsType={showWS}
          onClose={()=>setShowWS(false)}
        />
      )}
    </div>
  );
}


/* =======================================
   AI CHAT MODAL - persistent assistant
   Calls Claude API live for any request
======================================= */
function AIChatModal({ pal, family, onClose }) {
  const [messages, setMessages] = useState([
    { role:"assistant", content:`Hi! I'm your Root & Bloom assistant 🌱\n\nI can help you create **worksheets**, **lesson plans**, **unit studies**, **discussion questions**, or anything else for your homeschool. Just tell me what you need!\n\nTry something like:\n* "Make a worksheet on fractions for 4th grade"\n* "Write a nature journal prompt for my 7-year-old"\n* "Plan a 3-day unit on the American Revolution"` }
  ]);
  const [input,    setInput]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  const childNames = (family?.children||[]).map(c=>`${c.name} (${c.grade})`).join(", ");
  const philosophies = Array.isArray(family?.curriculumStyle)
    ? family.curriculumStyle.join(", ")
    : (family?.curriculumStyle || "eclectic");

  useEffect(() => {
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if(!AI_KEY){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"AI features need an API key. Ask your app admin to add one in settings."}]);setInput("");return;}
    const {allowed,used,limit} = checkAILimit();
    if(!allowed){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"Monthly AI limit of "+limit+" uses reached. Resets next month!"}]);setInput("");return;}
    setInput("");
    const userMsg = {role:"user", content:text};
    const updated = [...messages, userMsg];
    setMessages(updated);
    setLoading(true);
    try {
      const history = updated.map(m=>({role:m.role, content:m.content}));
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":AI_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-5-20251001",
          max_tokens:1500,
          system:"You are a warm, creative homeschool assistant for Root & Bloom app. You help homeschool families with worksheets, lesson plans, unit studies, discussion questions, project ideas, and any educational content they need.\n\n"
            +"Family info:\n"
            +"- Children: "+(childNames||"not specified")+"\n"
            +"- Learning philosophy: "+philosophies+"\n"
            +"- Curriculum programs: "+((family?.curriculumBrands||[]).join(", ")||"not specified")+"\n"
            +"- State: "+(family?.state||"not specified")+"\n"
            +"- Goals: "+((family?.goals||[]).join(", ")||"not specified")+"\n\n"
            +"When creating worksheets or lesson plans, format them clearly with headers, questions numbered, and age-appropriate content. Be warm, encouraging, and practical. Keep responses focused and useful - not overly long.",
          messages:history
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response. Please try again.";
      setMessages(m=>[...m,{role:"assistant",content:reply}]);
    } catch(e) {
      const msg = e.message==="NO_KEY"
        ? "AI features need an API key. Add your key in the app settings."
        : e.message==="RATE_LIMIT"
        ? "Monthly AI limit reached (50 uses). Reset next month or update the limit in settings."
        : "Something went wrong. Please check your connection and try again.";
      setMessages(m=>[...m,{role:"assistant",content:msg}]);
    }
    setLoading(false);
  };

  const handleKey = e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }};

  const QUICK = [
    "Make a worksheet for today",
    "Give me a fun project idea",
    "Write discussion questions",
    "Plan a lesson on nature",
  ];

  const renderMessage = (text) => {
    return text.split("\n").map((line,i)=>{
      const bold = line.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
      return <div key={i} style={{marginBottom:line===""?"0.4rem":"0"}} dangerouslySetInnerHTML={{__html:bold||"&nbsp;"}} />;
    });
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",background:pal.sand,maxWidth:"430px",margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:pal.heroGrad,padding:"0.9rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <div style={{width:"38px",height:"38px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:"#fff",fontSize:"0.95rem"}}>AI Assistant</div>
          <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.65)"}}>Worksheets, lessons, projects & more</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"8px",padding:"0.3rem 0.65rem",color:"#fff",cursor:"pointer",fontSize:"0.8rem",fontWeight:"700"}}>x</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant" && (
              <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem",flexShrink:0,marginRight:"0.5rem",alignSelf:"flex-end",marginBottom:"2px"}}></div>
            )}
            <div style={{
              maxWidth:"82%",padding:"0.65rem 0.9rem",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
              background:m.role==="user"?pal.accentGrad:pal.linen,
              color:m.role==="user"?pal.onDark:pal.ink,
              fontSize:"0.82rem",lineHeight:1.6,
              border:m.role==="assistant"?`1px solid ${pal.stone}50`:"none"
            }}>
              {renderMessage(m.content)}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
            <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem"}}></div>
            <div style={{background:pal.linen,border:`1px solid ${pal.stone}50`,borderRadius:"16px 16px 16px 4px",padding:"0.65rem 0.9rem"}}>
              <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,opacity:0.4,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
              </div>
            </div>
          </div>
        )}
        {/* Quick prompts - show only at start */}
        {messages.length===1 && !loading && (
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginTop:"0.25rem"}}>
            {QUICK.map(q=>(
              <button key={q} onClick={()=>{setInput(q); setTimeout(()=>inputRef.current?.focus(),50);}}
                style={{padding:"0.4rem 0.75rem",border:`1.5px solid ${pal.primary}40`,borderRadius:"20px",background:pal.pale,color:pal.primary,fontSize:"0.74rem",fontWeight:"600",cursor:"pointer"}}>
                {q}
              </button>
            ))}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"0.75rem 1rem",borderTop:`1.5px solid ${pal.stone}40`,background:pal.linen,flexShrink:0}}>
        <div style={{display:"flex",gap:"0.5rem",alignItems:"flex-end"}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Ask me anything... worksheet, lesson plan, project idea..."
            rows={2}
            style={{flex:1,resize:"none",padding:"0.6rem 0.8rem",border:`1.5px solid ${pal.stone}60`,borderRadius:"12px",background:"#fff",fontSize:"0.82rem",fontFamily:"inherit",color:pal.ink,outline:"none",lineHeight:1.5}}
          />
          <button onClick={send} disabled={!input.trim()||loading}
            style={{width:"40px",height:"40px",borderRadius:"50%",border:"none",background:input.trim()&&!loading?pal.accentGrad:"#ccc",color:"#fff",fontSize:"1rem",cursor:input.trim()&&!loading?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
            >
          </button>
        </div>
        <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"0.4rem",textAlign:"center"}}>Press Enter to send - Shift+Enter for new line</div>
      </div>
      <style>{`@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

/* =======================================
   AI UNIT BUILDER MODAL - 3-step wizard
   Calls Claude API live
======================================= */
function AIUnitBuilderModal({ pal, family, activeChild, onSave, onClose }) {
  const [step,     setStep]     = useState(0); // 0=subject 1=details 2=generating 3=result
  const [subject,  setSubject]  = useState(null);
  const [topic,    setTopic]    = useState("");
  const [duration, setDuration] = useState("6 weeks");
  const [notes,    setNotes]    = useState("");
  const [result,   setResult]   = useState(null);
  const [error,    setError]    = useState(null);
  const [dots,     setDots]     = useState(".");

  // Animate dots while generating
  useState(()=>{
    if(step!==2) return;
    const t=setInterval(()=>setDots(d=>d.length>=3?".":"d.+."), 600);
    return ()=>clearInterval(t);
  },[step]);

  const generate = async () => {
    if(!subject||!topic.trim()) return;
    setStep(2);
    setError(null);
    const child = activeChild;
    const style = family.curriculumStyle||"classical";
    const goals = (family.goals||[]).slice(0,4).join(", ")||"well-rounded education";
    const prompt = "You are a homeschool curriculum assistant. Create a concise unit study plan for a homeschool family.\n\n"
      + "Student: "+(child?.name||"Student")+", "+(child?.grade||"elementary")+" grade\n"
      + "Curriculum approach: "+style+"\n"
      + "Subject: "+subject.label+"\n"
      + "Topic: "+topic+"\n"
      + "Duration: "+duration+"\n"
      + "Family goals: "+goals+"\n"
      + (notes?"Special notes: "+notes+"\n":"")
      + "\nRespond in this exact JSON format (no markdown, no backticks, just raw JSON):\n"
      + '{\n  \"title\": \"unit title (5-8 words)\",\n  \"overview\": \"2-3 sentence engaging overview\",\n'
      + '  \"weeklyPlan\": [\n    {\"week\": 1, \"focus\": \"focus area\", \"activities\": [\"activity 1\", \"activity 2\", \"activity 3\"], \"resources\": \"suggested books or materials\"},\n'
      + '    {\"week\": 2, \"focus\": \"focus area\", \"activities\": [\"activity 1\", \"activity 2\", \"activity 3\"], \"resources\": \"suggested books or materials\"}\n  ],\n'
      + '  \"keySkills\": [\"skill 1\", \"skill 2\", \"skill 3\"],\n  \"assessmentIdeas\": [\"idea 1\", \"idea 2\"]\n}'
      + "\n\nInclude only the first 3 weeks in weeklyPlan. Keep each activity description under 12 words."

    try {
      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
      setStep(3);
    } catch(e) {
      setError("Couldn't connect to AI right now. Check your connection and try again.");
      setStep(1);
    }
  };

  const handleSave = () => {
    if(!result||!subject) return;
    const subj = SUBJECTS.find(s=>s.id===subject.id);
    onSave({
      subject:subject.label,
      icon:subject.icon,
      title:result.title,
      weeks:parseInt(duration)||6,
      weeksDone:0,
      plan:result.overview+"\n\n"+result.weeklyPlan.map(w=>`Week ${w.week}: ${w.focus}\n${w.activities.map(a=>"* "+a).join("\n")}`).join("\n\n"),
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(14px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -14px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>
        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        {/* Header */}
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}> AI Unit Builder</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>
              {["Pick a subject","Details","Generating...","Your unit plan"][step]}
            </div>
          </div>
          {step!==2&&<button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>}

            <div style={{fontSize:"0.8rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.6}}>
              What subject are we building a unit for{activeChild?` for ${activeChild.name}`:""}?

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem"}}>

          {/* Step 1 - Details */}
          {step===1&&(<>
            <div style={{display:"flex",alignItems:"center",gap:"0.65rem",padding:"0.75rem",background:pal.pale,borderRadius:"13px",marginBottom:"1rem",border:`2px solid ${pal.primary}20`}}>
              <span style={{fontSize:"1.5rem"}}>{subject?.icon}</span>
              <span style={{fontWeight:"700",color:pal.primary,fontSize:"0.88rem"}}>{subject?.label}</span>

            <Lbl pal={pal}>Topic or title</Lbl>

            <Lbl pal={pal}>Duration</Lbl>
            <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>

              onBlur={e=>e.target.style.borderColor=pal.stone}

          </>)}

          {/* Step 2 - Generating */}
          {step===2&&(
            <div style={{textAlign:"center",padding:"2rem 1rem",animation:"fadeIn 0.3s ease"}}>
              <div style={{fontSize:"3.5rem",marginBottom:"1rem",animation:"pulse 1.4s ease infinite"}}></div>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"1.1rem",marginBottom:"0.5rem"}}>Building your unit{dots}</div>
              <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.7,marginBottom:"1.5rem"}}>

              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
                {["Picking key themes & skills","Planning weekly activities","Selecting resources","Writing your overview"].map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.5rem 0.75rem",background:pal.pale,borderRadius:"10px",animation:`fadeUp 0.3s ease ${i*0.12}s both`}}>
                    <div style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,animation:"pulse 1.2s ease infinite",animationDelay:`${i*0.2}s`,flexShrink:0}}/>

            </div>

          {/* Step 3 - Result */}
          {step===3&&result&&(
            <div style={{animation:"fadeUp 0.25s ease"}}>
              {/* Title & overview */}
              <div style={{background:pal.heroGrad,borderRadius:"18px",padding:"1.1rem 1.2rem",marginBottom:"1rem",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",right:"-20px",top:"-20px",width:"80px",height:"80px",borderRadius:"50%",background:"rgba(255,255,255,0.07)"}}/>
                <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.55rem",position:"relative"}}>
                  <span style={{fontSize:"1.4rem"}}>{subject?.icon}</span>
                  <div>
                    <div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:"700"}}>{subject?.label} - {duration}</div>
                    <div style={{fontWeight:"900",color:"#fff",fontSize:"1rem",lineHeight:1.2}}>{result.title}</div>
                  </div>
                </div>
                <div style={{fontSize:"0.8rem",color:"rgba(255,255,255,0.8)",lineHeight:1.7,position:"relative"}}>{result.overview}</div>
              </div>

              {/* Key skills */}
              <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}45`}}>
                <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.55rem"}}>Key Skills</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                  {(result.keySkills||[]).map((sk,i)=>(
                    <span key={i} style={{padding:"0.22rem 0.65rem",background:pal.pale,borderRadius:"50px",fontSize:"0.74rem",fontWeight:"700",color:pal.primary}}>{sk}</span>
                  ))}
                </div>
              </div>

              {/* Weekly plan */}
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.55rem"}}>Weekly Plan</div>
              {(result.weeklyPlan||[]).map((w,i)=>(
                <div key={i} style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.5rem",border:`1.5px solid ${pal.stone}40`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
                    <span style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>Week {w.week}</span>
                    <span style={{fontSize:"0.72rem",fontWeight:"700",color:pal.primary,background:pal.pale,padding:"0.1rem 0.5rem",borderRadius:"50px"}}>{w.focus}</span>
                  </div>
                  {w.activities.map((a,j)=>(
                    <div key={j} style={{display:"flex",gap:"0.5rem",alignItems:"flex-start",marginBottom:"0.3rem"}}>
                      <div style={{width:"5px",height:"5px",borderRadius:"50%",background:pal.primary,flexShrink:0,marginTop:"6px"}}/>
                      <span style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.5}}>{a}</span>
                    </div>
                  ))}
                  {w.resources&&<div style={{marginTop:"0.5rem",fontSize:"0.72rem",color:pal.slate,fontStyle:"italic"}}>📚 {w.resources}</div>}
                </div>
              ))}

              {/* Assessment ideas */}
              {result.assessmentIdeas&&result.assessmentIdeas.length>0&&(
                <div style={{background:pal.pale,borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.primary}20`}}>
                  <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.45rem"}}>Assessment Ideas</div>
                  {result.assessmentIdeas.map((a,i)=>(
                    <div key={i} style={{display:"flex",gap:"0.5rem",alignItems:"flex-start",marginBottom:"0.28rem"}}>
                      <span style={{fontSize:"0.8rem",flexShrink:0}}>💡</span>
                      <span style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.5}}>{a}</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{height:"0.5rem"}}/>
            </div>
          )}
        </div>

        {/* Footer buttons */}
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {step===0&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={()=>subject&&setStep(1)} disabled={!subject} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:subject?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:subject?"pointer":"not-allowed"}}>
                Next ->
              </button>
            </>
          )}
          {step===1&&(
            <>
              <button onClick={()=>setStep(0)} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Back</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Build It
              </button>
            </>
          )}
          {step===3&&(
            <>
              <button onClick={()=>{setStep(1);setResult(null);}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Rebuild</button>
              <button onClick={handleSave} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Save Unit v
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function AIWorksheetModal({ pal, family, activeChild, wsType, onClose }) {
  const [topic,   setTopic]   = useState("");
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);

  const isCustom = wsType==="custom";
  const ws = isCustom ? {id:"custom",label:"Custom Worksheet",icon:""} : wsType;

  const generate = async () => {
    if(!topic.trim()) return;
    setLoading(true); setError(null);
    const child=activeChild;
    const grade=child?.grade||"elementary";
    const prompt = "Create a homeschool worksheet for a "+grade+" student.\n\n"
      + "Worksheet type: "+ws.label+"\n"
      + "Topic: "+topic+"\n"
      + "Student name: "+(child?.name||"Student")+"\n\n"
      + "Respond in this exact JSON format (no markdown, no backticks, just raw JSON):\n"
      + '{"title":"worksheet title","instructions":"one clear sentence of instructions",'
      + '"items":[{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"},{"type":"prompt","content":"item text"}],'
      + '"bonusChallenge":"one optional bonus challenge sentence"}'
      + "\n\nMake items age-appropriate for "+grade+". For copywork: provide beautiful sentences to copy. For narration: provide open-ended reflection prompts. For math: provide practice problems. For spelling: provide 8 words with a sentence each. For quiz: provide 5 questions with blank answer lines. Keep items concise and clear."

    try {
      const raw = await callClaude(prompt);
      const clean = raw.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
    } catch(e) {
      setError("Couldn't generate worksheet right now. Try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(14px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 -14px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{ws.icon} {ws.label}</div>
            <div style={{fontSize:"0.74rem",color:pal.slate,marginTop:"2px"}}>{activeChild?.name||"Student"} - {activeChild?.grade||"All grades"}</div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          {!result&&!loading&&(<>
            <Lbl pal={pal}>What topic?</Lbl>
            <Input pal={pal} value={topic} onChange={setTopic}
              placeholder={ws.id==="copywork"?"e.g. Famous quotes about nature":ws.id==="math"?"e.g. Adding fractions":"e.g. Ancient Egypt"}
            />
            {error&&<div style={{marginTop:"0.65rem",padding:"0.7rem",background:pal.badBg,borderRadius:"10px",fontSize:"0.78rem",color:"#a03030"}}>{error}</div>}
            <div style={{height:"0.85rem"}}/>
          </>)}

          {loading&&(
            <div style={{textAlign:"center",padding:"2rem 0"}}>
              <div style={{fontSize:"3rem",marginBottom:"0.75rem",animation:"pulse 1.2s ease infinite"}}>{ws.icon}</div>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.95rem",marginBottom:"0.3rem"}}>Building your worksheet...</div>
              <div style={{fontSize:"0.78rem",color:pal.slate}}>This takes about 10 seconds</div>
            </div>
          )}

          {result&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              {/* Worksheet header */}
              <div style={{background:pal.parchm,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}45`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.3rem"}}>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.92rem",flex:1,paddingRight:"0.5rem"}}>{result.title}</div>
                  <span style={{fontSize:"0.68rem",fontWeight:"700",color:pal.primary,background:pal.pale,borderRadius:"50px",padding:"0.12rem 0.5rem",flexShrink:0}}>{ws.label}</span>
                </div>
                <div style={{display:"flex",gap:"1rem",fontSize:"0.7rem",color:pal.slate}}>
                  <span>Name: {activeChild?.name||"___________"}</span>
                  <span>Date: ___________</span>
                </div>
              </div>
              {/* Instructions */}
              <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.65,marginBottom:"0.85rem",fontStyle:"italic",padding:"0 0.2rem"}}>
                📌 {result.instructions}
              </div>
              {/* Items */}
              <div style={{display:"flex",flexDirection:"column",gap:"0.75rem",marginBottom:"0.85rem"}}>
                {(result.items||[]).map((item,i)=>(
                  <div key={i} style={{background:pal.linen,borderRadius:"13px",padding:"0.8rem 0.95rem",border:`1.5px solid ${pal.stone}40`}}>
                    <div style={{display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
                      <div style={{width:"22px",height:"22px",borderRadius:"50%",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:"900",color:"#fff",flexShrink:0,marginTop:"1px"}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.6,marginBottom:"0.45rem"}}>{item.content}</div>
                        <div style={{borderBottom:`1px solid ${pal.stone}60`,height:"1px",marginBottom:"0.3rem"}}/>
                        <div style={{borderBottom:`1px solid ${pal.stone}35`,height:"1px"}}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {/* Bonus */}
              {result.bonusChallenge&&(
                <div style={{background:pal.pale,borderRadius:"12px",padding:"0.75rem 0.9rem",border:`2px solid ${pal.primary}25`,marginBottom:"0.5rem"}}>
                  <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.75rem",marginBottom:"0.2rem"}}>* Bonus Challenge</div>
                  <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.55}}>{result.bonusChallenge}</div>
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {!result&&!loading&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Generate
              </button>
            </>
          )}
          {result&&(
            <>
              <button onClick={()=>{setResult(null);setTopic("");}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>New</button>
              <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Done v
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---- Portfolio Card wrapper ---- */
function PortfolioCard({pal,icon,title,count,note,children}){
  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.75rem 0.9rem 0.65rem",borderBottom:`1px solid ${pal.stone}20`}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <span style={{fontSize:"1.1rem"}}>{icon}</span>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>{title}</div>
            {note&&<div style={{fontSize:"0.62rem",color:pal.slate,marginTop:"1px"}}>{note}</div>}

        </div>
        {count>0&&<div style={{background:pal.primary+"18",borderRadius:"20px",padding:"0.12rem 0.55rem"}}>

/* ---- Portfolio Subject Row (replaces SubjectBubble) ---- */
function PortfolioSubjectRow({sd,cp,pal,family,expanded,onToggle,onDetail}){
  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const subj = allSubjs.find(x=>x.label===sd.subj);
  const icon = subj?.icon||"📋";
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));
  weekStart.setHours(0,0,0,0);
  const yearNum = now.getFullYear();
  const thisWeekEntries = sd.entries.filter(e=>{
    try{ const d=new Date(e.date+", "+yearNum); return d>=weekStart; }catch{return false;}
  });
  const recentEntries = [...sd.entries].reverse().slice(0,8);

  return (
    <div style={{borderRadius:"12px",border:`1.5px solid ${expanded?cp.c1+"60":pal.stone+"25"}`,overflow:"hidden",background:"#fff",marginBottom:"0.35rem",transition:"all 0.15s"}}>
      <button onClick={onToggle}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.65rem 0.8rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <div style={{width:"36px",height:"36px",borderRadius:"9px",background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}15)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{sd.subj}</div>
          <div style={{fontSize:"0.63rem",color:pal.slate,marginTop:"1px"}}>
            {thisWeekEntries.length>0
              ? thisWeekEntries.length+" this week \u2022 "+sd.entries.length+" total"
              : sd.entries.length+" total \u2022 last: "+(sd.entries[sd.entries.length-1]?.date||"")}
          </div>
        </div>
        {sd.hasPhotos&&<span style={{fontSize:"0.78rem",flexShrink:0}}>{"📷"}</span>}
        <div style={{background:cp.c1+"20",borderRadius:"20px",padding:"0.1rem 0.45rem",flexShrink:0}}>
          <span style={{fontWeight:"800",color:cp.c1,fontSize:"0.74rem"}}>{sd.entries.length}</span>
        </div>
        <span style={{color:pal.slate,fontSize:"1rem",transform:expanded?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>{"›"}</span>
      </button>
      {expanded&&(
        <div style={{borderTop:`1px solid ${pal.stone}15`}}>
          {recentEntries.map((e,i)=>(
            <div key={e.id||i} onClick={()=>onDetail(e)}
              style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.55rem 0.8rem",borderTop:i>0?`1px solid ${pal.stone}12`:"none",cursor:"pointer",background:"#fafafa"}}
              onTouchStart={ev=>ev.currentTarget.style.background=pal.pale}
              onTouchEnd={ev=>ev.currentTarget.style.background="#fafafa"}>
              <div style={{width:"30px",height:"30px",borderRadius:"7px",background:`${cp.c1}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",flexShrink:0,overflow:"hidden",position:"relative"}}>
                {e.photos&&e.photos[0]?<img src={e.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>:<span>{e.thumb||"📋"}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:"600",color:pal.ink,fontSize:"0.79rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.readingTitle||e.title}</div>
                {e.note&&e.note.trim()&&<div style={{fontSize:"0.62rem",color:pal.slate,marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note.slice(0,60)}</div>}
              </div>
              <div style={{fontSize:"0.61rem",color:pal.stone,flexShrink:0}}>{e.date}</div>
              <span style={{color:pal.stone,fontSize:"0.8rem",flexShrink:0}}>{"›"}</span>
            </div>
          ))}
          {sd.entries.length>8&&(
            <div style={{padding:"0.45rem",textAlign:"center",fontSize:"0.68rem",color:pal.slate,borderTop:`1px solid ${pal.stone}12`}}>
              +{sd.entries.length-8} more entries
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  entries.slice().reverse().forEach(e=>{

      if(photoItems.length<3) photoItems.push({src,entry:e});

  while(photoItems.length<3) photoItems.push(null);

  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.75rem 0.9rem 0.65rem",borderBottom:`1px solid ${pal.stone}20`}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <span style={{fontSize:"1.1rem"}}>{"📷"}</span>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>Photos</div>
            <div style={{fontSize:"0.62rem",color:pal.slate,marginTop:"1px"}}>3 featured {"\u2022"} add photos when logging entries</div>
          </div>
        </div>
        {entries.length>0&&<div style={{background:pal.primary+"18",borderRadius:"20px",padding:"0.12rem 0.55rem"}}>
          <span style={{fontWeight:"800",color:pal.primary,fontSize:"0.76rem"}}>{entries.length}</span>
        </div>}
      </div>
      <div style={{padding:"0.75rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.5rem"}}>
          {photoItems.map((item,i)=>(
            <div key={i}
              onClick={item?()=>onDetail(item.entry):undefined}
              style={{aspectRatio:"1",borderRadius:"12px",overflow:"hidden",border:`1.5px solid ${item?cp.c1+"40":pal.stone+"30"}`,background:item?"#000":pal.parchm,cursor:item?"pointer":"default",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative"}}>
              {item ? (
                <img src={item.src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              ) : (
                <div style={{textAlign:"center",padding:"0.5rem"}}>
                  <div style={{fontSize:"1.3rem",marginBottom:"3px",opacity:0.35}}>{"📸"}</div>
                  <div style={{fontSize:"0.55rem",color:pal.stone,opacity:0.7,lineHeight:1.4}}>{"Paste photo\nor leave blank"}</div>
                </div>
              )}

          ))}
        </div>
        {entries.length===0&&(
          <div style={{marginTop:"0.6rem",fontSize:"0.7rem",color:pal.slate,textAlign:"center",lineHeight:1.5}}>
            Photos you add to entries will appear here. You can also leave slots blank to paste polaroids or printed photos to your binder.
          </div>
        )}
      </div>
    </div>
  );
}

/* ---- Year Overview ---- */
function YearOverview({pal,family,activeCh,cp,entries,attendanceDays,onBack}){
  const TOTAL_WEEKS = 40;
  const now = new Date();
  const yearStart = family.yearStart ? new Date(family.yearStart) : new Date(now.getFullYear(),7,1);
  const yearEnd   = family.yearEnd   ? new Date(family.yearEnd)   : new Date(now.getFullYear()+1,4,31);
  const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";

  // Build a map of week# => entry count
  const weekMap = {};
  entries.forEach(e=>{
    try{
      const d = new Date(e.date+", "+now.getFullYear());
      if(isNaN(d)) return;
      const diff = Math.floor((d-yearStart)/(7*24*60*60*1000));
      if(diff>=0&&diff<TOTAL_WEEKS){ weekMap[diff]=(weekMap[diff]||0)+1; }
    }catch(err){}
  });

  const msPerWeek = 7*24*60*60*1000;
  const currentWeek = Math.floor((now-yearStart)/msPerWeek);
  const REQUIRED = 180;
  const pct = Math.min(100,Math.round((attendanceDays/REQUIRED)*100));

  // Subject breakdown
  const bySubj = {};
  entries.filter(e=>!e.isDay&&e.subj!=="Daily Notes").forEach(e=>{
    bySubj[e.subj]=(bySubj[e.subj]||0)+1;
  });
  const subjList = Object.entries(bySubj).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>
          {"< Back"}
        </button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{activeCh?.avatar} {activeCh?.name} {"—"} Year Overview</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>{schoolName}</div>
        </div>
      </div>

      <div style={{padding:"0.85rem 1rem"}}>

        {/* Attendance bar */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.5rem"}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>School Year Progress</div>
            <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{pct}{"% done"}</div>
          </div>
          <div style={{height:"10px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.45rem"}}>
            <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.5s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.69rem",color:pal.slate}}>
            <span><b style={{color:pal.ink}}>{attendanceDays}</b> days logged</span>
            <span><b style={{color:pal.ink}}>{Math.max(0,REQUIRED-attendanceDays)}</b> days remaining</span>
            <span><b style={{color:pal.ink}}>{REQUIRED}</b> required</span>
          </div>
        </div>

        {/* 40-week grid */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>40-Week Grid</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"0.3rem",marginBottom:"0.7rem"}}>
            {Array.from({length:TOTAL_WEEKS},(_,w)=>{
              const count  = weekMap[w]||0;
              const isPast = w<currentWeek;
              const isCurr = w===currentWeek;
              const hasWork= count>0;
              const bg = isCurr
                ? cp.c1
                : hasWork
                  ? cp.c1+"55"
                  : isPast
                    ? "#f0ece6"
                    : pal.parchm;
              const textCol = isCurr?"#fff": hasWork?cp.c1 : isPast?"#ccc" : pal.stone;
              return (
                <div key={w} style={{aspectRatio:"1",borderRadius:"7px",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:`1.5px solid ${isCurr?cp.c1:hasWork?cp.c1+"40":"transparent"}`,transition:"all 0.15s"}}>
                  <div style={{fontSize:"0.52rem",fontWeight:isCurr||hasWork?"800":"400",color:textCol,lineHeight:1}}>{w+1}</div>
                  {count>0&&<div style={{fontSize:"0.45rem",color:isCurr?"rgba(255,255,255,0.8)":cp.c1,fontWeight:"700"}}>{count}</div>}
                </div>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",fontSize:"0.62rem",color:pal.slate}}>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1}}/>
              <span>This week</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1+"55"}}/>
              <span>Logged</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:"#f0ece6"}}/>
              <span>Past / no log</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:pal.parchm,border:`1px solid ${pal.stone}40`}}/>
              <span>Upcoming</span>
            </div>
          </div>
        </div>

        {/* Subject breakdown */}
        {subjList.length>0&&(
          <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>Subjects This Year</div>
            <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
              {subjList.map(([subj,cnt])=>{
                const maxCnt = subjList[0][1];
                const w = Math.max(8,Math.round((cnt/maxCnt)*100));
                return (
                  <div key={subj} style={{display:"flex",alignItems:"center",gap:"0.55rem"}}>
                    <div style={{width:"90px",fontSize:"0.73rem",color:pal.inkM,fontWeight:"600",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj}</div>
                    <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${w}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:"0.72rem",fontWeight:"800",color:cp.c1,minWidth:"22px",textAlign:"right",flexShrink:0}}>{cnt}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Worksheet reminder */}
        <div style={{background:"#fffbeb",border:"1.5px solid #f5c842",borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",gap:"0.55rem",alignItems:"flex-start"}}>
          <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:"1px"}}>{"📎"}</span>
          <div>
            <div style={{fontWeight:"800",color:"#7a5500",fontSize:"0.82rem",marginBottom:"2px"}}>Remember: Add Worksheets to Your Binder</div>
            <div style={{fontSize:"0.71rem",color:"#a07020",lineHeight:1.55}}>After printing your portfolio, insert completed worksheets, tests, and work samples behind each section. Physical work samples strengthen your portfolio for state evaluation.</div>
          </div>
        </div>

        <div style={{height:"1rem"}}/>
      </div>
    </div>
  );
}

/* ---- Daily Portfolio Log Modal (step-through per subject) ---- */
function DailyPortfolioModal({pal,family,childIdx,stateInfo,onClose,onSave}){
  const activeCh = family.children[childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjIds = family.subjects||[];
  const activeSubjList = activeSubjIds.map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);

  // Step 0 = pick date + subjects for today; steps 1..N = one per subject; final = done
  const [step,        setStep]       = useState(0);
  const [todayDate,   setTodayDate]  = useState(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}));
  const [selectedSubjs, setSelSubjs] = useState(new Set(activeSubjList.map(s=>s.label)));
  const [descMap,     setDescMap]    = useState({});
  const [photoMap,    setPhotoMap]   = useState({});
  const [readMap,     setReadMap]    = useState({});
  const [saved,       setSaved]      = useState(false);

  const galleryRef = useRef(null);
  const [gallerySubj, setGallerySubj] = useState(null);

  const toggleSubj = (label) => {
    setSelSubjs(prev=>{
      const next=new Set(prev);
      if(next.has(label)) next.delete(label); else next.add(label);
      return next;
    });
  };

  const subjSteps = activeSubjList.filter(s=>selectedSubjs.has(s.label));
  const totalSteps = subjSteps.length;
  const currentSubj = subjSteps[step-1];
  const isReadingSubj = currentSubj&&(currentSubj.label==="Reading"||currentSubj.label==="Reading/Language Arts");
  const needsReadingTitle = isReadingSubj&&(stateInfo?.readingLog||false);

  const setDesc = (label,val)=>setDescMap(m=>({...m,[label]:val}));
  const setPhotos = (label,val)=>setPhotoMap(m=>({...m,[label]:val}));
  const setReadTitle = (label,val)=>setReadMap(m=>({...m,[label]:val}));

  const handleGallery = (e) => {
    if(!gallerySubj) return;
    Array.from(e.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        setPhotos(gallerySubj,prev=>[...(prev||[]),{name:file.name,dataUrl:ev.target.result}]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };

  const removePhoto = (label,i)=>{
    setPhotos(label,(photoMap[label]||[]).filter((_,pi)=>pi!==i));
  };

  const handleNext = () => {
    if(step<totalSteps) setStep(s=>s+1);
    else handleFinish();
  };

  const handleFinish = () => {
    const entries = subjSteps.map(s=>{
      const desc = (descMap[s.label]||"").trim();
      const photos = (photoMap[s.label]||[]).map(p=>p.dataUrl);
      const readingTitle = (readMap[s.label]||"").trim()||undefined;
      return {
        childIdx,
        subj: s.label,
        title: desc ? desc.slice(0,80) : s.label+" session",
        note: desc||"",
        thumb: s.icon||"📋",
        date: todayDate,
        photos,
        readingTitle,
      };
    }).filter(s=>s.note.trim()||(photoMap[s.subj]||[]).length>0||(descMap[s.subj]||"").trim());
    if(entries.length===0){
      // save at least one entry per selected subject
      onSave(subjSteps.map(s=>({childIdx,subj:s.label,title:s.label+" session",note:"",thumb:s.icon||"📋",date:todayDate,photos:[]})));
      return;
    }
    setSaved(true);
    onSave(entries);
  };

  const canProceed0 = selectedSubjs.size>0;
  const curDesc = currentSubj ? (descMap[currentSubj.label]||"") : "";
  const curPhotos = currentSubj ? (photoMap[currentSubj.label]||[]) : [];
  const curRead = currentSubj ? (readMap[currentSubj.label]||"") : "";
  const canProceedSubj = !needsReadingTitle || curRead.trim().length>0;

  if(saved){
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",padding:"2rem 1.5rem 3rem",textAlign:"center",animation:"slideUp 0.28s ease"}}>
          <div style={{fontSize:"3.5rem",marginBottom:"0.6rem"}}>{"🌱"}</div>
          <div style={{fontWeight:"900",color:cp.c1,fontSize:"1.1rem",marginBottom:"0.35rem"}}>{"Today" + String.fromCharCode(39) + "s log saved!"}</div>
          <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.65,marginBottom:"1.5rem"}}>{selectedSubjs.size} subject{selectedSubjs.size!==1?"s":""} added to {activeCh?.name}{String.fromCharCode(39)}s portfolio.</div>
          <button onClick={onClose} style={{width:"100%",padding:"0.82rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.9rem",cursor:"pointer"}}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"90vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>

        {/* Handle + Header */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        <div style={{padding:"0.7rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.98rem"}}>
              {step===0 ? "What did we do today?" : currentSubj?.icon+" "+currentSubj?.label}
            </div>
            <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>
              {step===0 ? activeCh?.avatar+" "+activeCh?.name : "Step "+(step)+" of "+totalSteps+" \u2022 "+activeCh?.name}
            </div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>{"x"}</button>
        </div>

        {/* Progress bar */}
        {totalSteps>0&&(
          <div style={{display:"flex",gap:"3px",padding:"0.55rem 1.3rem 0",flexShrink:0}}>
            {Array.from({length:totalSteps},(_,i)=>(
              <div key={i} style={{flex:1,height:"4px",borderRadius:"99px",background:i<step?cp.c1:i===step-1?cp.c1+"88":pal.stone+"40",transition:"background 0.25s"}}/>
            ))}
          </div>
        )}

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          {/* Step 0: Date + Subject picker */}
          {step===0&&(
            <div>
              <div style={{marginBottom:"1rem"}}>
                <Lbl pal={pal}>Date</Lbl>
                <input value={todayDate} onChange={e=>setTodayDate(e.target.value)}
                  style={{width:"100%",padding:"0.55rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
                  onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
              </div>
              <Lbl pal={pal}>Subjects covered today</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:"0.35rem"}}>
                {activeSubjList.map(s=>{
                  const sel=selectedSubjs.has(s.label);
                  return (
                    <button key={s.id||s.label} onClick={()=>toggleSubj(s.label)}
                      style={{display:"flex",alignItems:"center",gap:"0.65rem",padding:"0.62rem 0.9rem",borderRadius:"12px",border:`2px solid ${sel?cp.c1:pal.stone+"50"}`,background:sel?cp.c1+"12":"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.13s"}}>
                      <div style={{width:"32px",height:"32px",borderRadius:"8px",background:sel?cp.c1+"22":pal.parchm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{s.icon||"📋"}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:sel?"700":"500",color:sel?pal.ink:pal.inkM,fontSize:"0.84rem"}}>{s.label}</div>
                      </div>
                      <div style={{width:"20px",height:"20px",borderRadius:"50%",border:`2px solid ${sel?cp.c1:pal.stone+"60"}`,background:sel?cp.c1:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel&&<span style={{color:"#fff",fontSize:"0.65rem",fontWeight:"900"}}>{"\u2713"}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
              {activeSubjList.length===0&&(
                <div style={{padding:"1rem",textAlign:"center",fontSize:"0.78rem",color:pal.slate,background:pal.parchm,borderRadius:"12px"}}>
                  No subjects set up yet. Go to Settings to add your subjects.
                </div>
              )}
            </div>
          )}

          {/* Steps 1..N: per-subject description */}
          {step>0&&currentSubj&&(
            <div>
              <div style={{background:`linear-gradient(135deg,${cp.c1}15,${cp.c2}08)`,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`1.5px solid ${cp.c1}25`}}>
                <div style={{fontSize:"2rem",marginBottom:"0.3rem"}}>{currentSubj.icon||"📋"}</div>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.95rem"}}>{currentSubj.label}</div>
                <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px"}}>Describe what was worked on today</div>
              </div>

              {needsReadingTitle&&(
                <div style={{marginBottom:"0.85rem",animation:"fadeUp 0.18s ease"}}>
                  <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>{"*"}</span></Lbl>
                  <div style={{background:pal.pale,borderRadius:"10px",padding:"0.4rem 0.65rem",marginBottom:"0.45rem",fontSize:"0.7rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>
                    {"📖 "}{family.state||"Your state"} requires reading materials to be listed by title.
                  </div>
                  <Input pal={pal} value={curRead} onChange={v=>setReadTitle(currentSubj.label,v)} placeholder="e.g. Charlotte Web, Saxon Math 5/4..."/>
                </div>
              )}
              {isReadingSubj&&!needsReadingTitle&&(
                <div style={{marginBottom:"0.7rem"}}>
                  <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
                  <Input pal={pal} value={curRead} onChange={v=>setReadTitle(currentSubj.label,v)} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
                </div>
              )}

              <Lbl pal={pal}>What did {activeCh?.name} work on?</Lbl>
              <textarea
                value={curDesc}
                onChange={e=>setDesc(currentSubj.label,e.target.value)}
                rows={4}
                placeholder={"Describe the activity, lesson, or topic covered. What did " + (activeCh?.name||"they") + " learn or practice?"}
                style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.83rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6,marginBottom:"0.75rem"}}
                onFocus={e=>e.target.style.borderColor=cp.c1}
                onBlur={e=>e.target.style.borderColor=pal.stone}/>

              {/* Photos for this subject */}
              <Lbl pal={pal}>Photos (optional)</Lbl>
              <input ref={galleryRef} type="file" accept="image/*" multiple onChange={handleGallery} style={{display:"none"}}/>
              <button onClick={()=>{setGallerySubj(currentSubj.label);setTimeout(()=>galleryRef.current?.click(),50);}}
                style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.55rem 0.9rem",border:`2px solid ${pal.stone}50`,borderRadius:"11px",background:"transparent",color:pal.inkM,fontWeight:"700",fontSize:"0.77rem",cursor:"pointer",marginBottom:"0.6rem"}}>
                <span style={{fontSize:"1rem"}}>{"📷"}</span><span>Add Photos</span>
              </button>
              {curPhotos.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem",marginBottom:"0.5rem"}}>
                  {curPhotos.map((p,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:"10px",overflow:"hidden",aspectRatio:"1",border:`1.5px solid ${pal.stone}40`}}>
                      <img src={p.dataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <button onClick={()=>removePhoto(currentSubj.label,i)}
                        style={{position:"absolute",top:"4px",right:"4px",width:"20px",height:"20px",borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:"0.65rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
                        {"x"}
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Footer buttons */}
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {step>0&&(
            <button onClick={()=>setStep(s=>s-1)}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>
              {"< Back"}
            </button>
          )}
          {step===0&&(
            <button onClick={onClose}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>
              Cancel
            </button>
          )}
          <button
            onClick={handleNext}
            disabled={step===0?!canProceed0:!canProceedSubj}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:(step===0?canProceed0:canProceedSubj)?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:(step===0?canProceed0:canProceedSubj)?"pointer":"default"}}>
            {step===0 ? "Start \u2192 "+selectedSubjs.size+" subject"+(selectedSubjs.size!==1?"s":"")
              : step===totalSteps ? "Save Portfolio \u2713"
              : "Next: "+(subjSteps[step]?.label||"")+" \u2192"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Entry Detail Modal ---- */
