/* -----------------------------------------
   THEME ENGINE (same as v2)
----------------------------------------- */
function lerpHex(a, b, t) {
  const ah=a.replace("#",""), bh=b.replace("#","");
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb=parseInt(bh.slice(4,6),16);
  return `#${Math.round(ar+(br-ar)*t).toString(16).padStart(2,"0")}${Math.round(ag+(bg-ag)*t).toString(16).padStart(2,"0")}${Math.round(ab+(bb-ab)*t).toString(16).padStart(2,"0")}`;
}
const lighten = (hex,a) => lerpHex(hex,"#ffffff",a);
const darken  = (hex,a) => lerpHex(hex,"#000000",a);

function buildTheme(a,b) {
  const mid=lerpHex(a,b,0.45), light=lerpHex(a,b,0.75);
  return {
    deep:darken(a,0.15), primary:a, mid, accent:b,
    accentD:darken(b,0.25), pale:lighten(b,0.70), paleMid:lighten(b,0.50),
    sand:lerpHex(lighten(a,0.88),"#fdf8ef",0.5),
    linen:lerpHex(lighten(b,0.92),"#ffffff",0.4),
    parchm:lerpHex(lighten(a,0.82),"#f5ead6",0.5),
    stone:lerpHex(lighten(a,0.55),"#c0b8a8",0.5),
    navGrad:`linear-gradient(160deg,${darken(a,0.15)},${a},${mid})`,
    heroGrad:`linear-gradient(160deg,${darken(a,0.12)},${mid})`,
    accentGrad:`linear-gradient(135deg,${mid},${b})`,
    shimmer:`linear-gradient(90deg,${lighten(b,0.55)},${lighten(a,0.65)},${lighten(b,0.55)})`,
    onDark:"#ffffff", onLight:darken(a,0.55),
    ink:"#1a1408", inkM:"#4a3c2a",
    slate:lerpHex(darken(a,0.05),"#8a7a62",0.55),
    good:lerpHex(b,"#44aa66",0.4), warn:"#c47818", bad:"#a03030",
    goodBg:lighten(lerpHex(b,"#44aa66",0.4),0.75),
    warnBg:"#fef0d0", badBg:"#faeae4",
  };
}

function getLRTopicForWeek(grade) {
  const topics = LR_WEEKLY_TOPICS[grade] || LR_WEEKLY_TOPICS["5th"];
  const weekNum = Math.floor((new Date() - new Date(new Date().getFullYear(),0,1)) / (7*24*60*60*1000));
  return topics[weekNum % topics.length];
}

const LS_KEY = "stembloom_v1";
function loadSaved() {
  try { const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; } catch(e){return null;}
}
function savePersist(obj) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch(e){}
}

function StemAndBloom() {
  const saved = useMemo(()=>loadSaved(),[]);
  const [family,         setFamily]         = useState(saved?.family||null);
  const [view,           setView]           = useState("splash");
  const [activeTab,      setActiveTab]      = useState("home");
  const [navIds,         setNavIds]         = useState(saved?.navIds||["home","schedule","portfolio"]);
  const [childFilt,      setChildFilt]      = useState("all");
  const [checkin,        setCheckin]        = useState(false);
  const [lastCheckinDate,setLastCheckinDate]= useState(saved?.lastCheckinDate||null);
  const [checkinStreak,  setCheckinStreak]  = useState(saved?.checkinStreak||0);
  const [showTheme,      setShowTheme]      = useState(false);
  const [showNav,        setShowNav]        = useState(false);
  const [showSwitcher,   setShowSwitcher]   = useState(false);
  const [learnTab,       setLearnTab]       = useState("curriculum");
  const [activeStudent,  setActiveStudent]  = useState(null);
  const [portfolioEntries,setPortfolioEntries]=useState(saved?.portfolio||[]);
  const [coopLog, setCoopLog] = useState(saved?.coopLog||[]);
  const [attendanceDays,    setAttendanceDays]    = useState(saved?.attendanceDays||0);
  const [pendingSchedDays,  setPendingSchedDays]  = useState(1);
  const [showSchedConfirm,  setShowSchedConfirm]  = useState(false);
  const [showCatchup,       setShowCatchup]       = useState(false);
  const [showAIChat,        setShowAIChat]        = useState(false);
  const [showDaySummary,    setShowDaySummary]    = useState(false);
  const [showLifeReady,     setShowLifeReady]     = useState(false);
  const [daySummaryData,    setDaySummaryData]    = useState(null);
  const [todayProgress,     setTodayProgress]     = useState(saved?.todayProgress||{count:0,total:0,date:""});
  const [paletteId, setPaletteId] = useState(saved?.paletteId||"sage");
  const [customA,   setCustomA]   = useState(saved?.customA||"#2a4a28");
  const [customB,   setCustomB]   = useState(saved?.customB||"#a8c890");

  // Auto-save whenever key state changes
  useEffect(()=>{
    savePersist({family,navIds,portfolio:portfolioEntries,coopLog,attendanceDays,paletteId,customA,customB,lastCheckinDate,checkinStreak,todayProgress});
  },[family,navIds,portfolioEntries,coopLog,attendanceDays,paletteId,customA,customB,lastCheckinDate,checkinStreak,todayProgress]);

  const pal = useMemo(() => {
    const p = PRESET_PALETTES.find(p=>p.id===paletteId)||PRESET_PALETTES[0];
    return buildTheme(p.isCustom?customA:p.a, p.isCustom?customB:p.b);
  }, [paletteId,customA,customB]);

  const navTabs = ALL_SECTIONS.filter(s=>navIds.includes(s.id));

  const handleSplash     = () => setView(family?"parent":"onboarding");
  const handleCheckinSave = (entries) => {
    entries.forEach(e => addPortfolioEntry(e));
    // increment attendance
    const todayStr = new Date().toDateString();
    setAttendanceDays(d => d + (lastCheckinDate===todayStr ? 0 : 1));
    // update streak
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toDateString();
    if (lastCheckinDate === yStr) setCheckinStreak(s=>s+1);
    else if (lastCheckinDate !== todayStr) setCheckinStreak(1);
    setLastCheckinDate(todayStr);
    setCheckin(false);
  };
  const finishOnboarding = (data) => { setFamily(data); setPaletteId(data.paletteId||"sage"); setView("parent"); };
  const openSettings     = () => setView("settings");
  const closeSettings    = () => setView("parent");
  const switchToStudent  = (child) => { setActiveStudent(child); setShowSwitcher(false); setView("student"); };
  const backToParent     = () => { setActiveStudent(null); setView("parent"); };
  const addPortfolioEntry  = (e) => setPortfolioEntries(p=>[{id:uid(),...e},...p]);
  const editPortfolioEntry = (id,updated) => setPortfolioEntries(p=>p.map(e=>e.id===id?{...e,...updated}:e));

  // Today is co-op day if it's a Friday (demo) or already logged
  const isCoop = (() => {
    if (!family) return false;
    const freq = family.coopFreq || "";
    if (freq === "We don't do co-op" || freq === "") return false;
    const day = new Date().getDay();
    return day === 5; // Friday - still use Friday as co-op day trigger

        @keyframes starPop{0%{opacity:0;transform:scale(0) rotate(-20deg)}70%{transform:scale(1.25) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
        @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(60px) rotate(360deg)}}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{border-radius:99px}
        input,textarea,select,button{font-family:inherit}
      `}</style>

      {/* -- SPLASH -- */}
      {view==="splash"     && <SplashScreen   pal={pal} onContinue={handleSplash} />}
      {view==="onboarding" && <OnboardingFlow pal={pal} onComplete={finishOnboarding} />}
      {view==="settings"   && <SettingsScreen pal={pal} family={family} setFamily={setFamily}
          paletteId={paletteId} setPaletteId={setPaletteId}
          customA={customA} customB={customB} setCustomA={setCustomA} setCustomB={setCustomB}
          navIds={navIds} setNavIds={setNavIds} onBack={closeSettings} />}

          child={activeStudent}
          family={family}
          pal={pal}
          isCoop={isCoop}
          entries={portfolioEntries.filter((_,i)=> family.children.findIndex(c=>c.id===activeStudent.id) === portfolioEntries.find(e=>e.id===_.id)?.childIdx)}

          onAddEntry={addPortfolioEntry}
          onCoopLog={e=>setCoopLog(l=>[{...e,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})},...l])}

        </div>

        {/* Main content */}

          {activeTab==="schedule" && <ScheduleScreen pal={pal} family={family} child={childFilt} setChild={setChildFilt}
            onMarkComplete={(data)=>{
              const todayStr=new Date().toDateString();
              setAttendanceDays(d=>d+(lastCheckinDate===todayStr?0:1));
              const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
              if(lastCheckinDate===yesterday.toDateString()) setCheckinStreak(s=>s+1);
              else if(lastCheckinDate!==todayStr) setCheckinStreak(1);
              setLastCheckinDate(todayStr);
              setDaySummaryData(data);
              setShowDaySummary(true);
            }}
            onProgressUpdate={(count,total)=>{
              const todayStr=new Date().toDateString();
              setTodayProgress({count,total,date:todayStr});
            }}
          />}
          {activeTab==="learn"       && <LearnScreen       pal={pal} family={family} child={childFilt} setChild={setChildFilt} learnTab={learnTab} setLearnTab={setLearnTab} />}

          {activeTab==="attendance"  && <AttendanceScreen  pal={pal} family={family} days={attendanceDays} pending={pendingSchedDays} onConfirmPull={()=>{setAttendanceDays(d=>d+pendingSchedDays);setPendingSchedDays(0);setShowSchedConfirm(false);}} onCatchup={()=>setShowCatchup(true)} />}
          {activeTab==="coop"        && <CoopScreen        pal={pal} family={family} coopLog={coopLog} onLog={e=>setCoopLog(l=>[e,...l])} />}
          {activeTab==="transcripts" && <TranscriptsScreen pal={pal} family={family} portfolioEntries={portfolioEntries} attendanceDays={attendanceDays} coopLog={coopLog} />}
          {showLifeReady && family && <LifeReadyScreen pal={pal} family={family} onBack={()=>setShowLifeReady(false)}/>}
          {!showLifeReady && activeTab==="more"        && <MoreScreen        pal={pal} family={family}
              onNav={id=>{ if(id==="settings") openSettings(); else if(navIds.includes(id)) setActiveTab(id); }}
              onTheme={()=>setShowTheme(true)} onNavEdit={()=>setShowNav(true)} onSettings={openSettings} onLifeReady={()=>setShowLifeReady(true)} />}
        </div>

        {/* Floating AI Chat Button */}
        <button onClick={()=>setShowAIChat(true)} style={{position:"fixed",bottom:"80px",right:"calc(50% - 205px)",width:"52px",height:"52px",borderRadius:"50%",background:pal.accentGrad,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",zIndex:49,boxShadow:`0 3px 14px ${pal.primary}55`,transition:"transform 0.15s"}}
          onMouseDown={e=>e.currentTarget.style.transform="scale(0.9)"}
          onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
          onTouchStart={e=>e.currentTarget.style.transform="scale(0.9)"}
          onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
          
        </button>

        {/* Bottom nav */}
        <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:pal.linen,borderTop:`1.5px solid ${pal.stone}60`,height:"68px",display:"flex",alignItems:"center",zIndex:50}}>
          {navTabs.map(t=>{
            const active=activeTab===t.id;
            return (
              <button key={t.id} onClick={()=>setActiveTab(t.id)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"0.4rem 0",border:"none",background:"transparent",cursor:"pointer",position:"relative",transition:"transform 0.1s"}}
                onMouseDown={e=>e.currentTarget.style.transform="scale(0.91)"}
                onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
                onTouchStart={e=>e.currentTarget.style.transform="scale(0.91)"}
                onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"28px",height:"3px",borderRadius:"0 0 3px 3px",background:pal.accentGrad}}/>}
                <span style={{fontSize:"1.28rem",lineHeight:1}}>{t.icon}</span>
                <span style={{fontSize:"0.59rem",fontWeight:active?"800":"500",color:active?pal.primary:pal.slate,transition:"color 0.15s"}}>{t.label}</span>
              </button>
            );
          })}
        </nav>

        {/* Modals */}
        {showAIChat    && <AIChatModal     pal={pal} family={family} onClose={()=>setShowAIChat(false)} />}
        {showTheme    && <ThemeModal     pal={pal} paletteId={paletteId} setPaletteId={setPaletteId} customA={customA} customB={customB} setCustomA={setCustomA} setCustomB={setCustomB} onClose={()=>setShowTheme(false)} />}
        {showNav      && <NavModal       pal={pal} navIds={navIds} setNavIds={setNavIds} onClose={()=>setShowNav(false)} />}
        {showSwitcher && <ViewSwitcher   pal={pal} family={family} onParent={()=>setShowSwitcher(false)} onStudent={switchToStudent} />}
        {showSchedConfirm && <SchedConfirmModal pal={pal} family={family} days={pendingSchedDays} onConfirm={()=>{setAttendanceDays(d=>d+pendingSchedDays);setPendingSchedDays(0);setShowSchedConfirm(false);}} onClose={()=>setShowSchedConfirm(false)} />}
        {showCatchup  && <CatchupModal   pal={pal} family={family} days={attendanceDays} needed={180} onClose={()=>setShowCatchup(false)} />}
        {checkin      && <CheckinModal   pal={pal} family={family} onClose={()=>setCheckin(false)} onSave={handleCheckinSave} />}
        {showDaySummary && daySummaryData && <DaySummaryModal pal={pal} family={family} data={daySummaryData} portfolioEntries={portfolioEntries}
          onSave={(entries)=>{entries.forEach(e=>addPortfolioEntry(e));setShowDaySummary(false);setActiveTab("home");}}
          onClose={()=>{setShowDaySummary(false);setActiveTab("home");}} />}
      </>)}
    </div>
  );
}

======================================= */
function StudentPortal({ child, family, pal, isCoop, allEntries, onAddEntry, onCoopLog, onBack }) {
  const [sTab,     setSTab]     = useState("home");
  const [noteText, setNoteText] = useState("");
  const [noteSaved,setNoteSaved]= useState(false);
  const [points,   setPoints]   = useState(142);
  const [streak,   setStreak]   = useState(7);
  const [showCoopPopup, setShowCoopPopup] = useState(isCoop && (family.coopFreq||'') !== "We don't do co-op" && (family.coopFreq||'') !== '');
  const [coopDone, setCoopDone] = useState(false);

  const childIdx  = family.children.findIndex(c=>c.id===child.id);
  const myEntries = allEntries.filter(e=>e.childIdx===childIdx);
  const colorPalette = CHILD_COLOR_PALETTES.find(p=>p.id===(child.colorId||"sunshine")) || CHILD_COLOR_PALETTES[childIdx%CHILD_COLOR_PALETTES.length];
  const [c1,c2]   = [colorPalette.c1, colorPalette.c2];
  const heroGrad  = `linear-gradient(135deg,${c1},${c2})`;

  const greetKid  = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };

  const saveNote = () => {
    if(!noteText.trim()) return;
    onAddEntry({childIdx, title:noteText.slice(0,42), subj:"Daily Note", date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}), thumb:"", note:noteText});
    setNoteText(""); setNoteSaved(true); setPoints(p=>p+10); setStreak(s=>s);
    setTimeout(()=>setNoteSaved(false),2400);
  };

  const SCHEDULE = generateSchedule(family);

  const STABS = [{id:"home",icon:"🏠",l:"Home"},{id:"today",icon:"📅",l:"Today"},{id:"mywork",icon:"*",l:"My Work"},{id:"streak",icon:"🔥",l:"Streak"}];

  return (
    <div style={{minHeight:"100vh",background:SK.cream,fontFamily:"'Comic Sans MS','Chalkboard SE',cursive",display:"flex",flexDirection:"column"}}>

        </div>
        <div style={{background:"rgba(255,255,255,0.22)",borderRadius:"9px",padding:"0.2rem 0.55rem",display:"flex",alignItems:"center",gap:"0.3rem"}}>
          <span style={{fontSize:"0.85rem"}}>*</span>
          <span style={{fontWeight:"800",color:"#fff",fontSize:"0.78rem"}}>{points}</span>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:"74px"}}>

        {/* -- HOME TAB -- */}
        {sTab==="home" && (
          <div style={{animation:"fadeUp 0.22s ease"}}>
            {/* Big hero */}
            <div style={{background:heroGrad,padding:"1.5rem 1.2rem 2.5rem",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",right:"-25px",bottom:"-25px",width:"110px",height:"110px",borderRadius:"50%",background:"rgba(255,255,255,0.07)"}}/>
              <div style={{fontSize:"3.8rem",marginBottom:"0.4rem",animation:"bounce 2.2s ease infinite"}}>{child.avatar}</div>
              <div style={{fontWeight:"900",color:"#fff",fontSize:"1.55rem",lineHeight:1.2}}>{greetKid()},<br/>{child.name}! 🌟</div>
              <div style={{fontSize:"0.82rem",color:"rgba(255,255,255,0.72)",marginTop:"0.25rem"}}>Ready to learn something awesome?</div>
            </div>

            {/* Floating streak card */}
            <div style={{margin:"-1.1rem 1rem 0",position:"relative",zIndex:2}}>
              <div style={{background:SK.card,borderRadius:"22px",padding:"0.9rem 1.1rem",boxShadow:"0 4px 22px rgba(0,0,0,0.11)",display:"flex",gap:"0.9rem",alignItems:"center"}}>
                <div style={{width:"52px",height:"52px",borderRadius:"14px",background:`linear-gradient(135deg,${SK.orange},${SK.sun})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.9rem",flexShrink:0,animation:"wiggle 3s ease infinite"}}>🔥</div>

              ))}
            </div>
          </div>

        {sTab==="today" && (
          <div style={{animation:"fadeUp 0.22s ease",padding:"1.2rem 1rem"}}>

                <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`linear-gradient(135deg,${c1}88,${c2}66)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",flexShrink:0}}>{b.i}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"800",color:SK.ink,fontSize:"0.9rem"}}>{b.s}</div>

/* =======================================
   CO-OP DAY AUTO-POPUP (student)
======================================= */
function CoopDayPopup({ child, heroGrad, c1, onLog, onDismiss }) {
  const [note, setNote] = useState("");
  const [done, setDone] = useState(false);
  const handleSave = () => {
    if(!note.trim()) return;
    onLog(note);
    setDone(true);
    setTimeout(onDismiss, 2200);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,20,10,0.75)",backdropFilter:"blur(12px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center",fontFamily:"'Comic Sans MS','Chalkboard SE',cursive"}}>
      <div style={{background:SK.cream,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",padding:"1.5rem 1.4rem 2.2rem",animation:"slideUp 0.3s ease"}}>
        {!done ? <>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:"#ddd",margin:"0 auto 1.3rem"}}/>
          <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
            <div style={{fontSize:"3rem",marginBottom:"0.4rem",animation:"bounce 1.8s ease infinite"}}>🏫</div>
            <div style={{fontWeight:"900",color:SK.ink,fontSize:"1.15rem",lineHeight:1.3,marginBottom:"0.25rem"}}>Co-op Day, {child.name}! 🎉</div>
            <div style={{fontSize:"0.8rem",color:SK.lite,lineHeight:1.65}}>What did you learn or do at co-op today?</div>
          </div>
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            placeholder="We did science experiments and I learned..." rows={3} autoFocus
            style={{width:"100%",padding:"0.85rem",border:`2.5px solid ${note.length>0?c1:"#ece5dc"}`,borderRadius:"16px",fontSize:"0.9rem",fontFamily:"inherit",background:SK.skyL,color:SK.ink,resize:"none",lineHeight:1.6,outline:"none",marginBottom:"0.8rem"}}
            onFocus={e=>e.target.style.borderColor=c1} onBlur={e=>{ if(!note.length) e.target.style.borderColor="#ece5dc"; }}
          />
          <button onClick={handleSave} disabled={!note.trim()} style={{width:"100%",padding:"0.88rem",border:"none",borderRadius:"15px",background:note.trim()?`linear-gradient(135deg,${SK.sky},${SK.grass})`:"#e8e0d8",color:"#fff",fontWeight:"900",fontSize:"0.95rem",cursor:note.trim()?"pointer":"default",marginBottom:"0.55rem"}}>
            Save it!  +25 points
          </button>
          <button onClick={onDismiss} style={{width:"100%",padding:"0.5rem",border:"none",background:"transparent",color:SK.lite,fontSize:"0.78rem",cursor:"pointer"}}>Maybe later</button>
        </> : (
          <div style={{textAlign:"center",padding:"1.5rem 0"}}>
            <div style={{fontSize:"3.5rem",marginBottom:"0.65rem",animation:"starPop 0.4s ease"}}>🌟</div>
            <div style={{fontWeight:"900",color:SK.grass,fontSize:"1.1rem",marginBottom:"0.3rem"}}>+25 points! Amazing!</div>
            <div style={{fontSize:"0.82rem",color:SK.lite}}>Your co-op note was saved. Great job today, {child.name}!</div>
          </div>
        )}
      </div>
    </div>
  );
}

  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    parentName:"", familyName:"", schoolName:"", state:"Tennessee",
    yearsHomeschooling:"0-1 years",
    children:[{id:uid(),name:"",grade:"1st",avatar:"🌻"}],
    curriculumStyle:["eclectic"],
    curriculumBrands:[],
    subjects:["bible","math","reading","language","science","history"],
    sessionLength:"45 min",
    morningGathering:true, morningGatheringName:"Morning Time",
    schoolDays:"Monday-Friday", startTime:"8:00", endTime:"15:00", breakStyle:"Short breaks every hour",
    goals:["faith","reading"],
    coopFreq:"Every other week", extracurriculars:[], choresInSched:false, mealsInSched:false,
    lifeReady:false, lifeReadyFreq:"monday_plus_practice", lifeReadyCategories:[],
    paletteId:"sage",
  });
  const upd = (k,v) => setData(d=>({...d,[k]:v}));
  const STEPS = ["Welcome","Your Children","Learning Style","Curriculum","Subjects","Schedule","Goals","Life & Extras","Life Ready"];
  const pct = Math.round((step/8)*100);

  const STEP_ICONS = ["🌱","👨👩👧👦","📚","📖","🔬","📅","🌟","🌿","🛡"];

  return (
    <div style={{minHeight:"100vh",background:pal.sand,display:"flex",flexDirection:"column"}}>

      {step>0 && (
        <div style={{background:pal.deep,padding:"0.85rem 1.1rem 0.75rem",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.55rem"}}>
            <button onClick={()=>setStep(s=>Math.max(0,s-1))} style={{background:"rgba(255,255,255,0.14)",border:"none",color:"#fff",borderRadius:"50%",width:"28px",height:"28px",cursor:"pointer",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center"}}>Back</button>
            <span style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.55)",fontWeight:"700",letterSpacing:"0.08em",textTransform:"uppercase"}}>{STEP_ICONS[step]} {STEPS[step]}</span>
            <span style={{fontSize:"0.68rem",color:"rgba(255,255,255,0.4)",fontWeight:"600"}}>{step + " of 8"}</span>
          </div>
          <div style={{height:"4px",borderRadius:"99px",background:"rgba(255,255,255,0.15)",overflow:"hidden"}}>

          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto"}}>
        {step===0 && <OnbWelcome      pal={pal} data={data} upd={upd} onNext={()=>setStep(1)} />}
        {step===1 && <OnbChildren     pal={pal} data={data} upd={upd} onNext={()=>setStep(2)} />}
        {step===2 && <OnbPhilosophy   pal={pal} data={data} upd={upd} onNext={()=>setStep(3)} />}
        {step===3 && <OnbCurrBrands   pal={pal} data={data} upd={upd} onNext={()=>setStep(4)} />}
        {step===4 && <OnbSubjects     pal={pal} data={data} upd={upd} onNext={()=>setStep(5)} />}
        {step===5 && <OnbSchedule     pal={pal} data={data} upd={upd} onNext={()=>setStep(6)} />}
        {step===6 && <OnbGoals        pal={pal} data={data} upd={upd} onNext={()=>setStep(7)} />}
        {step===7 && <OnbExtras       pal={pal} data={data} upd={upd} onNext={()=>setStep(8)} />}
        {step===8 && <OnbLifeReady    pal={pal} data={data} upd={upd} onNext={()=>onComplete(data)} />}
      </div>
    </div>
  );
}

/* --- STEP 4: Subjects --- */
function OnbSubjects({ pal, data, upd, onNext }) {
  const [customInput, setCustomInput] = React.useState("");
  const toggleSubj = id => {
    const cur = data.subjects || [];
    upd("subjects", cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id]);
  };
  const addCustom = () => {
    const val = customInput.trim();
    if (!val) return;
    const id = "custom_" + val.toLowerCase().replace(/\s+/g,"_");
    const cur = data.subjects || [];
    const customs = data.customSubjects || [];
    if (!customs.find(c=>c.id===id)) {
      upd("customSubjects", [...customs, {id, label:val, icon:"📐"}]);
    }
    if (!cur.includes(id)) upd("subjects", [...cur, id]);
    setCustomInput("");
  };
  const removeCustom = (id) => {
    upd("customSubjects", (data.customSubjects||[]).filter(c=>c.id!==id));
    upd("subjects", (data.subjects||[]).filter(s=>s!==id));
  };
  const sel = data.subjects || [];
  const allSubjects = [...SUBJECT_OPTIONS, ...(data.customSubjects||[])];
  return (
    <div style={{padding:"1.4rem 1.2rem",animation:"fadeUp 0.25s ease"}}>
      <StepHdr pal={pal} icon="🔬" title="Your Subjects" sub="Pick everything you teach. You can always add or remove later." />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.45rem",marginBottom:"0.85rem"}}>
        {allSubjects.map(s=>{
          const isSelected = sel.includes(s.id);
          const isCustom = s.id.startsWith("custom_");
          return (
            <button key={s.id} onClick={()=>toggleSubj(s.id)} style={{padding:"0.7rem 0.75rem",border:`2px solid ${isSelected?pal.primary:pal.stone+"50"}`,borderRadius:"12px",background:isSelected?pal.pale:"transparent",cursor:"pointer",textAlign:"left",display:"flex",gap:"0.5rem",alignItems:"center",transition:"all 0.13s",position:"relative"}}>
              <span style={{fontSize:"1.15rem",flexShrink:0}}>{s.icon}</span>
              <span style={{fontWeight:isSelected?"700":"400",color:isSelected?pal.primary:pal.inkM,fontSize:"0.78rem",flex:1}}>{s.label}</span>
              {isSelected && !isCustom && <span style={{color:pal.primary,fontSize:"0.65rem",fontWeight:"900"}}>v</span>}
              {isCustom && <span onClick={e=>{e.stopPropagation();removeCustom(s.id);}} style={{fontSize:"0.65rem",color:pal.bad,fontWeight:"900",cursor:"pointer",padding:"0 2px"}}>x</span>}
            </button>
          );
        })}
      </div>
      {/* Custom subject adder */}
      <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.2rem",alignItems:"center"}}>
        <input
          value={customInput}
          onChange={e=>setCustomInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addCustom()}
          placeholder="Add your own subject..."
          style={{flex:1,padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor=pal.primary}
          onBlur={e=>e.target.style.borderColor=pal.stone}
        />
        <button onClick={addCustom} disabled={!customInput.trim()} style={{padding:"0.62rem 1rem",border:"none",borderRadius:"11px",background:customInput.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.82rem",cursor:customInput.trim()?"pointer":"default",whiteSpace:"nowrap",flexShrink:0}}>
          + Add
        </button>
      </div>
      <Lbl pal={pal}>Typical session length</Lbl>
      <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        {SESSION_LENGTHS.map(l=>(
          <button key={l} onClick={()=>upd("sessionLength",l)} style={{padding:"0.45rem 0.85rem",border:`2px solid ${data.sessionLength===l?pal.primary:pal.stone+"50"}`,borderRadius:"20px",background:data.sessionLength===l?pal.pale:"transparent",cursor:"pointer",fontWeight:data.sessionLength===l?"700":"400",color:data.sessionLength===l?pal.primary:pal.inkM,fontSize:"0.8rem",transition:"all 0.13s"}}>
            {l}
          </button>
        ))}
      </div>
      <div style={{background:pal.pale,borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1.2rem",border:`1.5px solid ${pal.primary}22`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom: data.morningGathering?"0.65rem":"0"}}>
          <div>
            <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.86rem"}}>🌅 Morning gathering time?</div>
            <div style={{fontSize:"0.72rem",color:pal.slate,marginTop:"2px"}}>A cozy start before individual subjects</div>
          </div>
          <button onClick={()=>upd("morningGathering",!data.morningGathering)} style={{width:"44px",height:"26px",borderRadius:"13px",border:"none",background:data.morningGathering?pal.primary:pal.stone+"60",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
            <div style={{position:"absolute",top:"3px",left:data.morningGathering?"21px":"3px",width:"20px",height:"20px",borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
          </button>
        </div>
        {data.morningGathering && (
          <div>
            <Lbl pal={pal}>What do you call it?</Lbl>
            <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.5rem"}}>
              {["Morning Time","Morning Basket","Circle Time","Morning Meeting","Devotions"].map(n=>(
                <button key={n} onClick={()=>upd("morningGatheringName",n)} style={{padding:"0.35rem 0.7rem",border:`1.5px solid ${data.morningGatheringName===n?pal.primary:pal.stone+"50"}`,borderRadius:"20px",background:data.morningGatheringName===n?pal.pale:"transparent",cursor:"pointer",fontSize:"0.74rem",fontWeight:data.morningGatheringName===n?"700":"400",color:data.morningGatheringName===n?pal.primary:pal.inkM,transition:"all 0.13s"}}>
                  {n}
                </button>
              ))}
            </div>
            <Input pal={pal} value={data.morningGatheringName} onChange={v=>upd("morningGatheringName",v)} placeholder="Or type your own name..." />
          </div>
        )}
      </div>
      <Btn pal={pal} disabled={sel.length===0} onClick={onNext}>Next -></Btn>
    </div>
  );
}

/* --- STEP 4: Goals --- */
function OnbGoals({ pal, data, upd, onNext }) {
  const [customInput, setCustomInput] = React.useState("");
  const toggle = id => upd("goals",data.goals.includes(id)?data.goals.filter(g=>g!==id):[...data.goals,id]);
  const addCustom = () => {
    const val = customInput.trim();
    if (!val) return;
    const id = "custom_" + val.toLowerCase().replace(/\s+/g,"_");
    const customs = data.customGoals || [];
    if (!customs.find(c=>c.id===id)) upd("customGoals",[...customs,{id,label:val,icon:"🌟"}]);
    const cur = data.goals || [];
    if (!cur.includes(id)) upd("goals",[...cur,id]);
    setCustomInput("");
  };
  const removeCustom = id => {
    upd("customGoals",(data.customGoals||[]).filter(g=>g.id!==id));
    upd("goals",(data.goals||[]).filter(g=>g!==id));
  };
  const allGoals = [...GOALS,...(data.customGoals||[])];
  return (
    <div style={{padding:"1.4rem 1.2rem",animation:"fadeUp 0.25s ease"}}>
      <StepHdr pal={pal} icon="🌟" title="Your Goals" sub="What matters most for your family? Pick as many as you like." />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem",marginBottom:"0.85rem"}}>
        {allGoals.map(g=>{
          const sel=data.goals.includes(g.id);
          const isCustom=g.id.startsWith("custom_");
          return (
            <button key={g.id} onClick={()=>toggle(g.id)} style={{padding:"0.8rem 0.75rem",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,borderRadius:"14px",background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.3rem",transition:"all 0.14s",position:"relative"}}>
              <span style={{fontSize:"1.5rem"}}>{g.icon}</span>
              <span style={{fontSize:"0.74rem",fontWeight:sel?"800":"500",color:sel?pal.primary:pal.inkM,lineHeight:1.25}}>{g.label}</span>
              {isCustom&&<span onClick={e=>{e.stopPropagation();removeCustom(g.id);}} style={{position:"absolute",top:"4px",right:"6px",fontSize:"0.6rem",color:pal.bad,fontWeight:"900",cursor:"pointer"}}>x</span>}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.2rem",alignItems:"center"}}>
        <input value={customInput} onChange={e=>setCustomInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustom()}
          placeholder="Add your own goal..."
          style={{flex:1,padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
          onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
        <button onClick={addCustom} disabled={!customInput.trim()} style={{padding:"0.62rem 1rem",border:"none",borderRadius:"11px",background:customInput.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.82rem",cursor:customInput.trim()?"pointer":"default",flexShrink:0}}>+ Add</button>
      </div>
      <Btn pal={pal} onClick={onNext}>Next -></Btn>
    </div>
  );
}

/* --- TIME OPTIONS --- */
const TIME_OPTS = [];
for(let h=5;h<=22;h++){
  for(let m=0;m<60;m+=30){
    if(h===22&&m===30) break;
    const val = `${h}:${m===0?"00":"30"}`;
    const hh = h>12?h-12:h===0?12:h;
    const ampm = h>=12?"pm":"am";
    const label = `${hh}:${m===0?"00":"30"} ${ampm}`;
    TIME_OPTS.push({val,label});
  }
}
function TimeSelect({pal,value,onChange}){
  return (
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",cursor:"pointer"}}>
      {TIME_OPTS.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}
    </select>
  );
}

/* --- SCHEDULE GENERATOR --- */
function generateSchedule(family) {
  const subjects = family.subjects || ["math","reading","language","science","history"];
  const sessionMins = parseInt((family.sessionLength||"45 min").split(" ")[0]);
  const customSubjs = family.customSubjects || [];
  const subjectMap = Object.fromEntries([...SUBJECT_OPTIONS, ...customSubjs].map(s=>[s.id,s]));
  const isTimed = family.scheduleMode === "timed";
  const startHour = parseInt((family.startTime||"8:00").split(":")[0]);
  const startMin  = parseInt((family.startTime||"8:00").split(":")[1]||0);
  let blocks = [];
  let cursor = startHour * 60 + startMin;
  const toTime = mins => {
    const h = Math.floor(mins/60);
    const m = mins % 60;
    return `${h}:${m.toString().padStart(2,"0")}`;
  };
  if (family.morningGathering) {
    blocks.push({t:isTimed?toTime(cursor):"", s:family.morningGatheringName||"Morning Time", i:"🌅", c:"all", dur:30});
    if(isTimed) cursor += 30;
  }
  subjects.forEach((id, idx) => {
    const subj = subjectMap[id];
    if (!subj) return;
    if (isTimed) {
      const hour = Math.floor(cursor/60);
      if (hour >= 12 && !blocks.find(b=>b.s==="Lunch")) {
        blocks.push({t:toTime(cursor), s:"Lunch", i:"🥪", c:"all", dur:45});
        cursor += 45;
      }
    }
    blocks.push({t:isTimed?toTime(cursor):"", s:subj.label, i:subj.icon, c:"all", dur:sessionMins});
    if(isTimed) {
      cursor += sessionMins;
      if ((idx+1) % 2 === 0 && idx < subjects.length-1) {
        const breakStyle = family.breakStyle||"";
        if (!breakStyle.includes("No set")) {
          blocks.push({t:toTime(cursor), s:"Break", i:"", c:"all", dur:15});
          cursor += 15;
        }
      }
    }
  });

  // Inject Life Ready blocks based on day of week
  if (family.lifeReady) {
    const dow = new Date().getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu
    const freq = family.lifeReadyFreq || "monday_plus_practice";
    const topic = getLRTopicForWeek(family.children?.[0]?.grade||"5th");
    if (dow===1) {
      // Monday — full 30-min lesson inserted right after morning gathering (or at top)
      const insertAt = family.morningGathering ? 1 : 0;
      blocks.splice(insertAt, 0, {
        t: isTimed ? toTime(cursor) : "",
        s: LR_NAME + ": " + topic,
        i: LR_ICON,
        c: "all",
        dur: 30,
        lifeReady: true,
        isLesson: true,
        accentColor: LR_COLOR,
      });
    } else if (freq === "monday_plus_practice" && (dow===2||dow===3||dow===4)) {
      // Tue-Thu — short 10-min practice prompt appended at end
      blocks.push({
        t: "",
        s: "P&C Practice: " + topic,
        i: LR_ICON,
        c: "all",
        dur: 10,
        lifeReady: true,
        isPractice: true,
        accentColor: LR_COLOR,
      });
    }
  }

  return blocks;
}

function ScheduleScreen({pal,family,child,setChild,onMarkComplete,onProgressUpdate}){
  const today = new Date();
  const todayDow = today.getDay();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - (todayDow===0?6:todayDow-1));
  const DAYS = ["Mon","Tue","Wed","Thu","Fri"].map((l,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return {l, d:d.getDate(), date:d.toDateString(), isToday:d.toDateString()===today.toDateString()};
  });
  const todayIdx = DAYS.findIndex(d=>d.isToday);
  const [selectedDay, setSelectedDay] = useState(Math.max(0,todayIdx));

  // Persist checked + skipped state in localStorage so partial progress saves across navigation
  const SCHED_KEY = "stembloom_sched_v1";
  const loadSchedState = () => { try{const s=localStorage.getItem(SCHED_KEY);return s?JSON.parse(s):{checked:{},skipped:{}};}catch(e){return{checked:{},skipped:{}};}};
  const [schedState, setSchedState] = useState(()=>loadSchedState());
  const saveSchedState = (ns) => { try{localStorage.setItem(SCHED_KEY,JSON.stringify(ns));}catch(e){} };

  const checked = schedState.checked || {};
  const daySubjects = schedState.skipped || {};

  const setChecked = (updFn) => setSchedState(prev=>{
    const ns = {...prev, checked:{...updFn(prev.checked||{})}};
    saveSchedState(ns); return ns;
  });
  const setDaySubjects = (updFn) => setSchedState(prev=>{
    const ns = {...prev, skipped:{...updFn(prev.skipped||{})}};
    saveSchedState(ns); return ns;
  });

  const allBlocks = generateSchedule(family);
  const toggleBlock = (di, bi) => {
    const key = di+"_"+bi;
    setChecked(c=>({...c,[key]:!c[key]}));
  };
  const skipBlock = (e, di, bi) => {
    e.stopPropagation();
    setDaySubjects(prev=>{
      const dayMap = prev[di]||{};
      return {...prev,[di]:{...dayMap,[bi]:!dayMap[bi]}};
    });
  };
  const checkAll = (di) => {
    const updates = {};
    allBlocks.forEach((b,bi)=>{ if(!(daySubjects[di]||{})[bi]) updates[di+"_"+bi]=true; });
    setChecked(c=>({...c,...updates}));
  };
  const uncheckAll = (di) => {
    const updates = {};
    allBlocks.forEach((_,bi)=>{ updates[di+"_"+bi]=false; });
    setChecked(c=>({...c,...updates}));
  };

  const visibleBlocks = allBlocks.filter((b,bi)=>!(daySubjects[selectedDay]||{})[bi]);
  const filteredByChild = visibleBlocks.filter(b=>child==="all"||b.c==="all"||b.c===child);
  const checkedCount = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi] && checked[selectedDay+"_"+bi]).length;
  const allDone = checkedCount===filteredByChild.length && filteredByChild.length>0;

  // Report progress to parent (home screen)
  useEffect(()=>{
    if(onProgressUpdate && DAYS[selectedDay]?.isToday) {
      onProgressUpdate(checkedCount, filteredByChild.length);
    }
  },[checkedCount, filteredByChild.length, selectedDay]);
  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <ScreenHdr pal={pal} title="Schedule" sub={new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"})} icon="📅"/>
      <div style={{padding:"0 1rem"}}>
        {/* Child filter */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"0.9rem",overflowX:"auto"}}>
          <Chip pal={pal} label="All" active={child==="all"} onClick={()=>setChild("all")}/>
          {family.children.map(c=><Chip key={c.id} pal={pal} label={c.avatar+" "+c.name} active={child===c.id} onClick={()=>setChild(c.id)}/>)}
        </div>
        {/* Day strip - real dates */}
        <div style={{display:"flex",gap:"0.35rem",marginBottom:"1rem"}}>
          {DAYS.map((d,i)=>(
            <button key={i} onClick={()=>setSelectedDay(i)} style={{flex:1,padding:"0.55rem 0",borderRadius:"12px",border:`2px solid ${i===selectedDay?pal.primary:d.isToday?pal.primary+"40":pal.stone+"55"}`,background:i===selectedDay?pal.primary:"transparent",cursor:"pointer",textAlign:"center",transition:"all 0.14s"}}>
              <div style={{fontSize:"0.58rem",fontWeight:"600",color:i===selectedDay?"rgba(255,255,255,0.7)":d.isToday?pal.primary:pal.slate,marginBottom:"2px"}}>{d.l}</div>
              <div style={{fontSize:"0.9rem",fontWeight:"800",color:i===selectedDay?pal.onDark:pal.inkM}}>{d.d}</div>
            </button>
          ))}
        </div>

        {/* Today tip - only show on today */}
        {DAYS[selectedDay]?.isToday && (
          <div style={{background:pal.pale,borderRadius:"13px",padding:"0.65rem 1rem",marginBottom:"0.85rem",border:`2px solid ${pal.primary}22`,display:"flex",gap:"0.65rem",alignItems:"center"}}>
            <span style={{fontSize:"1.1rem",flexShrink:0}}>🌱</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:"700",color:pal.primary,fontSize:"0.78rem"}}>{"Today's checklist"}</div>
              <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"1px"}}>Tap items to check them off. Skip any you are not doing today.</div>
            </div>
          </div>
        )}

        {/* Block list */}
        {filteredByChild.length===0 && (
          <div style={{textAlign:"center",padding:"2rem 1rem",color:pal.slate,fontSize:"0.82rem"}}>No subjects for this day yet.</div>
        )}
        {allBlocks.map((b, bi)=>{
          const skipped = (daySubjects[selectedDay]||{})[bi];
          const blockKey = selectedDay+"_"+bi;
          const done = !!checked[blockKey];
          const hiddenByChild = !(child==="all"||b.c==="all"||b.c===child);
          if(hiddenByChild) return null;
          return (
            <div key={bi} style={{marginBottom:"0.5rem",opacity:skipped?0.38:1,transition:"opacity 0.2s"}}>

                </div>
              </div>
            </div>
          );
        })}

        {/* Progress bar */}
        {filteredByChild.length>0&&(
          <div style={{background:pal.linen,borderRadius:"12px",padding:"0.75rem 1rem",marginTop:"0.35rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}35`}}>

              <span style={{fontSize:"0.75rem",fontWeight:"600",color:pal.inkM}}>{DAYS[selectedDay]?.isToday?"Today":"This day"}</span>
              <span style={{fontSize:"0.75rem",fontWeight:"800",color:allDone?pal.good:pal.primary}}>{checkedCount} / {filteredByChild.length} done</span>
            </div>
            <div style={{height:"7px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${filteredByChild.length?Math.round(checkedCount/filteredByChild.length*100):0}%`,borderRadius:"99px",background:allDone?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.3s ease"}}/>
            </div>

        )}

        {/* Check all / uncheck all row */}
        {filteredByChild.length>0 && (
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.65rem"}}>

          </div>
        </div>

        {/* Mark complete - glows when all done */}
        <button
          onClick={()=>{

            const completedBlocks = allBlocks.filter((_,bi)=>!(daySubjects[selectedDay]||{})[bi]&&checked[selectedDay+"_"+bi]);
            onMarkComplete({
              blocks:completedBlocks,
              date:DAYS[selectedDay]?.date||new Date().toDateString(),
              dateLabel:DAYS[selectedDay]?DAYS[selectedDay].l+" "+DAYS[selectedDay].d:new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),

          style={{width:"100%",marginBottom:"0.75rem",padding:"0.9rem",border:"none",borderRadius:"14px",background:allDone?pal.accentGrad:pal.stone+"30",color:allDone?pal.onDark:pal.stone,fontWeight:"800",fontSize:"0.88rem",cursor:allDone?"pointer":"default",transition:"all 0.3s",boxShadow:allDone?`0 6px 24px ${pal.accent}50`:"none"}}>
          {allDone ? "🌟 Day complete — see summary" : "Check off subjects above to finish the day"}
        </button>
        <div style={{height:"1rem"}}/>
      </div>
    </div>
  );
}

/* ---- AI Rate Limiter ---- */
const AI_KEY = ""; // TODO: Add your Anthropic API key here (sk-ant-...)
const AI_LIMIT_KEY = "stembloom_ai_limits";
const AI_MONTHLY_LIMIT = 50; // max AI calls per month — change as needed

function checkAILimit(limitOverride) {
  try {
    const now = new Date();
    const monthKey = now.getFullYear()+"-"+(now.getMonth()+1);
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    const count = stored[monthKey]||0;
    const limit = limitOverride || (() => { try{ return parseInt(localStorage.getItem("stembloom_ailimit")||String(AI_MONTHLY_LIMIT)); }catch(e){return AI_MONTHLY_LIMIT;} })();
    return { allowed: count < limit, used: count, limit, monthKey };
  } catch(e) { return { allowed: true, used: 0, limit: AI_MONTHLY_LIMIT, monthKey:"" }; }
}
function incrementAILimit(monthKey) {
  try {
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    stored[monthKey] = (stored[monthKey]||0) + 1;
    // Clean up old months
    const now = new Date();
    const current = now.getFullYear()+"-"+(now.getMonth()+1);
    Object.keys(stored).forEach(k=>{ if(k!==current) delete stored[k]; });
    localStorage.setItem(AI_LIMIT_KEY, JSON.stringify(stored));
  } catch(e) {}
}

async function callClaude(prompt) {
  const runtimeKey = (() => { try{ return localStorage.getItem("stembloom_apikey")||AI_KEY; }catch(e){return AI_KEY;} })();
  const runtimeLimit = (() => { try{ return parseInt(localStorage.getItem("stembloom_ailimit")||"50"); }catch(e){return 50;} })();
  if(!runtimeKey) throw new Error("NO_KEY");
  const { allowed, monthKey } = checkAILimit(runtimeLimit);
  if(!allowed) throw new Error("RATE_LIMIT");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":runtimeKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5-20251001",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}],
    }),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  incrementAILimit(monthKey);
  return data.content?.map(b=>b.text||"").join("") || "";
}

              <div key={u.id} style={{background:pal.linen,borderRadius:"18px",padding:"1rem",marginBottom:"0.65rem",border:`1.5px solid ${done?pal.good+"50":u.aiGenerated?pal.primary+"30":pal.stone+"40"}`}}>
                <div onClick={()=>setExpandedUnit(expandedUnit===u.id?null:u.id)} style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",cursor:"pointer"}}>
                  <div style={{width:"44px",height:"44px",borderRadius:"12px",background:done?pal.goodBg:pal.pale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.35rem",flexShrink:0}}>{u.icon||"📚"}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap",marginBottom:"2px"}}>
                      <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem"}}>{u.title}</div>
                      {u.aiGenerated&&<span style={{fontSize:"0.58rem",fontWeight:"800",color:pal.primary,background:pal.pale,borderRadius:"50px",padding:"0.05rem 0.38rem"}}>🤖</span>}
                      {done&&<span style={{fontSize:"0.58rem",fontWeight:"800",color:pal.good,background:pal.goodBg,borderRadius:"50px",padding:"0.05rem 0.38rem"}}>Done!</span>}
                    </div>
                    <div style={{fontSize:"0.72rem",color:pal.slate}}>{u.subject} · {u.weeks} weeks</div>
                  </div>
                  <span style={{color:pal.slate,fontSize:"1rem",transform:expandedUnit===u.id?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>›</span>
                </div>
                <div style={{marginTop:"0.72rem"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                    <span style={{fontSize:"0.67rem",color:pal.slate}}>Week {u.weeksDone} of {u.weeks}</span>
                    <span style={{fontSize:"0.67rem",fontWeight:"800",color:done?pal.good:pal.primary}}>{pct}%</span>
                  </div>
                  <div style={{height:"7px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:done?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.35s"}}/>
                  </div>
                </div>
                {expandedUnit===u.id&&(
                  <div style={{marginTop:"0.85rem",animation:"fadeUp 0.18s ease"}}>
                    {u.plan&&<div style={{padding:"0.8rem",background:pal.sand,borderRadius:"11px",marginBottom:"0.6rem",fontSize:"0.78rem",color:pal.inkM,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{u.plan}</div>}
                    {u.notes&&<div style={{padding:"0.7rem",background:pal.parchm,borderRadius:"10px",marginBottom:"0.6rem",fontSize:"0.77rem",color:pal.inkM,lineHeight:1.6,fontStyle:"italic"}}>{u.notes}</div>}
                    <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap"}}>
                      {!done&&<button onClick={()=>advanceWeek(u.id)} style={{padding:"0.4rem 0.8rem",borderRadius:"10px",border:"none",background:pal.accentGrad,color:"#fff",fontWeight:"700",fontSize:"0.73rem",cursor:"pointer"}}>+ Week {u.weeksDone+1} done</button>}
                      <button onClick={()=>setEditUnit(u)} style={{padding:"0.4rem 0.8rem",borderRadius:"10px",border:`2px solid ${pal.stone}`,background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.73rem",cursor:"pointer"}}>Edit</button>
                      <button onClick={()=>{if(window.confirm("Delete this unit?"))deleteUnit(u.id);}} style={{padding:"0.4rem 0.8rem",borderRadius:"10px",border:`2px solid ${pal.bad}40`,background:"transparent",color:pal.bad,fontWeight:"600",fontSize:"0.73rem",cursor:"pointer"}}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{height:"1rem"}}/>
        </>)}

        {/* ====== PROGRESS TAB ====== */}
        {learnTab==="progress" && (<>
          {units.length>0&&(
            <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",border:`1.5px solid ${pal.stone}45`,marginBottom:"1rem"}}>
              <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.75rem"}}>Unit Studies</div>
              {units.map((u,i,a)=>{
                const pct=u.weeks>0?Math.round(u.weeksDone/u.weeks*100):0;
                return(
                  <div key={u.id} style={{display:"flex",alignItems:"center",gap:"0.65rem",marginBottom:i<a.length-1?"0.65rem":"0"}}>
                    <span style={{fontSize:"1rem",width:"22px",textAlign:"center"}}>{u.icon||"📚"}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
                        <span style={{fontSize:"0.78rem",fontWeight:"600",color:pal.inkM}}>{u.title}</span>
                        <span style={{fontSize:"0.7rem",fontWeight:"800",color:pct>=100?pal.good:pal.primary}}>{pct}%</span>
                      </div>
                      <div style={{height:"5px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:pct>=100?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad}}/>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{background:pal.linen,borderRadius:"16px",padding:"1rem",border:`1.5px solid ${pal.stone}45`,marginBottom:"1rem"}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.78rem",marginBottom:"0.75rem"}}>Subjects This Year</div>
            {activeSubjs.length===0 ? (
              <div style={{fontSize:"0.8rem",color:pal.slate,textAlign:"center",padding:"0.75rem"}}>Add subjects in onboarding or Settings to track progress.</div>
            ) : activeSubjs.map((s,i,a)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:"0.65rem",marginBottom:i<a.length-1?"0.65rem":"0"}}>
                <div style={{width:"34px",height:"34px",borderRadius:"9px",background:pal.pale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{s.icon}</div>
                <div style={{flex:1}}>
                  <span style={{fontSize:"0.78rem",fontWeight:"600",color:pal.inkM}}>{s.label}</span>
                </div>
                <span style={{fontSize:"0.65rem",color:pal.slate,background:pal.parchm,padding:"0.12rem 0.5rem",borderRadius:"20px"}}>Active</span>
              </div>
            ))}
          </div>
          <div style={{height:"1rem"}}/>
        </>)}

        {/* ====== WORKSHEETS TAB ====== */}
        {learnTab==="worksheets" && (<>
          <div style={{background:pal.pale,borderRadius:"13px",padding:"0.72rem 0.9rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.primary}20`,fontSize:"0.77rem",color:pal.inkM,lineHeight:1.6}}>
            💡 Worksheet builder uses AI. Add your key in <b>Settings → AI</b> to enable.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.55rem",marginBottom:"0.9rem"}}>
            {WS_TYPES.map((w,i)=>(
              <button key={i} onClick={()=>setShowWS(w)} style={{padding:"0.85rem 0.7rem",border:`2px solid ${pal.stone}40`,borderRadius:"14px",background:pal.linen,cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.35rem"}}
                onMouseDown={e=>e.currentTarget.style.background=pal.pale}
                onMouseUp={e=>e.currentTarget.style.background=pal.linen}>
                <span style={{fontSize:"1.65rem"}}>{w.icon}</span>
                <span style={{fontSize:"0.76rem",fontWeight:"700",color:pal.inkM}}>{w.label}</span>
              </button>
            ))}
          </div>
          <button onClick={()=>setShowWS("custom")} style={{width:"100%",padding:"0.85rem",border:"none",borderRadius:"14px",background:pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.86rem",cursor:"pointer"}}>Build Custom Worksheet</button>
          <div style={{height:"1rem"}}/>
        </>)}
      </div>

      {/* Unit Add/Edit Modal */}
      {(showAddUnit||editUnit) && <UnitModal pal={pal} family={family} initial={editUnit}
        onClose={()=>{setShowAddUnit(false);setEditUnit(null);}}
        onSave={u=>{editUnit?updateUnit(editUnit.id,u):addUnit(u);setShowAddUnit(false);setEditUnit(null);}}/>}

      {/* AI Builder Modal */}
      {showBuilder && (
        <AIUnitBuilderModal
          pal={pal} family={family} activeChild={activeChild}
          onSave={unit=>{ const nu=[{id:uid(),...unit,aiGenerated:true,weeksDone:0},...units]; setUnits(nu);saveUnits(nu); setShowBuilder(false); setLearnTab("curriculum"); }}
          onClose={()=>setShowBuilder(false)}
        />
      )}

      {/* Worksheet Builder Modal */}
      {showWS && (
        <AIWorksheetModal
          pal={pal} family={family} activeChild={activeChild}
          wsType={showWS}
          onClose={()=>setShowWS(false)}
        />
      )}
    </div>
  );
}


/* =======================================
   AI CHAT MODAL - persistent assistant
   Calls Claude API live for any request
======================================= */
function AIChatModal({ pal, family, onClose }) {
  const [messages, setMessages] = useState([
    { role:"assistant", content:`Hi! I'm your Stem & Bloom assistant 🌱\n\nI can help you create **worksheets**, **lesson plans**, **unit studies**, **discussion questions**, or anything else for your homeschool. Just tell me what you need!\n\nTry something like:\n* "Make a worksheet on fractions for 4th grade"\n* "Write a nature journal prompt for my 7-year-old"\n* "Plan a 3-day unit on the American Revolution"` }
  ]);
  const [input,    setInput]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  const childNames = (family?.children||[]).map(c=>`${c.name} (${c.grade})`).join(", ");
  const philosophies = Array.isArray(family?.curriculumStyle)
    ? family.curriculumStyle.join(", ")
    : (family?.curriculumStyle || "eclectic");

  useEffect(() => {
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if(!AI_KEY){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"AI features need an API key. Ask your app admin to add one in settings."}]);setInput("");return;}
    const {allowed,used,limit} = checkAILimit();
    if(!allowed){setMessages(m=>[...m,{role:"user",content:text},{role:"assistant",content:"Monthly AI limit of "+limit+" uses reached. Resets next month!"}]);setInput("");return;}
    setInput("");
    const userMsg = {role:"user", content:text};
    const updated = [...messages, userMsg];
    setMessages(updated);
    setLoading(true);
    try {
      const history = updated.map(m=>({role:m.role, content:m.content}));
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":AI_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-5-20251001",
          max_tokens:1500,
          system:`You are a warm, creative homeschool assistant for Stem & Bloom app. You help homeschool families with worksheets, lesson plans, unit studies, discussion questions, project ideas, and any educational content they need.

Family info:
- Children: ${childNames || "not specified"}
- Learning philosophy: ${philosophies}
- Curriculum programs: ${(family?.curriculumBrands||[]).join(", ")||"not specified"}
- State: ${family?.state||"not specified"}
- Goals: ${(family?.goals||[]).join(", ")||"not specified"}

When creating worksheets or lesson plans, format them clearly with headers, questions numbered, and age-appropriate content. Be warm, encouraging, and practical. Keep responses focused and useful - not overly long.`,
          messages:history
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response. Please try again.";
      setMessages(m=>[...m,{role:"assistant",content:reply}]);
    } catch(e) {
      const msg = e.message==="NO_KEY"
        ? "AI features need an API key. Add your key in the app settings."
        : e.message==="RATE_LIMIT"
        ? "Monthly AI limit reached (50 uses). Reset next month or update the limit in settings."
        : "Something went wrong. Please check your connection and try again.";
      setMessages(m=>[...m,{role:"assistant",content:msg}]);
    }
    setLoading(false);
  };

  const handleKey = e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }};

  const QUICK = [
    "Make a worksheet for today",
    "Give me a fun project idea",
    "Write discussion questions",
    "Plan a lesson on nature",
  ];

  const renderMessage = (text) => {
    return text.split("\n").map((line,i)=>{
      const bold = line.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
      return <div key={i} style={{marginBottom:line===""?"0.4rem":"0"}} dangerouslySetInnerHTML={{__html:bold||"&nbsp;"}} />;
    });
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",background:pal.sand,maxWidth:"430px",margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:pal.heroGrad,padding:"0.9rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <div style={{width:"38px",height:"38px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:"#fff",fontSize:"0.95rem"}}>AI Assistant</div>
          <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.65)"}}>Worksheets, lessons, projects & more</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"8px",padding:"0.3rem 0.65rem",color:"#fff",cursor:"pointer",fontSize:"0.8rem",fontWeight:"700"}}>x</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:"0.75rem"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant" && (
              <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem",flexShrink:0,marginRight:"0.5rem",alignSelf:"flex-end",marginBottom:"2px"}}></div>
            )}
            <div style={{
              maxWidth:"82%",padding:"0.65rem 0.9rem",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
              background:m.role==="user"?pal.accentGrad:pal.linen,
              color:m.role==="user"?pal.onDark:pal.ink,
              fontSize:"0.82rem",lineHeight:1.6,
              border:m.role==="assistant"?`1px solid ${pal.stone}50`:"none"
            }}>
              {renderMessage(m.content)}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
            <div style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem"}}></div>
            <div style={{background:pal.linen,border:`1px solid ${pal.stone}50`,borderRadius:"16px 16px 16px 4px",padding:"0.65rem 0.9rem"}}>
              <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
                {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:pal.primary,opacity:0.4,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
              </div>
            </div>
          </div>
        )}
        {/* Quick prompts - show only at start */}
        {messages.length===1 && !loading && (
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginTop:"0.25rem"}}>
            {QUICK.map(q=>(
              <button key={q} onClick={()=>{setInput(q); setTimeout(()=>inputRef.current?.focus(),50);}}
                style={{padding:"0.4rem 0.75rem",border:`1.5px solid ${pal.primary}40`,borderRadius:"20px",background:pal.pale,color:pal.primary,fontSize:"0.74rem",fontWeight:"600",cursor:"pointer"}}>
                {q}
              </button>
            ))}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"0.75rem 1rem",borderTop:`1.5px solid ${pal.stone}40`,background:pal.linen,flexShrink:0}}>
        <div style={{display:"flex",gap:"0.5rem",alignItems:"flex-end"}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Ask me anything... worksheet, lesson plan, project idea..."
            rows={2}
            style={{flex:1,resize:"none",padding:"0.6rem 0.8rem",border:`1.5px solid ${pal.stone}60`,borderRadius:"12px",background:"#fff",fontSize:"0.82rem",fontFamily:"inherit",color:pal.ink,outline:"none",lineHeight:1.5}}
          />
          <button onClick={send} disabled={!input.trim()||loading}
            style={{width:"40px",height:"40px",borderRadius:"50%",border:"none",background:input.trim()&&!loading?pal.accentGrad:"#ccc",color:"#fff",fontSize:"1rem",cursor:input.trim()&&!loading?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
            >
          </button>
        </div>
        <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"0.4rem",textAlign:"center"}}>Press Enter to send - Shift+Enter for new line</div>
      </div>
      <style>{`@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

/* ---- Unit Study Add/Edit Modal ---- */
function UnitModal({pal,family,initial,onClose,onSave}){
  const isEdit = !!initial;
  const ICONS = ["📚","🏛","📐","🔬","📝","🎨","🎵","📜","🌏","🌳","📖","🧪","💻","🖌","📓"];
  const [title,   setTitle]   = useState(initial?.title||"");
  const [subject, setSubject] = useState(initial?.subject||"");
  const [icon,    setIcon]    = useState(initial?.icon||"📚");
  const [weeks,   setWeeks]   = useState(initial?.weeks||6);
  const [plan,    setPlan]    = useState(initial?.plan||"");
  const [notes,   setNotes]   = useState(initial?.notes||"");
  const [customSubj, setCustomSubj] = useState("");

  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = activeSubjs.map(s=>s.label);

  const canSave = title.trim()&&(subject||customSubj.trim());
  const finalSubj = subject||customSubj.trim();

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Unit Study":"Add Unit Study"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>x</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          <Lbl pal={pal}>Subject</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>{setSubject(s);setCustomSubj("");}}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subject===s?pal.primary:pal.stone+"60"}`,background:subject===s?pal.pale:"transparent",color:subject===s?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subject===s?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            <button onClick={()=>{setSubject("");}} style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${!subject?pal.primary:pal.stone+"60"}`,background:!subject?pal.pale:"transparent",color:!subject?pal.primary:pal.slate,fontSize:"0.73rem",cursor:"pointer"}}>Other</button>
          </div>
          {!subject && (
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)} placeholder="e.g. Home Ec, Logic, Latin..."
              style={{width:"100%",padding:"0.5rem 0.75rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",fontSize:"0.8rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit",marginBottom:"0.75rem"}}/>
          )}
          {subject && <div style={{height:"0.6rem"}}/>}

          <Lbl pal={pal}>Unit title</Lbl>
          <Input pal={pal} value={title} onChange={setTitle} placeholder="e.g. Ancient Egypt, Fractions, Essay Writing"/>
          <div style={{height:"0.75rem"}}/>

          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setIcon(ic)} style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${icon===ic?pal.primary:pal.stone+"50"}`,background:icon===ic?pal.pale:"transparent",cursor:"pointer",fontSize:"1.1rem"}}>{ic}</button>
            ))}
          </div>

          <Lbl pal={pal}>Duration</Lbl>
          <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {[2,4,6,8,10,12,16,20].map(w=>(
              <button key={w} onClick={()=>setWeeks(w)} style={{padding:"0.3rem 0.65rem",borderRadius:"20px",border:`2px solid ${weeks===w?pal.primary:pal.stone+"50"}`,background:weeks===w?pal.pale:"transparent",cursor:"pointer",fontSize:"0.76rem",fontWeight:weeks===w?"700":"400",color:weeks===w?pal.primary:pal.inkM}}>
                {w} wks
              </button>
            ))}
          </div>

          <Lbl pal={pal}>Unit plan / overview (optional)</Lbl>
          <textarea value={plan} onChange={e=>setPlan(e.target.value)} rows={4}
            placeholder="What will you cover? Key books, activities, goals..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55,marginBottom:"0.75rem"}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>

          <Lbl pal={pal}>Notes (optional)</Lbl>

          {!result&&!loading&&(
            <>
              <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
              <button onClick={generate} disabled={!topic.trim()} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:topic.trim()?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:topic.trim()?"pointer":"not-allowed"}}>
                 Generate
              </button>
            </>
          )}
          {result&&(
            <>
              <button onClick={()=>{setResult(null);setTopic("");}} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>New</button>
              <button onClick={onClose} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
                Done v
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}


function PortfolioScreen({pal,family,child,setChild,entries=[],onAddEntry,onEditEntry}){

  const [showAdd,     setShowAdd]     = useState(false);

  const items = child==="all" ? entries : entries.filter(e=>{
    const idx=family.children.findIndex(c=>c.id===child);
    return e.childIdx===idx;
  });
  const getChild = (e) => family.children[e.childIdx];

  // Group by week for the packet view
  const getWeekLabel = (dateStr) => {
    try {
      const d = new Date(dateStr+", "+new Date().getFullYear());
      const now = new Date();
      const diff = Math.floor((now - d)/(1000*60*60*24));
      if(diff<=7) return "This Week";
      if(diff<=14) return "Last Week";
      return dateStr;
    } catch(e){ return dateStr; }
  };

  if(packetChild!==null) {
    return <WeeklyPacket pal={pal} family={family} child={packetChild} entries={entries} onBack={()=>setPacketChild(null)}/>;

  return (

          <div style={{position:"relative"}}>
            <div style={{fontWeight:"800",color:"#fff",fontSize:"0.92rem",marginBottom:"0.18rem"}}>📄 Weekly Portfolio Packet</div>
            <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,0.72)",marginBottom:"0.75rem"}}>AI-generated 2-page summary · Print-ready PDF</div>

          <span style={{fontSize:"1rem"}}>+</span> Add Portfolio Entry

        {/* Entry grid */}
        {items.length===0 ? (

            {items.map(p=>{

                    {p.thumb||"📋"}
                    <div style={{position:"absolute",top:"5px",right:"6px",background:"rgba(255,255,255,0.25)",borderRadius:"5px",padding:"1px 5px",fontSize:"0.58rem",color:"#fff",fontWeight:"700"}}>edit</div>
                  </div>

      {editEntry && (
        <AddEntryModal pal={pal} family={family}
          initialData={editEntry}

  );
}

/* ---- Add Entry Modal ---- */
function AddEntryModal({pal,family,onClose,onSave,initialData=null}){
  const isEdit = initialData!==null;
  const [childIdx,  setChildIdx]  = useState(initialData?.childIdx||0);
  const [title,     setTitle]     = useState(initialData?.title||"");
  const [subj,      setSubj]      = useState(initialData?.subj||"Daily Check-In");
  const [customSubj,setCustomSubj]= useState("");
  const [showCustom,setShowCustom]= useState(false);
  const [note,      setNote]      = useState(initialData?.note||"");
  const [thumb,     setThumb]     = useState(initialData?.thumb||"📋");
  const THUMBS=["📋","📜","🎨","🔬","📖","🏛","📝","🌿","🧪","🎵","📐","🌍","🏃","🍳","🏠","🧹","🌳","📸","💡","🖌"];
  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = ["Daily Check-In",...activeSubjs.map(s=>s.label)];
  // If editing with a subj not in the list, show it as custom
  const subjInList = subjOptions.includes(subj);

  const handleSubjSelect = (s) => {
    if(s==="__other__"){setShowCustom(true);}
    else{setSubj(s);setShowCustom(false);}

  const applyCustomSubj = () => {
    if(customSubj.trim()){setSubj(customSubj.trim());setShowCustom(false);}
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Entry":"Add Portfolio Entry"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>x</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          <Lbl pal={pal}>For which child?</Lbl>
          <div style={{display:"flex",gap:"0.4rem",marginBottom:"0.85rem"}}>
            {family.children.map((c,i)=>(
              <button key={c.id} onClick={()=>setChildIdx(i)}
                style={{flex:1,padding:"0.5rem",borderRadius:"11px",border:`2px solid ${childIdx===i?pal.primary:pal.stone+"50"}`,background:childIdx===i?pal.pale:"transparent",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:"1.3rem"}}>{c.avatar}</div>
                <div style={{fontSize:"0.68rem",fontWeight:childIdx===i?"700":"400",color:childIdx===i?pal.primary:pal.inkM}}>{c.name}</div>

            ))}

          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>handleSubjSelect(s)}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subj===s&&!showCustom?pal.primary:pal.stone+"60"}`,background:subj===s&&!showCustom?pal.pale:"transparent",color:subj===s&&!showCustom?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subj===s&&!showCustom?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            {/* Other option */}
            <button onClick={()=>handleSubjSelect("__other__")}
              style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.stone+"60"}`,background:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.pale:"transparent",color:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:showCustom||(!subjInList&&subj!=="Daily Check-In")?"700":"400",cursor:"pointer"}}>
              + Other

          </div>
          {/* Custom subject input */}
          {(showCustom||(!subjInList&&subj!=="Daily Check-In")) && (

              <input value={showCustom?customSubj:subj} onChange={e=>showCustom?setCustomSubj(e.target.value):setSubj(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&applyCustomSubj()}

              {showCustom && <button onClick={applyCustomSubj} style={{padding:"0.5rem 0.75rem",border:"none",borderRadius:"11px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.78rem",cursor:"pointer"}}>Use</button>}

          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {THUMBS.map(t=>(
              <button key={t} onClick={()=>setThumb(t)}

                {t}
              </button>
