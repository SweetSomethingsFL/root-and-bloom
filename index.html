        {/* Worksheet reminder */}
        <div style={{background:"#fffbeb",border:"1.5px solid #f5c842",borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",gap:"0.55rem",alignItems:"flex-start"}}>
          <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:"1px"}}>{"📎"}</span>
          <div>
            <div style={{fontWeight:"800",color:"#7a5500",fontSize:"0.82rem",marginBottom:"2px"}}>Remember: Add Worksheets to Your Binder</div>
            <div style={{fontSize:"0.71rem",color:"#a07020",lineHeight:1.55}}>After printing your portfolio, insert completed worksheets, tests, and work samples behind each section. Physical work samples strengthen your portfolio for state evaluation.</div>
          </div>
        </div>

        <div style={{height:"1rem"}}/>
      </div>
    </div>
  );
}

/* ---- Daily Portfolio Log Modal (step-through per subject) ---- */
function DailyPortfolioModal({pal,family,childIdx,stateInfo,onClose,onSave,prevCarryOver=null}){
  const activeCh = family.children[childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjIds = family.subjects||[];
  const activeSubjList = activeSubjIds.map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);

  // Step 0 = pick date + subjects for today; steps 1..N = one per subject; final = done
  const [step,        setStep]       = useState(0);
  const [todayDate,   setTodayDate]  = useState(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}));
  const [selectedSubjs, setSelSubjs] = useState(()=>{
    const base = new Set(activeSubjList.map(s=>s.label));
    if(prevCarryOver&&prevCarryOver.length>0){
      // Add carried-over subjects (they may be from a different child's subject list)
      prevCarryOver.forEach(s=>base.add(s));
    }
    return base;
  });
  const [descMap,     setDescMap]    = useState({});
  const [photoMap,    setPhotoMap]   = useState({});
  const [readMap,     setReadMap]    = useState({});
  const [saved,       setSaved]      = useState(false);

  const galleryRef = useRef(null);
  const [gallerySubj, setGallerySubj] = useState(null);

  const toggleSubj = (label) => {
    setSelSubjs(prev=>{
      const next=new Set(prev);
      if(next.has(label)) next.delete(label); else next.add(label);
      return next;
    });
  };

  const subjSteps = activeSubjList.filter(s=>selectedSubjs.has(s.label));
  const totalSteps = subjSteps.length;
  const currentSubj = subjSteps[step-1];
  const isReadingSubj = currentSubj&&(currentSubj.label==="Reading"||currentSubj.label==="Reading/Language Arts");
  const needsReadingTitle = isReadingSubj&&(stateInfo?.readingLog||false);

  const setDesc = (label,val)=>setDescMap(m=>({...m,[label]:val}));
  const setPhotos = (label,val)=>setPhotoMap(m=>({...m,[label]:val}));
  const setReadTitle = (label,val)=>setReadMap(m=>({...m,[label]:val}));

  const handleGallery = (e) => {
    if(!gallerySubj) return;
    Array.from(e.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        setPhotoMap(m=>{
          const cur = Array.isArray(m[gallerySubj]) ? m[gallerySubj] : [];
          return {...m,[gallerySubj]:[...cur,{name:file.name,dataUrl:ev.target.result}]};
        });
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };

  const removePhoto = (label,i)=>{
    setPhotoMap(m=>{
      const cur = Array.isArray(m[label]) ? m[label] : [];
      return {...m,[label]:cur.filter((_,pi)=>pi!==i)};
    });
  };

  const handleNext = () => {
    if(step<totalSteps) setStep(s=>s+1);
    else handleFinish();
  };

  const handleFinish = () => {
    const entries = subjSteps.map(s=>{
      const desc = (descMap[s.label]||"").trim();
      const photos = (photoMap[s.label]||[]).map(p=>p.dataUrl);
      const readingTitle = (readMap[s.label]||"").trim()||undefined;
      return {
        childIdx,
        subj: s.label,
        title: desc ? desc.slice(0,80) : s.label+" session",
        note: desc||"",
        thumb: s.icon||"📋",
        date: todayDate,
        photos,
        readingTitle,
      };
    }).filter(e=>e.note.trim()||e.photos.length>0);
    if(entries.length===0){
      // save at least one entry per selected subject with empty note
      onSave(subjSteps.map(s=>({childIdx,subj:s.label,title:s.label+" session",note:"",thumb:s.icon||"📋",date:todayDate,photos:[]})));
      return;
    }
    setSaved(true);
    onSave(entries);
  };

  const canProceed0 = selectedSubjs.size>0;
  const curDesc = currentSubj ? (descMap[currentSubj.label]||"") : "";
  const curPhotos = currentSubj ? (Array.isArray(photoMap[currentSubj.label]) ? photoMap[currentSubj.label] : []) : [];
  const curRead = currentSubj ? (readMap[currentSubj.label]||"") : "";
  const canProceedSubj = !needsReadingTitle || curRead.trim().length>0;

  if(saved){
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",padding:"2rem 1.5rem 3rem",textAlign:"center",animation:"slideUp 0.28s ease"}}>
          <div style={{fontSize:"3.5rem",marginBottom:"0.6rem"}}>{"🌱"}</div>
          <div style={{fontWeight:"900",color:cp.c1,fontSize:"1.1rem",marginBottom:"0.35rem"}}>{"Today" + String.fromCharCode(39) + "s log saved!"}</div>
          <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.65,marginBottom:"1.5rem"}}>{selectedSubjs.size} subject{selectedSubjs.size!==1?"s":""} added to {activeCh?.name}{String.fromCharCode(39)}s portfolio.</div>
          <button onClick={onClose} style={{width:"100%",padding:"0.82rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.9rem",cursor:"pointer"}}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"90vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>

        {/* Handle + Header */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>
        <div style={{padding:"0.7rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.98rem"}}>
              {step===0 ? "What did we do today?" : currentSubj?.icon+" "+currentSubj?.label}
            </div>
            <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>
              {step===0 ? activeCh?.avatar+" "+activeCh?.name+(prevCarryOver&&prevCarryOver.length>0?" • subjects carried over ✓":"") : "Step "+(step)+" of "+totalSteps+" • "+activeCh?.name}
            </div>
          </div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>{"x"}</button>
        </div>

        {/* Progress bar */}
        {totalSteps>0&&(
          <div style={{display:"flex",gap:"3px",padding:"0.55rem 1.3rem 0",flexShrink:0}}>
            {Array.from({length:totalSteps},(_,i)=>(
              <div key={i} style={{flex:1,height:"4px",borderRadius:"99px",background:i<step?cp.c1:i===step-1?cp.c1+"88":pal.stone+"40",transition:"background 0.25s"}}/>
            ))}
          </div>
        )}

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          {/* Step 0: Date + Subject picker */}
          {step===0&&(
            <div>
              <div style={{marginBottom:"1rem"}}>
                <Lbl pal={pal}>Date</Lbl>
                <input value={todayDate} onChange={e=>setTodayDate(e.target.value)}
                  style={{width:"100%",padding:"0.55rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
                  onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
              </div>
              <Lbl pal={pal}>Subjects covered today</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:"0.35rem"}}>
                {activeSubjList.map(s=>{
                  const sel=selectedSubjs.has(s.label);
                  return (
                    <button key={s.id||s.label} onClick={()=>toggleSubj(s.label)}
                      style={{display:"flex",alignItems:"center",gap:"0.65rem",padding:"0.62rem 0.9rem",borderRadius:"12px",border:`2px solid ${sel?cp.c1:pal.stone+"50"}`,background:sel?cp.c1+"12":"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.13s"}}>
                      <div style={{width:"32px",height:"32px",borderRadius:"8px",background:sel?cp.c1+"22":pal.parchm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{s.icon||"📋"}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:sel?"700":"500",color:sel?pal.ink:pal.inkM,fontSize:"0.84rem"}}>{s.label}</div>
                      </div>
                      <div style={{width:"20px",height:"20px",borderRadius:"50%",border:`2px solid ${sel?cp.c1:pal.stone+"60"}`,background:sel?cp.c1:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel&&<span style={{color:"#fff",fontSize:"0.65rem",fontWeight:"900"}}>{"\u2713"}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
              {activeSubjList.length===0&&(
                <div style={{padding:"1rem",textAlign:"center",fontSize:"0.78rem",color:pal.slate,background:pal.parchm,borderRadius:"12px"}}>
                  No subjects set up yet. Go to Settings to add your subjects.
                </div>
              )}
            </div>
          )}

          {/* Steps 1..N: per-subject description */}
          {step>0&&currentSubj&&(
            <div>
              <div style={{background:`linear-gradient(135deg,${cp.c1}15,${cp.c2}08)`,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`1.5px solid ${cp.c1}25`}}>
                <div style={{fontSize:"2rem",marginBottom:"0.3rem"}}>{currentSubj.icon||"📋"}</div>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.95rem"}}>{currentSubj.label}</div>
                <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px"}}>Describe what was worked on today</div>
              </div>

              {needsReadingTitle&&(
                <div style={{marginBottom:"0.85rem",animation:"fadeUp 0.18s ease"}}>
                  <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>{"*"}</span></Lbl>
                  <div style={{background:pal.pale,borderRadius:"10px",padding:"0.4rem 0.65rem",marginBottom:"0.45rem",fontSize:"0.7rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>
                    {"📖 "}{family.state||"Your state"} requires reading materials to be listed by title.
                  </div>
                  <Input pal={pal} value={curRead} onChange={v=>setReadTitle(currentSubj.label,v)} placeholder="e.g. Charlotte Web, Saxon Math 5/4..."/>
                </div>
              )}
              {isReadingSubj&&!needsReadingTitle&&(
                <div style={{marginBottom:"0.7rem"}}>
                  <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
                  <Input pal={pal} value={curRead} onChange={v=>setReadTitle(currentSubj.label,v)} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
                </div>
              )}

              <Lbl pal={pal}>What did {activeCh?.name} work on?</Lbl>
              <textarea
                value={curDesc}
                onChange={e=>setDesc(currentSubj.label,e.target.value)}
                rows={4}
                placeholder={"Describe the activity, lesson, or topic covered. What did " + (activeCh?.name||"they") + " learn or practice?"}
                style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.83rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6,marginBottom:"0.75rem"}}
                onFocus={e=>e.target.style.borderColor=cp.c1}
                onBlur={e=>e.target.style.borderColor=pal.stone}/>

              {/* Photos for this subject */}
              <Lbl pal={pal}>Photos (optional)</Lbl>
              <input ref={galleryRef} type="file" accept="image/*" multiple onChange={handleGallery} style={{display:"none"}}/>
              <button onClick={()=>{setGallerySubj(currentSubj.label);setTimeout(()=>galleryRef.current?.click(),50);}}
                style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.55rem 0.9rem",border:`2px solid ${pal.stone}50`,borderRadius:"11px",background:"transparent",color:pal.inkM,fontWeight:"700",fontSize:"0.77rem",cursor:"pointer",marginBottom:"0.6rem"}}>
                <span style={{fontSize:"1rem"}}>{"📷"}</span><span>Add Photos</span>
              </button>
              {curPhotos.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem",marginBottom:"0.5rem"}}>
                  {curPhotos.map((p,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:"10px",overflow:"hidden",aspectRatio:"1",border:`1.5px solid ${pal.stone}40`}}>
                      <img src={p.dataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <button onClick={()=>removePhoto(currentSubj.label,i)}
                        style={{position:"absolute",top:"4px",right:"4px",width:"20px",height:"20px",borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:"0.65rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
                        {"x"}
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Footer buttons */}
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          {step>0&&(
            <button onClick={()=>setStep(s=>s-1)}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>
              {"< Back"}
            </button>
          )}
          {step===0&&(
            <button onClick={onClose}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>
              Cancel
            </button>
          )}
          <button
            onClick={handleNext}
            disabled={step===0?!canProceed0:!canProceedSubj}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:(step===0?canProceed0:canProceedSubj)?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:(step===0?canProceed0:canProceedSubj)?"pointer":"default"}}>
            {step===0 ? "Start \u2192 "+selectedSubjs.size+" subject"+(selectedSubjs.size!==1?"s":"")
              : step===totalSteps ? "Save Portfolio \u2713"
              : "Next: "+(subjSteps[step]?.label||"")+" \u2192"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Entry Detail Modal ---- */

  if(!entry) return null;
  const ch = family.children[entry.childIdx];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"flex-end",animation:"fadeIn 0.18s ease"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxHeight:"85vh",overflowY:"auto",background:pal.linen,borderRadius:"22px 22px 0 0",padding:"1.2rem 1.1rem 2rem",animation:"slideUp 0.22s ease"}}>

        {/* Handle bar */}
        <div style={{width:"40px",height:"4px",borderRadius:"99px",background:pal.stone+"60",margin:"0 auto 1rem"}}/>

        {/* Header */}
        <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",marginBottom:"1rem"}}>
          <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`linear-gradient(135deg,${cp.c1}25,${cp.c2}18)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",flexShrink:0,overflow:"hidden",position:"relative"}}>
            {entry.photos&&entry.photos[0]
              ?<img src={entry.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>
              :<span>{entry.thumb||"📋"}</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.92rem",lineHeight:1.3}}>{entry.readingTitle||entry.title}</div>
            <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"2px"}}>
              {entry.subj}{entry.date?" · "+entry.date:""}{ch?" · "+ch.avatar+" "+ch.name:""}
            </div>
          </div>
          {onEdit&&<button onClick={onEdit} style={{padding:"0.28rem 0.65rem",border:`1.5px solid ${pal.stone}`,borderRadius:"8px",background:"transparent",color:pal.slate,fontWeight:"700",fontSize:"0.7rem",cursor:"pointer",flexShrink:0}}>Edit</button>}
        </div>

        {/* Reading title */}
        {entry.readingTitle&&entry.readingTitle!==entry.title&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.3rem"}}>📖 Reading Material</div>
            <div style={{fontSize:"0.88rem",color:pal.ink,fontWeight:"600"}}>{entry.readingTitle}</div>
          </div>
        )}

        {/* Notes */}
        {entry.note&&entry.note.trim()&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>Notes</div>
            <div style={{fontSize:"0.84rem",color:pal.inkM,lineHeight:1.75,background:pal.parchm,borderRadius:"11px",padding:"0.75rem 0.9rem",whiteSpace:"pre-wrap"}}>{entry.note.replace("AI Summary: ","").trim()}</div>
          </div>
        )}

        {/* Subjects covered (day notes) */}
        {entry.subjects&&entry.subjects.length>0&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>Subjects Covered</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>
              {entry.subjects.map(s=>(
                <span key={s} style={{fontSize:"0.72rem",padding:"0.15rem 0.55rem",background:cp.c1+"18",borderRadius:"20px",color:cp.c1,fontWeight:"700"}}>{s}</span>
              ))}
            </div>
          </div>
        )}

        {/* AI Summary */}
        {entry.aiSummary&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>🤖 AI Summary</div>
            <div style={{fontSize:"0.82rem",color:pal.inkM,lineHeight:1.7,background:pal.pale,borderRadius:"11px",padding:"0.7rem 0.85rem",fontStyle:"italic"}}>{entry.aiSummary}</div>
          </div>
        )}

        {/* Photos */}
        {entry.photos&&entry.photos.length>0&&(
          <div style={{marginBottom:"0.75rem"}}>
            <div style={{fontSize:"0.62rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.45rem"}}>📷 Photos ({entry.photos.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem"}}>
              {entry.photos.map((src,i)=>(
                <div key={i} style={{aspectRatio:"1",borderRadius:"10px",overflow:"hidden",border:`1.5px solid ${pal.stone}30`}}>
                  <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
              ))}
            </div>
          </div>
        )}

        <button onClick={onClose}
          style={{width:"100%",padding:"0.8rem",border:"none",borderRadius:"13px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer",marginTop:"0.5rem"}}>
          Done
        </button>
      </div>
    </div>
  );
}



/* ---- State Reminder ---- */
function StateReminder({pal,stateInfo,state}){
  const [open, setOpen] = useState(false);
  if(!state) return null;

  const tier = stateInfo.tier||2;
  const tierColor = tier<=1?pal.good:tier===2?pal.primary:tier===3?"#e07b00":"#c0392b";
  const tierLabel = tier<=1?"Low regulation":tier===2?"Moderate regulation":tier===3?"Moderate-high regulation":"High regulation";

  return (
    <div style={{background:pal.linen,borderRadius:"14px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1.1rem"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.75rem 0.9rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:"1.1rem",flexShrink:0}}>📋</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{state} Portfolio Reminder</div>
          <div style={{fontSize:"0.65rem",color:tierColor,fontWeight:"700",marginTop:"1px"}}>{tierLabel}</div>
        </div>
        <span style={{color:pal.slate,fontSize:"1rem",transform:open?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>›</span>
      </button>
      {open&&(
        <div style={{borderTop:`1px solid ${pal.stone}20`,padding:"0.75rem 0.9rem",background:"#fff"}}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
            {[
              ["📋","What to keep",stateInfo.portfolio],
              ["⏰","Hours / days",stateInfo.hours],
              ["📊","Testing",stateInfo.testing],
              ["📅","Due date",stateInfo.deadline],
              ["🗂","Keep records for",stateInfo.keepFor],
            ].filter(([_,__,v])=>v&&v!=="None"&&v!=="Not required"&&v!=="Not specified").map(([icon,label,val])=>(
              <div key={label} style={{display:"flex",gap:"0.6rem",alignItems:"flex-start"}}>
                <span style={{fontSize:"0.85rem",flexShrink:0,marginTop:"1px"}}>{icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.65rem",fontWeight:"700",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"1px"}}>{label}</div>
                  <div style={{fontSize:"0.78rem",color:pal.inkM,lineHeight:1.5}}>{val}</div>
                </div>
              </div>
            ))}
            <div style={{fontSize:"0.67rem",color:pal.slate,marginTop:"0.25rem",fontStyle:"italic",lineHeight:1.5}}>
              Laws can change. Always verify with HSLDA.org or your state DOE before your annual evaluation.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- Additional Notes ---- */
function AdditionalNotes({pal,family,child}){
  const LS_KEY = "rootbloom_portnotes_"+(child?.id||"");
  const [notes, setNotes] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [editing, setEditing] = useState(false);

  const save = (v) => {
    setNotes(v);
    try{localStorage.setItem(LS_KEY,v);}catch(e){}
  };

  return (
    <div style={{background:pal.linen,borderRadius:"14px",border:`1.5px solid ${pal.stone}30`,overflow:"hidden",marginBottom:"1.1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.75rem 0.9rem",borderBottom:editing||notes?`1px solid ${pal.stone}20`:"none"}}>
        <div>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>Additional Notes</div>
          <div style={{fontSize:"0.65rem",color:pal.slate,marginTop:"1px"}}>Parent observations, goals, reflections</div>
        </div>
        <button onClick={()=>setEditing(e=>!e)}
          style={{padding:"0.28rem 0.65rem",border:`1.5px solid ${pal.stone}`,borderRadius:"8px",background:"transparent",color:pal.slate,fontWeight:"700",fontSize:"0.7rem",cursor:"pointer"}}>
          {editing?"Done":"Edit"}
        </button>
      </div>
      {(editing||notes.trim())&&(
        <div style={{padding:"0.75rem 0.9rem",background:"#fff"}}>
          {editing ? (
            <textarea value={notes} onChange={e=>save(e.target.value)} rows={4}
              placeholder={"Notes about "+(child?.name||"your student")+" - progress, observations, goals for next term..."}
              style={{width:"100%",padding:"0.6rem 0.75rem",border:`1.5px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.8rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}/>
          ) : (
            <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{notes}</div>
          )}
        </div>
      )}
    </div>
  );
}



/* =======================================
   ADD EXTRACURRICULAR MODAL
   Purpose-built for activities outside
   the regular academic schedule.
======================================= */
function AddExtraModal({pal, family, onClose, onSave}) {
  const fileRef = useRef(null);
  const CHILD_COLORS2 = ["#e8943a","#4aabcf","#9b6fc8","#44aa66","#e85a7a"];

  // Which children participated
  const [selChildren, setSelChildren] = useState(
    new Set(family.children.map((_,i)=>i))
  );
  const toggleChild = (i) => setSelChildren(prev=>{
    const n = new Set(prev);
    if(n.has(i) && n.size>1) n.delete(i); else n.add(i);
    return n;
  });

  // Activity details
  const [activity,  setActivity]  = useState("");
  const [category,  setCategory]  = useState("");
  const [duration,  setDuration]  = useState("");
  const [note,      setNote]      = useState("");
  const [photos,    setPhotos]    = useState([]);

  // Build activity list from family extracurriculars + presets
  const familyExtras = [
    ...(family.extracurriculars||[]).filter(e=>e!=="None right now"),
    ...(family.customExtracurriculars||[]),
  ];
  const PRESET_CATEGORIES = [
    {label:"Sports",       icon:"🏃"},
    {label:"Music",        icon:"🎵"},
    {label:"Art",          icon:"🎨"},
    {label:"Dance",        icon:"💃"},
    {label:"Theater",      icon:"🎭"},
    {label:"Scouting",     icon:"⚜️"},
    {label:"Martial Arts", icon:"🥋"},
    {label:"Club",         icon:"🏅"},
    {label:"Field Trip",   icon:"🚌"},
    {label:"Volunteer",    icon:"🤎"},
    {label:"Other",        icon:"⭐"},
  ];
  const allCategories = [
    ...familyExtras.map(e=>({label:e, icon:"🏆"})),
    ...PRESET_CATEGORIES.filter(p=>!familyExtras.includes(p.label)),
  ];

  const handlePhoto = (e) => {
    Array.from(e.target.files).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ev => setPhotos(p=>[...p,{name:file.name,dataUrl:ev.target.result}]);
      reader.readAsDataURL(file);
    });
  };

  const canSave = activity.trim().length > 0;

  const handleSave = () => {
    const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const cat = category||activity;
    const entries = [...selChildren].map(ci=>{
      const icon = allCategories.find(c=>c.label===cat)?.icon||"🏆";
      return {
        childIdx: ci,
        title: activity.trim(),
        subj: "Extracurricular",
        date: today,
        thumb: icon,
        note: note.trim(),
        duration: duration||null,
        category: cat,
        photos: photos.map(p=>p.dataUrl),
        isExtra: true,
      };
    });
    onSave(entries);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.75)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"90vh",display:"flex",flexDirection:"column",animation:"slideUp 0.26s ease"}}>

        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>

        {/* Header */}
        <div style={{background:pal.heroGrad,padding:"0.9rem 1.2rem",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{"🏆 Log Extracurricular"}</div>
            <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.7)",marginTop:"2px"}}>Sports, music, clubs, field trips, and more</div>
          </div>
          <button onClick={onClose}
            style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"9px",padding:"0.3rem 0.65rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>
            {"✕"}
          </button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.2rem"}}>

          {/* Who participated */}
          {family.children.length>1&&(
            <div style={{marginBottom:"1rem"}}>
              <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.45rem"}}>Who participated?</div>
              <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap"}}>
                {family.children.map((c,i)=>{
                  const cc=CHILD_COLORS2[i%CHILD_COLORS2.length];
                  const sel=selChildren.has(i);
                  return (
                    <button key={c.id} onClick={()=>toggleChild(i)}
                      style={{display:"flex",alignItems:"center",gap:"0.35rem",padding:"0.32rem 0.75rem",borderRadius:"20px",border:`2px solid ${sel?cc:pal.stone+"50"}`,background:sel?cc+"22":"transparent",cursor:"pointer",transition:"all 0.12s"}}>
                      <span style={{fontSize:"1rem"}}>{c.avatar}</span>
                      <span style={{fontSize:"0.78rem",fontWeight:sel?"700":"400",color:sel?cc:pal.slate}}>{c.name}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Category chips */}
          <div style={{marginBottom:"0.85rem"}}>
            <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.45rem"}}>Category</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem"}}>
              {allCategories.map(c=>{
                const sel=category===c.label;
                return (
                  <button key={c.label} onClick={()=>setCategory(sel?"":c.label)}
                    style={{display:"flex",alignItems:"center",gap:"0.28rem",padding:"0.28rem 0.65rem",borderRadius:"20px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",cursor:"pointer",transition:"all 0.12s"}}>
                    <span style={{fontSize:"0.85rem"}}>{c.icon}</span>
                    <span style={{fontSize:"0.74rem",fontWeight:sel?"700":"400",color:sel?pal.primary:pal.inkM}}>{c.label}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Activity name */}
          <div style={{marginBottom:"0.85rem"}}>
            <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>
              {"Activity / Event *"}
            </div>
            <input
              value={activity}
              onChange={e=>setActivity(e.target.value)}
              placeholder={"e.g. Soccer practice, Piano recital, Museum field trip..."}
              autoFocus
              style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.83rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}
            />
          </div>

          {/* Duration */}
          <div style={{marginBottom:"0.85rem"}}>
            <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>Duration (optional)</div>
            <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap"}}>
              {["30 min","45 min","1 hour","1.5 hrs","2 hrs","2.5 hrs","3 hrs","All day"].map(d=>(
                <button key={d} onClick={()=>setDuration(duration===d?"":d)}
                  style={{padding:"0.28rem 0.65rem",borderRadius:"20px",border:`2px solid ${duration===d?pal.primary:pal.stone+"50"}`,background:duration===d?pal.pale:"transparent",cursor:"pointer",fontSize:"0.74rem",fontWeight:duration===d?"700":"400",color:duration===d?pal.primary:pal.inkM,transition:"all 0.12s"}}>
                  {d}
                </button>
              ))}
            </div>
          </div>

          {/* Notes */}
          <div style={{marginBottom:"0.85rem"}}>
            <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>Notes (optional)</div>
            <textarea
              value={note}
              onChange={e=>setNote(e.target.value)}
              placeholder={"e.g. Scored first goal! Piano exam passed with distinction. Really enjoyed the science museum."}
              rows={3}
              style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
              onFocus={e=>e.target.style.borderColor=pal.primary}
              onBlur={e=>e.target.style.borderColor=pal.stone}
            />
          </div>

          {/* Photos */}
          <div style={{marginBottom:"0.5rem"}}>
            <div style={{fontSize:"0.74rem",fontWeight:"700",color:pal.inkM,marginBottom:"0.35rem"}}>Photos (optional)</div>
            <input type="file" ref={fileRef} accept="image/*" multiple onChange={handlePhoto} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()}
              style={{padding:"0.45rem 1rem",border:`2px dashed ${pal.primary}50`,borderRadius:"11px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.78rem",cursor:"pointer",marginBottom:"0.55rem",display:"flex",alignItems:"center",gap:"0.4rem"}}>
              <span>{"📷"}</span><span>Add photos</span>
            </button>
            {photos.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.4rem"}}>
                {photos.map((p,i)=>(
                  <div key={i} style={{position:"relative",borderRadius:"10px",overflow:"hidden",border:`1.5px solid ${pal.stone}35`}}>
                    <img src={p.dataUrl} alt="" style={{width:"100%",height:"72px",objectFit:"cover",display:"block"}}/>
                    <button onClick={()=>setPhotos(ps=>ps.filter((_,pi)=>pi!==i))}
                      style={{position:"absolute",top:"3px",right:"3px",width:"20px",height:"20px",borderRadius:"50%",background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:"0.65rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {"✕"}
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"0.9rem 1.2rem",borderTop:`1px solid ${pal.stone}40`,background:pal.linen,flexShrink:0,display:"flex",gap:"0.5rem"}}>
          <button onClick={onClose}
            style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>
            Cancel
          </button>
          <button onClick={handleSave} disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {"Save to Portfolio ✓"}
          </button>
        </div>
      </div>
    </div>
  );
}

function AddEntryModal({pal,family,onClose,onSave,initialData=null,stateInfo=null}){
  const isEdit = initialData!==null;
  // Multi-child: store as Set of indices
  const [selectedChildren, setSelectedChildren] = useState(
    isEdit ? new Set([initialData?.childIdx||0]) : new Set([0])
  );
  const toggleChild = (i) => {
    if(isEdit) { setSelectedChildren(new Set([i])); return; } // edit = single child
    setSelectedChildren(prev => {
      const next = new Set(prev);
      if(next.has(i) && next.size>1) next.delete(i);
      else next.add(i);
      return next;
    });
  };
  const [title,     setTitle]     = useState(initialData?.title||"");
  const [subj,      setSubj]      = useState(initialData?.subj||"Daily Check-In");
  const [customSubj,setCustomSubj]= useState("");
  const [showCustom,setShowCustom]= useState(false);
  const [note,      setNote]      = useState(initialData?.note||"");
  const [thumb,        setThumb]       = useState(initialData?.thumb||"📋");
  const [readingTitle, setReadingTitle] = useState(initialData?.readingTitle||"");
  const isReadingSubj = subj==="Reading" || subj==="Reading/Language Arts";
  const needsReadingTitle = isReadingSubj && (stateInfo?.readingLog||false) && !isEdit;
  const canSaveReading = !needsReadingTitle || readingTitle.trim().length>0;
  const THUMBS=["📋","📜","🎨","🔬","📖","🏛","📝","🌿","🧪","🎵","📐","🌍","🏃","🍳","🏠","🧹","🌳","📸","💡","🖌"];
  const [photos,      setPhotos]    = useState(initialData?.photos||[]);
  const [showCamera,  setShowCamera]= useState(false);
  const galleryRef  = useRef(null);
  const cameraRef   = useRef(null);
  const videoRef    = useRef(null);
  const canvasRef   = useRef(null);
  const streamRef   = useRef(null);

  const handleGallery = (e) => {
    Array.from(e.target.files).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ev => setPhotos(p=>[...p,{name:file.name,dataUrl:ev.target.result}]);
      reader.readAsDataURL(file);
    });
  };

  const openCamera = async () => {
    setShowCamera(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
      streamRef.current = stream;
      if(videoRef.current) videoRef.current.srcObject = stream;
    } catch(e) {
      alert("Camera not available. Try uploading from gallery instead.");
      setShowCamera(false);
    }
  };

  const takePhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if(!video||!canvas) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    const dataUrl = canvas.toDataURL("image/jpeg",0.85);
    setPhotos(p=>[...p,{name:"photo-"+Date.now()+".jpg",dataUrl}]);
    closeCamera();
  };

  const closeCamera = () => {
    if(streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setShowCamera(false);
  };

  const removePhoto = (i) => setPhotos(p=>p.filter((_,pi)=>pi!==i));
  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = ["Daily Check-In",...activeSubjs.map(s=>s.label)];
  // If editing with a subj not in the list, show it as custom
  const subjInList = subjOptions.includes(subj);
  const canSave = title.trim().length>0 && canSaveReading;

  const handleSubjSelect = (s) => {
    if(s==="__other__"){setShowCustom(true);}
    else{setSubj(s);setShowCustom(false);}
  };
  const applyCustomSubj = () => {
    if(customSubj.trim()){setSubj(customSubj.trim());setShowCustom(false);}
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Entry":"Add Portfolio Entry"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>{"✕"}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>

          <Lbl pal={pal}>{isEdit?"For which child?":"For which children? (select all that apply)"}</Lbl>
          <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {family.children.map((c,i)=>{
              const sel=selectedChildren.has(i);
              return (
                <button key={c.id} onClick={()=>toggleChild(i)}
                  style={{flex:1,minWidth:"80px",padding:"0.55rem 0.4rem",borderRadius:"11px",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"center",position:"relative",transition:"all 0.13s"}}>
                  {sel&&<div style={{position:"absolute",top:"4px",right:"4px",width:"14px",height:"14px",borderRadius:"50%",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:"0.7rem",fontWeight:"900"}}>✓</span></div>}
                  <div style={{fontSize:"1.3rem"}}>{c.avatar}</div>
                  <div style={{fontSize:"0.68rem",fontWeight:sel?"700":"400",color:sel?pal.primary:pal.inkM}}>{c.name}</div>
                </button>
              );
            })}
          </div>
          {!isEdit && selectedChildren.size>1 && (
            <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.75rem",marginBottom:"0.75rem",marginTop:"-0.4rem",fontSize:"0.72rem",color:pal.primary,fontWeight:"700"}}>
              {selectedChildren.size} children selected — one entry will be saved for each
            </div>
          )}

          <Lbl pal={pal}>Subject</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>handleSubjSelect(s)}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subj===s&&!showCustom?pal.primary:pal.stone+"60"}`,background:subj===s&&!showCustom?pal.pale:"transparent",color:subj===s&&!showCustom?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subj===s&&!showCustom?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            {/* Other option */}
            <button onClick={()=>handleSubjSelect("__other__")}
              style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.stone+"60"}`,background:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.pale:"transparent",color:showCustom||(!subjInList&&subj!=="Daily Check-In")?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:showCustom||(!subjInList&&subj!=="Daily Check-In")?"700":"400",cursor:"pointer"}}>
              + Other
            </button>
          </div>
          {/* Custom subject input */}
          {(showCustom||(!subjInList&&subj!=="Daily Check-In")) && (
            <div style={{display:"flex",gap:"0.4rem",marginBottom:"0.6rem",animation:"fadeUp 0.18s ease"}}>
              <input value={showCustom?customSubj:subj} onChange={e=>showCustom?setCustomSubj(e.target.value):setSubj(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&applyCustomSubj()}
                placeholder="e.g. Home Ec, Nutrition, Art History..."
                style={{flex:1,padding:"0.5rem 0.75rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",fontSize:"0.8rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}/>
              {showCustom && <button onClick={applyCustomSubj} style={{padding:"0.5rem 0.75rem",border:"none",borderRadius:"11px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.78rem",cursor:"pointer"}}>Use</button>}
            </div>
          )}
          {subj && !showCustom && <div style={{fontSize:"0.72rem",color:pal.primary,fontWeight:"700",marginBottom:"0.75rem"}}>Subject: {subj}</div>}

          {/* Reading title — required for FL/PA states */}
          {needsReadingTitle && (
            <div style={{animation:"fadeUp 0.18s ease",marginBottom:"0.75rem"}}>
              <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>*</span></Lbl>
              <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.7rem",marginBottom:"0.5rem",fontSize:"0.71rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>
                📖 {family.state||"Your state"} requires reading materials to be listed by title.
              </div>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Math 5/4, Bible Story Vol.2"/>
            </div>
          )}
          {isReadingSubj && !needsReadingTitle && (
            <div style={{marginBottom:"0.55rem"}}>
              <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
            </div>
          )}
          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>

            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>

          {/* ── PHOTOS ── */}
          <div style={{height:"0.75rem"}}/>
          <Lbl pal={pal}>Photos (optional)</Lbl>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.65rem"}}>
            {/* Gallery upload */}
            <input ref={galleryRef} type="file" accept="image/*" multiple onChange={handleGallery} style={{display:"none"}}/>
            <button onClick={()=>galleryRef.current?.click()}

              <span style={{fontSize:"1.1rem"}}>📷</span><span>Gallery</span>

              <span style={{fontSize:"1.1rem"}}>📸</span><span>Camera</span>
            </button>
          </div>
          {/* Photo grid */}

              {photos.map((p,i)=>(
                <div key={i} style={{position:"relative",borderRadius:"10px",overflow:"hidden",aspectRatio:"1",border:`1.5px solid ${pal.stone}40`}}>

          <button onClick={()=>{
              if(!canSave) return;
              const today = initialData?.date||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
              if(isEdit) {
                // Edit = single child (first selected)
                const childIdx = [...selectedChildren][0];
                onSave({childIdx,title,subj,note,thumb,date:today,photos:photos.map(p=>p.dataUrl),readingTitle:readingTitle.trim()||undefined});
              } else {
                // Multi-save — one per selected child
                [...selectedChildren].forEach(childIdx => {
                  onSave({childIdx,title,subj,note,thumb,date:today,photos:photos.map(p=>p.dataUrl),readingTitle:readingTitle.trim()||undefined});
                });
              }
            }}
            disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {isEdit?"Save Changes":selectedChildren.size>1?"Save "+selectedChildren.size+" Entries":"Save Entry"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Weekly Portfolio Packet ---- */
function WeeklyPacket({pal,family,child,entries,onBack}){
  const [generating, setGenerating] = useState(false);
  const [summary,    setSummary]    = useState(null);
  const [error,      setError]      = useState(null);

  const ch = family.children[child];
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const childEntries = entries.filter(e=>e.childIdx===child);

  // Get this week entries
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  const weekEntries = childEntries.slice(0,20); // last 20 entries as proxy for the week

  const weekOf = now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const schoolName = family.schoolName || (family.familyName+" Academy") || "Home School";

  const generateSummary = async () => {
    if(weekEntries.length===0){setError("No entries yet! Complete some check-ins first.");return;}
    setGenerating(true); setError(null);
    const entriesList = weekEntries.map(e=>"- "+e.subj+": "+e.title+(e.note?" ("+e.note+")":"")).join("\n");
    const approach = (family.curriculumStyle||[]).join(", ")||"eclectic";
    const prompt = "You are a homeschool portfolio assistant. Write a warm, professional 2-paragraph narrative summary for a weekly portfolio packet.\n\n"
      + "Student: "+(ch?.name||"Student")+", "+(ch?.grade||"elementary")+" grade\n"
      + "School: "+schoolName+"\n"
      + "Learning approach: "+approach+"\n"
      + "Week of: "+weekOf+"\n\n"
      + "Activities this week:\n"+entriesList+"\n\n"
      + "Write: 1) A 2-3 sentence narrative describing what the student learned, warmly written for a state portfolio review. "
      + "2) A 1-2 sentence reflection on their growth. "
      + "Under 120 words total. No bullet points."

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:400,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.map(b=>b.text||"").join("")||"";
      if(!text) throw new Error("empty");
      setSummary(text);
    } catch(e){
      setError("Could not generate summary. Check your connection and try again.");
    }
    setGenerating(false);
  };

  // Group entries by subject
  const bySubject = {};
  weekEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]=[];
    bySubject[e.subj].push(e);
  });

  return (
    <div style={{animation:"fadeUp 0.22s ease",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>Back</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{ch?.avatar} {ch?.name} — Weekly Packet</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>Week of {weekOf}</div>
        </div>
        <button onClick={()=>window.print()} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>🖨 Print</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"1rem"}}>

        {/* Page 1: Cover + Summary */}
        <div style={{background:pal.linen,borderRadius:"18px",padding:"1.2rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}35`}} id="packet-page1">
          {/* School header */}
          <div style={{borderBottom:`2px solid ${cp.c1}40`,paddingBottom:"0.75rem",marginBottom:"0.85rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{schoolName}</div>
              <div style={{fontSize:"0.7rem",color:pal.slate}}>{family.state} · {family.parentName}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"0.65rem",color:pal.slate,fontWeight:"600"}}>WEEKLY PORTFOLIO</div>
              <div style={{fontSize:"0.68rem",fontWeight:"700",color:pal.inkM}}>Week of {weekOf}</div>
            </div>
          </div>

          {/* Student info */}
          <div style={{display:"flex",alignItems:"center",gap:"0.85rem",marginBottom:"1rem"}}>
            <div style={{width:"54px",height:"54px",borderRadius:"14px",background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2rem",flexShrink:0}}>{ch?.avatar}</div>
            <div>
              <div style={{fontWeight:"900",color:pal.ink,fontSize:"1.1rem"}}>{ch?.name}</div>
              <div style={{fontSize:"0.76rem",color:pal.slate}}>{ch?.grade} · {weekEntries.length} activities this week</div>
            </div>
          </div>

          {/* AI Summary section */}
          <div style={{background:pal.sand,borderRadius:"13px",padding:"0.9rem 1rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}35`}}>
            <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.5rem"}}>Weekly Narrative</div>
            {summary ? (
              <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.75}}>{summary}</div>
            ) : generating ? (
              <div style={{display:"flex",gap:"0.5rem",alignItems:"center",padding:"0.5rem 0"}}>
                {[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:cp.c1,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}
                <span style={{fontSize:"0.78rem",color:pal.slate}}>Writing summary...</span>
              </div>
            ) : (
              <div style={{textAlign:"center",padding:"0.5rem 0"}}>
                <div style={{fontSize:"0.78rem",color:pal.slate,marginBottom:"0.65rem"}}>{weekEntries.length===0?"Add some check-ins first to generate a summary.":"Generate an AI-written narrative summary of this week."}</div>
                {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem"}}>{error}</div>}
                <button onClick={generateSummary} disabled={weekEntries.length===0||generating}
                  style={{padding:"0.55rem 1.2rem",border:"none",borderRadius:"11px",background:weekEntries.length>0?`linear-gradient(135deg,${cp.c1},${cp.c2})`:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.8rem",cursor:weekEntries.length>0?"pointer":"default"}}>
                  Generate with AI
                </button>
              </div>
            )}
            {summary && (
              <button onClick={()=>{setSummary(null);generateSummary();}} style={{marginTop:"0.5rem",background:"transparent",border:"none",color:pal.slate,fontSize:"0.68rem",cursor:"pointer",fontWeight:"600"}}>Regenerate</button>
            )}
          </div>

          {/* Subject list */}
          <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.5rem"}}>Subjects Covered</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
            {Object.keys(bySubject).map(s=>(
              <span key={s} style={{padding:"0.22rem 0.65rem",background:`${cp.c1}22`,borderRadius:"20px",fontSize:"0.74rem",fontWeight:"700",color:cp.c1,border:`1.5px solid ${cp.c1}40`}}>{s} ({bySubject[s].length})</span>
            ))}
            {Object.keys(bySubject).length===0&&<span style={{fontSize:"0.78rem",color:pal.slate}}>No entries yet</span>}
          </div>
        </div>

        {/* Page 2: Activity log */}
        <div style={{background:pal.linen,borderRadius:"18px",padding:"1.2rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}35`}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.9rem",marginBottom:"0.85rem",paddingBottom:"0.55rem",borderBottom:`2px solid ${cp.c1}30`}}>
            Activity Log
          </div>
          {weekEntries.length===0 ? (
            <div style={{textAlign:"center",padding:"1.5rem 0",color:pal.slate,fontSize:"0.82rem"}}>No entries yet. Complete check-ins to fill this page!</div>
          ) : weekEntries.map((e,i)=>(
            <div key={i} style={{display:"flex",gap:"0.7rem",alignItems:"flex-start",padding:"0.6rem 0",borderTop:i>0?`1px solid ${pal.stone}30`:"none"}}>
              <div style={{width:"34px",height:"34px",borderRadius:"9px",background:`${cp.c1}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>{e.thumb||"📋"}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{e.title}</div>
                <div style={{fontSize:"0.68rem",color:pal.slate}}>{e.subj} · {e.date}</div>
                {e.note&&<div style={{fontSize:"0.75rem",color:pal.inkM,marginTop:"2px",lineHeight:1.5,fontStyle:"italic"}}>{e.note}</div>}
              </div>
            </div>
          ))}
          {/* Signature line */}
          <div style={{marginTop:"1.5rem",paddingTop:"1rem",borderTop:`1px solid ${pal.stone}40`,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <div style={{borderBottom:`1px solid ${pal.inkM}`,marginBottom:"4px",width:"140px",height:"24px"}}/>
              <div style={{fontSize:"0.65rem",color:pal.slate}}>Parent/Teacher Signature</div>
            </div>
            <div style={{flex:1,textAlign:"right"}}>
              <div style={{borderBottom:`1px solid ${pal.inkM}`,marginBottom:"4px",width:"100px",height:"24px",marginLeft:"auto"}}/>
              <div style={{fontSize:"0.65rem",color:pal.slate}}>Date</div>
            </div>
          </div>
        </div>

      </div>
      <style>{`@media print{body{background:white}nav,button:not(#packet-page1 button){display:none!important}}`}</style>
    </div>
  );
}
function AttendanceScreen({pal,family,days,attendanceLog=[],portfolioEntries=[],coopLog=[],onAddDay,onRemoveDay,onSyncPortfolio,pending,onConfirmPull,onCatchup,onLogPastDay}){
  const stateInfo  = getStateInfo(family.state||"");
  const REQUIRED   = parseInt((stateInfo.hours||"180").match(/\d+/)?.[0]||"180");
  const remaining  = Math.max(0,REQUIRED-days);
  const pct        = Math.min(100,Math.round((days/REQUIRED)*100));
  const onTrack    = (() => {
    if(!family.yearStart||!family.yearEnd) return pct>=68;
    const start=new Date(family.yearStart), end=new Date(family.yearEnd), now=new Date();
    const totalDays=(end-start)/(24*60*60*1000);
    const elapsed=(now-start)/(24*60*60*1000);
    const expectedPct=Math.min(100,Math.round((elapsed/totalDays)*100));
    return pct>=expectedPct-10;
  })();

  const [view,       setView]       = useState("overview"); // overview | ledger
  const [showAdd,    setShowAdd]    = useState(false);
  const [showLogPast,setShowLogPast]= useState(false);
  const [logPastDate,setLogPastDate]= useState(new Date().toISOString().slice(0,10));
  const [syncMsg,  setSyncMsg]  = useState(null);
  const [addDate,  setAddDate]  = useState(new Date().toISOString().slice(0,10));
  const [addType,  setAddType]  = useState("School Day");
  const [addNote,  setAddNote]  = useState("");

  const DAY_TYPES = ["School Day","Co-op Day","Field Trip","Excused Absence","Holiday"];
  const TYPE_ICONS = {"School Day":"📋","Co-op Day":"🏫","Field Trip":"🗺","Excused Absence":"🤒","Holiday":"🎉"};
  const TYPE_COUNTS = {"School Day":true,"Co-op Day":true,"Field Trip":true,"Excused Absence":false,"Holiday":false};

  // Build monthly breakdown from attendanceLog
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const monthCounts = {};
  attendanceLog.forEach(e=>{
    if(!TYPE_COUNTS[e.type]) return;
    try{
      const d=new Date(e.date+", "+new Date().getFullYear());
      if(isNaN(d)) return;
      const key=d.getMonth();
      monthCounts[key]=(monthCounts[key]||0)+1;
    }catch{}
  });

  // Build ledger sorted newest first
  const ledger = [...attendanceLog].sort((a,b)=>{
    try{ return new Date(b.date+", "+new Date().getFullYear())-new Date(a.date+", "+new Date().getFullYear()); }catch{return 0;}
  });

  // Get portfolio dates not yet in log for sync
  const loggedDates = new Set(attendanceLog.map(e=>e.date));
  const portfolioDates = [...new Set(portfolioEntries.filter(e=>!e.isDay&&e.date).map(e=>e.date))];
  const unsyncedCount = portfolioDates.filter(d=>!loggedDates.has(d)).length;

  const handleAddDay = () => {
    const dateStr = new Date(addDate).toLocaleDateString("en-US",{month:"short",day:"numeric"});
    onAddDay({date:dateStr,type:addType,note:addNote.trim()});
    setShowAdd(false);
    setAddNote("");
    setAddType("School Day");
  };

  const handleSync = () => {
    const count = onSyncPortfolio();
    setSyncMsg(count>0?`Added ${count} day${count!==1?"s":""} from portfolio!`:"All portfolio days are already logged.");
    setTimeout(()=>setSyncMsg(null),3000);
  };

  // Weeks left calc
  const weeksLeft = (() => {
    if(!family.yearEnd) return Math.round(remaining/5*10)/10;
    const end=new Date(family.yearEnd), now=new Date();
    const wks=Math.max(0,Math.ceil((end-now)/(7*24*60*60*1000)));
    return wks;
  })();
  const daysPerWeekNeeded = weeksLeft>0 ? Math.ceil(remaining/weeksLeft) : remaining;

  const printAttendance = () => {
    const win = window.open("","_blank");
    if(!win) return;
    const rows = ledger.map(e=>`<tr><td>${e.date}</td><td>${e.type}</td><td>${e.note||""}</td></tr>`).join("");
    win.document.write(`<!DOCTYPE html><html><head><title>Attendance Record</title>
    <style>body{font-family:Georgia,serif;padding:2rem;max-width:700px;margin:0 auto}
    h1{font-size:1.4rem;margin-bottom:0.25rem}h2{font-size:1rem;color:#555;font-weight:400;margin-bottom:1.5rem}
    table{width:100%;border-collapse:collapse;font-size:0.9rem}
    th{background:#f0f0f0;padding:0.5rem 0.75rem;text-align:left;border-bottom:2px solid #ccc}
    td{padding:0.45rem 0.75rem;border-bottom:1px solid #eee}
    .stats{display:flex;gap:2rem;margin-bottom:1.5rem;padding:1rem;background:#f9f9f9;border-radius:8px}
    .stat{text-align:center}.stat-n{font-size:1.8rem;font-weight:700;color:#2a6a2a}.stat-l{font-size:0.75rem;color:#777;text-transform:uppercase}
    .sig{margin-top:3rem;display:flex;justify-content:space-between}
    .sig-line{border-top:1px solid #333;width:200px;padding-top:4px;font-size:0.75rem;color:#555}
    @media print{button{display:none}}</style></head><body>
    <h1>${family.schoolName||family.familyName+" Academy"}</h1>
    <h2>Attendance Record &bull; ${family.state||""} &bull; ${new Date().getFullYear()}</h2>
    <p style="margin-bottom:1rem"><b>Student(s):</b> ${family.children.map(c=>c.name+" ("+c.grade+")").join(", ")}</p>
    <div class="stats">

    </body></html>`);
    win.document.close();
  };

  return (

      <ScreenHdr pal={pal} title="Attendance" sub={(family.state||"Your state")+(family.yearStart?" \u00b7 "+new Date(family.yearStart).getFullYear()+(family.yearEnd?"\u2013"+new Date(family.yearEnd).getFullYear():""):"")} icon="📋"/>
      <FirstVisitTip pal={pal} screen="attendance"/>
      <div style={{padding:"0 1rem"}}>

        {/* Pending schedule days banner */}
        {pending>0&&(
          <div style={{background:pal.pale,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`2px solid ${pal.primary}30`,display:"flex",gap:"0.75rem",alignItems:"flex-start"}}>
            <div style={{width:"38px",height:"38px",borderRadius:"10px",background:pal.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{"📅"}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:"800",color:pal.primary,fontSize:"0.86rem",marginBottom:"0.2rem"}}>{pending} completed school {pending===1?"day":"days"} ready to log</div>

              <b>{unsyncedCount} portfolio {unsyncedCount===1?"day":"days"}</b> not yet in your attendance record.
