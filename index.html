/* ---- AI Rate Limiter ---- */
const AI_KEY = ""; // TODO: Add your Anthropic API key here (sk-ant-...)
const AI_LIMIT_KEY = "rootbloom_ai_limits";
const AI_MONTHLY_LIMIT = 50; // max AI calls per month — change as needed

function checkAILimit(limitOverride) {
  try {
    const now = new Date();
    const monthKey = now.getFullYear()+"-"+(now.getMonth()+1);
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    const count = stored[monthKey]||0;
    const limit = limitOverride || (() => { try{ return parseInt(localStorage.getItem("rootbloom_ailimit")||String(AI_MONTHLY_LIMIT)); }catch(e){return AI_MONTHLY_LIMIT;} })();
    return { allowed: count < limit, used: count, limit, monthKey };
  } catch(e) { return { allowed: true, used: 0, limit: AI_MONTHLY_LIMIT, monthKey:"" }; }
}
function incrementAILimit(monthKey) {
  try {
    const stored = JSON.parse(localStorage.getItem(AI_LIMIT_KEY)||"{}");
    stored[monthKey] = (stored[monthKey]||0) + 1;
    // Clean up old months
    const now = new Date();
    const current = now.getFullYear()+"-"+(now.getMonth()+1);
    Object.keys(stored).forEach(k=>{ if(k!==current) delete stored[k]; });
    localStorage.setItem(AI_LIMIT_KEY, JSON.stringify(stored));
  } catch(e) {}
}

/* ---- Unit Study Add/Edit Modal ---- */
function UnitModal({pal,family,initial,onClose,onSave}){
  const isEdit = !!initial;
  const ICONS = ["📚","🏛","📐","🔬","📝","🎨","🎵","📜","🌏","🌳","📖","🧪","💻","🖌","📓"];
  const [title,   setTitle]   = useState(initial?.title||"");
  const [subject, setSubject] = useState(initial?.subject||"");
  const [icon,    setIcon]    = useState(initial?.icon||"📚");
  const [weeks,   setWeeks]   = useState(initial?.weeks||6);
  const [plan,    setPlan]    = useState(initial?.plan||"");
  const [notes,   setNotes]   = useState(initial?.notes||"");
  const [customSubj, setCustomSubj] = useState("");
  const [readingTitle, setReadingTitle] = useState(initial?.readingTitle||"");

  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const activeSubjs = (family.subjects||[]).map(id=>allSubjs.find(s=>s.id===id)).filter(Boolean);
  const subjOptions = activeSubjs.map(s=>s.label);
  const READING_SUBJS_UM = ["Reading","Reading/Language Arts","Bible / Faith","Literature"];
  const isReadingSubj = READING_SUBJS_UM.some(r=>finalSubj.toLowerCase().includes(r.toLowerCase()));
  const READING_TITLE_STATES = ["FL","PA","OH","VA","NC"];
  const needsReadingTitle = isReadingSubj && READING_TITLE_STATES.includes(family.state||"");

  const canSave = title.trim()&&(subject||customSubj.trim());
  const finalSubj = subject||customSubj.trim();

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.72)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"88vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}><div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/></div>
        <div style={{padding:"0.75rem 1.3rem",borderBottom:`1px solid ${pal.stone}45`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"1rem"}}>{isEdit?"Edit Unit Study":"Add Unit Study"}</div>
          <button onClick={onClose} style={{width:"28px",height:"28px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.9rem"}}>{"✕"}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.3rem"}}>
          <Lbl pal={pal}>Subject</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",marginBottom:"0.45rem"}}>
            {subjOptions.map(s=>(
              <button key={s} onClick={()=>{setSubject(s);setCustomSubj("");}}
                style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${subject===s?pal.primary:pal.stone+"60"}`,background:subject===s?pal.pale:"transparent",color:subject===s?pal.primary:pal.slate,fontSize:"0.73rem",fontWeight:subject===s?"700":"400",cursor:"pointer"}}>
                {s}
              </button>
            ))}
            <button onClick={()=>{setSubject("");}} style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${!subject?pal.primary:pal.stone+"60"}`,background:!subject?pal.pale:"transparent",color:!subject?pal.primary:pal.slate,fontSize:"0.73rem",cursor:"pointer"}}>Other</button>
          </div>
          {!subject && (
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)} placeholder="e.g. Home Ec, Logic, Latin..."
              style={{width:"100%",padding:"0.5rem 0.75rem",border:`2px solid ${pal.primary}`,borderRadius:"11px",fontSize:"0.8rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit",marginBottom:"0.75rem"}}/>
          )}
          {subject && <div style={{height:"0.6rem"}}/>}

          <Lbl pal={pal}>Unit title</Lbl>
          <Input pal={pal} value={title} onChange={setTitle} placeholder="e.g. Ancient Egypt, Fractions, Essay Writing"/>
          <div style={{height:"0.75rem"}}/>

          {/* Reading title — required for FL/PA states */}
          {needsReadingTitle && (
            <div style={{animation:"fadeUp 0.18s ease",marginBottom:"0.75rem"}}>
              <Lbl pal={pal}>Book / Material Title <span style={{color:pal.primary,fontWeight:"900"}}>*</span></Lbl>
              <div style={{background:pal.pale,borderRadius:"10px",padding:"0.45rem 0.7rem",marginBottom:"0.5rem",fontSize:"0.71rem",color:pal.primary,fontWeight:"600",border:`1.5px solid ${pal.primary}25`}}>
                📖 {family.state||"Your state"} requires reading materials to be listed by title.
              </div>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Math 5/4, Bible Story Vol.2"/>
            </div>
          )}
          {isReadingSubj && !needsReadingTitle && (
            <div style={{marginBottom:"0.55rem"}}>
              <Lbl pal={pal}>Book / Material Title (optional)</Lbl>
              <Input pal={pal} value={readingTitle} onChange={setReadingTitle} placeholder="e.g. Charlotte Web, Saxon Phonics..."/>
            </div>
          )}
          <Lbl pal={pal}>Icon</Lbl>
          <div style={{display:"flex",gap:"0.35rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {ICONS.map(ic=>(
              <button key={ic} onClick={()=>setIcon(ic)} style={{width:"36px",height:"36px",borderRadius:"8px",border:`2px solid ${icon===ic?pal.primary:pal.stone+"50"}`,background:icon===ic?pal.pale:"transparent",cursor:"pointer",fontSize:"1.1rem"}}>{ic}</button>
            ))}
          </div>

          <Lbl pal={pal}>Duration</Lbl>
          <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
            {[2,4,6,8,10,12,16,20].map(w=>(
              <button key={w} onClick={()=>setWeeks(w)} style={{padding:"0.3rem 0.65rem",borderRadius:"20px",border:`2px solid ${weeks===w?pal.primary:pal.stone+"50"}`,background:weeks===w?pal.pale:"transparent",cursor:"pointer",fontSize:"0.76rem",fontWeight:weeks===w?"700":"400",color:weeks===w?pal.primary:pal.inkM}}>
                {w} wks
              </button>
            ))}
          </div>

          <Lbl pal={pal}>Unit plan / overview (optional)</Lbl>
          <textarea value={plan} onChange={e=>setPlan(e.target.value)} rows={4}
            placeholder="What will you cover? Key books, activities, goals..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55,marginBottom:"0.75rem"}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>

          <Lbl pal={pal}>Notes (optional)</Lbl>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2}
            placeholder="Curriculum used, any special notes..."
            style={{width:"100%",padding:"0.65rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.82rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.55}}
            onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
        </div>
        <div style={{padding:"0.9rem 1.3rem",borderTop:`1px solid ${pal.stone}45`,display:"flex",gap:"0.6rem",flexShrink:0}}>
          <button onClick={onClose} style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.84rem"}}>Cancel</button>
          <button onClick={()=>canSave&&onSave({title,subject:finalSubj,icon,weeks,plan,notes,readingTitle:readingTitle.trim()||undefined})} disabled={!canSave}
            style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:canSave?pal.accentGrad:"#ccc",color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:canSave?"pointer":"default"}}>
            {isEdit?"Save Changes":"Add Unit"}
          </button>
        </div>
      </div>
    </div>
  );
}

  const [showFullYearPrint, setShowFullYearPrint] = useState(false);

  const [narratorLoading,setNarratorLoading]= useState(false);
  const [narratorOpen,   setNarratorOpen]   = useState(false);

  const generateNarrative = async (ch, entries) => {
    setNarratorOpen(true); setNarratorLoading(true); setNarratorText("");
    try {
      const text = await generatePortfolioNarrative({child:ch, entries, family});
      setNarratorText(text);
    } catch(e) {
      setNarratorText(e.message==="NO_KEY"
        ? "Add your API key in Settings → AI to use this feature."
        : "Could not generate. Please try again.");
    } finally { setNarratorLoading(false); }
  };

  const stateInfo = getStateInfo(family.state||"");
  const activeCi  = family.children.findIndex(c=>c.id===child);
  const activeCh  = activeCi>=0 ? family.children[activeCi] : family.children[0];
  const activeCiR = activeCi>=0 ? activeCi : 0;
  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(activeCh?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const childEntries = entries.filter(e=>e.childIdx===activeCiR);
  const subjEntries  = childEntries.filter(e=>!e.isDay && e.subj!=="Daily Notes");
  const readingEntries = subjEntries.filter(e=>e.subj==="Reading"||e.subj==="Reading/Language Arts"||e.subj==="Bible / Faith");
  const extraEntries = childEntries.filter(e=>e.isExtra||e.subj==="Extracurricular"||e.subj==="Co-op");
  const photoEntries = childEntries.filter(e=>e.photos&&e.photos.length>0);

  const bySubject = {};
  subjEntries.forEach(e=>{
    if(!bySubject[e.subj]) bySubject[e.subj]={subj:e.subj,entries:[],hasPhotos:false};
    bySubject[e.subj].entries.push(e);
    if(e.photos&&e.photos.length>0) bySubject[e.subj].hasPhotos=true;
  });
  const now_sort = new Date();
  const yr_sort = now_sort.getFullYear();
  const parseEntryDate = (dateStr) => {
    if(!dateStr) return new Date(0);
    const d1 = new Date(dateStr+", "+yr_sort);
    const d2 = new Date(dateStr+", "+(yr_sort-1));
    return d1 <= now_sort ? d1 : d2;
  };
  const subjectList = Object.values(bySubject).sort((a,b)=>{
    const aLast = parseEntryDate(a.entries[a.entries.length-1]?.date);
    const bLast = parseEntryDate(b.entries[b.entries.length-1]?.date);
    return bLast - aLast; // most recently logged first
  });
  const schoolName  = family.schoolName||(family.familyName+" Academy")||"Home School";

  if(showYearView) return <YearOverview pal={pal} family={family} activeCh={activeCh} cp={cp}
    entries={childEntries} attendanceDays={attendanceDays} onBack={()=>setShowYearView(false)}/>;


  const renderPortfolio_yearoverview = () => (
    <div key="yearoverview">
      {/* ── YEAR OVERVIEW BUTTON ── */}

            {/* ── SEARCH & FILTER ── */}

          const yrS=new Date(now2.getFullYear(),0,1);
          const inRange=(ds)=>{
            if(!filterRange) return true;
            try{ const d=new Date(ds+", "+yr2); if(filterRange==="week") return d>=wkS; if(filterRange==="month") return d>=moS; if(filterRange==="year") return d>=yrS; }catch{} return true;

          const activeSubjLabels=[...new Set(subjEntries.map(e=>e.subj).filter(Boolean))];

                </div>

              {filtered&&(

                    {filtered.length>40&&<div style={{textAlign:"center",fontSize:"0.7rem",color:pal.slate,fontStyle:"italic",padding:"0.3rem 0"}}>{"Showing 40 of "+filtered.length+" \xe2\x80\x94 refine your search to see more"}</div>}
                  </div>

              )}
            </div>
          );
        })()}


      {/* Layout edit toggle */}

/* =======================================
   MASTERY CARD
======================================= */
function MasteryCard({pal, family, child, cp}) {
  const yearEnd = family.yearEnd||"";
  const MASTERY_KEY = "rootbloom_mastery_"+child.id+"_"+yearEnd;
  const [mastery, setMastery] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem(MASTERY_KEY)||"{}"); }catch(e){return {};}
  });
  const [expanded, setExpanded] = useState(false);
  const [activeTab, setActiveTab] = useState(null);
  const skills = EOY_SKILLS[child.grade]||EOY_SKILLS["5th"]||[];
  const cycle = (skill) => {
    const cur = mastery[skill]||null;
    const next = cur===null?"working":cur==="working"?"mastered":null;
    const updated = {...mastery};
    if(next===null) delete updated[skill]; else updated[skill]=next;
    setMastery(updated);
    try{ localStorage.setItem(MASTERY_KEY, JSON.stringify(updated)); }catch(e){}
  };
  const totalSkills   = skills.reduce((s,cat)=>s+cat.skills.length, 0);
  const masteredCount = Object.values(mastery).filter(v=>v==="mastered").length;
  const workingCount  = Object.values(mastery).filter(v=>v==="working").length;
  const pct = totalSkills>0 ? Math.round(masteredCount/totalSkills*100) : 0;
  const STATUS = {
    null:     {label:"\u2014",   bg:"transparent",  color:"#bbb",     border:"#e0e0e0"},
    working:  {label:"Working", bg:"#fff8e6",      color:"#b07800",  border:"#f5c842"},
    mastered: {label:"\u2713",  bg:cp.c1+"18",     color:cp.c1,      border:cp.c1+"50"},
  };
  if(!expanded) return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <button onClick={()=>setExpanded(true)}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.85rem 1rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
        <div style={{width:"40px",height:"40px",borderRadius:"11px",background:cp.c1+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{"🎯"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.85rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>
            {masteredCount>0||workingCount>0 ? masteredCount+" mastered · "+workingCount+" in progress · "+totalSkills+" total" : child.grade+" grade skills — tap to track"}
          </div>
        </div>
        {masteredCount>0&&<div style={{background:cp.c1+"18",borderRadius:"20px",padding:"0.1rem 0.5rem",flexShrink:0}}><span style={{fontWeight:"800",color:cp.c1,fontSize:"0.74rem"}}>{pct+"%"}</span></div>}
        <span style={{color:pal.slate,fontSize:"1rem",flexShrink:0}}>{"›"}</span>
      </button>
      {(masteredCount>0||workingCount>0)&&(
        <div style={{padding:"0 1rem 0.75rem"}}>
          <div style={{height:"6px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s ease"}}/>
          </div>
        </div>
      )}
    </div>
  );
  const currentCat = activeTab||skills[0]?.cat;
  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.stone}25`,marginBottom:"1rem",overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}12)`,padding:"0.85rem 1rem",display:"flex",alignItems:"center",gap:"0.65rem",borderBottom:`1px solid ${pal.stone}20`}}>
        <span style={{fontSize:"1.2rem"}}>{"🎯"}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem"}}>{"Skills & Mastery"}</div>
          <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px"}}>{masteredCount+" of "+totalSkills+" mastered · "+workingCount+" in progress"}</div>
        </div>
        <button onClick={()=>setExpanded(false)} style={{width:"26px",height:"26px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.slate,cursor:"pointer",fontSize:"0.8rem",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
      </div>
      <div style={{padding:"0.55rem 1rem 0"}}>
        <div style={{height:"5px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.65rem"}}>
          <div style={{height:"100%",width:pct+"%",borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:"0",overflowX:"auto",padding:"0 0.75rem",borderBottom:`1px solid ${pal.stone}20`}}>
        {skills.map(cat=>(
          <button key={cat.cat} onClick={()=>setActiveTab(cat.cat)}
            style={{padding:"0.45rem 0.65rem",border:"none",borderBottom:`2px solid ${currentCat===cat.cat?cp.c1:"transparent"}`,background:"transparent",color:currentCat===cat.cat?cp.c1:pal.slate,fontWeight:currentCat===cat.cat?"800":"500",fontSize:"0.68rem",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {cat.cat}
          </button>
        ))}
      </div>
      <div style={{padding:"0.65rem 0.85rem"}}>

/* ---- Portfolio Subject Row (replaces SubjectBubble) ---- */
function PortfolioSubjectRow({sd,cp,pal,family,expanded,onToggle,onDetail,onLog}){
  const customSubjs = family.customSubjects||[];
  const allSubjs = [...SUBJECT_OPTIONS,...customSubjs];
  const subj = allSubjs.find(x=>x.label===sd.subj);
  const icon = subj?.icon||"📋";
  const now = new Date();
  const yr = now.getFullYear();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));
  weekStart.setHours(0,0,0,0);
  const thisWeekEntries = sd.entries.filter(e=>{
    try{ const d1=new Date(e.date+", "+yr); const d=d1<=now?d1:new Date(e.date+", "+(yr-1)); return d>=weekStart; }catch{return false;}
  });
  const recentEntries = [...sd.entries].reverse().slice(0,8);
  const lastEntry = sd.entries[sd.entries.length-1];
  const lastDate = lastEntry?.date;
  const daysSince = lastDate ? (()=>{
    try{
      const d1=new Date(lastDate+", "+yr);
      const d=d1<=now?d1:new Date(lastDate+", "+(yr-1));
      return Math.floor((now-d)/(24*60*60*1000));
    }catch{return null;}
  })() : null;
  const isStale = daysSince!==null && daysSince>=7;
  const isVeryStale = daysSince!==null && daysSince>=14;
  const staleColor = isVeryStale?"#c0392b":isStale?"#e67e22":pal.good;
  const staleBg = isVeryStale?"#fdf0ee":isStale?"#fef9ed":pal.goodBg;
  const staleLabel = daysSince===0?"today":daysSince===1?"yesterday":daysSince!==null?daysSince+"d ago":lastDate||"";

  return (
    <div style={{borderRadius:"12px",border:`1.5px solid ${isVeryStale?"#e74c3c30":isStale?"#f39c1230":expanded?cp.c1+"60":pal.stone+"25"}`,overflow:"hidden",background:"#fff",marginBottom:"0.35rem",transition:"all 0.15s"}}>
      <button onClick={onToggle}
        style={{width:"100%",display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.65rem 0.8rem",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",minWidth:0}}>
          <div style={{width:"36px",height:"36px",borderRadius:"9px",background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}15)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
              <span style={{fontWeight:"700",color:pal.ink,fontSize:"0.83rem"}}>{sd.subj}</span>
              {isVeryStale&&<span style={{fontSize:"0.58rem",fontWeight:"800",color:"#c0392b",background:"#fdf0ee",padding:"0.08rem 0.4rem",borderRadius:"99px",flexShrink:0}}>{"Needs attention"}</span>}
              {isStale&&!isVeryStale&&<span style={{fontSize:"0.58rem",fontWeight:"800",color:"#e67e22",background:"#fef9ed",padding:"0.08rem 0.4rem",borderRadius:"99px",flexShrink:0}}>{"Check in"}</span>}
            </div>
            <div style={{fontSize:"0.63rem",marginTop:"2px",display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{color:pal.slate}}>{sd.entries.length+" entries"}</span>
              {thisWeekEntries.length>0&&<span style={{color:pal.good,fontWeight:"700"}}>{thisWeekEntries.length+" this week"}</span>}
              <span style={{color:staleColor,fontWeight:isStale?"700":"400"}}>{"• "+staleLabel}</span>
            </div>
          </div>
          {sd.hasPhotos&&<span style={{fontSize:"0.78rem",flexShrink:0}}>{"📷"}</span>}
          <div style={{background:cp.c1+"20",borderRadius:"20px",padding:"0.1rem 0.45rem",flexShrink:0}}>
            <span style={{fontWeight:"800",color:cp.c1,fontSize:"0.74rem"}}>{sd.entries.length}</span>
          </div>
          <span style={{color:pal.slate,fontSize:"1rem",transform:expanded?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>{"\u203a"}</span>
      </button>
      {expanded&&(
        <div style={{borderTop:`1px solid ${pal.stone}15`}}>
          {recentEntries.map((e,i)=>(
            <div key={e.id||i} onClick={()=>onDetail(e)}
              style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.55rem 0.8rem",borderTop:i>0?`1px solid ${pal.stone}12`:"none",cursor:"pointer",background:"#fafafa"}}
              onTouchStart={ev=>ev.currentTarget.style.background=pal.pale}
              onTouchEnd={ev=>ev.currentTarget.style.background="#fafafa"}>
              <div style={{width:"30px",height:"30px",borderRadius:"7px",background:`${cp.c1}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",flexShrink:0,overflow:"hidden",position:"relative"}}>
                {e.photos&&e.photos[0]?<img src={e.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>:<span>{e.thumb||"📋"}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:"600",color:pal.ink,fontSize:"0.79rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.readingTitle||e.title}</div>
                {e.note&&e.note.trim()&&!e.isSubject&&<div style={{fontSize:"0.62rem",color:pal.slate,marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note.slice(0,60)}</div>}
              </div>
              <div style={{fontSize:"0.61rem",color:pal.stone,flexShrink:0}}>{e.date}</div>
              <span style={{color:pal.stone,fontSize:"0.8rem",flexShrink:0}}>{"\u203a"}</span>
            </div>
          ))}
          {sd.entries.length>8&&(
            <div style={{padding:"0.45rem",textAlign:"center",fontSize:"0.68rem",color:pal.slate,borderTop:`1px solid ${pal.stone}12`}}>
              +{sd.entries.length-8} more entries
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---- Year Overview ---- */
function YearOverview({pal,family,activeCh,cp,entries,attendanceDays,onBack}){
  const TOTAL_WEEKS = 40;
  const now = new Date();
  const yearStart = family.yearStart ? new Date(family.yearStart) : new Date(now.getFullYear(),7,1);
  const yearEnd   = family.yearEnd   ? new Date(family.yearEnd)   : new Date(now.getFullYear()+1,4,31);
  const schoolName = family.schoolName||(family.familyName+" Academy")||"Home School";

  // Build a map of week# => entry count
  const weekMap = {};
  entries.forEach(e=>{
    try{
      const d = new Date(e.date+", "+now.getFullYear());
      if(isNaN(d)) return;
      const diff = Math.floor((d-yearStart)/(7*24*60*60*1000));
      if(diff>=0&&diff<TOTAL_WEEKS){ weekMap[diff]=(weekMap[diff]||0)+1; }
    }catch(err){}
  });

  const msPerWeek = 7*24*60*60*1000;
  const currentWeek = Math.floor((now-yearStart)/msPerWeek);
  const REQUIRED = parseInt((getStateInfo(family.state||"").hours||"180").match(/\d+/)?.[0]||"180");
  const pct = REQUIRED ? Math.min(100,Math.round((attendanceDays/REQUIRED)*100)) : null;

  // Subject breakdown
  const bySubj = {};
  entries.filter(e=>!e.isDay&&e.subj!=="Daily Notes").forEach(e=>{
    bySubj[e.subj]=(bySubj[e.subj]||0)+1;
  });
  const subjList = Object.entries(bySubj).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return (
    <div style={{animation:"fadeUp 0.22s ease"}}>
      <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"1rem 1.1rem",display:"flex",alignItems:"center",gap:"0.75rem"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"9px",padding:"0.3rem 0.7rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>
          {"< Back"}
        </button>
        <div style={{flex:1}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"0.95rem"}}>{activeCh?.avatar} {activeCh?.name} {"—"} Year Overview</div>
          <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.75)"}}>{schoolName}</div>
        </div>
      </div>

      <div style={{padding:"0.85rem 1rem"}}>

        {/* Attendance bar */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.5rem"}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>School Year Progress</div>
            <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{pct!==null?pct+"% done":attendanceDays+" days"}</div>
          </div>
          {pct!==null&&(
            <div style={{height:"10px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.45rem"}}>
              <div style={{height:"100%",width:`${pct}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.5s"}}/>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.69rem",color:pal.slate}}>
            <span><b style={{color:pal.ink}}>{attendanceDays}</b> days logged</span>
            {REQUIRED?(<>
              <span><b style={{color:pal.ink}}>{Math.max(0,REQUIRED-attendanceDays)}</b> days remaining</span>
              <span><b style={{color:pal.ink}}>{REQUIRED}</b> required</span>
            </>):(
              <span style={{fontStyle:"italic"}}>{family.state||"Your state"} has no day requirement</span>
            )}
          </div>
        </div>

        {/* 40-week grid */}
        <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
          <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>40-Week Grid</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"0.3rem",marginBottom:"0.7rem"}}>
            {Array.from({length:TOTAL_WEEKS},(_,w)=>{
              const count  = weekMap[w]||0;
              const isPast = w<currentWeek;
              const isCurr = w===currentWeek;
              const hasWork= count>0;
              const bg = isCurr
                ? cp.c1
                : hasWork
                  ? cp.c1+"55"
                  : isPast
                    ? "#f0ece6"
                    : pal.parchm;
              const textCol = isCurr?"#fff": hasWork?cp.c1 : isPast?"#ccc" : pal.stone;
              return (
                <div key={w} style={{aspectRatio:"1",borderRadius:"7px",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:`1.5px solid ${isCurr?cp.c1:hasWork?cp.c1+"40":"transparent"}`,transition:"all 0.15s"}}>
                  <div style={{fontSize:"0.52rem",fontWeight:isCurr||hasWork?"800":"400",color:textCol,lineHeight:1}}>{w+1}</div>
                  {count>0&&<div style={{fontSize:"0.45rem",color:isCurr?"rgba(255,255,255,0.8)":cp.c1,fontWeight:"700"}}>{count}</div>}
                </div>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",fontSize:"0.62rem",color:pal.slate}}>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1}}/>
              <span>This week</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:cp.c1+"55"}}/>
              <span>Logged</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:"#f0ece6"}}/>
              <span>Past / no log</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.28rem"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"3px",background:pal.parchm,border:`1px solid ${pal.stone}40`}}/>
              <span>Upcoming</span>
            </div>
          </div>
        </div>

        {/* Subject breakdown */}
        {subjList.length>0&&(
          <div style={{background:pal.linen,borderRadius:"14px",padding:"0.9rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
            <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem",marginBottom:"0.65rem"}}>Subjects This Year</div>
            <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
              {subjList.map(([subj,cnt])=>{
                const maxCnt = subjList[0][1];
                const w = Math.max(8,Math.round((cnt/maxCnt)*100));
                return (
                  <div key={subj} style={{display:"flex",alignItems:"center",gap:"0.55rem"}}>
                    <div style={{width:"90px",fontSize:"0.73rem",color:pal.inkM,fontWeight:"600",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj}</div>
                    <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${w}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:"0.72rem",fontWeight:"800",color:cp.c1,minWidth:"22px",textAlign:"right",flexShrink:0}}>{cnt}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Worksheet reminder */}
        <div style={{background:"#fffbeb",border:"1.5px solid #f5c842",borderRadius:"13px",padding:"0.85rem 1rem",marginBottom:"1rem",display:"flex",gap:"0.55rem",alignItems:"flex-start"}}>
          <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:"1px"}}>{"📎"}</span>
          <div>
            <div style={{fontWeight:"800",color:"#7a5500",fontSize:"0.82rem",marginBottom:"2px"}}>Remember: Add Worksheets to Your Binder</div>
            <div style={{fontSize:"0.71rem",color:"#a07020",lineHeight:1.55}}>After printing your portfolio, insert completed worksheets, tests, and work samples behind each section. Physical work samples strengthen your portfolio for state evaluation.</div>
          </div>
        </div>

        <div style={{height:"1rem"}}/>
      </div>
    </div>
  );
}

              </div>
            ))}
            <div style={{fontSize:"0.67rem",color:pal.slate,marginTop:"0.25rem",fontStyle:"italic",lineHeight:1.5}}>
              Laws can change. Always verify with HSLDA.org or your state DOE before your annual evaluation.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function GradesTab({pal, ch, family, childEntries, cp, gradeStruggle, setGradeStruggle, gradeStruggleLoading, setGradeStruggleLoading, gradeStruggleError, setGradeStruggleError}) {
// Letter grade helper
const pctToLetter = (pct) => {
  if(pct>=93) return {letter:"A+",color:"#1a6e40",bg:"#edf9f0"};
  if(pct>=90) return {letter:"A", color:"#1a6e40",bg:"#edf9f0"};
  if(pct>=87) return {letter:"B+",color:"#2563a8",bg:"#eef4ff"};
  if(pct>=83) return {letter:"B", color:"#2563a8",bg:"#eef4ff"};
  if(pct>=80) return {letter:"B-",color:"#2563a8",bg:"#eef4ff"};
  if(pct>=77) return {letter:"C+",color:"#7a5500",bg:"#fff8e6"};
  if(pct>=73) return {letter:"C", color:"#7a5500",bg:"#fff8e6"};
  if(pct>=70) return {letter:"C-",color:"#7a5500",bg:"#fff8e6"};
  if(pct>=60) return {letter:"D", color:"#8a3a00",bg:"#fff3ec"};
  return       {letter:"F", color:"#cc2222",bg:"#fff0f0"};
};

// Aggregate all quiz entries for this child across the whole year
const allQuizEntries = childEntries.filter(e=>e.isQuizResult&&e.quizData);
const bySubj = {};
allQuizEntries.forEach(e=>{
  if(!bySubj[e.subj]) bySubj[e.subj]={subj:e.subj,quizzes:[],totalScore:0,totalPoss:0,missed:[]};
  bySubj[e.subj].quizzes.push(e);
  bySubj[e.subj].totalScore+=e.quizData.score;
  bySubj[e.subj].totalPoss+=e.quizData.total;
  (e.quizData.missed||[]).forEach(m=>{ if(!bySubj[e.subj].missed.includes(m)) bySubj[e.subj].missed.push(m); });
});
const gradeRows = Object.values(bySubj).sort((a,b)=>(b.totalScore/Math.max(b.totalPoss,1))-(a.totalScore/Math.max(a.totalPoss,1)));
const allAs = gradeRows.length>=3 && gradeRows.every(r=>(r.totalScore/Math.max(r.totalPoss,1))>=0.90);
const weakRows = gradeRows.filter(r=>(r.totalScore/Math.max(r.totalPoss,1))<0.75);

const generateStruggleReport_cb = () => generateStruggleReport(
  weakRows, ch?.name,
  {setLoading:setGradeStruggleLoading, setError:setGradeStruggleError, setResult:setGradeStruggle}
);

return (
  <div>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,"+cp.c1+"18,"+cp.c2+"12)",borderRadius:"16px",padding:"0.9rem 1rem",marginBottom:"1rem",border:"1.5px solid "+cp.c1+"25"}}>
      <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.88rem",marginBottom:"3px"}}>{"\uD83C\uDFC6 "+ch?.name+"\u2019s Grades"}</div>
      <div style={{fontSize:"0.74rem",color:pal.slate,lineHeight:1.55}}>{"Based on all quiz scores this year. Use these for freebie rewards, not compliance \u2014 Florida doesn\u2019t require a report card."}</div>
    </div>

    {gradeRows.length===0&&(
      <div style={{background:pal.linen,borderRadius:"14px",padding:"2rem 1.2rem",textAlign:"center",border:"1.5px solid "+pal.stone+"25"}}>
        <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>{"\uD83C\uDFAF"}</div>
        <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.88rem",marginBottom:"0.3rem"}}>{"No quiz scores yet"}</div>
        <div style={{fontSize:"0.76rem",color:pal.slate,lineHeight:1.6}}>{"Grades appear here once kids take quizzes from the Student Portal. Tap the \uD83C\uDFAF button after logging a subject."}</div>
      </div>
    )}

    {/* Straight A's callout */}
    {allAs&&(
      <div style={{background:"linear-gradient(135deg,#f5c842,#f9a825)",borderRadius:"16px",padding:"1rem 1.1rem",marginBottom:"1rem",border:"none",textAlign:"center",boxShadow:"0 4px 18px rgba(245,200,66,0.35)"}}>
        <div style={{fontSize:"2rem",marginBottom:"4px"}}>{"\uD83C\uDF1F\uD83C\uDFC6\uD83C\uDF1F"}</div>
        <div style={{fontWeight:"900",color:"#5a3a00",fontSize:"1rem",marginBottom:"3px"}}>{"STRAIGHT A\u2019S!"}</div>
        <div style={{fontSize:"0.78rem",color:"#7a5500",lineHeight:1.55}}>{"Every subject is 90%+. Time to claim those freebie rewards! \uD83C\uDF54\uD83C\uDFDE\uFE0F\uD83C\uDFA8"}</div>
      </div>
    )}

    {/* Per-subject grade cards */}
    {gradeRows.map(r=>{
      const pct=r.totalPoss>0?Math.round((r.totalScore/r.totalPoss)*100):0;
      const {letter,color,bg}=pctToLetter(pct);
      const so=[...SUBJECT_OPTIONS,...(family.customSubjects||[])].find(x=>x.label===r.subj);
      const trend=r.quizzes.length>=2?(()=>{
        const first=r.quizzes[r.quizzes.length-1].quizData;
        const last=r.quizzes[0].quizData;
        const fp=Math.round((first.score/Math.max(first.total,1))*100);
        const lp=Math.round((last.score/Math.max(last.total,1))*100);
        return lp-fp;
      })():null;
      return (
        <div key={r.subj} style={{background:bg,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.5rem",border:"1.5px solid "+color+"35"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
            <div style={{width:"44px",height:"44px",borderRadius:"12px",background:color+"18",border:"2px solid "+color+"40",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontWeight:"900",color:color,fontSize:"1.1rem"}}>{letter}</span>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"2px"}}>
                <span style={{fontSize:"0.9rem"}}>{so?.icon||"\uD83D\uDCCB"}</span>
                <span style={{fontWeight:"700",color:pal.ink,fontSize:"0.85rem"}}>{r.subj}</span>
                {trend!==null&&(
                  <span style={{fontSize:"0.65rem",fontWeight:"800",color:trend>0?"#2d9e5f":trend<0?"#cc4444":pal.slate}}>
                    {trend>0?"\u2191+"+trend+"%":trend<0?"\u2193"+trend+"%":"\u2192"}
                  </span>
                )}
              </div>
              <div style={{height:"5px",borderRadius:"99px",background:pal.stone+"20",overflow:"hidden",marginBottom:"4px"}}>
                <div style={{height:"100%",width:pct+"%",background:color,borderRadius:"99px"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"0.7rem",color:pal.slate}}>{r.quizzes.length+" quiz"+(r.quizzes.length===1?"":"zes")+" \u00b7 "+r.totalScore+"/"+r.totalPoss+" correct"}</span>
                <span style={{fontSize:"0.78rem",fontWeight:"800",color:color}}>{pct+"%"}</span>
              </div>
            </div>
          </div>
          {r.missed.length>0&&(
            <div style={{marginTop:"0.5rem",paddingTop:"0.5rem",borderTop:"1px solid "+color+"25",fontSize:"0.7rem",color:pal.inkM,lineHeight:1.5}}>
              <span style={{fontWeight:"700",color:"#cc4444"}}>{"Needs review: "}</span>
              {r.missed.slice(0,4).join(", ")+(r.missed.length>4?" \u2026":"")}
            </div>
          )}
        </div>
      );
    })}

    {/* Struggling areas AI section */}
    {gradeRows.length>0&&(
      <div style={{marginTop:"0.75rem"}}>
        {gradeStruggle?(
          <div style={{background:"#fff8e6",borderRadius:"14px",padding:"0.9rem 1rem",border:"1.5px solid #f5c84240"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.45rem"}}>
              <span style={{fontSize:"0.7rem",fontWeight:"800",color:"#b07800",textTransform:"uppercase",letterSpacing:"0.07em"}}>{"\uD83C\uDF31 Coaching Note"}</span>
              <button onClick={()=>setGradeStruggle(null)} style={{background:"transparent",border:"none",color:pal.stone,cursor:"pointer",fontSize:"0.8rem"}}>{"×"}</button>
            </div>
            <div style={{fontSize:"0.82rem",color:pal.ink,lineHeight:1.75}}>{gradeStruggle}</div>
          </div>
        ):gradeStruggleLoading?(
          <div style={{background:pal.pale,borderRadius:"14px",padding:"0.85rem",border:"1.5px solid "+pal.primary+"20",textAlign:"center"}}>
            <div style={{fontSize:"0.78rem",color:pal.primary,fontWeight:"700"}}>{"Analysing quiz results\u2026"}</div>
          </div>
        ):(
          <div>
            {gradeStruggleError==="no_key"&&<div style={{background:"#fff8ed",borderRadius:"12px",padding:"0.75rem",marginBottom:"0.5rem",fontSize:"0.76rem",color:"#7a5500",textAlign:"center",border:"1.5px solid #f5c84240"}}>{"Add an API key in Settings to unlock AI coaching notes."}</div>}
            {gradeStruggleError==="error"&&<div style={{background:"#fff0f0",borderRadius:"12px",padding:"0.75rem",marginBottom:"0.5rem",fontSize:"0.76rem",color:"#aa3333",textAlign:"center",border:"1.5px solid #ffaaaa40"}}>{"Could not generate \u2014 check your connection."}</div>}
            <button onClick={generateStruggleReport_cb}
              disabled={weakRows.length===0}
              style={{width:"100%",padding:"0.78rem",border:weakRows.length>0?"1.5px dashed #f5c842":"1.5px solid "+pal.stone+"30",borderRadius:"13px",background:weakRows.length>0?"#fffbeb":pal.linen,color:weakRows.length>0?"#b07800":pal.stone,fontWeight:"700",fontSize:"0.8rem",cursor:weakRows.length>0?"pointer":"default"}}>
              {weakRows.length>0?"\uD83C\uDF31 Get coaching tips for struggling subjects":"All subjects 75%+ \u2014 great work!"}
            </button>
          </div>
        )}
      </div>
    )}

  </div>
);
        
}


function DailyLogSection({pal,cp,ch,childEntries,subjEntries}){
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [gradeStruggle,        setGradeStruggle]        = useState(null);
  const [gradeStruggleLoading, setGradeStruggleLoading] = useState(false);
  const [gradeStruggleError,   setGradeStruggleError]   = useState(null);

  // Group subject entries by date
  const byDate = {};
  subjEntries.forEach(e=>{
    if(!e.date) return;
    if(!byDate[e.date]) byDate[e.date]={date:e.date,entries:[],dayNote:null};
    byDate[e.date].entries.push(e);
  });
  // Also pull daily notes entries for parent notes per day
  childEntries.filter(e=>e.isDay||e.subj==="Daily Notes").forEach(e=>{
    if(!e.date) return;
    if(!byDate[e.date]) byDate[e.date]={date:e.date,entries:[],dayNote:null};
    byDate[e.date].dayNote = e;
  });

  // Sort dates newest first
  const allDates = Object.values(byDate).sort((a,b)=>{
    // Parse "Mar 25" style dates for sorting -- year-aware to handle Jan/Dec boundary
    try{
      const now = new Date();
      const parse = s => {
        const d1 = new Date(s+", "+now.getFullYear());
        const d2 = new Date(s+", "+(now.getFullYear()-1));
        return d1 <= now ? d1 : d2;
      };
      return parse(b.date) - parse(a.date);
    }catch{return 0;}
  });

  // Filter by search
  const filtered = search.trim()
    ? allDates.filter(d=>
        d.date.toLowerCase().includes(search.toLowerCase()) ||
        d.entries.some(e=>e.subj?.toLowerCase().includes(search.toLowerCase())||e.note?.toLowerCase().includes(search.toLowerCase())||e.title?.toLowerCase().includes(search.toLowerCase()))
      )
    : allDates;

  if(allDates.length===0) return null;

  return (
    <div style={{marginBottom:"0.85rem"}}>
      {/* Header + search */}

/* ---- Narrative Editor (inline within TranscriptsScreen) ---- */
function NarrativeEditor({pal,ch,family,bySubject,attendanceDays,schoolName,cp,compact=false,observationLog=[]}){
  const LS_KEY = "rootbloom_narrative_"+ch.id;
  const [text, setText] = useState(()=>{ try{return localStorage.getItem(LS_KEY)||"";}catch(e){return "";} });
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  const save = (v) => {
    setText(v);
    try{ localStorage.setItem(LS_KEY,v); }catch(e){}
  };

  const generate = async () => {
    setGenerating(true); setError(null);
    const subjList    = Object.keys(bySubject).join(", ")||"various subjects";
    const subjCounts  = Object.entries(bySubject).map(([s,d])=>s+": "+d.count+" entries").join(", ");
    const goals       = goalSummary(family);
    const curriculum  = curriculumContext(family);
    const allGoalObjs = [...GOALS,...(family.customGoals||[])];
    const goalProgress = (family.goals||[]).map(id=>{
      const g = allGoalObjs.find(x=>x.id===id);
      const nudge = GOAL_NUDGES[id];
      if(!g) return null;
      const cnt = nudge?.subjs?.length>0
        ? Object.entries(bySubject).filter(([s])=>nudge.subjs.includes(s)).reduce((n,[,d])=>n+d.count,0)
        : null;
      return g.label+(cnt!==null?" ("+cnt+" related entries)":"");
    }).filter(Boolean).join(", ");

    // Pull this child's observation notes — most recent 8, condensed
    const childObs = observationLog
      .filter(e=>e.childId===ch.id)
      .sort((a,b)=>(b.ts||0)-(a.ts||0))
      .slice(0,8)
      .map(e=>"\u2022 "+e.text.slice(0,120)+(e.text.length>120?"...":""))
      .join("\n");

    const prompt = "Write a warm, professional annual narrative report for a homeschool portfolio."
      + " Student: "+ch.name+", "+ch.grade+" grade."
      + " School: "+schoolName+". State: "+(family.state||"")+"."
      + " Curriculum: "+curriculum+"."
      + " Subjects studied: "+subjList+"."
      + " Portfolio entries by subject: "+subjCounts+"."
      + " Days completed: "+attendanceDays+"."
      + " Family goals this year: "+goals+"."
      + (goalProgress?" Goal progress: "+goalProgress+".":"")
      + (childObs?"\n\nParent observations recorded throughout the year (use these to make the narrative specific and personal):\n"+childObs+"\n\n":"")
      + " Write 3 paragraphs:"
      + " 1) Overview of the year — approach, rhythm, and how the family's goals shaped their homeschool."
      + " 2) Academic highlights — growth in key subjects, notable entries, reading, and specific achievements. Draw from the parent observations where relevant."
      + " 3) Character and personal development — tie back to stated goals, highlight growth beyond academics. Reference specific moments from the observations if available."
      + " Weave the parent observations naturally — make it feel like the parent wrote this from memory, not like a data report."
      + " Warm, specific, parent-voice. Suitable for state review. Under 300 words.";
    try {
      const text = await callClaude(prompt);
      save(text);
    } catch(e) {
      const msg = e.message==="NO_KEY"?"Add your API key in Settings → AI to generate narratives."
        :e.message==="RATE_LIMIT"?"Monthly AI limit reached."
        :"Could not connect. Try again.";
      setError(msg);
    }
    setGenerating(false);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.06em"}}>Annual Narrative</div>
          {observationLog.filter(e=>e.childId===ch.id).length>0&&(
            <div style={{fontSize:"0.64rem",color:pal.good,marginTop:"2px",fontWeight:"600"}}>
              {"📓 "+observationLog.filter(e=>e.childId===ch.id).length+" parent observations will be included"}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
          <span style={{fontSize:"0.65rem",color:pal.slate}}>{wordCount} words</span>
          {!compact&&<button onClick={generate} disabled={generating} style={{padding:"0.28rem 0.65rem",borderRadius:"8px",border:"none",background:generating?"#ccc":pal.accentGrad,color:"#fff",fontWeight:"700",fontSize:"0.7rem",cursor:generating?"default":"pointer"}}>
            {generating?"🔄 Writing...":"🤖 Generate"}
          </button>}
          {compact&&<button onClick={generate} disabled={generating} style={{padding:"0.22rem 0.5rem",borderRadius:"7px",border:"none",background:generating?"#ccc":`linear-gradient(135deg,${cp.c1},${cp.c2})`,color:"#fff",fontWeight:"700",fontSize:"0.62rem",cursor:generating?"default":"pointer"}}>
            {generating?"...":"🤖 AI"}
          </button>}
        </div>
      </div>
      {error && <div style={{fontSize:"0.74rem",color:"#a03030",marginBottom:"0.5rem",padding:"0.5rem",background:"#faeae4",borderRadius:"8px"}}>{error}</div>}
      <textarea value={text} onChange={e=>save(e.target.value)}
        placeholder={"Write your annual narrative here, or use AI to generate one. Describe what "+ch.name+" studied this year, how they grew, highlights from each subject, and any notable achievements..."}
        rows={12}
        style={{width:"100%",padding:"0.75rem 0.9rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.8rem",fontFamily:"Georgia, serif",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.8}}
        onFocus={e=>e.target.style.borderColor=pal.primary}
        onBlur={e=>e.target.style.borderColor=pal.stone}/>
    </div>
  );
}

function NavModal({ pal, navIds, setNavIds, onClose }) {
  const initIds = navIds.includes("progress")?navIds:[...navIds,"progress"];

  const toggle=id=>{
    const s=ALL_SECTIONS.find(x=>x.id===id);
    if(s?.locked)return;
    if(local.includes(id)){if(local.length<=2)return;setLocal(l=>l.filter(x=>x!==id));}

  return (
    <BottomSheet pal={pal} onClose={onClose} title="Customize Your Nav" sub={"Customize your nav tabs"}>
      <div style={{display:"flex",flexDirection:"column",gap:"0.42rem",marginBottom:"1rem"}}>

function getTipsSeen(){try{return new Set(JSON.parse(localStorage.getItem(TIPS_KEY)||"[]"));}catch(e){return new Set();}}
function markTipSeen(id){try{const s=getTipsSeen();s.add(id);localStorage.setItem(TIPS_KEY,JSON.stringify([...s]));}catch(e){}}

function FirstVisitTip({pal, screen}){
  const tip = TIPS[screen];
  const [visible, setVisible] = useState(()=>!getTipsSeen().has(screen));
  const [pulsed,  setPulsed]  = useState(false);

  useEffect(()=>{
    if(!visible) return;
    const t = setTimeout(()=>setPulsed(true), 400);
    return ()=>clearTimeout(t);
  },[visible]);

  if(!tip||!visible) return null;
  const dismiss = () => { markTipSeen(screen); setVisible(false); };

  return (
    <div style={{margin:"0 1rem 0.85rem",animation:"fadeUp 0.35s ease"}}>
      <div onClick={dismiss} style={{
        display:"flex",alignItems:"center",gap:"0.55rem",
        background:pal.pale,
        border:`1.5px solid ${pal.primary}35`,
        borderRadius:"99px",
        padding:"0.45rem 0.75rem 0.45rem 0.55rem",
        cursor:"pointer",
        boxShadow: pulsed ? `0 0 0 4px ${pal.primary}18` : "none",
        animation: pulsed ? "tipPulse 1.2s ease 0.1s" : "none",
        transition:"box-shadow 0.3s",
        userSelect:"none",
      }}>
        <div style={{
          width:"22px",height:"22px",borderRadius:"50%",
          background:`linear-gradient(135deg,${pal.primary},${pal.mid})`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"0.75rem",flexShrink:0,

        <span style={{
          flex:1,fontSize:"0.76rem",color:pal.inkM,

    </div>
  );

function Chip({pal,label,active,onClick,dark,small}){

}
function Btn({pal,children,onClick,disabled,style={}}){
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"0.9rem",border:"none",borderRadius:"14px",background:disabled?"#ccc":pal.accentGrad,color:pal.onDark,fontWeight:"800",fontSize:"0.92rem",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,...style}}>{children}</button>;
}
function Input({pal,value,onChange,placeholder,type="text"}){
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:pal.ink,outline:"none",transition:"border-color 0.18s"}} onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>;
}
function Select({pal,value,onChange,options,placeholder}){
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"0.62rem 0.85rem",border:`2px solid ${value?pal.stone:pal.primary}`,borderRadius:"11px",fontSize:"0.85rem",background:pal.parchm,color:value?pal.ink:pal.slate,outline:"none",cursor:"pointer"}}>{placeholder&&!value&&<option value="" disabled>{placeholder}</option>}{options.map(o=><option key={o} value={o}>{o}</option>)}</select>;
}
function Lbl({pal,children}){
  return <div style={{fontSize:"0.72rem",fontWeight:"700",color:pal.inkM,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.38rem"}}>{children}</div>;

function PillBtn({pal,label,active,onClick}){
  return <button onClick={onClick} style={{padding:"0.3rem 0.75rem",border:`2px solid ${active?pal.primary:pal.stone+"60"}`,borderRadius:"50px",background:active?pal.pale:"transparent",color:active?pal.primary:pal.inkM,fontSize:"0.78rem",fontWeight:active?"700":"400",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.13s"}}>{label}</button>;

}
