/* -----------------------------------------
   THEME ENGINE (same as v2)
----------------------------------------- */
function lerpHex(a, b, t) {
  const ah=a.replace("#",""), bh=b.replace("#","");
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb=parseInt(bh.slice(4,6),16);
  return `#${Math.round(ar+(br-ar)*t).toString(16).padStart(2,"0")}${Math.round(ag+(bg-ag)*t).toString(16).padStart(2,"0")}${Math.round(ab+(bb-ab)*t).toString(16).padStart(2,"0")}`;
}
const lighten = (hex,a) => lerpHex(hex,"#ffffff",a);
const darken  = (hex,a) => lerpHex(hex,"#000000",a);

function buildTheme(a,b) {
  const mid=lerpHex(a,b,0.45), light=lerpHex(a,b,0.75);
  return {
    deep:darken(a,0.15), primary:a, mid, accent:b,
    accentD:darken(b,0.25), pale:lighten(b,0.70), paleMid:lighten(b,0.50),
    sand:lerpHex(lighten(a,0.88),"#fdf8ef",0.5),
    linen:lerpHex(lighten(b,0.92),"#ffffff",0.4),
    parchm:lerpHex(lighten(a,0.82),"#f5ead6",0.5),
    stone:lerpHex(lighten(a,0.55),"#c0b8a8",0.5),
    navGrad:`linear-gradient(160deg,${darken(a,0.15)},${a},${mid})`,
    heroGrad:`linear-gradient(160deg,${darken(a,0.12)},${mid})`,
    accentGrad:`linear-gradient(135deg,${mid},${b})`,
    shimmer:`linear-gradient(90deg,${lighten(b,0.55)},${lighten(a,0.65)},${lighten(b,0.55)})`,
    onDark:"#ffffff", onLight:darken(a,0.55),
    ink:"#1a1408", inkM:"#4a3c2a",
    slate:lerpHex(darken(a,0.05),"#8a7a62",0.55),
    good:lerpHex(b,"#44aa66",0.4), warn:"#c47818", bad:"#a03030",
    goodBg:lighten(lerpHex(b,"#44aa66",0.4),0.75),
    warnBg:"#fef0d0", badBg:"#faeae4",
  };
}

function printPortfolioPDF(family, entries, child, attendanceDays, stateInfo, dateOverride) {

    +".date-chip{background:rgba(255,255,255,0.15);border-radius:8px;padding:8px 14px;text-align:center}"

    +".dc-val{font-size:14pt;font-weight:700;color:#fff;margin-top:2px}"
    +".body{padding:20px 24px;background:#faf8f4}"
    +".section-label{font-size:7.5pt;color:#888;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;margin-top:14px}"
    +".section-label:first-child{margin-top:0}"
    +".subj-grid{display:grid;gap:10px;margin-bottom:14px}"
    +".subj-box{background:#fff;border-radius:8px;border:1px solid #e2ddd8;padding:11px 14px}"
    +".subj-tag{display:inline-block;background:#e8f0e8;color:#2a4a28;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;border-radius:4px;padding:2px 7px;margin-bottom:6px}"

    +".photo-placeholder{font-size:8pt;color:#ccc;text-align:center}"
    +".parent-note{background:#f8f7f4;border-left:3px solid #aaa;border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:14px}"
    +".parent-note-label{font-size:7pt;text-transform:uppercase;letter-spacing:0.1em;color:#888;font-weight:700;margin-bottom:4px}"

  // Parent note
  if(todayNote&&todayNote.note){
    const noteClean=(todayNote.note||"").replace("AI Summary: ","").trim();
    html += "<div class='parent-note'><div class='parent-note-label'>Parent Notes</div><div style='font-size:9.5pt;color:#444;line-height:1.65'>"+noteClean+"</div></div>";

  // FL/PA reading log
  if(needsReading && readingEntries.some(e=>e.readingTitle)){
    html += "<div class='section-label'>Reading Log (required by "+state+")</div>"

    readingEntries.filter(e=>e.readingTitle).forEach(e=>{
      html += "<div class='r-row'><div class='r-subj'>"+e.subj+"</div><div class='r-title'>"+e.readingTitle+"</div></div>";

    html += "<div class='photo-box'>";

  // Footer

    +"<div style='text-align:right'><div>"+state+" Homeschool Record</div>"
    +"<div class='f-note'>Keep for: "+ci.keepFor+"</div></div>"
    +"</div>"

    +"</div>" // body
    +"<script>window.onload=function(){setTimeout(function(){window.print();},500);};<\/script>"
    +"</body></html>";

  const w=window.open("","_blank","width=800,height=960,scrollbars=yes");
  if(w){w.document.write(html);w.document.close();}
  else{alert("Please allow popups to print your portfolio.");}

function printFullPortfolio(family, entries, child, attendanceDays, stateInfoUnused, aiSummary) {
  const schoolName  = family.schoolName||(family.familyName+" Academy")||"Home School";
  const yearStartNum= family.yearStart?new Date(family.yearStart).getFullYear():new Date().getFullYear();
  const yearEndNum  = family.yearEnd?new Date(family.yearEnd).getFullYear():yearStartNum+1;
  const today       = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const childName   = child?.name||"Student";
  const grade       = child?.grade||"";
  const avatar      = child?.avatar||"";
  const state       = family.state||"";
  const si          = getStateInfo(state);
  const ci          = getComplianceInfo(state, grade);
  const stateReqDays= parseInt((si.hours||"180").match(/\d+/)?.[0]||"180");
  const pct         = Math.min(100,Math.round(attendanceDays/stateReqDays*100));
  const subjEntries = entries.filter(e=>!e.isDay&&e.subj!=="Daily Notes")
    .sort((a,b)=>{try{return new Date(a.date+", "+yearStartNum)-new Date(b.date+", "+yearStartNum);}catch{return 0;}});
  const bySubject = {};
  subjEntries.forEach(e=>{ if(!bySubject[e.subj]) bySubject[e.subj]=[]; bySubject[e.subj].push(e); });
  const subjectList   = Object.keys(bySubject).sort((a,b)=>bySubject[b].length-bySubject[a].length);
  const readingTitles = [...new Set(subjEntries.filter(e=>e.readingTitle).map(e=>e.readingTitle))];

function getEOYWeeksLeft(family) {
  if(!family?.yearEnd) return null;
  const end = new Date(family.yearEnd);
  const today = new Date();
  const msLeft = end - today;
  if(msLeft < 0) return 0;
  return Math.ceil(msLeft / (7*24*60*60*1000));
}

/* =======================================

function TourModal({pal, onDone}){
  const [slide, setSlide] = useState(0);
  const [dir,   setDir]   = useState(1); // 1=forward, -1=back
  const [anim,  setAnim]  = useState(false);

  const SLIDES = [
    {
      emoji:"🏡",
      color:"#2a6a2a",
      color2:"#4a9a4a",
      title:"Your daily command center",
      body:"Log today's school day right from the home screen. Tap 📝 Log Today — it walks you through every subject in under a minute.",
      hint:"No jumping between screens. One tap and you're done.",
    },
    {
      emoji:"📅",
      color:"#1a5a8a",
      color2:"#3a8ac8",
      title:"Check off as you go",
      body:"The Schedule screen shows your daily blocks. Tap each subject as you finish it. When everything is done, one button saves it all to your portfolio.",
      hint:"You can customize the order and timing in ✏️ Edit.",
    },
    {
      emoji:"🗂",
      color:"#7a3a8a",
      color2:"#b06ac0",
      title:"Your living record",
      body:"Every day you log becomes part of your portfolio — entries, photos, reading titles, co-op sessions. It builds your year automatically.",
      hint:"Florida families: reading titles are tracked separately for your activity log.",
    },
    {
      emoji:"🎓",
      color:"#8a5a1a",
      color2:"#c08a3a",
      title:"Evaluation-ready all year",
      body:"When it's time for your annual evaluation, your transcript, reading log, attendance record, and narrative are already built. Just tap Print.",
      hint:"Find everything in More → Records.",
    },
  ];

  const goTo = (idx) => {
    if(idx===slide||anim) return;
    setDir(idx>slide?1:-1);
    setAnim(true);
    setTimeout(()=>{ setSlide(idx); setAnim(false); },220);
  };
  const next = () => slide < SLIDES.length-1 ? goTo(slide+1) : onDone();
  const prev = () => slide > 0 ? goTo(slide-1) : null;

  const s = SLIDES[slide];

  return (
    <div style={{position:"fixed",inset:0,zIndex:500,background:"#0a0f0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

      {/* Skip button */}
      <button onClick={onDone} style={{position:"absolute",top:"1.1rem",right:"1.1rem",background:"rgba(255,255,255,0.12)",border:"none",borderRadius:"20px",padding:"0.3rem 0.85rem",color:"rgba(255,255,255,0.55)",fontSize:"0.75rem",fontWeight:"600",cursor:"pointer",zIndex:10}}>
        Skip
      </button>

      {/* Slide */}
      <div key={slide} style={{
        width:"100%",maxWidth:"360px",padding:"0 1.5rem",
        animation: anim ? (dir>0?"slideOutLeft 0.22s ease forwards":"slideOutRight 0.22s ease forwards")
                        : (dir>0?"slideInRight 0.28s ease both":"slideInLeft 0.28s ease both"),
        textAlign:"center",
      }}>
        {/* Big emoji in colored circle */}
        <div style={{
          width:"110px",height:"110px",borderRadius:"50%",
          background:`radial-gradient(circle at 35% 35%, ${s.color2}, ${s.color})`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"3.5rem",margin:"0 auto 1.5rem",
          boxShadow:`0 12px 40px ${s.color}60`,
          animation:"grow 0.45s cubic-bezier(0.34,1.56,0.64,1) both",
        }}>
          {s.emoji}
        </div>

        {/* Title */}
        <h2 style={{
          fontFamily:"Georgia,serif",fontWeight:"900",
          color:"#fff",fontSize:"1.45rem",
          margin:"0 0 0.75rem",lineHeight:1.2,
          animation:"fadeUp 0.4s ease 0.1s both",
        }}>
          {s.title}
        </h2>

        {/* Body */}
        <p style={{
          color:"rgba(255,255,255,0.78)",fontSize:"0.92rem",
          lineHeight:1.65,margin:"0 0 1rem",
          animation:"fadeUp 0.4s ease 0.18s both",
        }}>
          {s.body}
        </p>

        {/* Hint pill */}
        <div style={{
          display:"inline-flex",alignItems:"center",gap:"0.35rem",
          background:`${s.color}35`,border:`1px solid ${s.color2}50`,
          borderRadius:"20px",padding:"0.35rem 0.85rem",
          animation:"fadeUp 0.4s ease 0.26s both",
        }}>
          <span style={{fontSize:"0.75rem"}}>{"💡"}</span>
          <span style={{fontSize:"0.73rem",color:"rgba(255,255,255,0.65)",fontWeight:"500"}}>{s.hint}</span>
        </div>
      </div>

      {/* Dot indicators */}
      <div style={{display:"flex",gap:"0.45rem",marginTop:"2.5rem",marginBottom:"1.5rem"}}>
        {SLIDES.map((_,i)=>(
          <button key={i} onClick={()=>goTo(i)} style={{
            width: i===slide?"22px":"8px",height:"8px",
            borderRadius:"99px",border:"none",cursor:"pointer",
            background: i===slide?"#fff":"rgba(255,255,255,0.25)",
            transition:"all 0.3s ease",
            padding:0,
          }}/>
        ))}
      </div>

      {/* Nav buttons */}
      <div style={{display:"flex",gap:"0.75rem",width:"100%",maxWidth:"320px",padding:"0 1.5rem"}}>
        {slide>0&&(
          <button onClick={prev} style={{
            flex:1,padding:"0.85rem",border:"2px solid rgba(255,255,255,0.2)",
            borderRadius:"14px",background:"transparent",
            color:"rgba(255,255,255,0.7)",fontWeight:"700",fontSize:"0.9rem",cursor:"pointer",
          }}>
            {"← Back"}
          </button>
        )}
        <button onClick={next} style={{
          flex:2,padding:"0.85rem",border:"none",borderRadius:"14px",
          background:slide===SLIDES.length-1
            ? `linear-gradient(135deg,${s.color},${s.color2})`
            : `linear-gradient(135deg,${s.color},${s.color2})`,
          color:"#fff",fontWeight:"900",fontSize:"0.95rem",cursor:"pointer",
          boxShadow:`0 6px 24px ${s.color}50`,
          transition:"box-shadow 0.3s",
        }}>
          {slide===SLIDES.length-1 ? "Let's start! 🌱" : "Next →"}
        </button>
      </div>

      <style>{`
        @keyframes slideInRight  { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideInLeft   { from{opacity:0;transform:translateX(-60px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideOutLeft  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-60px)} }
        @keyframes slideOutRight { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(60px)} }
      `}</style>
    </div>
  );
}

   END OF YEAR CHECKLIST + GRADE PROMOTION
======================================= */
function EOYChecklistModal({pal,family,childIdx,setChildIdx,weeksLeft,portfolioEntries=[],attendanceDays=0,onClose,onGradeUp}){
  const [tab, setTab] = useState("checklist"); // checklist | reflect | promote
  const [eoyAI,     setEoyAI]     = useState(null);
  const [eoyAILoad, setEoyAILoad] = useState(false);
  const [eoyAIErr,  setEoyAIErr]  = useState(null);

  const ch = family.children[childIdx]||family.children[0];
  if(!ch) return null;

  const info = getComplianceInfo(family.state||"", ch.grade||"5th");
  const next = nextGrade(ch.grade);
  const cp   = CHILD_COLOR_PALETTES.find(p=>p.id===(ch.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
  const REQUIRED = parseInt((getStateInfo(family.state||"").hours||"180").match(/\d+/)?.[0]||"180");

  // ── Checklist tab state ──
  const CHECKLIST_ITEMS = [
    {id:"attendance",  icon:"📋", label:"Attendance Record",      detail:attendanceDays+" days logged ("+info.hours+" required)"},
    {id:"activitylog", icon:"📓", label:"Activity Log",           detail:"Daily/weekly log with reading titles listed"},
    {id:"worksamples", icon:"📚", label:"Work Samples",           detail:"Beginning, middle, end of year per subject"},
    {id:"subjects",    icon:"🔬", label:"All Subjects Covered",   detail:info.subjects.slice(0,4).join(", ")+(info.subjects.length>4?" + more":"")},
    {id:"narrative",   icon:"📝", label:"Parent Narrative",       detail:"Written description of the year's progress"},
    ...(info.needsTest?[{id:"testing",icon:"📊",label:"Standardized Test",detail:"Required this grade in "+family.state}]:[]),
    {id:"portfolio",   icon:"🗂", label:"Portfolio Organized",    detail:"Sections tabbed, entries dated, photos included"},
    {id:"save",        icon:"💾", label:"Portfolio Saved/Printed",detail:"PDF saved or printed for your records"},
  ];
  const [checked, setChecked] = useState({});
  const toggle = id => setChecked(c=>({...c,[id]:!c[id]}));
  const doneCount = Object.values(checked).filter(Boolean).length;
  const allDone   = doneCount === CHECKLIST_ITEMS.length;

  // ── Reflection tab state ──
  const REFLECT_KEY = "rootbloom_eoy_reflect_"+(ch.id||"")+"_"+(family.yearEnd||"");
  const [reflectNote, setReflectNote] = useState(()=>{
    try{ return localStorage.getItem(REFLECT_KEY)||""; }catch(e){return "";}
  });
  const saveReflect = (v) => {
    setReflectNote(v);
    try{ localStorage.setItem(REFLECT_KEY, v); }catch(e){}
  };
  const [skillsChecked, setSkillsChecked] = useState({});
  const toggleSkill = (cat,i) => setSkillsChecked(s=>({...s,[cat+"_"+i]:!s[cat+"_"+i]}));

  // Portfolio entries for this child
  const childEntries = portfolioEntries.filter(e=>e.childIdx===childIdx);
  const subjEntries  = childEntries.filter(e=>!e.isDay&&e.subj!=="Daily Notes");

  // Subject counts
  const subjCounts = {};
  subjEntries.forEach(e=>{ subjCounts[e.subj]=(subjCounts[e.subj]||0)+1; });
  const subjList = Object.entries(subjCounts).sort((a,b)=>b[1]-a[1]);
  const maxCount = subjList[0]?.[1]||1;

  // Goals recap — map each goal to entry counts
  const allGoalObjs = [...GOALS,...(family.customGoals||[])];
  const generateEoyAI = async () => {
    setEoyAILoad(true); setEoyAIErr(null);
    const ci2 = family.children.indexOf(ch);
    const childEntries2 = portfolioEntries.filter(e=>e.childIdx===ci2);
    const subjEs = childEntries2.filter(e=>!e.isDay&&e.subj!=="Daily Notes");
    const bySubj = {};
    subjEs.forEach(e=>{ if(!bySubj[e.subj]) bySubj[e.subj]=[]; bySubj[e.subj].push(e); });
    const subjBreakdown = Object.keys(bySubj).map(s=>s+" ("+bySubj[s].length+")").join(", ");
    const readingTitles2 = [...new Set(subjEs.filter(e=>e.readingTitle).map(e=>e.readingTitle))];
    const notesSample = subjEs.filter(e=>(e.note||"").trim().length>20).slice(0,15).map(e=>e.subj+": "+((e.note||"").slice(0,100))).join(" | ");
    const yearStart2 = family.yearStart?new Date(family.yearStart).getFullYear():new Date().getFullYear();
    const yearEnd2   = family.yearEnd?new Date(family.yearEnd).getFullYear():yearStart2+1;
    const prompt = "Write a warm year-end summary for a homeschool portfolio.\n"
      +"Student: "+ch.name+", "+ch.grade+"\nSchool: "+(family.schoolName||family.familyName+" Academy")+"\n"
      +"Subjects: "+subjBreakdown+"\nDays: "+attendanceDays+"\nReading: "+(readingTitles2.slice(0,6).join(", ")||"not recorded")+"\n"
      +"Notes: "+notesSample+"\n\n"
      +"Respond ONLY in JSON (no markdown):\n"
      +'{"narrative":"2-3 warm sentences","accomplishments":["win 1","win 2","win 3"],"growthAreas":["area 1","area 2"],"readingHighlight":"one sentence","parentNote":"encouragement"}';
    try {
      const raw = await callClaude(prompt);
      setEoyAI(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { setEoyAIErr("Could not generate — try again."); }
    setEoyAILoad(false);
  };

  const goalRecap = (family.goals||[]).map(id=>{
    const g = allGoalObjs.find(x=>x.id===id);
    const nudge = GOAL_NUDGES[id];
    if(!g) return null;
    const relSubjs = nudge?.subjs||[];
    const count = relSubjs.length>0
      ? subjEntries.filter(e=>relSubjs.includes(e.subj)).length
      : 0;
    return {id, g, nudge, count, hasSubjs: relSubjs.length>0};
  }).filter(Boolean);

  // Skills for this grade
  const gradeSkills = EOY_SKILLS[ch.grade]||EOY_SKILLS["5th"]||[];
  const totalSkills = gradeSkills.reduce((s,cat)=>s+cat.skills.length,0);
  const checkedSkills = Object.values(skillsChecked).filter(Boolean).length;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.75)",backdropFilter:"blur(12px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"92vh",display:"flex",flexDirection:"column",animation:"slideUp 0.28s ease"}}>

        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>

        {/* Header */}
        <div style={{background:pal.heroGrad,padding:"0.9rem 1.2rem",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:"900",color:"#fff",fontSize:"1rem"}}>{"🎓 End of Year"}</div>
              <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.75)"}}>
                {weeksLeft===0?"Year complete!":weeksLeft===1?"Last week!":weeksLeft+" weeks remaining"}
              </div>
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"9px",padding:"0.3rem 0.65rem",color:"#fff",fontWeight:"700",fontSize:"0.75rem",cursor:"pointer"}}>Close</button>
          </div>
          {family.children.length>1&&(
            <div style={{display:"flex",gap:"0.35rem",marginTop:"0.65rem",overflowX:"auto"}}>
              {family.children.map((c,i)=>(
                <button key={c.id} onClick={()=>setChildIdx(i)}
                  style={{padding:"0.25rem 0.65rem",borderRadius:"20px",border:`2px solid ${childIdx===i?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.2)"}`,background:childIdx===i?"rgba(255,255,255,0.18)":"transparent",color:"#fff",fontSize:"0.72rem",fontWeight:childIdx===i?"700":"400",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                  {c.avatar} {c.name}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* 3-tab switcher */}
        <div style={{display:"flex",background:pal.parchm,margin:"0.75rem 1.2rem 0",borderRadius:"11px",padding:"3px",gap:"2px",flexShrink:0}}>
          {[["📋","Checklist","checklist"],["🌟","Year Review","reflect"],["🎓","Next Grade","promote"]].map(([icon,l,id])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{flex:1,padding:"0.42rem 0.3rem",border:"none",borderRadius:"9px",background:tab===id?pal.linen:"transparent",color:tab===id?pal.ink:pal.slate,fontSize:"0.65rem",fontWeight:tab===id?"700":"400",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"1px"}}>
              <span style={{fontSize:"0.85rem"}}>{icon}</span>
              <span>{l}</span>
            </button>
          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0.85rem 1.2rem"}}>

          {/* ====== CHECKLIST TAB ====== */}
          {tab==="checklist"&&(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.65rem"}}>
              <div style={{fontSize:"0.78rem",fontWeight:"700",color:pal.inkM}}>{ch.avatar} {ch.name} {"\u00b7"} {ch.grade}</div>
              <div style={{fontSize:"0.72rem",color:doneCount===CHECKLIST_ITEMS.length?pal.good:pal.slate,fontWeight:"700"}}>{doneCount}/{CHECKLIST_ITEMS.length} complete</div>
            </div>
            <div style={{height:"6px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"0.85rem"}}>
              <div style={{height:"100%",width:`${Math.round(doneCount/CHECKLIST_ITEMS.length*100)}%`,borderRadius:"99px",background:allDone?`linear-gradient(90deg,${pal.good},${pal.mid})`:pal.accentGrad,transition:"width 0.3s"}}/>
            </div>
            {info.deadline&&info.deadline!=="None"&&(
              <div style={{background:pal.pale,borderRadius:"12px",padding:"0.65rem 0.85rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.primary}20`,fontSize:"0.74rem",color:pal.inkM}}>
                <span style={{fontWeight:"700",color:pal.primary}}>{family.state||"Your state"} deadline:</span> {info.deadline}
              </div>
            )}
            {CHECKLIST_ITEMS.map((item)=>(
              <div key={item.id} onClick={()=>toggle(item.id)}
                style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",padding:"0.65rem 0.75rem",background:checked[item.id]?pal.goodBg:pal.linen,borderRadius:"12px",marginBottom:"0.42rem",border:`1.5px solid ${checked[item.id]?pal.good+"40":pal.stone+"35"}`,cursor:"pointer",transition:"all 0.15s"}}>
                <div style={{width:"36px",height:"36px",borderRadius:"10px",background:checked[item.id]?pal.good:pal.pale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0,transition:"background 0.15s"}}>
                  {checked[item.id]?"✓":item.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"700",color:checked[item.id]?pal.good:pal.ink,fontSize:"0.84rem",textDecoration:checked[item.id]?"line-through":"none"}}>{item.label}</div>
                  <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"1px",lineHeight:1.5}}>{item.detail}</div>
                </div>
              </div>
            ))}
            {allDone&&(
              <div style={{background:pal.goodBg,borderRadius:"14px",padding:"1rem",marginTop:"0.5rem",textAlign:"center",border:`2px solid ${pal.good}40`}}>
                <div style={{fontSize:"2rem",marginBottom:"0.3rem"}}>{"🌟"}</div>
                <div style={{fontWeight:"900",color:pal.good,fontSize:"0.95rem",marginBottom:"0.2rem"}}>Portfolio Complete!</div>
                <div style={{fontSize:"0.76rem",color:pal.inkM,marginBottom:"0.65rem"}}>Switch to {"\""}Year Review{"\""}  to see how far you{"'"}ve come.</div>
                <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",justifyContent:"center"}}>
                  <button onClick={()=>printEvaluatorLetter(family,ch,attendanceDays)}
                    style={{padding:"0.5rem 1rem",border:"none",borderRadius:"10px",background:pal.accentGrad,color:pal.onDark,fontWeight:"700",fontSize:"0.78rem",cursor:"pointer"}}>
                    {"📜 Evaluator Letter"}
                  </button>
                  <button onClick={()=>{
                    const ci3=family.children.indexOf(ch);
                    const childEntries3=portfolioEntries.filter(e=>e.childIdx===ci3);
                    printFullPortfolio(family,childEntries3,ch,attendanceDays,null,eoyAI||null);
                  }}
                    style={{padding:"0.5rem 1rem",border:`2px solid ${pal.primary}`,borderRadius:"10px",background:"transparent",color:pal.primary,fontWeight:"700",fontSize:"0.78rem",cursor:"pointer"}}>
                    {"📚 Full Portfolio"}
                  </button>
                </div>
              </div>
            )}
          </>)}

          {/* ====== YEAR REVIEW TAB ====== */}
          {tab==="reflect"&&(<>

            {/* ── Attendance summary ── */}
            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}}>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem"}}>{"Attendance"}</div>
                <div style={{fontWeight:"900",color:cp.c1,fontSize:"1rem"}}>{Math.min(100,Math.round(attendanceDays/REQUIRED*100))}{"% done"}</div>
              </div>
              <div style={{height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden",marginBottom:"6px"}}>
                <div style={{height:"100%",width:`${Math.min(100,Math.round(attendanceDays/REQUIRED*100))}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:pal.slate}}>
                <span><b style={{color:pal.ink}}>{attendanceDays}</b> days logged</span>
                <span><b style={{color:pal.ink}}>{Math.max(0,REQUIRED-attendanceDays)}</b> remaining</span>
                <span><b style={{color:pal.ink}}>{REQUIRED}</b> required</span>
              </div>
            </div>

            {/* ── Goals recap ── */}
            {goalRecap.length>0&&(
              <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem",marginBottom:"0.65rem"}}>Goals This Year</div>
                <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
                  {goalRecap.map(({id,g,nudge,count,hasSubjs})=>{
                    const hit = hasSubjs ? count>0 : null;
                    return (
                      <div key={id} style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.45rem 0.65rem",background:hit===true?pal.goodBg:pal.parchm,borderRadius:"10px",border:`1.5px solid ${hit===true?pal.good+"40":pal.stone+"25"}`}}>
                        <span style={{fontSize:"1rem",flexShrink:0}}>{nudge?.icon||g.icon}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:"700",color:pal.ink,fontSize:"0.8rem"}}>{g.label}</div>
                          {hasSubjs&&(
                            <div style={{fontSize:"0.66rem",color:hit?pal.good:pal.slate,marginTop:"1px"}}>
                              {count>0 ? count+" related entries logged " : "No related entries yet"}
                              {count>0&&<span style={{fontWeight:"900"}}>{"✓"}</span>}
                            </div>
                          )}
                        </div>
                        {!hasSubjs&&<span style={{fontSize:"0.68rem",color:pal.slate,fontStyle:"italic"}}>track manually</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── Subject breakdown ── */}
            {subjList.length>0&&(
              <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
                <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem",marginBottom:"0.65rem"}}>
                  {"Subjects Logged — "+subjEntries.length+" total entries"}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
                  {subjList.slice(0,8).map(([subj,cnt])=>(
                    <div key={subj} style={{display:"flex",alignItems:"center",gap:"0.55rem"}}>
                      <div style={{width:"88px",fontSize:"0.72rem",color:pal.inkM,fontWeight:"600",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subj}</div>
                      <div style={{flex:1,height:"8px",borderRadius:"99px",background:pal.parchm,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.round(cnt/maxCount*100)}%`,borderRadius:"99px",background:`linear-gradient(90deg,${cp.c1},${cp.c2})`,transition:"width 0.4s"}}/>
                      </div>
                      <div style={{fontSize:"0.72rem",fontWeight:"800",color:cp.c1,minWidth:"22px",textAlign:"right",flexShrink:0}}>{cnt}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── Grade-level skills checklist ── */}
            {gradeSkills.length>0&&(
              <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.65rem"}}>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem"}}>{ch.grade} Skills Checklist</div>
                  <div style={{fontSize:"0.7rem",color:pal.slate,fontWeight:"700"}}>{checkedSkills}/{totalSkills}</div>
                </div>
                {gradeSkills.map((cat)=>(
                  <div key={cat.cat} style={{marginBottom:"0.75rem"}}>
                    <div style={{fontSize:"0.65rem",fontWeight:"800",color:pal.primary,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.35rem"}}>{cat.cat}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:"0.28rem"}}>
                      {cat.skills.map((skill,si)=>{
                        const key = cat.cat+"_"+si;
                        const done = skillsChecked[key];
                        return (
                          <button key={si} onClick={()=>toggleSkill(cat.cat,si)}
                            style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.38rem 0.55rem",borderRadius:"9px",background:done?pal.goodBg:"#fff",border:`1px solid ${done?pal.good+"40":pal.stone+"25"}`,cursor:"pointer",textAlign:"left",transition:"all 0.12s"}}>
                            <div style={{width:"18px",height:"18px",borderRadius:"4px",border:`2px solid ${done?pal.good:pal.stone}`,background:done?pal.good:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.12s"}}>
                              {done&&<span style={{color:"#fff",fontSize:"0.65rem",fontWeight:"900"}}>{"✓"}</span>}
                            </div>
                            <span style={{fontSize:"0.76rem",color:done?pal.good:pal.inkM,fontWeight:done?"600":"400",textDecoration:done?"line-through":"none",lineHeight:1.4}}>{skill}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ── Year reflection notes ── */}
            {/* AI Year Summary */}
            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.5rem"}}>
                <div>
                  <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem"}}>{"✨ AI Year Summary"}</div>
                  <div style={{fontSize:"0.68rem",color:pal.slate,marginTop:"2px"}}>{"Accomplishments, growth areas"}</div>
                </div>
                {!eoyAI&&!eoyAILoad&&(
                  <button onClick={generateEoyAI}
                    style={{padding:"0.35rem 0.85rem",border:"none",borderRadius:"9px",background:cp.c1,color:"#fff",fontWeight:"800",fontSize:"0.73rem",cursor:"pointer",flexShrink:0}}>
                    {"Generate"}
                  </button>
                )}
                {eoyAI&&<button onClick={()=>{setEoyAI(null);setEoyAIErr(null);}} style={{padding:"0.3rem 0.65rem",border:`1px solid ${pal.stone}`,borderRadius:"9px",background:"transparent",color:pal.slate,fontSize:"0.68rem",cursor:"pointer",flexShrink:0}}>{"Redo"}</button>}
              </div>
              {eoyAILoad&&<div style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.35rem 0"}}>{[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:cp.c1,animation:`bounce 1s ease ${i*0.15}s infinite`}}/>)}<span style={{fontSize:"0.74rem",color:pal.slate}}>{"Reviewing the year..."}</span></div>}
              {eoyAIErr&&<div style={{fontSize:"0.74rem",color:"#a03030"}}>{eoyAIErr}</div>}
              {eoyAI&&(
                <div style={{animation:"fadeUp 0.2s ease"}}>
                  <div style={{fontSize:"0.79rem",color:pal.ink,lineHeight:1.7,fontStyle:"italic",marginBottom:"0.6rem",paddingBottom:"0.6rem",borderBottom:`1px solid ${pal.stone}25`}}>{eoyAI.narrative}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem",marginBottom:"0.5rem"}}>
                    <div>
                      <div style={{fontSize:"0.63rem",fontWeight:"800",color:cp.c1,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.28rem"}}>{"Biggest Wins"}</div>
                      {(eoyAI.accomplishments||[]).map((a,i)=>(
                        <div key={i} style={{display:"flex",gap:"0.32rem",fontSize:"0.74rem",color:pal.inkM,marginBottom:"0.2rem",alignItems:"baseline"}}>
                          <span style={{color:cp.c1,fontWeight:"700",flexShrink:0}}>{"✓"}</span><span>{a}</span>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{fontSize:"0.63rem",fontWeight:"800",color:"#b07800",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"0.28rem"}}>{"Keep Building"}</div>
                      {(eoyAI.growthAreas||[]).map((a,i)=>(
                        <div key={i} style={{display:"flex",gap:"0.32rem",fontSize:"0.74rem",color:pal.inkM,marginBottom:"0.2rem",alignItems:"baseline"}}>
                          <span style={{color:"#b07800",flexShrink:0}}>{"→"}</span><span>{a}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {eoyAI.readingHighlight&&<div style={{fontSize:"0.71rem",color:pal.slate,fontStyle:"italic",borderTop:`1px solid ${pal.stone}20`,paddingTop:"0.4rem"}}>{"📖 "}{eoyAI.readingHighlight}</div>}
                </div>
              )}
              {!eoyAI&&!eoyAILoad&&<div style={{fontSize:"0.71rem",color:pal.stone,textAlign:"center",padding:"0.4rem 0",fontStyle:"italic"}}>{"Tap Generate for "+ch.name+"'s year summary"}</div>}
            </div>

            <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"0.85rem",border:`1.5px solid ${pal.stone}30`}}>
              <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.84rem",marginBottom:"0.3rem"}}>Year Reflection</div>
              <div style={{fontSize:"0.72rem",color:pal.slate,marginBottom:"0.65rem",lineHeight:1.5}}>
                What went well this year? What would you do differently? Notes for next year.
              </div>
              <textarea
                value={reflectNote}
                onChange={e=>saveReflect(e.target.value)}
                placeholder={"e.g. " + ch.name + " really thrived with hands-on science this year. Reading improved significantly by mid-year. Next year we want to add more writing practice and get outside more. Overall a great year!"}
                rows={5}
                style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.81rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6}}
                onFocus={e=>e.target.style.borderColor=cp.c1}
                onBlur={e=>e.target.style.borderColor=pal.stone}/>
              {reflectNote.trim()&&(
                <div style={{fontSize:"0.66rem",color:pal.good,marginTop:"0.35rem",fontWeight:"600"}}>{"✓ Saved automatically"}</div>
              )}
            </div>

          </>)}

          {/* ====== NEXT GRADE TAB ====== */}
          {tab==="promote"&&(<>
            <div style={{textAlign:"center",marginBottom:"1rem"}}>
              <div style={{fontSize:"3rem",marginBottom:"0.4rem",animation:"bounce 2s ease infinite"}}>{ch.avatar}</div>
              <div style={{fontWeight:"900",color:pal.ink,fontSize:"1.1rem",marginBottom:"0.15rem"}}>{ch.name}</div>
              <div style={{fontSize:"0.8rem",color:pal.slate,marginBottom:"0.75rem"}}>Currently in <b>{ch.grade}</b></div>
            </div>
            {next ? (<>
              <div style={{background:pal.pale,borderRadius:"18px",padding:"1.1rem 1.2rem",marginBottom:"1rem",border:`2px solid ${pal.primary}25`,textAlign:"center"}}>
                <div style={{fontSize:"0.68rem",color:pal.slate,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.3rem"}}>Ready to advance to</div>
                <div style={{fontWeight:"900",color:pal.primary,fontSize:"1.6rem",marginBottom:"0.25rem"}}>{next}</div>
                <div style={{fontSize:"0.74rem",color:pal.slate}}>
                  {gradeLevel(next)==="high"&&gradeLevel(ch.grade)!=="high"?"High school begins — transcript tracking starts now":
                   gradeLevel(next)==="middle"&&gradeLevel(ch.grade)==="elementary"?"Moving to middle school — subject requirements expand":
                   "New grade, new goals!"}
                </div>
              </div>
              {(()=>{
                const nextInfo = getComplianceInfo(family.state||"", next);
                return (
                  <div style={{background:pal.linen,borderRadius:"14px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`1.5px solid ${pal.stone}35`}}>
                    <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.74rem",marginBottom:"0.5rem"}}>What changes in {next}</div>
                    {nextInfo.needsTest&&<div style={{background:"#fff8e8",borderRadius:"8px",padding:"0.4rem 0.6rem",marginBottom:"0.4rem",fontSize:"0.73rem",color:"#7a5500",fontWeight:"700",border:"1px solid #f5c842"}}>{"⚠️ Standardized test required in "+next+" ("+family.state+")"}</div>}
                    <div style={{fontSize:"0.74rem",color:pal.inkM,lineHeight:1.6}}>{nextInfo.gradeNote}</div>
                    {gradeLevel(next)==="high"&&<div style={{marginTop:"0.5rem",fontSize:"0.72rem",color:pal.primary,fontWeight:"700"}}>{"📜 Transcript tracking begins — grades and credits will be recorded from "+next+" onward."}</div>}
                  </div>
                );
              })()}
              <button onClick={()=>onGradeUp&&onGradeUp(childIdx,next)}
                style={{width:"100%",padding:"0.9rem",border:"none",borderRadius:"14px",background:pal.accentGrad,color:pal.onDark,fontWeight:"900",fontSize:"0.92rem",cursor:"pointer",boxShadow:`0 4px 18px ${pal.accent}40`,marginBottom:"0.6rem"}}>
                {"🎓 Advance "+ch.name+" to "+next}
              </button>
              <button onClick={onClose}
                style={{width:"100%",padding:"0.65rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,fontWeight:"600",fontSize:"0.84rem",cursor:"pointer"}}>
                {"Not yet — keep in "+ch.grade}
              </button>
            </>) : (
              <div style={{textAlign:"center",padding:"1rem",background:pal.goodBg,borderRadius:"18px",border:`2px solid ${pal.good}30`}}>
                <div style={{fontSize:"2.5rem",marginBottom:"0.5rem"}}>{"🎓"}</div>
                <div style={{fontWeight:"900",color:pal.good,fontSize:"1rem",marginBottom:"0.3rem"}}>Graduation!</div>
                <div style={{fontSize:"0.8rem",color:pal.inkM,lineHeight:1.65}}>{ch.name} has completed 12th grade. Congratulations on completing your homeschool journey!</div>
              </div>
            )}
          </>)}

        </div>
      </div>
    </div>
  );
}

/* =======================================
   NEW YEAR MODAL
======================================= */
function NewYearModal({pal,family,onStart,onDismiss}){
  const today = new Date();
  // Default new year: starts today, ends ~10 months from now
  const defStart = today.toISOString().slice(0,10);
  const defEnd = new Date(today.getFullYear()+1, today.getMonth()-1, today.getDate()).toISOString().slice(0,10);

  const [yearStart, setYearStart] = useState(defStart);
  const [yearEnd,   setYearEnd]   = useState(defEnd);
  const [children,  setChildren]  = useState(
    family.children.map(c=>({...c, newGrade: nextGrade(c.grade)||c.grade}))
  );
  const [subjects,  setSubjects]  = useState(family.subjects||[]);
  const [notes,     setNotes]     = useState({}); // {childId: noteText}
  const [step,      setStep]      = useState(0); // 0=intro 1=dates 2=grades 3=notes 4=subjects

  const allSubjs = [...SUBJECT_OPTIONS,...(family.customSubjects||[])];
  const toggleSubj = id => setSubjects(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const updGrade = (id, grade) => setChildren(cs=>cs.map(c=>c.id===id?{...c,newGrade:grade}:c));
  const updNote  = (id, val)   => setNotes(n=>({...n,[id]:val}));

  const handleStart = () => {
    onStart({
      yearStart,
      yearEnd,
      subjects,
      children: children.map(c=>({...c, grade:c.newGrade, newYearNote:notes[c.id]||""})),
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,10,4,0.82)",backdropFilter:"blur(14px)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"92vh",display:"flex",flexDirection:"column",animation:"slideUp 0.3s ease"}}>

        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>

        {/* Header */}
        <div style={{background:pal.heroGrad,padding:"1rem 1.2rem",flexShrink:0}}>
          <div style={{fontWeight:"900",color:"#fff",fontSize:"1.05rem",marginBottom:"2px"}}>{"🌱 New School Year!"}</div>
          <div style={{fontSize:"0.74rem",color:"rgba(255,255,255,0.75)"}}>
            {"Your " + new Date(family.yearEnd).getFullYear() + " school year has ended. Let" + String.fromCharCode(39) + "s set up the next one."}
          </div>
        </div>

        {/* Step dots */}
        <div style={{display:"flex",gap:"5px",padding:"0.7rem 1.2rem 0",flexShrink:0}}>
          {["Dates","Grades","Notes","Subjects"].map((l,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{height:"4px",borderRadius:"99px",background:i<=step-1?pal.primary:pal.stone+"35",marginBottom:"3px",transition:"background 0.25s"}}/>
              <div style={{fontSize:"0.58rem",color:i<=step-1?pal.primary:pal.stone,fontWeight:i===step-1?"700":"400"}}>{l}</div>
            </div>
          ))}
        </div>

        <div key={step} style={{flex:1,overflowY:"auto",padding:"1rem 1.2rem"}}>

          {/* Step 0: Intro */}
          {step===0&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              <div style={{textAlign:"center",marginBottom:"1.5rem",paddingTop:"0.5rem"}}>
                <div style={{fontSize:"3.5rem",marginBottom:"0.6rem"}}>🎉</div>
                <div style={{fontWeight:"900",color:pal.ink,fontSize:"1.1rem",marginBottom:"0.4rem"}}>Year Complete!</div>
                <div style={{fontSize:"0.82rem",color:pal.slate,lineHeight:1.65,maxWidth:"280px",margin:"0 auto"}}>
                  {"Your attendance counter will reset to zero and your new year will start fresh. Your portfolio and all past entries are saved."}
                </div>
              </div>
              <div style={{background:pal.pale,borderRadius:"14px",padding:"0.9rem 1rem",border:`1.5px solid ${pal.primary}20`,marginBottom:"1rem"}}>
                <div style={{fontWeight:"700",color:pal.inkM,fontSize:"0.82rem",marginBottom:"0.5rem"}}>{"What resets:"}</div>
                {[
                  ["📅","Attendance counter → back to 0"],
                  ["🔥","Daily streak → resets"],
                  ["📋","Schedule stays the same"],
                  ["🗂","Portfolio entries are kept"],
                ].map(([icon,label])=>(
                  <div key={label} style={{display:"flex",gap:"0.5rem",alignItems:"center",marginBottom:"0.3rem"}}>
                    <span style={{fontSize:"0.9rem",flexShrink:0}}>{icon}</span>
                    <span style={{fontSize:"0.78rem",color:pal.inkM}}>{label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Step 1: Dates */}
          {step===1&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.65rem"}}>New Year Dates</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.65rem",marginBottom:"1rem"}}>
                <div>
                  <Lbl pal={pal}>Start date</Lbl>
                  <input type="date" value={yearStart} onChange={e=>setYearStart(e.target.value)}
                    style={{width:"100%",padding:"0.55rem 0.7rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
                    onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
                </div>
                <div>
                  <Lbl pal={pal}>Goal end date</Lbl>
                  <input type="date" value={yearEnd} onChange={e=>setYearEnd(e.target.value)}
                    style={{width:"100%",padding:"0.55rem 0.7rem",border:`2px solid ${pal.stone}`,borderRadius:"10px",fontSize:"0.82rem",background:pal.parchm,color:pal.ink,outline:"none",fontFamily:"inherit"}}
                    onFocus={e=>e.target.style.borderColor=pal.primary} onBlur={e=>e.target.style.borderColor=pal.stone}/>
                </div>
              </div>
              <div style={{background:pal.linen,borderRadius:"12px",padding:"0.7rem 0.9rem",border:`1.5px solid ${pal.stone}30`,fontSize:"0.74rem",color:pal.slate,lineHeight:1.6}}>
                {"You can always adjust these later in Settings \u2192 Family."}
              </div>
            </div>
          )}

          {/* Step 2: Grade promotion */}
          {step===2&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Confirm Grades</div>
              <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.55}}>
                {"We" + String.fromCharCode(39) + "ve suggested the next grade for each child. Change any that don" + String.fromCharCode(39) + "t look right."}
              </div>
              {children.map(c=>{
                const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                const pcTier = c.newGrade&&["Pre-K","K","1st","2nd"].includes(c.newGrade)?"Playful & low-pressure"
                  :["3rd","4th","5th","6th","7th","8th"].includes(c.newGrade)?"Story-based & scenario-driven"
                  :"Matter-of-fact & responsibility-focused";
                return (
                  <div key={c.id} style={{background:pal.linen,borderRadius:"16px",padding:"0.9rem 1rem",marginBottom:"0.75rem",border:`1.5px solid ${pal.stone}30`}}>
                    <div style={{display:"flex",gap:"0.75rem",alignItems:"center",marginBottom:"0.75rem"}}>
                      <div style={{width:"42px",height:"42px",borderRadius:"11px",background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",flexShrink:0}}>{c.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"800",color:pal.ink,fontSize:"0.9rem"}}>{c.name}</div>
                        <div style={{fontSize:"0.7rem",color:pal.slate,marginTop:"1px"}}>
                          {c.grade} {"\u2192"} <span style={{fontWeight:"700",color:cp.c1}}>{c.newGrade}</span>
                        </div>
                      </div>
                      <select value={c.newGrade} onChange={e=>updGrade(c.id,e.target.value)}
                        style={{padding:"0.42rem 0.65rem",border:`2px solid ${cp.c1}`,borderRadius:"10px",fontSize:"0.84rem",background:pal.pale,color:cp.c1,fontWeight:"700",outline:"none",cursor:"pointer"}}>
                        {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    {family.lifeReady&&(
                      <div style={{background:`${LR_COLOR}10`,borderRadius:"9px",padding:"0.45rem 0.65rem",border:`1px solid ${LR_COLOR}25`,display:"flex",gap:"0.4rem",alignItems:"flex-start"}}>
                        <span style={{fontSize:"0.85rem",flexShrink:0}}>{LR_ICON}</span>
                        <div style={{fontSize:"0.69rem",color:LR_COLOR,lineHeight:1.5}}>
                          <b>P{"&"}C updates automatically</b>{" \u2014 "}{c.newGrade} lessons will use the <b>{pcTier}</b> style.
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Step 3: New year notes per child */}
          {step===3&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Teaching Notes</div>
              <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem",lineHeight:1.55}}>

              </div>
              {children.map(c=>{
                const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

                  <div key={c.id} style={{marginBottom:"1rem"}}>

                      <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.4rem"}}>

                        <span style={{fontWeight:"800",color:pal.ink,fontSize:"0.86rem"}}>{c.name}</span>
                        <span style={{fontSize:"0.7rem",color:pal.slate}}>{c.newGrade}</span>
                      </div>
                    )}
                    <textarea
                      value={notes[c.id]||""}
                      onChange={e=>updNote(c.id,e.target.value)}
                      placeholder={"e.g. " + c.name + " needs more practice with reading fluency. Really excelled at math this year \u2014 ready for harder problems. Consider adding more hands-on science. Keep an eye on writing stamina."}
                      rows={4}
                      style={{width:"100%",padding:"0.7rem 0.85rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",fontSize:"0.81rem",fontFamily:"inherit",background:pal.parchm,color:pal.ink,resize:"none",outline:"none",lineHeight:1.6}}
                      onFocus={e=>e.target.style.borderColor=cp.c1}
                      onBlur={e=>e.target.style.borderColor=pal.stone}/>
                  </div>
                );
              })}
              <div style={{background:pal.pale,borderRadius:"11px",padding:"0.65rem 0.85rem",border:`1.5px solid ${pal.primary}20`,fontSize:"0.71rem",color:pal.slate,lineHeight:1.55}}>
                {"These notes are saved to each child" + String.fromCharCode(39) + "s profile and will show in their portfolio as a new year note."}
              </div>
            </div>
          )}

          {/* Step 4: Subjects */}
          {step===4&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              <div style={{fontWeight:"800",color:pal.inkM,fontSize:"0.82rem",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.2rem"}}>Subjects This Year</div>
              <div style={{fontSize:"0.74rem",color:pal.slate,marginBottom:"0.85rem"}}>Review and update for the new year. Add or remove anything that changed.</div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.35rem"}}>
                {allSubjs.map(s=>{
                  const sel=subjects.includes(s.id);
                  return (
                    <button key={s.id} onClick={()=>toggleSubj(s.id)}
                      style={{display:"flex",gap:"0.65rem",alignItems:"center",padding:"0.6rem 0.85rem",border:`2px solid ${sel?pal.primary:pal.stone+"50"}`,borderRadius:"11px",background:sel?pal.pale:"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.13s"}}>
                      <span style={{fontSize:"1rem",width:"22px",textAlign:"center",flexShrink:0}}>{s.icon||"📋"}</span>
                      <span style={{flex:1,fontWeight:sel?"700":"400",color:sel?pal.primary:pal.inkM,fontSize:"0.83rem"}}>{s.label}</span>
                      <div style={{width:"18px",height:"18px",borderRadius:"4px",border:`2px solid ${sel?pal.primary:pal.stone}`,background:sel?pal.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel&&<span style={{color:"#fff",fontSize:"0.72rem",fontWeight:"900"}}>{"✓"}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

        </div>

        {/* Footer */}
        <div style={{padding:"0.9rem 1.2rem",borderTop:`1px solid ${pal.stone}40`,background:pal.linen,flexShrink:0,display:"flex",gap:"0.55rem"}}>
          {step===0 ? (
            <button onClick={onDismiss}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.82rem"}}>
              Later
            </button>
          ) : (
            <button onClick={()=>setStep(s=>s-1)}
              style={{padding:"0.7rem 1rem",border:`2px solid ${pal.stone}`,borderRadius:"12px",background:"transparent",color:pal.slate,cursor:"pointer",fontSize:"0.82rem"}}>
              Back
            </button>
          )}
          <button onClick={()=>{
            if(step<4) setStep(s=>s+1);
            else handleStart();
          }} style={{flex:1,padding:"0.7rem",border:"none",borderRadius:"12px",background:pal.accentGrad,color:"#fff",fontWeight:"800",fontSize:"0.88rem",cursor:"pointer"}}>
            {step===0?"Set up new year \u2192":step===4?"Start new year \uD83C\uDF31":"Next \u2192"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =======================================
   OBSERVATION JOURNAL MODAL
   Private per-child parent notes.
   Quick capture, timestamped, never
   shown in portfolio or reports.
======================================= */
function ObservationJournalModal({pal, family, childId, entries, onAdd, onDelete, onClose}){
  const child = family.children.find(c=>c.id===childId)||family.children[0];
  const ci    = family.children.findIndex(c=>c.id===childId);
  const cp    = CHILD_COLOR_PALETTES.find(p=>p.id===(child?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];

  const [text,     setText]     = useState("");
  const [delConf,  setDelConf]  = useState(null); // id to confirm delete
  const inputRef = useRef(null);

  const childEntries = entries.filter(e=>e.childId===childId)
    .sort((a,b)=>b.ts-(a.ts||0));

  const handleAdd = () => {
    const t = text.trim();
    if(!t) return;
    const now = new Date();
    onAdd({
      id: uid(),
      childId,
      text: t,
      ts: now.getTime(),
      date: now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),
      time: now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
    });
    setText("");
    inputRef.current?.focus();
  };

  const PROMPTS = [
    "Had a breakthrough with...",
    "Struggled today with...",
    "Asked a great question about...",
    "Really excited about...",
    "I noticed...",
    "Something to follow up on...",
  ];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,15,10,0.8)",backdropFilter:"blur(14px)",zIndex:250,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:pal.linen,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:"430px",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 -16px 60px rgba(0,0,0,0.35)",animation:"slideUp 0.28s ease"}}>

        {/* Handle */}
        <div style={{padding:"0.7rem 0 0",display:"flex",justifyContent:"center",flexShrink:0}}>
          <div style={{width:"36px",height:"4px",borderRadius:"99px",background:pal.stone}}/>
        </div>

        {/* Header */}
        <div style={{background:`linear-gradient(135deg,${cp.c1},${cp.c2})`,padding:"0.9rem 1.2rem",flexShrink:0}}>

                          Delete

                      </div>

                      <button onClick={()=>setDelConf(entry.id)}
                        style={{width:"20px",height:"20px",borderRadius:"50%",border:`1px solid ${pal.stone}30`,background:"transparent",color:pal.stone,fontSize:"0.58rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>

                  {/* Note text */}
                  <div style={{fontSize:"0.83rem",color:pal.ink,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                    {entry.text}
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{height:"0.5rem"}}/>
        </div>
      </div>
    </div>
  );
}

const DISMISS_KEY = "rootbloom_goals_nudge_dismiss";

function GoalsNudgeCard({pal,family,portfolioEntries,todayStr,onTabChange}){
  const goals = family.goals||[];
  if(goals.length===0) return null;

  // Check if dismissed today
  const [dismissed, setDismissed] = useState(()=>{
    try{ return localStorage.getItem(DISMISS_KEY)===todayStr; }catch(e){return false;}
  });
  const dismiss = () => {
    try{ localStorage.setItem(DISMISS_KEY, todayStr); }catch(e){}
    setDismissed(true);
  };
  if(dismissed) return null;

  // Find the most actionable goal — prefer one whose subject hasn't been logged today
  const todayEntries = portfolioEntries.filter(e=>
    e.date===new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})
  );
  const loggedSubjsToday = new Set(todayEntries.map(e=>e.subj));

  // Score each goal: +2 if subject not yet logged today, +1 otherwise
  const allGoalObjs = [...GOALS,...(family.customGoals||[])];
  const scored = goals.map(id=>{
    const g = allGoalObjs.find(x=>x.id===id);
    const nudge = GOAL_NUDGES[id];
    if(!g||!nudge) return null;
    const subjectLogged = nudge.subjs.length>0 && nudge.subjs.some(s=>loggedSubjsToday.has(s));
    return {id, g, nudge, subjectLogged, score: subjectLogged?0:2};
  }).filter(Boolean).sort((a,b)=>b.score-a.score);

  if(scored.length===0) return null;

  const primary = scored[0]; // most actionable goal
  const completed = primary.subjectLogged;

  // Show top 3 goal icons
  const topGoals = scored.slice(0,3);

  return (
    <div style={{background:pal.linen,borderRadius:"16px",border:`1.5px solid ${pal.primary}25`,marginBottom:"1rem",overflow:"hidden"}}>
      {/* Header row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.7rem 0.9rem 0.55rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <span style={{fontSize:"0.62rem",fontWeight:"800",color:pal.primary,textTransform:"uppercase",letterSpacing:"0.1em"}}>
            Working Toward
          </span>
        </div>
        <button onClick={dismiss}
          style={{width:"22px",height:"22px",borderRadius:"50%",background:pal.parchm,border:"none",color:pal.stone,fontSize:"0.7rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700",flexShrink:0}}>
          {"✕"}
        </button>
      </div>

      {/* Goal pills */}
      <div style={{display:"flex",gap:"0.35rem",padding:"0 0.9rem 0.65rem",flexWrap:"wrap"}}>
        {topGoals.map(({id,g,subjectLogged})=>{
          const nudge = GOAL_NUDGES[id];
          return (
            <button key={id} onClick={()=>onTabChange("goals")}
              style={{display:"flex",alignItems:"center",gap:"0.3rem",padding:"0.22rem 0.6rem",background:subjectLogged?pal.goodBg:`${pal.primary}12`,borderRadius:"20px",border:`1.5px solid ${subjectLogged?pal.good+"50":pal.primary+"30"}`,cursor:"pointer"}}>
              <span style={{fontSize:"0.85rem"}}>{nudge?.icon||g.icon}</span>
              <span style={{fontSize:"0.7rem",fontWeight:"700",color:subjectLogged?pal.good:pal.primary}}>{g.label}</span>
              {subjectLogged&&<span style={{fontSize:"0.65rem",color:pal.good,fontWeight:"900"}}>{"✓"}</span>}
            </button>
          );
        })}
        {goals.length>3&&(
          <button onClick={()=>onTabChange("goals")}
            style={{display:"flex",alignItems:"center",padding:"0.22rem 0.55rem",background:pal.parchm,borderRadius:"20px",border:"none",cursor:"pointer"}}>
            <span style={{fontSize:"0.68rem",color:pal.slate,fontWeight:"600"}}>+{goals.length-3} more</span>
          </button>
        )}
      </div>

      {/* Nudge message */}
      <div style={{borderTop:`1px solid ${pal.stone}20`,padding:"0.6rem 0.9rem",background:completed?"transparent":pal.pale,display:"flex",gap:"0.6rem",alignItems:"center"}}>
        <span style={{fontSize:"1rem",flexShrink:0}}>{completed?"🌟":primary.nudge?.icon||"💡"}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:"0.77rem",color:completed?pal.good:pal.inkM,fontWeight:"600",lineHeight:1.5}}>
            {completed
              ? primary.g.label+" logged today — great work!"
              : primary.nudge.nudge}
          </div>
        </div>
        <button onClick={()=>onTabChange("goals")}
          style={{padding:"0.28rem 0.7rem",border:"none",borderRadius:"9px",background:pal.accentGrad,color:"#fff",fontSize:"0.68rem",fontWeight:"800",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
          {"View Goals"}
        </button>
      </div>
    </div>
  );
}

function HomeScreen({ pal, family, child, setChild, onTheme, attendanceDays, checkinStreak, lastCheckinDate, portfolioEntries, onTabChange, todayProgress, onAddEntry, onCheckin, checkinDates={}, observationLog=[], onOpenJournal, attendanceLog=[], studentVisits={} }) {
  const stateInfo  = getStateInfo(family.state||"");
  const stateHours = stateInfo.hours||"";
  const dayMatch   = stateHours.match(/(\d+)\s*day/i);
  const REQUIRED   = dayMatch ? parseInt(dayMatch[1]) : (stateInfo.attendance ? 180 : null);
  const blocks = generateSchedule(family, family.scheduleMode2!=="same"?(child!=="all"?child:family.children?.[0]?.id):null);
  const [showQuickLog, setShowQuickLog] = useState(false);
  const [logQueue,     setLogQueue]     = useState([]); // children yet to be logged in sequence
  const [nextChildPrompt, setNextChildPrompt] = useState(null); // {nextChildId, prevEntries, queue}
  const [carryOverSubjs,  setCarryOverSubjs]  = useState([]);
  const todayStr = new Date().toDateString();

  // Start logging — build queue of children who haven't been logged today
  const startLog = () => {
    const todayDateStr = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    if(child!=="all"||family.children.length===1){
      // Single child mode — log that child
      setLogQueue([]);
      setShowQuickLog(true);
    } else {
      // Multi-child — queue all children not yet logged today
      const unlogged = family.children.filter(c=>checkinDates[c.id]!==todayStr);
      if(unlogged.length===0){
        // All already logged — still allow adding more
        setLogQueue([]);
        setShowQuickLog(true);
      } else {
        setLogQueue(unlogged.slice(1).map(c=>c.id));
        setChild(unlogged[0].id);
        setShowQuickLog(true);
      }
    }
  };

  // P&C week completion state
  const PC_KEY = "rootbloom_pc_done";
  const getPCWeekKey = () => {
    const now = new Date();
    const yearStart = new Date(now.getFullYear(),7,1);
    const weekNum = Math.floor((now-yearStart)/(7*24*60*60*1000));
    return now.getFullYear()+"-"+weekNum;
  };
  const [pcDone, setPcDone] = useState(()=>{
    try{ const s=localStorage.getItem(PC_KEY); return s?JSON.parse(s).weekKey===getPCWeekKey():false; }catch(e){return false;}
  });
  const markPCDone = () => {
    try{ localStorage.setItem(PC_KEY,JSON.stringify({weekKey:getPCWeekKey(),date:new Date().toDateString()})); }catch(e){}
    setPcDone(true);
  };
  const visible = blocks.filter(b=>child==="all"||b.c==="all"||b.c===child);
  const pct = REQUIRED ? Math.min(100, Math.round((attendanceDays/REQUIRED)*100)) : null;
  const onTrack = (() => {
    if(!REQUIRED||!family.yearStart||!family.yearEnd) return pct!==null?(pct>=68):true;
    const start=new Date(family.yearStart), end=new Date(family.yearEnd), now=new Date();
    const totalDays=(end-start)/(24*60*60*1000);
    const elapsed=Math.max(0,(now-start)/(24*60*60*1000));
    const expectedPct=Math.min(100,Math.round((elapsed/totalDays)*100));
    return pct>=expectedPct-10;
  })();
  // checkedInToday: true if the currently viewed child (or any child in all mode) is logged today
  const checkedInToday = child!=="all"
    ? checkinDates[child]===todayStr
    : family.children.some(c=>checkinDates[c.id]===todayStr) || lastCheckinDate===todayStr;

  // Build subject progress from portfolio entries
  const customSubjs = family.customSubjects || [];
  const allSubjMap = Object.fromEntries([...SUBJECT_OPTIONS,...customSubjs].map(s=>[s.id,s]));
  const activeSubjects = (family.subjects||[]).slice(0,5).map(id=>allSubjMap[id]).filter(Boolean);
  const totalEntries = portfolioEntries.length || 1;
  const subjProgress = activeSubjects.map(s=>{
    const count = portfolioEntries.filter(e=>e.subj===s.label||e.subj===s.id).length;
    return {n:s.label, i:s.icon, p:Math.min(95,Math.round((count/Math.max(totalEntries*0.3,1))*100))};
  });

  // Hours estimate using daily goal or default 3hrs
  const dailyHrs = (() => {
    const g = family.dailyHoursGoal||"3 hours/day";
    if(g==="No hour tracking") return null;
    const m = g.match(/(\d+)/);
    return m ? parseInt(m[1]) : 3;
  })();
  const hoursEst = dailyHrs ? Math.round(attendanceDays * dailyHrs) : null;

  return (
    <div style={{animation:"fadeUp 0.24s ease"}}>
      {/* Hero header */}
      <div style={{background:pal.heroGrad,padding:"1.4rem 1.1rem 1.65rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:"-40px",top:"-40px",width:"160px",height:"160px",borderRadius:"50%",background:"rgba(255,255,255,0.055)"}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.14em",fontWeight:"700",marginBottom:"0.18rem"}}>{today()}</div>
          <h1 style={{margin:"0 0 0.08rem",fontSize:"1.45rem",fontWeight:"800",color:"rgba(255,255,255,0.95)",lineHeight:1.2}}>{greet()},</h1>
          <h1 style={{margin:"0 0 1.1rem",fontSize:"1.45rem",fontWeight:"800",lineHeight:1.2,background:pal.shimmer,backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 4s linear infinite"}}>
            {family.parentName||family.familyName} 🌱
          </h1>
          <div style={{display:"flex",gap:"0.38rem",flexWrap:"wrap"}}>
            <Chip pal={pal} label="All" active={child==="all"} onClick={()=>setChild("all")} dark />
            {family.children.map(c=><Chip key={c.id} pal={pal} label={c.avatar+" "+c.name} active={child===c.id} onClick={()=>setChild(c.id)} dark />)}
          </div>
        </div>
      </div>

      <div style={{padding:"1rem"}}>
        <FirstVisitTip pal={pal} screen="home"/>

        {/* ── Multi-child dashboard — shown when "All" selected and 2+ children ── */}
        {child==="all" && family.children.length>1 && (()=>{
          const todayDateStr = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
          const weekStart = new Date();
          weekStart.setDate(weekStart.getDate() - (weekStart.getDay()===0?6:weekStart.getDay()-1));
          const weekDates = Array.from({length:5},(_,i)=>{
            const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
            return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
          });

          return (
            <div style={{marginBottom:"1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
                <span style={{fontWeight:"800",color:pal.inkM,fontSize:"0.78rem",textTransform:"uppercase",letterSpacing:"0.06em"}}>{"Today's Roster"}</span>
                <span style={{fontSize:"0.68rem",color:pal.slate}}>{new Date().toLocaleDateString("en-US",{weekday:"long"})}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.42rem"}}>
                {family.children.map((c,ci)=>{
                  const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(c.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
                  const childEntries = portfolioEntries.filter(e=>e.childIdx===ci);
                  const loggedToday = checkinDates[c.id]===todayStr || childEntries.some(e=>e.date===todayDateStr&&!e.isDay);
                  const weekEntries = childEntries.filter(e=>weekDates.includes(e.date)&&!e.isDay).length;
                  const lastEntry = childEntries[0];

                  // Get child's subjects for mini progress dots
                  const childSubjs = family.scheduleMode2==="separate"||family.scheduleMode2==="mixed"
                    ? (c.scheduleConfig?.subjects||family.subjects||[])
                    : (family.subjects||[]);
                  const loggedSubjsToday = new Set(childEntries.filter(e=>e.date===todayDateStr&&!e.isDay).map(e=>e.subj));
                  const subjDone = childSubjs.filter(id=>{
                    const s=[...SUBJECT_OPTIONS,...(family.customSubjects||[])].find(x=>x.id===id);
                    return s&&loggedSubjsToday.has(s.label);
                  }).length;
                  const selfLoggedToday = childEntries.filter(e=>e.date===todayDateStr&&e.selfLogged);

                  return (
                    <button key={c.id} onClick={()=>setChild(c.id)}
                      style={{display:"flex",gap:"0.75rem",alignItems:"center",padding:"0.75rem 0.9rem",background:loggedToday?`linear-gradient(135deg,${cp.c1}18,${cp.c2}10)`:`${pal.linen}`,borderRadius:"14px",border:`2px solid ${loggedToday?cp.c1+"50":pal.stone+"30"}`,cursor:"pointer",textAlign:"left",transition:"all 0.15s",width:"100%"}}>

                      {/* Avatar */}

                        {c.avatar}
                        {loggedToday&&(

                      </div>

                      {/* Name + grade + last activity */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:"0.4rem",marginBottom:"2px"}}>

                        {loggedToday?(

                              : lastEntry
                                ? "Last logged: "+lastEntry.date
                                : "No entries yet"}

                        )}
                      </div>

                      {/* Week entries badge + journal button + arrow */}
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:0}}>
                        <div style={{background:loggedToday?cp.c1:pal.parchm,borderRadius:"20px",padding:"0.18rem 0.55rem",display:"flex",alignItems:"center",gap:"0.25rem"}}>
                          <span style={{fontSize:"0.68rem",fontWeight:"800",color:loggedToday?"#fff":pal.slate}}>{weekEntries}</span>
                          <span style={{fontSize:"0.58rem",color:loggedToday?"rgba(255,255,255,0.8)":pal.stone,fontWeight:"600"}}>this wk</span>
                        </div>
                        <div style={{display:"flex",gap:"0.3rem",alignItems:"center"}}>
                          <button onClick={e=>{e.stopPropagation();onOpenJournal&&onOpenJournal(c.id);}}
                            style={{padding:"0.15rem 0.45rem",border:`1.5px solid ${pal.stone}40`,borderRadius:"8px",background:pal.parchm,color:pal.slate,fontSize:"0.65rem",cursor:"pointer",fontWeight:"600"}}>
                            {"📓"}
                          </button>
                          <span style={{fontSize:"0.72rem",color:pal.stone}}>{"›"}</span>
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* Stats row - filtered by selected child (or single-child families) */}
        {(child!=="all" || family.children.length===1) && (()=>{
          const ci = child==="all" ? 0 : family.children.findIndex(c=>c.id===child);
          const ch = family.children[ci];
          const cp = CHILD_COLOR_PALETTES.find(p=>p.id===(ch?.colorId||"sunshine"))||CHILD_COLOR_PALETTES[0];
          const childEntries = portfolioEntries.filter(e=>e.childIdx===ci);
          return (
            <div style={{background:`linear-gradient(135deg,${cp.c1}22,${cp.c2}15)`,borderRadius:"16px",padding:"0.85rem 1rem",marginBottom:"1rem",border:`2px solid ${cp.c1}30`,display:"flex",gap:"0.75rem",alignItems:"center"}}>
